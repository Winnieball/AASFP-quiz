避免高撞擊性訓練，考慮非負重訓練如固定自行車或水中有氧。", "page": 79, "source": "補充練習題", "id": 179}, {"chapter": "8. 特別需要人士訓練指引", "stem": "鐮刀型紅血球疾病患者運動時，建議每運動多久應稍作休息？", "options": {"A": "20分鐘", "B": "5分鐘", "C": "60分鐘", "D": "不需要休息"}, "answer": "A", "explanation": "鐮刀型紅血球疾病患者每運動20分鐘便應稍作休息，不應持續運動多於20分鐘，以免脫水及乳酸積聚。", "page": 80, "source": "補充練習題", "id": 180}, {"chapter": "8. 特別需要人士訓練指引", "stem": "教練面對特別需要人士時的角色定位是：", "options": {"A": "不需理會客人的運動反應", "B": "可代替醫生作診斷", "C": "不具備康復治療資格，必要時應先獲醫護人員同意書", "D": "可自行進行康復治療"}, "answer": "C", "explanation": "教練不具備進行康復治療及診斷的資格，必要時應先獲得醫生或專業人士同意書才能開始運動。", "page": 79, "source": "補充練習題", "id": 181}, {"chapter": "8. 特別需要人士訓練指引", "stem": "冠心病的典型症狀是疼痛可能延伸至：", "options": {"A": "腹部下方", "B": "右腳掌", "C": "頭頂", "D": "左胸延伸到左腋下、左手內側及肩胛骨之間"}, "answer": "D", "explanation": "冠心病痛楚可從左胸延伸到左腋下和左手內側，以及肩胛骨之間。", "page": 81, "source": "補充練習題", "id": 182}, {"chapter": "8. 特別需要人士訓練指引", "stem": "糖尿病人士的高血糖定義通常是超過：", "options": {"A": "6.0 mmol/L", "B": "7.0 mmol/L", "C": "3.9 mmol/L", "D": "10-11.1 mmol/L"}, "answer": "D", "explanation": "糖尿病人士高血糖定義為血糖值超過10-11.1 mmol/L。", "page": 82, "source": "補充練習題", "id": 183}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "急性軟組織受傷處理原則 P.OL.I.C.E. 中，「OL」代表：", "options": {"A": "Overload 超負荷", "B": "Optimal Loading 施加理想負荷", "C": "Open Leg 打開雙腿", "D": "Only Load 只負重"}, "answer": "B", "explanation": "P.OL.I.C.E.分別代表Protection保護、Optimal Loading理想負荷、Ice冰敷、Compression加壓及Elevation抬高。", "page": 93, "source": "補充練習題", "id": 184}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "軟組織受傷處理不宜事項H.A.R.M.中，「R」代表：", "options": {"A": "Running 走動", "B": "Recovery 恢復", "C": "Rehabilitation 康復", "D": "Rest 休息"}, "answer": "A", "explanation": "H.A.R.M.代表Hot熱、Alcohol酒精、Running走動及Massage按摩，四者於急性受傷初期均不宜。", "page": 93, "source": "補充練習題", "id": 185}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "P.OL.I.C.E.及H.A.R.M.處理原則適用於受傷後多久內？", "options": {"A": "一星期後", "B": "6-12小時", "C": "48至72小時內", "D": "24小時內"}, "answer": "C", "explanation": "此兩套處理原則適用於急性創傷後48至72小時內，目的是紓緩病情及防止傷患惡化。", "page": 93, "source": "補充練習題", "id": 186}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "運動創傷的「內在因素」不包括：", "options": {"A": "柔韌性欠佳", "B": "錯誤選擇運動器材", "C": "關節排列不良", "D": "肌肉不平衡"}, "answer": "B", "explanation": "錯誤選擇運動器材屬於外在因素；內在因素包括體適能水平、關節排列不良、肌肉不平衡、柔韌性欠佳及關節失穩等。", "page": 92, "source": "補充練習題", "id": 187}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "訓練前熱身的R.A.M.原則中，「M」代表：", "options": {"A": "Massage 按摩", "B": "Mobilize 活動關節提升幅度和靈活", "C": "Motivation 動機", "D": "Maximum 最大化"}, "answer": "B", "explanation": "R.A.M.代表Raise提升體溫循環、Activate激活核心/穩定肌群及Mobilize活動關節提升靈活度。", "page": 101, "source": "補充練習題", "id": 188}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "扭傷（Sprain）與拉傷（Strain）的分別是：", "options": {"A": "扭傷只發生於上肢", "B": "扭傷是韌帶受傷，拉傷是肌肉或肌腱受傷", "C": "兩者完全相同", "D": "扭傷是肌肉受傷，拉傷是韌帶受傷"}, "answer": "B", "explanation": "扭傷是韌帶被過度拉扯撕裂（如踝關節扭傷），拉傷則是肌肉或肌腱過度拉扯撕裂（如膕繩肌拉傷）。", "page": 93, "source": "補充練習題", "id": 189}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "肩關節夾擠症候群的常見誘因不包括：", "options": {"A": "高沖擊撞擊性活動如快跑", "B": "肩胛穩定及肩袖肌群薄弱", "C": "經常於高危肩膊位置重複運動", "D": "圓肩、寒背"}, "answer": "A", "explanation": "肩關節夾擠症候群主要與肩部重複性動作、圓肩姿勢及肩胛/肩袖肌群薄弱有關，與下肢高沖擊活動關聯較低。", "page": 95, "source": "補充練習題", "id": 190}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "肩關節夾擠症候群患者，肩外展至哪個角度範圍時痛楚特別明顯（疼痛弧）？", "options": {"A": "0-30度", "B": "沒有特定角度", "C": "150-180度", "D": "60-120度"}, "answer": "D", "explanation": "肩外展60-120度時痛楚特別明顯，稱為「疼痛弧」。", "page": 95, "source": "補充練習題", "id": 191}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "髕骨關節綜合症（前膝疼痛）患者訓練調整建議不包括：", "options": {"A": "考慮貼紥改善髕骨位置", "B": "減低跑步里數或增加休息", "C": "深蹲改半蹲", "D": "增加跳躍訓練量"}, "answer": "D", "explanation": "髕骨關節綜合症患者應減少跳躍及高沖擊訓練，而非增加，以免加劇病情。", "page": 96, "source": "補充練習題", "id": 192}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "下背痛及腰椎扭傷的成因不包括：", "options": {"A": "提起重物時姿勢不良", "B": "核心肌肉反應遲緩或衰弱", "C": "充足熱身及漸進式訓練", "D": "長期坐姿不正確"}, "answer": "C", "explanation": "充足熱身及漸進式訓練是預防受傷的方法，並非下背痛的成因。", "page": 96, "source": "補充練習題", "id": 193}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "根據課程分類，「類別III」訓練動作的特點是：", "options": {"A": "經改良後適合普通人士", "B": "低風險高效益，適合普羅大眾", "C": "必須每日進行", "D": "風險過大、回報價值較低，容易受傷"}, "answer": "D", "explanation": "類別III訓練對任何人士都屬風險過大、回報/價值較低，容易受傷，訓練好處亦不明確。", "page": 95, "source": "補充練習題", "id": 194}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "訓練後冷卻及放鬆的作用不包括：", "options": {"A": "加快清除乳酸", "B": "減輕遲發性肌肉酸痛", "C": "直接治療已存在的關節炎", "D": "減低運動後生理及心理疲勞"}, "answer": "C", "explanation": "訓練後冷卻放鬆主要有助恢復及減少疲勞和酸痛，但教練不具治療關節炎等病症的資格。", "page": 95, "source": "補充練習題", "id": 195}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "肩關節夾擠症候群訓練調整建議中，上斜臥推應如何調整？", "options": {"A": "增加至過頭推舉", "B": "改為平板或下斜臥推，或採用窄手", "C": "改為直立划船", "D": "不需調整"}, "answer": "B", "explanation": "上斜臥推對肩關節夾擠風險較高，建議改為平板或下斜臥推，並採用較窄的握距以降低風險。", "page": 95, "source": "補充練習題", "id": 196}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 5, "stem": "背闊肌的收縮動作包括：", "options": {"A": "肘伸展及肘屈曲", "B": "肩伸展、肩內旋及肩內收", "C": "髖伸展及膝屈曲", "D": "肩外展及肩外旋"}, "answer": "B", "explanation": "背闊肌起於胸椎、腰椎、髂骨及骶骨，止於肱骨前上方，收縮動作為肩伸展、肩內旋及肩內收。", "source": "補充練習題", "id": 197}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 5, "stem": "膕繩肌（Hamstrings）的止端位於：", "options": {"A": "坐骨", "B": "脛骨及腓骨", "C": "股骨", "D": "髂骨"}, "answer": "B", "explanation": "膕繩肌起於坐骨（Ischium），止於脛骨及腓骨，收縮動作為膝屈曲及髖伸展。", "source": "補充練習題", "id": 198}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 5, "stem": "中三角肌主要負責的動作是：", "options": {"A": "肩外展", "B": "肩伸展", "C": "肩屈曲", "D": "肩內收"}, "answer": "A", "explanation": "中三角肌起於肩胛骨，止於肱骨，主要收縮動作為肩外展。", "source": "補充練習題", "id": 199}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 7, "stem": "肩袖肌群中，負責「肩內旋」的肌肉是：", "options": {"A": "小圓肌", "B": "肩胛下肌", "C": "棘下肌", "D": "棘上肌"}, "answer": "B", "explanation": "肩胛下肌止於肱骨前方，收縮動作為肩內旋；棘下肌及小圓肌則負責肩外旋。", "source": "補充練習題", "id": 200}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 9, "stem": "根據課程內容，最大攝氧量（VO2max）被公認是甚麼體適能項目的最佳指標？", "options": {"A": "肌肉力量", "B": "柔韌度", "C": "平衡力", "D": "心肺耐力"}, "answer": "D", "explanation": "VO2max公認是心肺耐力這項體適能的最佳客觀及準確指標。", "source": "補充練習題", "id": 201}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 9, "stem": "根據VO2max與運動強度的關係，當運動強度達至最高點時，攝氧量會：", "options": {"A": "持續線性上升不會停止", "B": "與運動強度無關", "C": "達至最高點及出現平原位置", "D": "隨即下降"}, "answer": "C", "explanation": "當運動強度達至最高點時，攝氧量會隨之達至最高點及出現平原位置（plateau）。", "source": "補充練習題", "id": 202}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 10, "stem": "周邊神經系統（PNS）的主要功能包括：", "options": {"A": "儲存長期記憶", "B": "傳遞資訊及反射作用", "C": "控制內分泌腺體", "D": "產生意識思考"}, "answer": "B", "explanation": "周邊神經系統（PNS）負責傳遞資訊及執行反射作用，並將訊息傳送至中樞神經系統（CNS）作整合。", "source": "補充練習題", "id": 203}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 11, "stem": "以下關於I型與IIx型肌纖維比較，何者正確？", "options": {"A": "兩者代謝方式相同", "B": "兩者收縮速度相同", "C": "I型抗疲乏性較高，IIx型收縮力量較高", "D": "I型收縮力量較高，IIx型抗疲乏性較高"}, "answer": "C", "explanation": "I型肌纖維（慢縮）抗疲乏性高但收縮力量低；IIx型肌纖維（快縮）收縮力量極高但抗疲乏性低。", "source": "補充練習題", "id": 204}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 19, "stem": "Jackson & Pollock女士三點皮褶測試的量度部位是：", "options": {"A": "髂脊上、小腿、大腿", "B": "三頭肌、髂脊上、大腿", "C": "胸、腹、大腿", "D": "三頭肌、腹、小腿"}, "answer": "B", "explanation": "女士三點皮褶測試部位為三頭肌、髂脊上及大腿；男士則為胸、腹及大腿。", "source": "補充練習題", "id": 205}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 20, "stem": "男性胸部皮褶測量點的描述是：", "options": {"A": "大腿前側髖膝關節中間以垂直線捏起", "B": "前腋線與乳頭中間位置以斜線捏起", "C": "肚臍右側1英寸位置以垂直線捏起", "D": "肩峰與鷹嘴突中間以垂直線捏起"}, "answer": "B", "explanation": "男性胸部皮褶位置是前腋線與乳頭中間位置，以斜線方向捏起。", "source": "補充練習題", "id": 206}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 21, "stem": "女性三頭肌皮褶測量點的描述是：", "options": {"A": "肚臍旁以垂直線捏起", "B": "髂脊上方，前腋線延長線以斜線捏起", "C": "上臂後部，肩峰與鷹嘴突中間以垂直線捏起", "D": "大腿前側以垂直線捏起"}, "answer": "C", "explanation": "女性三頭肌皮褶位置是上臂後部（肱三頭肌），肩峰（肩）與鷹嘴突（肘）的中間位置，以垂直線捏起。", "source": "補充練習題", "id": 207}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 18, "stem": "量度血壓時，橡皮箍袖至少應能圍著覆蓋上臂範圍的：", "options": {"A": "80%以上", "B": "100%", "C": "30%以上", "D": "50%以上"}, "answer": "A", "explanation": "務必使用合適大小的橡皮箍袖，至少能圍著覆蓋80%以上的上臂範圍。", "source": "補充練習題", "id": 208}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 18, "stem": "量度血壓時，箍袖底邊應與肘窩位相距約：", "options": {"A": "1厘米", "B": "2.5厘米", "C": "5厘米", "D": "0.5厘米"}, "answer": "B", "explanation": "箍袖底邊應與肘窩位有2.5厘米距離，聽診器則置於箍袖和肘窩之間，大約位於肱二頭肌腱內側。", "source": "補充練習題", "id": 209}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 22, "stem": "1.5英哩跑測試較適用於哪類人群？", "options": {"A": "長者或體能較弱人士", "B": "大部份健身人士", "C": "心臟病患者", "D": "孕婦"}, "answer": "B", "explanation": "1.5英哩跑測試（2.41km）適用於大部份健身人士；1英哩步行測試則較常用於長者或體能水平較弱人士。", "source": "補充練習題", "id": 210}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 22, "stem": "動態肌耐力測試中，評估背部肌群耐力常用的動作是：", "options": {"A": "引體上升", "B": "平板支撐", "C": "捲腹", "D": "深蹲"}, "answer": "A", "explanation": "動態肌耐力測試中，背部肌群常用引體上升；胸部用掌上壓；腹部用捲腹。", "source": "補充練習題", "id": 211}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 23, "stem": "BESS平衡測試每個站立情況最多可扣多少分？", "options": {"A": "20分", "B": "10分", "C": "15分", "D": "5分"}, "answer": "B", "explanation": "BESS平衡測試每個情況最多扣10分（即20秒內最多計10次錯誤），如同時作出多個錯誤動作，只作一個錯誤計算。", "source": "補充練習題", "id": 212}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 22, "stem": "靜態肌力測試中，最具代表性的測試動作是：", "options": {"A": "掌上壓", "B": "深蹲", "C": "手握力測試", "D": "平板支撐"}, "answer": "C", "explanation": "靜態肌力測試以手握力測試最大肌力，較適用於一般大眾；動態最大肌力測試（3RM）則較適用於有訓練經驗人士。", "source": "補充練習題", "id": 213}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 31, "stem": "槓鈴（啞鈴）平板臥推舉的目標肌肉包括：", "options": {"A": "胸大肌、三角肌前束、肱三頭肌", "B": "腹直肌、豎脊肌", "C": "股四頭肌、臀大肌", "D": "背闊肌、二頭肌"}, "answer": "A", "explanation": "臥推舉的活動平面為水平面，關節活動為肩水平內收及肘伸展，目標肌肉為胸大肌、三角肌前束及肱三頭肌。", "source": "補充練習題", "id": 214}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 31, "stem": "臥推舉的常見高危動作不包括：", "options": {"A": "肘關節超伸", "B": "膝關節微屈", "C": "肘部低於肩部水平", "D": "腰椎過於拱起超過一掌距離"}, "answer": "B", "explanation": "膝關節微屈是蹲舉的正確要求，並非臥推舉的高危動作；臥推舉高危動作包括肘超伸、肘低於肩水平及腰椎過度拱起。", "source": "補充練習題", "id": 215}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 32, "stem": "蹲舉的目標肌肉包括：", "options": {"A": "股四頭肌、臀大肌、膕繩肌", "B": "胸大肌、三角肌", "C": "背闊肌、二頭肌", "D": "腓腸肌、比目魚肌"}, "answer": "A", "explanation": "蹲舉的活動平面為矢狀面，關節活動為髖伸展及膝伸展，目標肌肉為股四頭肌、臀大肌及膕繩肌。", "source": "補充練習題", "id": 216}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 32, "stem": "蹲舉時，正確的腳尖方向建議是朝向：", "options": {"A": "完全朝前", "B": "沒有特定方向", "C": "完全朝外90度", "D": "時鐘11:05的指標方向"}, "answer": "D", "explanation": "蹲舉時雙腳打開與肩同寬，腳尖建議朝向時鐘11:05的指標方向。", "source": "補充練習題", "id": 217}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 31, "stem": "阻力訓練動作中，「身體位置」這項分析重點主要是指：", "options": {"A": "呼吸節奏", "B": "訓練後的恢復方式", "C": "訓練開始前身體各部位的擺放及對齊", "D": "動作完成所需時間"}, "answer": "C", "explanation": "「身體位置」是指訓練動作開始前，身體各部位（如手握位置、雙腳、脊椎）的正確擺放及對齊方式。", "source": "補充練習題", "id": 218}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 32, "stem": "蹲舉時「身體穩定」的要求包括：", "options": {"A": "膝關節鎖死", "B": "雙手自然垂放", "C": "肩帶聳起，核心放鬆", "D": "肩帶縮回下壓，腹橫肌收緊，背部挺直"}, "answer": "D", "explanation": "蹲舉的身體穩定要求與臥推舉相同：肩帶縮回下壓、腹橫肌收緊及背部挺直，以維持軀幹穩定。", "source": "補充練習題", "id": 219}, {"chapter": "4. 訓練原則和方案設計", "page": 44, "stem": "以增肌（肌肉圍度）為主要目標的CO-FIVR-PT方案中，建議的強度是：", "options": {"A": "15-20 RM", "B": "最大心率的80%", "C": "6-12 RM", "D": "1-3 RM"}, "answer": "C", "explanation": "以增肌為主的CO-FIVR-PT方案建議強度為6-12 RM，訓練量3-6組，組間休息≤90秒。", "source": "補充練習題", "id": 220}, {"chapter": "4. 訓練原則和方案設計", "page": 44, "stem": "以增肌為主要目標的訓練速度節奏建議是：", "options": {"A": "完全爆發式無停頓", "B": "向心5秒，離心5秒", "C": "向心2秒，停約1秒，離心2-3秒", "D": "沒有特定建議"}, "answer": "C", "explanation": "增肌為主的CO-FIVR-PT方案建議節奏為向心2秒、停約1秒、離心2-3秒（2-1-2）。", "source": "補充練習題", "id": 221}, {"chapter": "4. 訓練原則和方案設計", "page": 45, "stem": "以肌肉力量為主要目標的訓練方案，建議的組間休息時間是：", "options": {"A": "≥3分鐘", "B": "不需要休息", "C": "30-60秒", "D": "≤30秒"}, "answer": "A", "explanation": "以肌肉力量為主的CO-FIVR-PT方案建議組間休息≥3分鐘，強度約6RM，訓練量3-6組。", "source": "補充練習題", "id": 222}, {"chapter": "4. 訓練原則和方案設計", "page": 45, "stem": "以肌肉力量為主要目標的訓練次序建議是：", "options": {"A": "單關節先於多關節", "B": "上身先於下身", "C": "下身先於上身", "D": "沒有固定次序"}, "answer": "C", "explanation": "以肌肉力量為主的訓練次序建議下身先於上身進行。", "source": "補充練習題", "id": 223}, {"chapter": "4. 訓練原則和方案設計", "page": 46, "stem": "高階訓練技巧中，「金字塔訓練法」的其中一種實踐方式是：", "options": {"A": "阻力逐漸上升，每組重複次數逐漸下降", "B": "每組重量不變", "C": "阻力維持不變，透過調整動作幅度製造變化", "D": "整個訓練週期集中安排單一組數的高強度動作"}, "answer": "A", "explanation": "金字塔訓練法其中一種實踐方式為「每組加重訓練法」：阻力逐漸上升，同時每組重複次數逐漸下降。", "source": "補充練習題", "id": 224}, {"chapter": "4. 訓練原則和方案設計", "page": 46, "stem": "「預先疲勞訓練法」的訓練次序是：", "options": {"A": "先進行孤立式動作（單關節），再進行複合式動作（雙關節）", "B": "全程只安排孤立式動作，避免涉及複合動作", "C": "全程只安排複合式動作，避免涉及孤立動作", "D": "先進行複合式動作，再進行孤立式動作"}, "answer": "A", "explanation": "預先疲勞訓練法是先進行孤立式（單關節）動作，然後緊接複合式（雙關節）動作，例如先做器械坐式腿屈伸，再做槓鈴蹲舉。", "source": "補充練習題", "id": 225}, {"chapter": "4. 訓練原則和方案設計", "page": 46, "stem": "力竭後馬上更換較輕重量再完成幾次的訓練法，稱為：", "options": {"A": "超級組訓練法", "B": "金字塔訓練法", "C": "循環訓練法", "D": "Drop set"}, "answer": "D", "explanation": "力竭後馬上更換輕一點的重量再做幾次，常被稱為Drop set（遞減組訓練法）。", "source": "補充練習題", "id": 226}, {"chapter": "4. 訓練原則和方案設計", "page": 46, "stem": "「超級組訓練法1」的做法是：", "options": {"A": "以不同角度訓練同一組肌群", "B": "連續做兩個動作，分別針對原動肌和其拮抗肌，動作之間盡量少休息", "C": "單一動作重複做到力竭", "D": "每組休息5分鐘"}, "answer": "B", "explanation": "超級組訓練法1是連續做兩個動作，分別針對原動肌和其拮抗肌，兩動作之間沒有或盡量少休息，例如鋼線二頭肌彎舉配鋼線臂屈伸。", "source": "補充練習題", "id": 227}, {"chapter": "4. 訓練原則和方案設計", "page": 46, "stem": "循環訓練法一般建議每個訓練動作之間的休息時間及每個循環的時長是：", "options": {"A": "休息5分鐘，循環30分鐘", "B": "休息10秒，循環約15分鐘", "C": "不需要休息，循環1小時", "D": "休息1分鐘，循環5分鐘"}, "answer": "B", "explanation": "循環訓練法將數個訓練動作組合成一個循環，動作之間只有約10秒極短休息，每個循環約15分鐘，重複2-3次。", "source": "補充練習題", "id": 228}, {"chapter": "4. 訓練原則和方案設計", "page": 47, "stem": "根據阻力訓練處方一般指引，以提升「爆發力」為主要目標，建議的重複次數及最大阻力百分比是：", "options": {"A": "≤6次，≥85%", "B": "≥12次，≤67%", "C": "3-5次，30-90%", "D": "6-12次，67-85%"}, "answer": "C", "explanation": "以提升爆發力為目標，建議重複3-5次，強度為最大阻力（1RM）的30-90%，組間休息2-5分鐘。", "source": "補充練習題", "id": 229}, {"chapter": "4. 訓練原則和方案設計", "page": 47, "stem": "根據阻力訓練處方一般指引，以提升「肌耐力」為主要目標，建議的組間休息時間是：", "options": {"A": "2-5分鐘", "B": "5分鐘以上", "C": "30-90秒", "D": "≤30秒"}, "answer": "D", "explanation": "以提升肌耐力為目標，建議重複次數≥12次，強度≤67% 1RM，組間休息≤30秒，每週訓練2-3次以上。", "source": "補充練習題", "id": 230}, {"chapter": "4. 訓練原則和方案設計", "page": 47, "stem": "根據阻力訓練處方一般指引，以提升「肌力」（力量）為主要目標，建議的每週訓練次數是：", "options": {"A": "沒有建議", "B": "4-6次", "C": "1-2次", "D": "7次"}, "answer": "B", "explanation": "以提升肌力為目標，建議重複次數≤6次，強度≥85% 1RM，組間休息2-5分鐘，每週訓練4-6次。", "source": "補充練習題", "id": 231}, {"chapter": "4. 訓練原則和方案設計", "page": 47, "stem": "「超量恢復」指的是：", "options": {"A": "訓練後立即進行下一節訓練", "B": "完全沒有訓練效果", "C": "訓練強度不足導致體能下降", "D": "訓練後有足夠休息，體能水平超越初始水平的狀態"}, "answer": "D", "explanation": "超量恢復指從一節或一段時期的訓練後，配合足夠休息，令體能水平超越訓練前初始水平的狀態。", "source": "補充練習題", "id": 232}, {"chapter": "4. 訓練原則和方案設計", "page": 47, "stem": "超量恢復週期中，「Involution」代表的階段是：", "options": {"A": "恢復", "B": "超量恢復", "C": "衰減", "D": "疲勞"}, "answer": "C", "explanation": "超量恢復週期分為I=Fatigue疲勞、II=Recovery恢復、III=Supercompensation超量恢復、IV=Involution衰減四個階段。", "source": "補充練習題", "id": 233}, {"chapter": "4. 訓練原則和方案設計", "page": 44, "stem": "以增肌為主的CO-FIVR-PT訓練方案中，訓練動作的選取建議是：", "options": {"A": "採用孤立肌肉，將重點劃分訓練時間表", "B": "只用自身體重動作", "C": "不需要規劃", "D": "完全使用複合動作"}, "answer": "A", "explanation": "以增肌為主的方案建議採用孤立肌肉的訓練動作，並按肌肉分化劃分訓練時間表（分化計劃）。", "source": "補充練習題", "id": 234}, {"chapter": "4. 訓練原則和方案設計", "page": 45, "stem": "以肌肉力量為主的CO-FIVR-PT方案，訓練動作的選取可按：", "options": {"A": "與客人目標無關", "B": "功能、動作類別或身體部位規劃訓練時間表", "C": "只能按身體部位規劃", "D": "只能按單一動作規劃"}, "answer": "B", "explanation": "以肌肉力量為主的方案，訓練動作選取可按功能（如最大肌力、減速離心肌力）、動作類別（如推、拉、轉身）或身體部位規劃。", "source": "補充練習題", "id": 235}, {"chapter": "4. 訓練原則和方案設計", "page": 46, "stem": "以下哪項不屬於課程列出的高階訓練技巧？", "options": {"A": "超級組訓練法", "B": "皮褶測量法", "C": "預先疲勞訓練法", "D": "金字塔訓練法"}, "answer": "B", "explanation": "皮褶測量法屬於體適能評估（第二章）內容，並非高階訓練技巧；高階訓練技巧包括金字塔、預先疲勞、力竭、超級組、循環訓練等。", "source": "補充練習題", "id": 236}, {"chapter": "4. 訓練原則和方案設計", "page": 46, "stem": "「離心收縮訓練法」的做法是：", "options": {"A": "利用教練/拍檔/器械提供離心訓練環境", "B": "主要著重向心收縮階段的力量發展", "C": "訓練負荷主要依靠自身體重提供", "D": "與循環訓練法相同"}, "answer": "A", "explanation": "離心收縮訓練法是利用教練、拍檔或器械提供額外的離心訓練環境，以加強離心階段的訓練刺激。", "source": "補充練習題", "id": 237}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 55, "stem": "課程指出，私人教練的溝通技巧中，「距離」屬於哪一類？", "options": {"A": "非語言溝通", "B": "與溝通技巧無關", "C": "只適用於書面溝通", "D": "語言溝通"}, "answer": "A", "explanation": "距離屬於非語言溝通技巧的一種，與眼神接觸、身體接觸、儀表及聆聽同屬人際溝通的重要元素。", "source": "補充練習題", "id": 238}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 54, "stem": "私人教練成功之道的四大互相配合部分不包括：", "options": {"A": "良好溝通技巧", "B": "良好銷售業績", "C": "低廉收費", "D": "良好服務態度"}, "answer": "C", "explanation": "私人教練成功之道由良好銷售業績、良好溝通技巧、良好服務態度及專業訓練技巧與知識四方面互相配合而成，並非取決於低廉收費。", "source": "補充練習題", "id": 239}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 54, "stem": "根據課程，私人教練成功條件的「藝術」部分包括：", "options": {"A": "心態、溝通、服務、銷售", "B": "安全性", "C": "知識和技巧", "D": "以上皆非"}, "answer": "A", "explanation": "私人教練成功條件的「藝術」部分包括心態、溝通、服務及銷售；「科學」部分則包括知識技巧及安全性。", "source": "補充練習題", "id": 240}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 55, "stem": "銷售六步曲中，「向客戶解釋處方的內容」屬於第幾步？", "options": {"A": "第六步", "B": "第二步", "C": "第三步", "D": "第五步"}, "answer": "D", "explanation": "六步曲第五步是向客戶解釋處方的內容，其後第六步才完成付款手續。", "source": "補充練習題", "id": 241}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 55, "stem": "銷售六步曲中，第二步的內容是：", "options": {"A": "完成付款手續", "B": "了解客戶的需求及目標", "C": "估計客戶時間的配合", "D": "建立融洽和諧的關係"}, "answer": "B", "explanation": "六步曲第二步是了解客戶的需求及目標，其後第三步才估計客戶需要多長時間達到目標。", "source": "補充練習題", "id": 242}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 54, "stem": "良好的非語言溝通不包括以下哪一項？", "options": {"A": "眼神接觸", "B": "姿勢", "C": "創造舒適的環境", "D": "利用鼓勵性字眼"}, "answer": "D", "explanation": "利用鼓勵性字眼屬於語言溝通技巧；眼神接觸、姿勢及創造舒適環境則屬於非語言溝通技巧。", "source": "補充練習題", "id": 243}, {"chapter": "6. 營養及運動表現", "page": 59, "stem": "肌肉蛋白質重塑主要受以下哪兩者的平衡影響？", "options": {"A": "睡眠質量及運動時間", "B": "心率及血壓", "C": "碳水化合物及脂肪攝取", "D": "肌蛋白合成及肌蛋白分解"}, "answer": "D", "explanation": "肌肉蛋白質重塑受肌蛋白合成及肌蛋白分解的平衡所影響。", "source": "補充練習題", "id": 244}, {"chapter": "6. 營養及運動表現", "page": 60, "stem": "耐力運動前3-4小時，建議攝取碳水化合物的份量是：", "options": {"A": "1-4克/公斤體重", "B": "10-15克/公斤體重", "C": "不需要攝取", "D": "0.5克/公斤體重"}, "answer": "A", "explanation": "耐力運動前3-4小時，建議攝取1-4克碳水化合物/公斤體重，以增加肌醣原儲備，有利於超過90分鐘的耐力性運動。", "source": "補充練習題", "id": 245}, {"chapter": "6. 營養及運動表現", "page": 60, "stem": "耐力運動持續45分鐘以下，關於碳水化合物補充的建議是：", "options": {"A": "必須補充脂肪", "B": "必須大量補充", "C": "只能補充蛋白質", "D": "並非必須補充"}, "answer": "D", "explanation": "運動持續時間少於45分鐘，碳水化合物的攝取並非必須；45-75分鐘則可與含碳水化合物飲料漱口或飲用。", "source": "補充練習題", "id": 246}, {"chapter": "6. 營養及運動表現", "page": 62, "stem": "肌酸磷酸的「維持期」建議攝取量是：", "options": {"A": "不需要維持期", "B": "3-5克/日", "C": "50克/日", "D": "20克/日"}, "answer": "B", "explanation": "肌酸適應期建議持續5-7日、每日約20克（分4等份）；其後轉為維持期，建議3-5克/日（一劑量）。", "source": "補充練習題", "id": 247}, {"chapter": "6. 營養及運動表現", "page": 62, "stem": "支鏈氨基酸（BCAA）延緩疲勞感的機制，主要是透過降低哪種物質的比例？", "options": {"A": "葡萄糖濃度", "B": "心率", "C": "色氨酸相對BCAA的比例", "D": "乳酸濃度"}, "answer": "C", "explanation": "研究顯示BCAA可減低色氨酸（一種可使腦部產生疲勞感的物質）對BCAA的比例，從而延緩疲勞感。", "source": "補充練習題", "id": 248}, {"chapter": "6. 營養及運動表現", "page": 59, "stem": "增肌人士的每日蛋白質建議攝取次數／餐數安排是：", "options": {"A": "1餐內攝取全部所需份量", "B": "攝取次數可按個人習慣自由調整，效果分別不大", "C": "分開5至6餐進食", "D": "只能於運動後攝取"}, "answer": "C", "explanation": "現時對增肌人士蛋白質攝入的分配建議是分開5至6餐進食，多餘的蛋白質會轉化成脂肪或碳水化合物。", "source": "補充練習題", "id": 249}, {"chapter": "6. 營養及運動表現", "page": 59, "stem": "體重控制的能量平衡原則中，「攝取 = 消耗」會導致：", "options": {"A": "減重", "B": "肌肉流失", "C": "增重", "D": "維持體重"}, "answer": "D", "explanation": "當熱量攝取等於消耗時，身體處於能量平衡狀態，結果是維持體重不變。", "source": "補充練習題", "id": 250}, {"chapter": "6. 營養及運動表現", "page": 61, "stem": "咖啡因過量攝入可能引發的副作用不包括：", "options": {"A": "失眠及躁動", "B": "血糖大幅上升", "C": "焦慮", "D": "暈眩"}, "answer": "B", "explanation": "咖啡因過量攝入可能引發暈眩、焦慮、失眠及躁動等副作用，課程內容中未提及會導致血糖大幅上升。", "source": "補充練習題", "id": 251}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 70, "stem": "上交叉綜合症的評估檢查點中，「肩胛胸椎距離過大」是指觀察哪個部位？", "options": {"A": "肩胛骨內側緣與胸椎的距離", "B": "骨盆與腰椎的距離", "C": "膝關節與腳踝的距離", "D": "頭部與肩峰的距離"}, "answer": "A", "explanation": "上交叉綜合症的檢查點之一是肩胛胸椎距離過大，即觀察肩胛骨內側緣（下角）與胸椎之間的距離是否過寬，反映肩胛前引。", "source": "補充練習題", "id": 252}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 71, "stem": "下交叉綜合症的評估檢查點包括：", "options": {"A": "腰椎前曲弧度過大、骨盆前傾、膝超伸", "B": "肩胛不平貼", "C": "頭部前引", "D": "足弓塌陷"}, "answer": "A", "explanation": "下交叉綜合症的檢查點包括腰椎前曲弧度過大、骨盆前傾及膝超伸。", "source": "補充練習題", "id": 253}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 71, "stem": "旋前變形綜合症中，過緊的肌肉包括：", "options": {"A": "股內側肌", "B": "臀大肌、臀中肌", "C": "脛骨前肌", "D": "腓腸肌、比目魚肌、足底筋膜"}, "answer": "D", "explanation": "旋前變形綜合症過緊肌肉包括腓腸肌、比目魚肌、足底筋膜、髖內收肌群、闊筋膜張肌（及髂脛束）、髂腰肌及股直肌。", "source": "補充練習題", "id": 254}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 72, "stem": "脊柱側彎中，導致過緊的肌肉包括：", "options": {"A": "對側臀中肌", "B": "中下斜方肌", "C": "腹部肌群", "D": "對側腰方肌、背闊肌、上斜方肌及肩胛提肌"}, "answer": "D", "explanation": "脊柱側彎的過緊肌肉包括對側腰方肌、對側髖內收肌群、部份豎棘肌、背闊肌、腰方肌、上斜方肌及肩胛提肌。", "source": "補充練習題", "id": 255}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 72, "stem": "改善脊柱側彎的建議強化運動包括：", "options": {"A": "槓鈴聳肩", "B": "靠牆站立、俯臥超人、側棒", "C": "深蹲", "D": "硬拉"}, "answer": "B", "explanation": "脊柱側彎的建議強化運動包括靠牆站立、俯臥超人及側棒，並應避免高負重的全身性訓練如蹲舉、硬拉。", "source": "補充練習題", "id": 256}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 73, "stem": "拇趾外翻的成因不包括：", "options": {"A": "遺傳", "B": "經常穿著高跟、尖頭鞋", "C": "痛風", "D": "缺鐵性貧血"}, "answer": "D", "explanation": "拇趾外翻的成因包括遺傳、經常穿著高跟尖頭鞋、痛風及關節問題，並不包括缺鐵性貧血。", "source": "補充練習題", "id": 257}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 73, "stem": "拇趾外翻的建議治療運動包括：", "options": {"A": "腳趾爬行訓練、腳趾分散訓練", "B": "硬拉", "C": "槓鈴蹲舉", "D": "直立划船"}, "answer": "A", "explanation": "拇趾外翻的建議治療運動包括足底壓力分配、腳趾爬行訓練及腳趾分散訓練。", "source": "補充練習題", "id": 258}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 71, "stem": "旋前變形綜合症的評估檢查點「跟腱方向」主要用作觀察：", "options": {"A": "腰椎曲度", "B": "肩胛穩定性", "C": "頸椎排列", "D": "足弓塌陷及足部力學排列"}, "answer": "D", "explanation": "旋前變形綜合症的檢查點包括足弓空間、跟腱方向、大拇趾外翻、膝外翻及骨盆前傾，主要反映下肢及足部的力學排列問題。", "source": "補充練習題", "id": 259}, {"chapter": "8. 特別需要人士訓練指引", "page": 82, "stem": "半月板撕裂的常見成因是：", "options": {"A": "缺鐵性貧血", "B": "血壓過高", "C": "血糖過低", "D": "扭曲或快速旋轉膝蓋，通常在膝蓋彎曲時發生"}, "answer": "D", "explanation": "半月板撕裂通常是扭曲或快速旋轉而造成，通常在膝蓋彎曲時發生，隨年齡增長半月板磨損後亦更容易撕裂。", "source": "補充練習題", "id": 260}, {"chapter": "8. 特別需要人士訓練指引", "page": 82, "stem": "半月板撕裂的徵兆和症狀不包括：", "options": {"A": "陰道漏液", "B": "膝部活動時有聲響", "C": "腫脹在2-3天後變得更嚴重", "D": "膝蓋兩側或中心感到疼痛"}, "answer": "A", "explanation": "陰道漏液屬於孕婦避免運動的警示徵狀，並非半月板撕裂的症狀；半月板撕裂症狀包括膝痛、腫脹加劇及關節聲響等。", "source": "補充練習題", "id": 261}, {"chapter": "8. 特別需要人士訓練指引", "page": 82, "stem": "半月板撕裂的建議預防訓練是：", "options": {"A": "閉氣訓練", "B": "高強度衝刺跑", "C": "星形平衡訓練、單腳著地訓練", "D": "深跳訓練"}, "answer": "C", "explanation": "半月板撕裂的預防訓練建議針對平衡力及關節穩定性，例如星形平衡訓練及單腳著地訓練。", "source": "補充練習題", "id": 262}, {"chapter": "8. 特別需要人士訓練指引", "page": 83, "stem": "肩周炎較常見於以下哪個年齡層及性別？", "options": {"A": "40-60歲，女性多於男性", "B": "只發生於兒童", "C": "20-30歲，男性多於女性", "D": "只發生於男性"}, "answer": "A", "explanation": "肩周炎常見於40-60歲人士，女性多於男性（比例約1.3：1），亦常見於肩部曾接受手術或長時間不活動人士。", "source": "補充練習題", "id": 263}, {"chapter": "8. 特別需要人士訓練指引", "page": 83, "stem": "肩周炎「冰凍期」的特徵是：", "options": {"A": "症狀維持輕微，並未影響日常活動幅度", "B": "關節活動範圍受限，疼痛開始緩解", "C": "疼痛完全消失，活動幅度正常", "D": "與活動幅度無關"}, "answer": "B", "explanation": "肩周炎冰凍期的特徵是關節活動範圍受限，但疼痛開始緩解；融化期則疼痛進一步緩解，關節活動幅度增加。", "source": "補充練習題", "id": 264}, {"chapter": "8. 特別需要人士訓練指引", "page": 83, "stem": "肩周炎患者應避免的訓練動作是：", "options": {"A": "毛巾伸展", "B": "頸後下拉、直立上提", "C": "肩外旋及內旋", "D": "肩帶縮回"}, "answer": "B", "explanation": "肩周炎患者應避免容易造成肩關節囊紊亂的動作，例如頸後下拉及直立上提。", "source": "補充練習題", "id": 265}, {"chapter": "8. 特別需要人士訓練指引", "page": 83, "stem": "足底筋膜炎的典型症狀是：", "options": {"A": "與跑步或站立無關", "B": "起床落地第一步時腳跟顯著痛楚", "C": "只在夜間出現痛楚", "D": "只影響大拇趾"}, "answer": "B", "explanation": "足底筋膜炎的典型症狀是起身落床著地第一步時腳跟顯著痛楚，久站或步行/跑步後情況較差。", "source": "補充練習題", "id": 266}, {"chapter": "8. 特別需要人士訓練指引", "page": 83, "stem": "足底筋膜炎的主要成因是：", "options": {"A": "缺乏維他命D", "B": "血糖過低", "C": "心血管功能失調", "D": "小腿過緊及足弓塌陷，足底筋膜繃緊"}, "answer": "D", "explanation": "足底筋膜炎主要成因是小腿過緊及足弓塌陷，令足底筋膜繃緊，長期跑步或站立令足底組織承受重量而導致微細撕裂及發炎。", "source": "補充練習題", "id": 267}, {"chapter": "8. 特別需要人士訓練指引", "page": 84, "stem": "足底筋膜炎的建議改善及預防訓練包括：", "options": {"A": "大量伸展小腿腓腸及比目魚肌，強化小腿肌肉", "B": "增加高沖擊跑步訓練量", "C": "避免任何小腿伸展", "D": "以靜態休息為主，待症狀自然緩解"}, "answer": "A", "explanation": "足底筋膜炎的改善及預防訓練包括放鬆及大量伸展小腿腓腸肌及比目魚肌、訓練足弓承托小肌肉及強化小腿肌肉（特別是離心力量）。", "source": "補充練習題", "id": 268}, {"chapter": "8. 特別需要人士訓練指引", "page": 84, "stem": "根據課程指引，兒童在指定次最大強度節奏下，氧氣消耗量相較成人：", "options": {"A": "平均低10-30%", "B": "完全相同", "C": "平均高10-30%", "D": "平均低50%"}, "answer": "C", "explanation": "兒童的運動經濟較低，在指定的次最大強度節奏下，兒童的氧氣消耗量比成人平均高10-30%。", "source": "補充練習題", "id": 269}, {"chapter": "8. 特別需要人士訓練指引", "page": 84, "stem": "兒童運動時的特殊考量不包括：", "options": {"A": "體溫調節能力較弱，對極端氣候忍耐力較低", "B": "軟組織或骨骺容易受傷，避免高強度運動", "C": "建議進行大量高強度運動以增強抵抗力", "D": "無氧運動能力較弱，建議低強度抗阻力訓練"}, "answer": "C", "explanation": "兒童發育時期不應進行大量高強度運動以增強抵抗力，這說法是不正確的；兒童應注意體溫調節、無氧能力較弱及軟組織骨骺易受傷等特點。", "source": "補充練習題", "id": 270}, {"chapter": "8. 特別需要人士訓練指引", "page": 84, "stem": "孕婦運動時應避免進行的姿勢是：", "options": {"A": "跪姿訓練", "B": "坐姿訓練", "C": "站立訓練", "D": "躺著鍛鍊（容易壓迫子宮）"}, "answer": "D", "explanation": "孕婦應注意姿勢考慮，例如躺著鍛鍊容易壓迫子宮，對母親和胎兒都會構成威脅。", "source": "補充練習題", "id": 271}, {"chapter": "8. 特別需要人士訓練指引", "page": 84, "stem": "孕婦懷孕期間釋放的鬆弛激素會導致：", "options": {"A": "韌帶放鬆，應避免過度伸展", "B": "血糖大幅上升", "C": "心率大幅下降", "D": "骨質密度增加"}, "answer": "A", "explanation": "孕婦懷孕期間釋放鬆弛激素會導致韌帶放鬆，訓練時應避免過度伸展。", "source": "補充練習題", "id": 272}, {"chapter": "8. 特別需要人士訓練指引", "page": 85, "stem": "以下哪項屬於孕婦應避免進行運動的警示徵狀？", "options": {"A": "輕微肌肉痠痛", "B": "輕微疲倦", "C": "正常食慾增加", "D": "心率大幅提高（超過140 bpm）"}, "answer": "D", "explanation": "孕婦避免運動的警示徵狀包括陰道出血、頭暈、呼吸急促、胸痛、頭痛、肌肉無力、心率超過140 bpm及胎兒運動減少等。", "source": "補充練習題", "id": 273}, {"chapter": "8. 特別需要人士訓練指引", "page": 85, "stem": "高齡人士訓練時，建議加入以下哪類訓練元素以減低跌倒風險？", "options": {"A": "神經運動控制訓練，例如平衡、敏捷及本體感受", "B": "閉氣訓練", "C": "單一動作重複訓練", "D": "高強度衝刺訓練"}, "answer": "A", "explanation": "高齡人士建議在訓練中加入神經運動控制的訓練，例如平衡、敏捷及本體感受等元素，以減低或防止跌倒。", "source": "補充練習題", "id": 274}, {"chapter": "8. 特別需要人士訓練指引", "page": 85, "stem": "骨質疏鬆症患者訓練時應避免：", "options": {"A": "步行", "B": "任何伸展運動", "C": "爆發性或高衝擊性訓練", "D": "負重訓練"}, "answer": "C", "explanation": "骨質疏鬆症患者應避免爆發性或高衝擊性訓練，並小心進行需要過度扭曲、彎曲或壓縮脊椎的動作，但適量負重訓練有助保持骨質密度。", "source": "補充練習題", "id": 275}, {"chapter": "8. 特別需要人士訓練指引", "page": 85, "stem": "根據課程指引，肌少症（Sarcopenia）特別需要留意的年齡層是：", "options": {"A": "只影響青少年", "B": "30歲以上", "C": "50歲以上", "D": "20歲以上"}, "answer": "C", "explanation": "肌肉力量會隨年齡增長而下降，特別是年齡高於50歲人士（肌少症），因此恆常抗阻力訓練對高齡人士相當重要。", "source": "補充練習題", "id": 276}, {"chapter": "8. 特別需要人士訓練指引", "page": 79, "stem": "教練面對特別需要人士時，必要時應先取得以下哪一項才能開始運動？", "options": {"A": "以上皆非", "B": "健身室會籍證明", "C": "醫生或有關專業人士的同意書", "D": "客人的身份證副本"}, "answer": "C", "explanation": "教練不具備進行康復治療及診斷的資格，必要時應先獲得醫生或有關專業人士的同意書才能開始運動。", "source": "補充練習題", "id": 277}, {"chapter": "8. 特別需要人士訓練指引", "page": 79, "stem": "肥胖成因不包括以下哪一項？", "options": {"A": "基因或生理因素", "B": "行為及環境因素", "C": "單純缺乏維他命C", "D": "藥物因素"}, "answer": "C", "explanation": "肥胖成因包括行為及環境因素、基因或生理因素、藥物及情緒因素等，並不包括單純缺乏維他命C。", "source": "補充練習題", "id": 278}, {"chapter": "8. 特別需要人士訓練指引", "page": 79, "stem": "肥胖誘發的併發症包括：", "options": {"A": "視力提升", "B": "聽力增強", "C": "靜脈曲張及瓣膜故障", "D": "骨質密度顯著上升"}, "answer": "C", "explanation": "肥胖誘發的併發症包括靜脈曲張及瓣膜故障，令液體積聚，並增加關節長期承受壓力而患上關節炎的風險。", "source": "補充練習題", "id": 279}, {"chapter": "8. 特別需要人士訓練指引", "page": 81, "stem": "哮喘患者應避免在以下哪種相對濕度的室內環境進行運動？", "options": {"A": "低於30%或高於50%", "B": "50%-55%", "C": "40%-45%", "D": "沒有特定限制"}, "answer": "A", "explanation": "哮喘患者應避免在相對濕度低於30%（黏膜可能更易變乾）或高於50%（蟲害和黴菌問題可能增加）的室內環境下進行運動。", "source": "補充練習題", "id": 280}, {"chapter": "8. 特別需要人士訓練指引", "page": 81, "stem": "哮喘發作的緊急處理包括：", "options": {"A": "大量飲用冰水", "B": "服用緊急處理藥物，例如氣管舒張藥物、哮喘噴霧劑", "C": "立即進行劇烈運動", "D": "平躺並抬高雙腳"}, "answer": "B", "explanation": "哮喘發作的緊急處理包括服用緊急處理藥物（如氣管舒張藥物、哮喘噴霧劑），並讓患者保持放鬆及舒緩的體位。", "source": "補充練習題", "id": 281}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 92, "stem": "以下哪項屬於運動創傷的「外在因素」？", "options": {"A": "關節排列不良", "B": "肌肉不平衡", "C": "柔韌性欠佳", "D": "不正確使用運動設備"}, "answer": "D", "explanation": "不正確使用運動設備屬於外在因素；肌肉不平衡、柔韌性欠佳及關節排列不良則屬於內在因素。", "source": "補充練習題", "id": 282}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 93, "stem": "軟組織勞損的可能成因不包括：", "options": {"A": "熱身不足", "B": "重複某些動作引致結締組織微撕裂", "C": "欠缺休息", "D": "充足的漸進式訓練"}, "answer": "D", "explanation": "充足的漸進式訓練是預防勞損的方法，並非勞損成因；勞損成因包括重複動作、肌肉不平衡、欠缺休息、熱身不足及訓練量突然加大。", "source": "補充練習題", "id": 283}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 94, "stem": "根據課程對訓練動作的風險分類，「類別II」動作的特點是：", "options": {"A": "對普通人士有一定風險，建議經改良後進行", "B": "低風險高效益，適合所有人", "C": "只適合傷患未康復人士", "D": "風險過大，不應採用"}, "answer": "A", "explanation": "類別II訓練對提升健康或運動表現有一定好處，但對普通人士有一定風險，建議經改良或調整後進行，訓練有素人士則可直接採用。", "source": "補充練習題", "id": 284}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 95, "stem": "訓練前熱身R.A.M.原則中，「A」（Activate）主要目的是：", "options": {"A": "促進神經肌肉亢奮程度", "B": "活動關節提升靈活度", "C": "提升身體溫度及循環", "D": "激活重要核心/穩定肌群"}, "answer": "D", "explanation": "R.A.M.中「A」代表Activate，即激活重要的核心/穩定肌群；「R」提升體溫循環，「M」則活動關節提升靈活度。", "source": "補充練習題", "id": 285}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 95, "stem": "R.A.M.原則中的「Potentiation」（增效）主要透過甚麼方式達成？", "options": {"A": "用針對訓練的動作、速度或收縮方式促進神經肌肉亢奮程度", "B": "完全靜止休息", "C": "補充水份", "D": "單純伸展"}, "answer": "A", "explanation": "增效是用針對訓練的動作、速度或收縮方式，促進相關神經肌肉的亢奮程度，一般建議阻力訓練前以R.A.M.配合1-2組熱身組完成。", "source": "補充練習題", "id": 286}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 95, "stem": "訓練後冷卻放鬆有助於：", "options": {"A": "令肌肉更繃緊", "B": "增加受傷風險", "C": "降低神經肌肉表現", "D": "加快清除乳酸，減輕遲發性肌肉酸痛"}, "answer": "D", "explanation": "訓練後冷卻及放鬆有助加快清除乳酸、減輕遲發性肌肉酸痛，並有利減少訓練後肌力和表現下降，避免肌肉過度繃緊及勞損。", "source": "補充練習題", "id": 287}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 96, "stem": "下背痛的成因中，長期不正確坐姿主要導致：", "options": {"A": "心肺功能下降", "B": "骨質密度上升", "C": "椎間盤後韌帶或組織拉扯鬆弛，使椎間盤不穩", "D": "肌肉量增加"}, "answer": "C", "explanation": "長期坐姿不正確會導致椎間盤後韌帶或物質拉扯鬆弛，使椎間盤不穩，身體感受到腰椎不穩時會緊急收緊表面腰椎肌肉作臨時保護（痙攣）。", "source": "補充練習題", "id": 288}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 96, "stem": "如椎間盤問題已壓迫神經，可能引發的症狀是：", "options": {"A": "聽力下降", "B": "與下肢完全無關", "C": "下肢牽涉痛、麻痺、針刺或觸電感覺，甚至下肢肌肉無力", "D": "視力模糊"}, "answer": "C", "explanation": "椎間盤凸出如已壓到神經，可能引發下肢相關的牽涉痛、麻痺、針刺或觸電感覺，甚至下肢肌肉無力。", "source": "補充練習題", "id": 289}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 96, "stem": "下背痛客人訓練調整建議中，槓鈴深蹲可考慮改為：", "options": {"A": "健身球靠牆蹲", "B": "直立划船", "C": "頸後下拉", "D": "羅馬椅背伸展"}, "answer": "A", "explanation": "下背痛客人訓練調整建議中，槓鈴深蹲可考慮改為健身球靠牆蹲，硬拉則可改為肩橋，以降低腰椎壓力。", "source": "補充練習題", "id": 290}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 92, "stem": "運動創傷的內在因素不包括：", "options": {"A": "錯誤選擇運動", "B": "體適能水平", "C": "肌力下降", "D": "關節失穩"}, "answer": "A", "explanation": "錯誤選擇運動屬於外在因素；體適能水平、肌力下降及關節失穩則屬於內在因素。", "source": "補充練習題", "id": 291}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 93, "stem": "軟組織受傷主要分為扭傷及拉傷兩種，「扭傷」的定義是：", "options": {"A": "骨骼斷裂", "B": "韌帶被過度拉扯撕裂", "C": "肌肉或肌腱過度拉扯撕裂", "D": "神經受壓"}, "answer": "B", "explanation": "扭傷是韌帶被過度拉扯撕裂而受傷（例如踝關節扭傷）；拉傷則是肌肉或肌腱過度拉扯撕裂（例如膕繩肌拉傷）。", "source": "補充練習題", "id": 292}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 95, "stem": "熱身的重要性不包括：", "options": {"A": "提升血液循環及關節滑液", "B": "提升本體感受、反應、平衡及穩定性", "C": "直接增加骨質密度", "D": "提升神經肌肉表現"}, "answer": "C", "explanation": "熱身的重要性包括提升血液循環、本體感受、神經肌肉表現及減低受傷機會，但並不會直接增加骨質密度。", "source": "補充練習題", "id": 293}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 93, "stem": "軟組織勞損問題若持續運動而不作休息，會出現的情況是：", "options": {"A": "勞損問題不會康復，關節活動空間持續受限", "B": "身體會自動修復，不留任何影響", "C": "肌肉會自動增大以抵抗勞損", "D": "與訓練表現無關"}, "answer": "A", "explanation": "勞損的原理是受傷先會發炎腫脹，期後組織變厚，讓關節活動空間受限制；如持續運動沒有休息，勞損問題就沒有康復的機會。", "source": "補充練習題", "id": 294}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 93, "stem": "軟組織勞損的病理過程一般是：", "options": {"A": "與發炎無關", "B": "直接導致骨折", "C": "發炎腫脹 → 組織變厚 → 關節活動空間受限", "D": "組織變厚 → 發炎腫脹 → 空間增加"}, "answer": "C", "explanation": "軟組織勞損的原理是受傷先會發炎腫脹，期後組織變厚，讓關節活動空間受限制，若持續運動而沒有休息，勞損問題便不會康復。", "source": "補充練習題", "id": 295}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 94, "stem": "根據課程對訓練動作的分類，「類別I」動作對健康人士而言屬於：", "options": {"A": "只適合運動員", "B": "與訓練經驗無關但風險高", "C": "風險過大不應採用", "D": "低風險及高效益，適合普羅大眾"}, "answer": "D", "explanation": "類別I訓練對無論是否有訓練經驗的健康人士都屬於低風險及高效益，適合普羅大眾；但對功能失調或傷患未完全康復人士，或需經醫護調整後方可進行。", "source": "補充練習題", "id": 296}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 96, "stem": "下背痛的成因中，如負重時核心肌肉反應遲緩或衰弱，主要會導致：", "options": {"A": "骨質密度上升", "B": "提起重物時腰部承受過多壓力", "C": "心率大幅提升", "D": "與下背痛無關"}, "answer": "B", "explanation": "負重時核心肌肉反應遲緩或衰弱，或負重技巧過於壓迫腰部，是下背痛及腰椎扭傷的常見成因之一。", "source": "補充練習題", "id": 297}, {"chapter": "1. 高級功能解剖學和運動生理學", "stem": "根據WHO定義，身體活動的核心是由骨骼肌產生、並伴隨什麼變化的肢體動作？", "options": {"A": "血液循環減慢", "B": "能量消耗", "C": "體溫下降", "D": "心率恆定不變"}, "answer": "B", "explanation": "正確答案：B. 能量消耗", "source": "簡報溫習題", "page": null, "id": 298}, {"chapter": "1. 高級功能解剖學和運動生理學", "stem": "長期缺乏身體活動所引發的一系列慢性病，統稱為？", "options": {"A": "代謝綜合症", "B": "缺乏運動症", "C": "關節退化症", "D": "營養不良症"}, "answer": "A", "explanation": "正確答案：A. 代謝綜合症", "source": "簡報溫習題", "page": null, "id": 299}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "以下哪一項不屬於缺乏運動症包含的病症？", "options": {"A": "心血管疾病", "B": "糖尿病", "C": "視力退化", "D": "下背痛"}, "answer": "C", "explanation": "正確答案：C. 視力退化", "source": "簡報溫習題", "page": null, "id": 300}, {"chapter": "2. 健康體適能評估及計劃安排", "stem": "ACSM與AMA在2007年聯合推廣的理念是？", "options": {"A": "運動分級管理", "B": "運動是良藥", "C": "極限訓練理論", "D": "體重控制優先"}, "answer": "B", "explanation": "正確答案：B. 運動是良藥", "source": "簡報溫習題", "page": null, "id": 301}, {"chapter": "簡報溫習題", "stem": "下列哪一項屬於不可改變的體適能影響因素？", "options": {"A": "訓練習慣", "B": "飲食結構", "C": "遺傳", "D": "作息規律"}, "answer": "C", "explanation": "正確答案：C. 遺傳", "source": "簡報溫習題", "page": null, "id": 302}, {"chapter": "1. 高級功能解剖學和運動生理學", "stem": "成年男性體內睪酮水平大約是成年女性的幾倍？", "options": {"A": "2–3倍", "B": "4–6倍", "C": "7–8倍", "D": "10倍以上"}, "answer": "D", "explanation": "正確答案：D. 10倍以上", "source": "簡報溫習題", "page": null, "id": 303}, {"chapter": "2. 健康體適能評估及計劃安排", "stem": "體適能分為兩大類，分別是健康相關體適能與？", "options": {"A": "競技/技能相關體適能", "B": "心理相關體適能", "C": "飲食相關體適能", "D": "作息相關體適能"}, "answer": "A", "explanation": "正確答案：A. 競技/技能相關體適能", "source": "簡報溫習題", "page": null, "id": 304}, {"chapter": "2. 健康體適能評估及計劃安排", "stem": "下列選項中，不屬於健康相關體適能元素的是？", "options": {"A": "心肺耐力", "B": "反應能力", "C": "身體組成", "D": "柔韌性"}, "answer": "B", "explanation": "正確答案：B. 反應能力", "source": "簡報溫習題", "page": null, "id": 305}, {"chapter": "6. 營養及運動表現", "stem": "屬於技能/競技相關體適能元素的是？", "options": {"A": "肌耐力", "B": "平衡", "C": "心肺耐力", "D": "身體脂肪比例"}, "answer": "B", "explanation": "正確答案：B. 平衡", "source": "簡報溫習題", "page": null, "id": 306}, {"chapter": "2. 健康體適能評估及計劃安排", "stem": "ACSM建議有氧訓練的訓練頻度為每週幾次？", "options": {"A": "1–2次", "B": "3–5次", "C": "6–7次", "D": "每日兩次"}, "answer": "B", "explanation": "正確答案：B. 3–5次", "source": "簡報溫習題", "page": null, "id": 307}, {"chapter": "2. 健康體適能評估及計劃安排", "stem": "ACSM定義中強度有氧運動對應的儲備心率區間為？", "options": {"A": "30%–39%", "B": : "11–12", "B": "13–14", "C": "15–16", "D": "17–19"}, "answer": "C", "explanation": "正確答案：C. 15–16", "source": "簡報溫習題", "page": null, "id": 781}, {"chapter": "5. 溝通、業務推廣及商業發展", "stem": "以下哪項屬於超負荷可調整參數？", "options": {"A": "客戶基因", "B": "訓練重量", "C": "年齡", "D": "天生骨骼結構"}, "answer": "B", "explanation": "正確答案：B. 訓練重量", "source": "簡報溫習題", "page": null, "id": 782}, {"chapter": "4. 訓練原則和方案設計", "stem": "針對藍級失調客戶，首要訓練目標是？", "options": {"A": "增肌肥大", "B": "改善關節靈活穩定、矯正動作", "C": "高強度間歇跑步", "D": "最大力量衝擊"}, "answer": "B", "explanation": "正確答案：B. 改善關節靈活穩定、矯正動作", "source": "簡報溫習題", "page": null, "id": 783}, {"chapter": "4. 訓練原則和方案設計", "stem": "個案二40歲男士偶爾行山、輕微圓肩，對應AFT色級？", "options": {"A": "藍級", "B": "綠級", "C": "黃級", "D": "橙級"}, "answer": "B", "explanation": "正確答案：B. 綠級", "source": "簡報溫習題", "page": null, "id": 784}, {"chapter": "4. 訓練原則和方案設計", "stem": "漸進原則要求AFT升級規則是？", "options": {"A": "藍級可直接跳紅級", "B": "逐步升級，不可一次跳多級", "C": "重量提升幅度可按個人感覺自由調整", "D": "同時增加重量、次數、複雜度快速升級"}, "answer": "B", "explanation": "正確答案：B. 逐步升級，不可一次跳多級", "source": "簡報溫習題", "page": null, "id": 785}, {"chapter": "4. 訓練原則和方案設計", "stem": "針對性原則（SAID）核心含義是？", "options": {"A": "全身統一適應，動作間效果完全轉移", "B": "身體只針對施加的特定需求產生適應", "C": "力量訓練成績完全等同運動表現", "D": "孤立器械肌力可直接轉移複合動作"}, "answer": "B", "explanation": "正確答案：B. 身體只針對施加的特定需求產生適應", "source": "簡報溫習題", "page": null, "id": 786}, {"chapter": "4. 訓練原則和方案設計", "stem": "關於雙因子理論訓練後身體變化描述正確的是？", "options": {"A": "訓練完立刻體適能＞疲勞，表現最佳", "B": "訓練後短期疲勞大於體適能，數日後體適能超越疲勞", "C": "休息越久，體適能永遠持續上升", "D": "休息不足只會降低疲勞，不影響體適能"}, "answer": "B", "explanation": "正確答案：B. 訓練後短期疲勞大於體適能，數日後體適能超越疲勞", "source": "簡報溫習題", "page": null, "id": 787}, {"chapter": "1. 高級功能解剖學和運動生理學", "stem": "個案三35歲男士僅訓練1個月，跑10分鐘即氣喘下肢酸軟，主要心肺區訓練應選？", "options": {"A": "Zone5間歇區", "B": "Zone4乳酸閾區", "C": "Zone2耐力區", "D": "Zone1恢復區"}, "answer": "B", "explanation": "正確答案：B. Zone4乳酸閾區", "source": "簡報溫習題", "page": null, "id": 788}, {"chapter": "9. 鍛鍊安全性和損傷預防", "stem": "以下哪項不符合健康漸進訓練邏輯？", "options": {"A": "先穩定靈活，再發展耐力，最後速度爆發力", "B": "新手直接安排大重量高難度複合動作衝肌力", "C": "優先修正動作偏移，降低勞損風險", "D": "建立基礎控制後再提升訓練強度"}, "answer": "B", "explanation": "正確答案：B. 新手直接安排大重量高難度複合動作衝肌力", "source": "簡報溫習題", "page": null, "id": 789}, {"chapter": "5. 溝通、業務推廣及商業發展", "stem": "同一時間同步增加重量、訓練量、動作複雜度會導致？", "options": {"A": "快速超級適應，體能暴增", "B": "身體無法適應，過度訓練、不良適應", "C": "縮短恢復時間，提升進度", "D": "無任何負面影響，適合所有客戶"}, "answer": "C", "explanation": "正確答案：C. 縮短恢復時間，提升進度", "source": "簡報溫習題", "page": null, "id": 790}, {"chapter": "4. 訓練原則和方案設計", "stem": "關於習慣性原則應用方案設計正確做法？", "options": {"A": "全年使用完全相同訓練表，維持穩定", "B": "定期更換動作、負荷、節奏避免收益遞減", "C": "體能越高，無需調整訓練內容", "D": "初學者固定一套動作訓練1年以上"}, "answer": "B", "explanation": "正確答案：B. 定期更換動作、負荷、節奏避免收益遞減", "source": "簡報溫習題", "page": null, "id": 791}, {"chapter": "4. 訓練原則和方案設計", "stem": "CO-FIVR-PT中「Tempo節奏」的作用是？", "options": {"A": "只計算訓練總時長", "B": "控制肌肉收縮/伸展時間，調控刺激強度", "C": "設定每週訓練次數", "D": "規劃組間休息長短"}, "answer": "B", "explanation": "正確答案：B. 控制肌肉收縮/伸展時間，調控刺激強度", "source": "簡報溫習題", "page": null, "id": 792}, {"chapter": "4. 訓練原則和方案設計", "stem": "AFT黃級活躍業餘人士訓練特點不包含？", "options": {"A": "可執行高難度、高技巧動作", "B": "目標清晰：肌力、肌肥大", "C": "訓練內容仍以基礎矯正動作為主，較少涉及進階技巧", "D": "運用有氧無氧高強度訓練"}, "answer": "B", "explanation": "正確答案：B. 目標清晰：肌力、肌肥大", "source": "簡報溫習題", "page": null, "id": 793}, {"chapter": "1. 高級功能解剖學和運動生理學", "stem": "關於乳酸閾Zone3（最大耐力區）描述正確的是？", "options": {"A": "完全無無氧代謝參與，極低強度", "B": "中高強度，少量無氧代謝，可維持約30分鐘", "C": "強度超過乳酸閾，無法完整說句子", "D": "極高強度，僅維持數分鐘HIIT使用"}, "answer": "B", "explanation": "正確答案：B. 中高強度，少量無氧代謝，可維持約30分鐘", "source": "簡報溫習題", "page": null, "id": 794}, {"chapter": "4. 訓練原則和方案設計", "stem": "個案四有4個月訓練經驗30歲男士增肌，對應AFT色級？", "options": {"A": "藍級", "B": "綠級", "C": "黃級", "D": "橙級"}, "answer": "C", "explanation": "正確答案：C. 黃級", "source": "簡報溫習題", "page": null, "id": 795}, {"chapter": "1. 高級功能解剖學和運動生理學", "stem": "前臂轉動使掌心向上的動作為？", "options": {"A": "內旋", "B": "外旋", "C": "旋後", "D": "旋前"}, "answer": "C", "explanation": "正確答案：C. 旋後", "source": "簡報溫習題", "page": null, "id": 796}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 4, "stem": "陳先生現年40歲，他的靜態心率是60 b.p.m。他需要於貯備心率(H.R.R)的50%至70%下進行訓練，請問陳先生的目標心率範圍是多少？", "options": {"A": "每分鐘120-180次", "B": "每分鐘120-144次", "C": "每分鐘60-120次", "D": "每分鐘60-144次"}, "answer": "B", "explanation": "貯備心率(H.R.R) = 最大心率–靜態心率 = (220–40)–60 = 120 b.p.m。目標心率 = (H.R.R × 訓練強度%) + 靜態心率。下限 = (120×50%)+60 = 120 b.p.m；上限 = (120×70%)+60 = 144 b.p.m。因此目標心率範圍是120–144 b.p.m。", "source": "基礎部份", "id": 797}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 4, "stem": "有一位客人參與5公里跑，並未有出現氣喘但腿部肌肉卻非常酸軟，如要改善這個客人的5公里跑表現，應集中加強以下哪項體適能元素?", "options": {"A": "下肢的肌肉耐力", "B": "下肢的肌肉爆發力及肌肉肥大", "C": "下肢的肌肉力量及肌肉肥大", "D": "心肺耐力"}, "answer": "A", "explanation": "客人心肺耐力表現良好（冇氣喘），但腿部肌肉酸軟反映肌耐力不足以應付5公里跑嘅耐力需求。肌肉爆發力主要用於爆發性動作（跳躍、踢腿），肌肉肥大同肌力則涉及最大力量發揮，均非5公里跑呢類耐力活動嘅主要限制因素。", "source": "基礎部份", "id": 798}, {"chapter": "基礎部份", "page": 5, "stem": "以下哪項/些關於「肥胖(癡肥)」的說法是正確?\n\nI 判斷癡肥最好用身體體重來量度\nII 癡肥是指身體體脂過多的情況\nIII 男士體脂超過25%是屬於癡肥\nIV 體重指數(BMI)測量是適合所有類別的人士", "options": {"A": "I 和 III", "B": "I 和 II", "C": "II 和 III", "D": "II 和 IV"}, "answer": "C", "explanation": "癡肥係指身體脂肪過多嘅情況（II正確），男士體脂25%或以上被列為癡肥（III正確）。體重包含瘦體重，未必反映真實脂肪水平（I不正確）；BMI唔適合兒童、健美運動員、孕婦及部份運動員（IV不正確）。因此答案為II和III。", "source": "基礎部份", "id": 799}, {"chapter": "基礎部份", "page": 6, "stem": "以下哪項/些關於柔韌性的說法是正確？\n\nI 所有伸展運動都能有效及安全地增加柔韌度\nII 拉伸韌帶是其中一種常用的手法來增加關節柔韌性\nIII 良好的柔韌度不能保證免除運動損傷\nIV 柔韌性是一個關節所能產生的最大活動幅度", "options": {"A": "I, III 和 IV", "B": "II 和 IV", "C": "I, II 和 III", "D": "III 和 IV"}, "answer": "D", "explanation": "彈振性伸展等方式未必安全有效（I不正確）；伸展主要針對肌肉肌腱而非韌帶，拉長韌帶反而降低關節穩定性（II不正確）；良好柔韌度有助減少不平衡但不保證完全免除損傷（III正確）；柔韌性定義為關節可產生嘅最大活動幅度（IV正確）。答案為III和IV。", "source": "基礎部份", "id": 800}, {"chapter": "基礎部份", "page": 6, "stem": "以下哪項有關不可改變因素的說法是不正確?", "options": {"A": "由於遺傳基因的差異，非西班牙裔黑人在短跑方面的成績，一定比非西班牙裔白人好", "B": "年齡老化與肌肉力量的衰退有明顯關係", "C": "一般女性的脂肪百份比相對比男性高", "D": "男性的睪丸酮水平一般而言比女性高很多"}, "answer": "A", "explanation": "遺傳基因並非決定運動表現嘅唯一因素，訓練方式及運動員嘅努力同樣重要，「一定比...好」呢個講法過於絕對，因此D不正確。其餘三項均為已確立嘅生理學觀察。", "source": "基礎部份", "id": 801}, {"chapter": "基礎部份", "page": 6, "stem": "以下哪項是不屬於身體組合的構成部份?", "options": {"A": "內臟", "B": "水份", "C": "皮下脂肪", "D": "以上答案皆屬於身體組合構成部份"}, "answer": "D", "explanation": "身體組合由皮下脂肪、肌肉、內臟器官、骨骼及其他非脂肪物質（包括水份，約佔體重50-70%）組成，因此以上皆屬於身體組合嘅構成部份。", "source": "基礎部份", "id": 802}, {"chapter": "基礎部份", "page": 6, "stem": "根據ACSM 2017提出的心肺適能指引，以下哪項/些指引是正確的?", "options": {"A": "對一般成年人士來說，應每星期進行3-5次中高強度的運動", "B": "每周累積75-150分鐘有氧運動", "C": "可以以單一節連貫訓練或以數節較短(≥10分鐘)累積達成", "D": "以上皆是"}, "answer": "D", "explanation": "根據ACSM 2017指引：頻率為每週3-5次中高強度運動；時間為每周累積75-150分鐘，可以單一節完成或以數節（每節≥10分鐘）累積達成目標，因此以上三項描述皆正確。", "source": "基礎部份", "id": 803}, {"chapter": "基礎部份", "page": 7, "stem": "根據基本伸展指引，以下哪項是不當的建議?", "options": {"A": "在末端保持伸展狀況10-30秒", "B": "伸展前先進行熱身運動", "C": "伸展動作的末端直至不能承受痛楚", "D": "在仲展時保持有節奏及緩慢的呼吸"}, "answer": "C", "explanation": "伸展應該去到有繃緊感或輕微不適嘅末端位置，維持10-30秒，並唔應該伸展至無法承受嘅痛楚程度，否則有機會造成肌肉受傷，因此C係不當嘅建議。", "source": "基礎部份", "id": 804}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 8, "stem": "以下哪個關節能產生三個不同解剖平面的活動?", "options": {"A": "肘關節", "B": "肩關節", "C": "膝關節", "D": "上橈尺關節"}, "answer": "B", "explanation": "肩關節係球窩關節，肱骨頭如球狀放入肩胛骨淺窩，可以喺矢狀面、冠狀面及水平面三個平面活動；膝關節及肘關節屬樞紐關節（主要矢狀面活動），上橈尺關節屬車軸關節（只能圍繞單一軸旋轉）。", "source": "基礎部份", "id": 805}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 8, "stem": "腹外斜肌一般會同哪一組肌肉共同收縮以產生軀幹旋轉？", "options": {"A": "同側腹內斜肌", "B": "對側腹內斜肌", "C": "腹橫肌", "D": "腹直肌"}, "answer": "B", "explanation": "腹外斜肌係腹肌淺層肌肉，肌纖維走向為「V」型，一般會同對側嘅腹內斜肌（走向為倒「V」型）共同收縮，協同產生軀幹旋轉嘅動作。", "source": "基礎部份", "id": 806}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 9, "stem": "以下邊塊肌肉係人體最重要嘅脊椎穩定肌，同時能夠透過捲腹訓練有效鍛鍊嘅淺層肌肉係？", "options": {"A": "腹橫肌係最重要嘅脊椎穩定肌；腹直肌可透過捲腹訓練有效鍛鍊", "B": "腹直肌係最重要嘅脊椎穩定肌；腹橫肌可透過捲腹訓練有效鍛鍊", "C": "腹外斜肌係最重要嘅脊椎穩定肌；腹橫肌可透過捲腹訓練有效鍛鍊", "D": "腹內斜肌係最重要嘅脊椎穩定肌；腹外斜肌可透過捲腹訓練有效鍛鍊"}, "answer": "A", "explanation": "脊椎穩定肌中最重要嘅係腹橫肌（深層核心肌）。捲腹主要訓練淺層肌肉腹直肌（產生軀幹屈曲），而軀幹旋轉動作則有效訓練腹內斜肌。", "source": "基礎部份", "id": 807}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 9, "stem": "斜方肌中束同菱形肌收縮，最主要產生肩帶哪個動作？而背闊肌收縮則能產生肩關節哪組動作？", "options": {"A": "肩帶前引；肩外展及肩屈曲", "B": "肩帶上舉；肩外旋", "C": "肩帶縮回；肩內收、肩伸展及肩內旋", "D": "肩帶下壓；肩水平外展"}, "answer": "C", "explanation": "斜方肌中束同菱形肌一同收縮，主要產生肩帶縮回（將肩胛骨向脊柱方向拉近）；背闊肌收縮則能夠產生肩內收、肩伸展及肩內旋等肩關節動作。", "source": "基礎部份", "id": 808}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 10, "stem": "以下邊塊肌肉嘅起點喺恥骨、止點喺股骨，主要負責髖內收？", "options": {"A": "髂腰肌", "B": "大腿內收肌群", "C": "股四頭肌", "D": "膕繩肌"}, "answer": "B", "explanation": "大腿內收肌群起於恥骨，止於股骨，主要負責髖關節內收動作；膕繩肌起於坐骨止於脛腓骨，股四頭肌起於骨盆/股骨止於脛骨，髂腰肌起於胸腰椎止於股骨，三者嘅起止點及主要功能均與內收肌群唔同。", "source": "基礎部份", "id": 809}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 10, "stem": "人體脊椎由33塊硬骨組成，根據頸椎、胸椎、腰椎、骶骨及尾骨嘅順序，正確嘅數量排列係？", "options": {"A": "4 → 12 → 5 → 5 → 7", "B": "8 → 11 → 5 → 5 → 4", "C": "7 → 12 → 5 → 5 → 4", "D": "7 → 5 → 12 → 5 → 4"}, "answer": "C", "explanation": "人體脊椎由33塊硬骨組成：7塊頸椎、12塊胸椎、5塊腰椎、5塊骶骨及4塊尾骨，順序為7→12→5→5→4。", "source": "基礎部份", "id": 810}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 11, "stem": "肩胛骨向上及向下移動嘅動作分別稱為？", "options": {"A": "肩帶上舉及肩帶下壓", "B": "肩關節上舉及肩關節下壓", "C": "肩帶前引及肩帶縮回", "D": "肩關節前引及肩關節縮回"}, "answer": "A", "explanation": "肩帶由肩胛骨及鎖骨組成，任何肩胛骨嘅活動都屬於肩帶活動而非肩關節活動（肩關節活動需涉及肱骨）。肩胛骨向上移動為肩帶上舉，向下移動為肩帶下壓。", "source": "基礎部份", "id": 811}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 11, "stem": "標準掌上壓（腳尖支撐）同跪姿掌上壓（膝關節支撐）相比，邊個難度較大，原因係？", "options": {"A": "標準掌上壓比較容易，因為阻力力矩較大", "B": "標準掌上壓比較困難，因為阻力力矩（重心到軸心嘅力臂距離）較大", "C": "兩者難度完全一樣", "D": "跪姿掌上壓因為參與肌肉比較有力所以較容易"}, "answer": "B", "explanation": "掌上壓嘅阻力來自身體重量（重心約在下背），標準掌上壓以腳趾為軸心，力臂距離（下背到腳趾）較長；跪姿掌上壓以膝關節為軸心，力臂距離較短。力矩=力量×力臂，力臂越長阻力力矩越大，因此標準掌上壓難度較大。", "source": "基礎部份", "id": 812}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 12, "stem": "啞鈴平板臥推嘅原動肌及拮抗肌分別係？", "options": {"A": "原動肌：前三角肌、中三角肌；拮抗肌：後三角肌、背闊肌", "B": "原動肌：胸大肌、肱二頭肌；拮抗肌：後三角肌、肱三頭肌", "C": "原動肌：前三角肌、肱三頭肌；拮抗肌：後三角肌、肱二頭肌", "D": "原動肌：胸大肌、肱三頭肌；拮抗肌：後三角肌、肱二頭肌"}, "answer": "D", "explanation": "啞鈴臥推涉及肩水平內收（由胸大肌完成）及肘伸展（由肱三頭肌完成），呢兩塊肌肉係原動肌。拮抗肌係產生相反動作嘅肌肉：肩水平外展由後三角肌完成，肘屈曲由肱二頭肌完成，所以佢哋係拮抗肌。", "source": "基礎部份", "id": 813}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 12, "stem": "捲腹相比仰臥起坐，喺鍛練腹肌方面較有效同安全，主要原因包括邊幾項？\n\nI 捲腹嘅活動幅度較仰臥起坐大\nII 捲腹只涉及軀幹屈曲，仰臥起坐同時涉及軀幹屈曲及髖屈曲，令捲腹更集中鍛練腹肌\nIII 捲腹時下背完全被地面承托，較仰臥起坐穩定安全\nIV 仰臥起坐接近完成位置時力臂明顯減少，令腹肌參與大減", "options": {"A": "I, II 和 III", "B": "II, III 和 IV", "C": "II 和 III", "D": "I 和 II"}, "answer": "B", "explanation": "捲腹嘅活動幅度其實較細（I不正確）。捲腹只涉及軀幹屈曲，更集中鍛練腹直肌（II正確）；捲腹時下背貼地更穩定安全（III正確）；仰臥起坐接近完成位置時，身體重量幾乎喺髖關節軸心正上方，力臂大減，腹肌參與亦隨之減少（IV正確）。答案為II、III和IV。", "source": "基礎部份", "id": 814}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 13, "stem": "比目魚肌係單關節肌肉，只能產生蹠屈曲動作。以下邊項訓練動作能更有效針對比目魚肌而減少腓腸肌嘅參與？", "options": {"A": "以上兩個動作都唔會刺激到比目魚肌", "B": "坐姿提踵（膝關節屈曲）", "C": "兩者對比目魚肌嘅刺激完全一樣", "D": "站姿提踵（膝關節伸直）"}, "answer": "B", "explanation": "腓腸肌係雙關節肌肉，可產生膝屈曲及蹠屈曲，但喺膝關節屈曲時會縮短而出現主動不足，參與度下降；比目魚肌係單關節肌肉只負責蹠屈曲，喺坐姿（膝屈曲）提踵中，因腓腸肌參與減少，比目魚肌會得到更大刺激。", "source": "基礎部份", "id": 815}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 14, "stem": "心臟結構中，防止血液喺心臟收縮時由心室倒流返心房嘅結構係？", "options": {"A": "瓣膜（二尖瓣）", "B": "心包膜", "C": "竇房結", "D": "冠狀動脈"}, "answer": "A", "explanation": "心臟嘅瓣膜（如二尖瓣）主要功能係防止血液喺心臟收縮時由心室倒流返心房，確保血液按正確方向流動，並非用以增加血壓或分隔帶氧同缺氧血液。", "source": "基礎部份", "id": 816}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 14, "stem": "動脈血管嘅最終定義係？", "options": {"A": "運送血液由心臟到身體嘅血管", "B": "人體內最大直徑嘅血管", "C": "有瓣膜、把血液由身體運送回心臟嘅血管", "D": "運送帶氧血液嘅血管"}, "answer": "A", "explanation": "動脈嘅定義係運送血液離開心臟到身體嘅血管，唔一定運送帶氧血液（例如肺動脈運送缺氧血液），亦與血管大小無關（靜脈都可以有大血管）；有瓣膜並將血液運返心臟嘅係靜脈嘅定義。", "source": "基礎部份", "id": 817}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 14, "stem": "心肺耐力主要嘅決定因素係？", "options": {"A": "較高嘅心縮排血量（Stroke Volume）", "B": "低血壓", "C": "血管直徑較大", "D": "以上皆否"}, "answer": "A", "explanation": "心縮排血量係心臟每次收縮泵出嘅血量，心縮排血量越高，供應到工作肌肉嘅血液及氧氣越多，最大攝氧量同心肺耐力隨之提升，係心肺耐力嘅主要決定因素。", "source": "基礎部份", "id": 818}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 15, "stem": "改善400米短跑表現嘅有效訓練策略，以下邊幾項係不成立嘅？\n\nI 集中訓練ATP-CP能量系統，同時補充蛋白質確保有足夠能量\nII 訓練身體對乳酸嘅忍耐力可改善400米表現\nIII 補充蛋白質可增加該項目主要能量系統嘅能量來源\nIV 只集中訓練中低強度心肺耐力，而非高強度衝刺訓練", "options": {"A": "I, III 和 IV", "B": "I 和 IV", "C": "I, II 和 III", "D": "只有I"}, "answer": "A", "explanation": "400米主要能量系統係乳酸系統及ATP-CP系統，兩者均以碳水化合物為主要燃料，補充蛋白質對呢兩個系統嘅能量供應冇實質幫助（I、III不成立）。訓練乳酸耐受能力確實有助改善400米表現（II成立）。400米始終屬短跑項目，應以高強度衝刺訓練為主，中低強度心肺耐力訓練效益有限（IV不成立）。答案為I、III和IV。", "source": "基礎部份", "id": 819}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 16, "stem": "ATP-CP系統嘅特性描述，以下邊項正確？", "options": {"A": "主要能量來源是肌糖原", "B": "它是以無氧方式分解碳水化合物", "C": "供能短及快，但比乳酸系統略持久", "D": "不論強度高低，在起動瞬間很活躍"}, "answer": "D", "explanation": "ATP-CP系統嘅能量來源係ATP及肌酸磷酸，並非分解碳水化合物；其供能高峰只維持5-6秒，10秒後顯著衰減，比乳酸系統（可維持近2分鐘）更短暫。惟不論運動強度高低，ATP-CP系統喺任何動作起動瞬間都會活躍地釋放能量。", "source": "基礎部份", "id": 820}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 16, "stem": "長期有氧運動帶來嘅效應包括？", "options": {"A": "微絲血管密度下降", "B": "爆發性力量提升", "C": "心輸出量上升", "D": "靜態心率上升"}, "answer": "C", "explanation": "長期有氧訓練會令靜態心率下降（並非上升）、心輸出量上升，訓練效果偏向耐力而非爆發性力量，同時會提升（並非下降）肌纖維微絲血管密度，以增加肌肉同血液嘅交換效率。", "source": "基礎部份", "id": 821}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 17, "stem": "孤立式針對某肌肉嘅阻力訓練，最能帶來以下邊項神經肌肉適應？", "options": {"A": "有效改善平衡能力", "B": "以上皆不正確", "C": "提升神經系統募集運動單位嘅能力，進而使力量提升", "D": "有效修正運動程式及多組肌肉之間嘅協調"}, "answer": "C", "explanation": "孤立式訓練主要為單關節動作，集中訓練單一肌肉，能有效增加中央神經系統嘅信號傳遞、運動單位同步性及發射率，從而提升力量；但由於欠缺多關節協調嘅訓練元素，未能有效改善平衡或修正多組肌肉間嘅協調。", "source": "基礎部份", "id": 822}, {"chapter": "6. 營養及運動表現", "page": 17, "stem": "以下哪項關於碳水化合物嘅描述係錯誤嘅？", "options": {"A": "碳水化合物是腦部及神經系統的能量來源", "B": "足夠地攝取碳水化合物可避免蛋白質分解", "C": "一般而言，碳水化合物應佔每天總熱量攝取約20%", "D": "缺乏碳水化合物會增加身體貯水及增加食欲"}, "answer": "C", "explanation": "一般而言，碳水化合物應佔每日總熱量攝取約50-55%（並非20%）。碳水化合物確實可以避免蛋白質分解、係腦部及神經系統嘅能量來源，缺乏亦會影響身體水份貯存及食慾調節。", "source": "基礎部份", "id": 823}, {"chapter": "6. 營養及運動表現", "page": 17, "stem": "過量飲酒會造成以下邊幾項傷害？\n\nI 抑制抗利尿激素而產生利尿作用\nII 舒張血管，因而增加熱量流失並導致體重下降\nIII 增加高血壓，中風及患上乳癌的機會\nIV 它可能阻礙維生素及礦物質的吸收", "options": {"A": "以上皆是", "B": "I, II 和 III", "C": "I, II 和 IV", "D": "I, III 和 IV"}, "answer": "D", "explanation": "酒精抑制抗利尿激素增加利尿及脫水風險（I正確），急性反應係血管舒張增加熱量流失，但每克酒精提供7千卡熱量，過量飲酒實際會增加脂肪積聚而非導致體重下降（II不正確）。研究證實酒精增加高血壓、中風及乳癌風險（III正確），並會損害肝功能而阻礙維生素礦物質吸收（IV正確）。答案為I、III和IV。", "source": "基礎部份", "id": 824}, {"chapter": "6. 營養及運動表現", "page": 18, "stem": "蛋白質嘅基本單位氨基酸，總數同必需／非必需嘅分類正確係？", "options": {"A": "22種，10種必需，12種非必需", "B": "18種，9種必需，9種非必需", "C": "20種，11種必需，9種非必需", "D": "20種，9種必需，11種非必需"}, "answer": "D", "explanation": "氨基酸係蛋白質嘅基本組成單位，共20種，當中9種為必需氨基酸（人體無法自行合成，必須從食物攝取），11種為非必需氨基酸（人體可以自行合成）。", "source": "基礎部份", "id": 825}, {"chapter": "6. 營養及運動表現", "page": 18, "stem": "以下哪項/些關於膳食纖維素嘅描述係錯誤嘅？\n\nI 可分為水溶性及非水溶性纖維素\nII 纖維素並不是碳水化合物\nIII 每天進食水果25-30克即可滿足每日建議所需\nIV 能降低患冠心病及大腸癌的機會", "options": {"A": "I 和 IV", "B": "II 和 III", "C": "II, III 和 IV", "D": "只有II"}, "answer": "B", "explanation": "膳食纖維嘅結構係多醣，本質上屬於碳水化合物嘅一種（II不正確）。每日建議攝取量為25-30克纖維素，並非單靠每日食25-30克水果就足夠，因為水果除纖維外仲含其他營養素，攝取量未必足夠（III不正確）。纖維可分水溶性及非水溶性（I正確），亦有助降低冠心病及大腸癌風險（IV正確）。答案為II和III。", "source": "基礎部份", "id": 826}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 5, "stem": "一位客人進行啞鈴划船時，主訴上背部無法有效發力，反而肱二頭肌率先感到疲勞。以下哪項分析最為合理？", "options": {"A": "背闊肌力量不足，肱二頭肌因而代償完成划船動作", "B": "斜方肌上束過度繃緊，限制肩胛骨活動", "C": "腹橫肌未能有效收緊，導致核心穩定不足", "D": "三角肌後束過度活躍，令背闊肌未能參與發力"}, "answer": "A", "explanation": "划船動作的原動肌應為背闊肌及中背肌群（如斜方肌中束、菱形肌），若背部肌力不足，身體會借助肱二頭肌（負責肘屈曲）完成動作，令肱二頭肌提早疲勞。三角肌後束過度活躍屬於協同肌代償，並非導致背闊肌未能發力的主因；腹橫肌及斜方肌上束的問題與此代償模式關連較低。", "source": "補充題目(進階)", "id": 827}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 8, "stem": "客人剛完成一節高強度間歇跑步訓練，即時心率量得170 b.p.m.，五分鐘後降至110 b.p.m.。教練應如何解讀這項數據？", "options": {"A": "心率恢復純粹反映水份流失程度", "B": "心率恢復速度快", "C": "心率下降幅度大，代表訓練強度未有達標", "D": "心率下降速度與心肺適能水平無直接關係"}, "answer": "B", "explanation": "心率恢復（Heart Rate Recovery）是心肺適能的重要指標之一。運動後心率下降速度越快，通常反映心臟功能及自主神經系統（尤其副交感神經）的恢復能力越佳，並非代表訓練強度不足或純粹與水份流失有關。", "source": "補充題目(進階)", "id": 828}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 11, "stem": "馬拉松跑手與短跑運動員接受肌肉活組織檢查，兩者的肌纖維比例最可能出現以下哪種差異？", "options": {"A": "馬拉松跑手的I型肌纖維比例較高，短跑運動員的IIx型比例較高", "B": "肌纖維比例只由後天訓練決定，與運動項目無直接關係", "C": "馬拉松跑手的IIx型肌纖維比例較高，短跑運動員的I型比例較高", "D": "兩者的肌纖維比例基本上不會出現差異"}, "answer": "A", "explanation": "I型肌纖維（慢縮肌）抗疲乏能力較強，適合長時間耐力活動；IIx型肌纖維（快縮肌）收縮力量及爆發力較高但容易疲乏，適合短時間高強度活動。雖然肌纖維比例主要由基因決定，但長期專項訓練仍會令相應纖維的功能特性更為突出。", "source": "補充題目(進階)", "id": 829}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 10, "stem": "客人主訴每次進行高強度深蹲訓練後，翌日大腿肌肉出現明顯痠痛，但運動當下並無不適。這種現象的成因及時間規律最可能是？", "options": {"A": "神經傳導受阻，與肌肉結構損傷無關", "B": "急性肌肉痠痛，源於乳酸堆積，通常於運動後數分鐘內出現", "C": "遲發性肌肉痠痛（DOMS）", "D": "肌腱撕裂，應立即停止訓練並求醫"}, "answer": "C", "explanation": "深蹲涉及大量離心收縮（下降階段），容易誘發遲發性肌肉痠痛（DOMS，Delayed Onset Muscle Soreness），其特徵正是運動當下並無明顯不適，卻於一至三日後（通常24至72小時）出現痠痛高峰，與運動當下即時出現、由乳酸堆積引致的急性肌肉痠痛機制不同。", "source": "補充題目(進階)", "id": 830}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 9, "stem": "甲、乙兩位客人以相同的相對運動強度（%VO2max）進行帶氧訓練，惟甲的VO2max數值明顯高於乙。以下描述何者最為準確？", "options": {"A": "相對強度相同時，兩人的絕對運動強度普遍不會相差太遠", "B": "VO2max數值高低對訓練負荷分配的影響相對輕微", "C": "VO2max數值越高，代表訓練時越容易出現疲勞", "D": "甲的絕對運動強度（實際攝氧量數值）會高於乙"}, "answer": "D", "explanation": "VO2max反映心肺系統的最大攝氧能力上限。在相同相對強度（%VO2max）下，VO2max較高者的絕對攝氧量（實際能量消耗）亦會相應較高，即代表其可負荷的絕對訓練強度亦較大。", "source": "補充題目(進階)", "id": 831}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 7, "stem": "客人進行肩外展動作時，觀察到肩胛骨過早出現上旋及聳肩代償。以下哪組肌肉最可能出現肌力不足？", "options": {"A": "棘上肌及中下斜方肌", "B": "肱二頭肌及肱三頭肌", "C": "胸大肌及背闊肌", "D": "股四頭肌及膕繩肌"}, "answer": "A", "explanation": "肩外展動作初段主要由棘上肌（肩袖肌群之一）啟動，並配合中下斜方肌穩定肩胛骨。若這組肌肉力量不足，身體會借助上斜方肌聳肩代償，出現肩胛骨過早上旋的現象。", "source": "補充題目(進階)", "id": 832}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 6, "stem": "客人日常長時間使用手提電話，頭部長期前引。根據肌肉功能分析，以下哪項描述最為準確？", "options": {"A": "斜角肌力量減弱，深層頸屈肌則過度活躍", "B": "胸小肌及肩胛提肌傾向過度繃緊", "C": "胸大肌力量增強，背闊肌傾向繃緊", "D": "上斜方肌力量減弱，中下斜方肌過度繃緊"}, "answer": "B", "explanation": "長期頭部前引屬於上交叉綜合症的常見表現之一，會令胸小肌、肩胛提肌等前側及上方肌群傾向過緊，同時深層頸屈肌（負責頸部穩定）因長期缺乏使用而力量減弱。", "source": "補充題目(進階)", "id": 833}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 8, "stem": "客人完成第一節重量訓練後，兩星期內再進行同樣訓練，主觀感覺明顯較輕鬆，惟肌肉圍度並無明顯增加。以下解釋最為合理？", "options": {"A": "訓練初期的表現提升", "B": "這是暫時性肥大（因訓練充血）消退後的結果", "C": "這代表發生了肌纖維增生（hyperplasia）", "D": "這代表訓練強度不足，並無任何生理適應發生"}, "answer": "A", "explanation": "訓練初期（首數星期）的力量提升，主要來自神經系統適應（運動單位募集效率提升、肌肉間協調性改善），肌肉肥大（結構性改變）通常需要較長時間（數星期至數月）持續訓練刺激，才會於圍度上有明顯反映。", "source": "補充題目(進階)", "id": 834}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 9, "stem": "甲、乙兩位客人年齡體格相若，甲的靜態心率為55 b.p.m.，乙的靜態心率為80 b.p.m.。單憑此數據，以下推論最為合理？", "options": {"A": "靜態心率與心肺適能水平並無關連", "B": "靜態心率較低的甲，心肺適能可能相對較佳", "C": "靜態心率偏低多數與心臟功能問題有關，需要留意", "D": "靜態心率較高，一般反映運動表現相對較佳"}, "answer": "B", "explanation": "長期有氧訓練會使每搏輸出量提升，令心臟毋須跳動得太密就可以泵出足夠血液，因而降低靜態心率。因此，在非病理情況下，靜態心率偏低通常反映較佳的心肺適能水平。", "source": "補充題目(進階)", "id": 835}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 11, "stem": "教練希望透過訓練刺激客人的IIx型肌纖維，以提升爆發力表現。以下哪組訓練參數最為合適？", "options": {"A": "訓練參數與肌纖維類型的募集無關", "B": "高強度、低重複次數、要求爆發性收縮的訓練", "C": "中等強度、中等重複次數、緩慢節奏訓練", "D": "低強度、高重複次數、長時間持續訓練"}, "answer": "B", "explanation": "根據體積原則（Size Principle），IIx型肌纖維在高強度、低重複次數、需要爆發性收縮的訓練情境下最容易被募集及刺激；低強度長時間訓練則主要刺激I型肌纖維。", "source": "補充題目(進階)", "id": 836}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 7, "stem": "客人進行直立划船（upright row）時，主訴肩膊前方出現夾擠感。分析其肩袖肌群功能，以下哪項最可能是成因？", "options": {"A": "肩胛下肌力量過強", "B": "三角肌中束完全沒有參與動作", "C": "棘下肌及小圓肌（負責", "D": "肩胛骨活動範圍過大"}, "answer": "C", "explanation": "肩袖肌群中的外旋肌（棘下肌、小圓肌）負責於肩外展／上舉時將肱骨頭下沉穩定，防止與肩峰產生夾擠。此組肌肉力量不足，容易於直立划船這類高於肩水平的動作中出現夾擠徵狀。", "source": "補充題目(進階)", "id": 837}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 10, "stem": "甲、乙兩位客人完成同一組深蹲訓練，甲翌日出現明顯遲發性肌肉痠痛（DOMS），乙則幾乎沒有痠痛感覺。以下哪項是最可能的解釋？", "options": {"A": "乙的肌肉組織對痛覺較不敏感", "B": "甲的訓練量普遍偏向不足", "C": "重複性作用效應（Repe", "D": "這純屬隨機現象，並無科學解釋"}, "answer": "C", "explanation": "重複性作用效應指身體經歷一次離心收縮訓練刺激後，短期內再進行類似訓練，會因結構性及神經性適應而令DOMS明顯減輕，這是DOMS研究中常見的現象，並非隨機或訓練量差異所致。", "source": "補充題目(進階)", "id": 838}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 9, "stem": "教練為客人講解「攝氧量」與「心肺耐力」的關係，以下哪項描述最為準確？", "options": {"A": "攝氧量與運動強度呈現負相關關係", "B": "靜態攝氧量因人而異，無法作為心肺耐力的參考基礎", "C": "攝氧量純粹反映肌肉力量，與心肺耐力無關", "D": "最大攝氧量（VO2max）是評估心肺耐"}, "answer": "D", "explanation": "最大攝氧量（VO2max）被公認為評估心肺耐力最具代表性及準確的客觀指標之一，能反映身體攝取、運輸及利用氧氣的整體能力，並非單純反映肌肉力量。", "source": "補充題目(進階)", "id": 839}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 6, "stem": "客人的髂腰肌長期處於過度繃緊狀態。根據肌肉功能分析，以下哪項體位變化最可能同時出現？", "options": {"A": "膝關節過度伸直及踝關節活動受限", "B": "骨盆前傾及腰椎過度前曲", "C": "骨盆後傾及腰椎過度平直", "D": "胸椎過度伸展及肩胛下壓"}, "answer": "B", "explanation": "髂腰肌起於第十二胸椎及所有腰椎，止於股骨，過度繃緊會將骨盆向前拉，導致骨盆前傾及腰椎過度前曲，此為下交叉綜合症的常見表現之一。", "source": "補充題目(進階)", "id": 840}, {"chapter": "1. 高級功能解剖學和運動生理學", "page": 11, "stem": "教練比較兩種訓練模式對肌肉適應的影響：模式甲以低強度長時間持續進行，模式乙以高強度短時間爆發性動作進行。以下描述何者最為準確？", "options": {"A": "兩種模式對肌纖維類型的刺激效果完全相同", "B": "模式甲較傾向刺激I型肌纖維，模式乙較傾向刺激IIx型肌纖維", "C": "模式甲較傾向刺激IIx型肌纖維，模式乙較傾向刺激I型肌纖維", "D": "肌纖維類型的募集與訓練強度及時長無關"}, "answer": "B", "explanation": "根據體積原則，低強度、長時間的持續性活動主要募集及刺激抗疲乏能力較高的I型肌纖維；高強度、短時間的爆發性動作則需要募集收縮力量較高的IIx型肌纖維，兩者的生理適應方向有明顯分別。", "source": "補充題目(進階)", "id": 841}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 18, "stem": "客人正服用β受體阻斷劑（β-blocker）控制高血壓，教練打算以心率作為運動強度的監控指標。以下做法最為恰當？", "options": {"A": "直接採用220減年齡公式計算目標心率，數據仍屬可靠", "B": "服用此類藥物人士不宜進行任何帶氧運動", "C": "應改為只觀察客人面色，毋須理會其他強度指標", "D": "藥物可能令心率反應失真"}, "answer": "D", "explanation": "β受體阻斷劑（一種用於控制心率及血壓的藥物）會抑制心率反應，令以心率為本的強度監控（包括卡式公式）失去準確性，因此建議同時採用自覺運動強度表（RPE，Rating of Perceived Exertion）作為輔助甚至主要的強度判斷工具。", "source": "補充題目(進階)", "id": 842}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 19, "stem": "為一位BMI達32、體脂偏高的客人進行皮褶測試時，發現多個部位的皮褶厚度超出測量鉗的有效量度範圍。教練應該如何處理？", "options": {"A": "取消所有體脂相關的評估項目", "B": "皮褶測試結果理應準確，可直接應用於訓練計劃", "C": "堅持使用皮褶測試，只記錄測量鉗所能顯示的最大讀數", "D": "改用其他較適合嚴重肥胖人士的評估方法"}, "answer": "D", "explanation": "皮褶測試對於嚴重肥胖人士的準確度會大幅下降，甚至超出測量鉗的有效範圍。在此情況下，應考慮其他評估方法，例如生物電阻抗分析（BIA）或腰圍量度，以取得較為可靠的數據。", "source": "補充題目(進階)", "id": 843}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 22, "stem": "客人希望透過1.5英哩跑測試評估心肺耐力，惟其有輕微膝關節退化病史。教練應該如何處理？", "options": {"A": "改用對關節負荷較低的測試方式", "B": "改為量度手握力，以此代替心肺耐力評估", "C": "直接略去心肺耐力的評估項目", "D": "堅持進行1.5英哩跑測試，因為此測試最為準確"}, "answer": "A", "explanation": "1.5英哩跑涉及持續跑動，對有膝關節問題的人士負荷較大。教練應改用對關節負荷較低的心肺耐力測試方式（如台階測試、固定單車測試），以策安全，而非強行進行原有測試或完全略過評估。", "source": "補充題目(進階)", "id": 844}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 22, "stem": "客人於3RM測試中，以60公斤完成三下卧推後力竭。運用標準%1RM對照表（3RM約為1RM的93%）估算，其1RM大約為多少？", "options": {"A": "約56公斤", "B": "約70公斤", "C": "約65公斤", "D": "約60公斤"}, "answer": "C", "explanation": "1RM約等於3RM除以93%，即60除以0.93約等於64.5公斤，最接近選項中的約65公斤。此計算方式反映3RM與1RM之間的換算關係，是常見的實務估算技巧。", "source": "補充題目(進階)", "id": 845}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 18, "stem": "客人於量度血壓前半小時飲用了一杯濃咖啡，並剛完成一段快步行動才前來見教練。教練應該如何處理？", "options": {"A": "改用皮褶測試代替血壓評估", "B": "血壓量度不會受咖啡因或運動影響，可以照常進行", "C": "直接量度血壓，所得數據可直接採用作訓練依據", "D": "讓客人先靜坐休息最少五分鐘"}, "answer": "D", "explanation": "咖啡因及運動均會令血壓短暫上升。量度前應避免這些因素干擾，並讓客人靜坐休息最少五分鐘，才能取得反映其真實靜態血壓的可靠數據。", "source": "補充題目(進階)", "id": 846}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 23, "stem": "客人於Chester台階測試第二階段（RPE 12）已出現明顯氣喘，未能維持節奏。教練此時最恰當的做法是？", "options": {"A": "立即轉為進行1RM肌力測試", "B": "根據終止指標（RPE超過14", "C": "鼓勵客人繼續多做數個階段", "D": "忽略此徵狀，繼續按原定流程進行"}, "answer": "B", "explanation": "Chester台階測試設有明確的終止指標（RPE超過14、心率超過80%最大心率或未能保持節奏）。若客人提早出現明顯不適徵狀，應根據指標考慮提早終止測試，在保障安全之餘，仍可記錄相應數據作參考。", "source": "補充題目(進階)", "id": 847}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 22, "stem": "教練為初次接觸阻力訓練的客人挑選肌力測試方法，以下哪個組合最為恰當？", "options": {"A": "先以風險較低的靜態肌力測試", "B": "完全略過肌力評估，直接開始訓練", "C": "直接進行槓鈴蹲舉3RM測試", "D": "一開始就挑戰1RM測試"}, "answer": "A", "explanation": "對缺乏訓練經驗的客人，應優先選用風險較低的測試方式（如手握力測試或次最大強度的動態測試），避免初次接觸就進行風險較高的1RM或3RM測試，以減低受傷機會。", "source": "補充題目(進階)", "id": 848}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 20, "stem": "教練發現客人於BESS平衡測試中，雙腳並排企於硬地面已出現超過五次錯誤，但於軟墊上表現反而較佳。此結果最可能反映？", "options": {"A": "測試結果需要覆核", "B": "客人於硬地面的平衡力特別差，測試結果矛盾，數據無效", "C": "記錄過程出現誤差的機會相對較高", "D": "客人的平衡力表現屬於正常範圍"}, "answer": "A", "explanation": "BESS測試設計上，軟墊（不穩定表面）的難度理應高於硬地面。若出現軟墊表現反而較佳的矛盾結果，教練應懷疑測試過程或記錄存在誤差，需要覆核而非直接接受此結果。", "source": "補充題目(進階)", "id": 849}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 19, "stem": "運動員與久坐辦公室人士的體脂皆為12%，兩人BMI亦相同。教練單憑BMI數據評估兩人的健康體適能，會出現以下哪項問題？", "options": {"A": "完全沒有問題，BMI適用於所有人士", "B": "BMI無法反映體脂分佈及肌肉量的差異", "C": "BIA的準確度普遍高於體脂測試的其他方法", "D": "BMI只適用於運動員，不適用於一般人士"}, "answer": "B", "explanation": "BMI純粹基於身高及體重計算，未能區分肌肉量與脂肪量的差異。對於肌肉量較高的人士（如運動員），BMI可能會誤判其為過重或肥胖，這是BMI已知的限制之一。", "source": "補充題目(進階)", "id": 850}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 18, "stem": "教練為一位懷疑有心臟病史但未有醫生證明的客人進行體適能評估。根據PAR-Q問卷的原意，教練應該如何處理？", "options": {"A": "PAR-Q問卷（體能活動適應能力問卷）本身已足夠評估風險，可直接開始訓練", "B": "直接拒絕該客人，不再作跟進", "C": "PAR-Q結果並不影響訓練安排", "D": "PAR-Q只作初步篩查用途"}, "answer": "D", "explanation": "PAR-Q問卷（Physical Activity Readiness Questionnaire）的角色是初步篩查，並非臨床診斷工具。若篩查結果或客人背景顯示潛在健康風險，教練應建議客人先徵詢醫生意見及取得同意書，才開始正式訓練。", "source": "補充題目(進階)", "id": 851}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 22, "stem": "客人心肺耐力表現良好，惟於捲腹測試中的表現遠低於同齡人士平均水平。教練於設計訓練方案時，應該如何回應此項數據？", "options": {"A": "此項數據與訓練方案設計並無關連", "B": "因心肺耐力理想，可忽略核心肌耐力方面的相對弱項", "C": "應該大幅減少所有帶氧訓練", "D": "根據評估結果"}, "answer": "D", "explanation": "體適能評估的核心價值之一，正是識別客人的強項與弱項，從而制定個人化訓練方案。發現核心肌耐力相對偏弱，理應在方案中加強相關訓練，而非因其他項目表現良好而忽略此項弱項。", "source": "補充題目(進階)", "id": 852}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 18, "stem": "客人量度血壓的結果為150/95 mmHg，教練考慮是否需要轉介專業人士。以下哪項理解最為正確？", "options": {"A": "單一讀數超標並不需要任何跟進", "B": "高血壓的定義為日常靜態血壓", "C": "必須連續量度七日先可下判斷", "D": "此讀數屬正常範圍，毋須理會"}, "answer": "B", "explanation": "高血壓定義為日常靜態血壓持續高於140/90 mmHg，需相隔至少兩天、最少兩次量度作準。單次讀數達150/95 mmHg已符合高血壓定義的門檻，教練應建議相隔數日再次量度確認，並視乎情況考慮轉介醫生跟進。", "source": "補充題目(進階)", "id": 853}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 22, "stem": "教練發現客人於靜態肌耐力測試（如平板支撐）表現優異，卻於動態肌力測試（如3RM卧推）表現遜色。以下解釋最為合理？", "options": {"A": "動態肌力測試結果應該以靜態測試結果作準", "B": "靜態測試結果的參考價值較低，應該重新測試", "C": "靜態肌耐力與動態肌力屬於不同的體適能元素", "D": "這代表客人整體體適能水平低落"}, "answer": "C", "explanation": "靜態肌耐力（如維持特定姿勢的能力）與動態肌力（如完成特定重量動作的最大力量）屬於不同的體適能元素，兩者所反映的能力並不相同，評估時應該分開看待，不宜以其中一項的表現直接推斷另一項。", "source": "補充題目(進階)", "id": 854}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 23, "stem": "教練為長者客人進行體適能評估時，發現其在BESS平衡測試中的錯誤次數遠高於同齡標準。以下訓練調整建議最為合適？", "options": {"A": "評估結果與訓練方案設計無關，可以忽略", "B": "應立即安排高強度爆發性訓練以「強迫」改善平衡力", "C": "根據評估結果", "D": "應完全避免任何形式的訓練"}, "answer": "C", "explanation": "評估結果顯示客人平衡能力相對薄弱，教練應根據此數據，於方案中加入針對性的平衡及本體感受訓練，並確保於有保護及監督的安全環境下進行，而非忽略評估結果或採取過於進取的訓練安排。", "source": "補充題目(進階)", "id": 855}, {"chapter": "2. 健康體適能評估及計劃安排", "page": 19, "stem": "教練希望為客人選擇合適的體脂評估方法，客人本身裝有心臟起搏器。以下哪項考量最為重要？", "options": {"A": "裝有心臟起搏器人士不能進行任何體適能評估", "B": "應優先使用BIA，因其準確度普遍較其他方法為高", "C": "生物電阻抗分析（BIA）透過微電流評估體脂", "D": "心臟起搏器不會影響任何體脂評估方法的選擇"}, "answer": "C", "explanation": "生物電阻抗分析（BIA）透過身體發出微電流評估體脂，裝有心臟起搏器等電子醫療儀器的人士應避免使用此方法，以免電流干擾儀器運作，宜改用皮褶測試等不涉及電流的評估方式。", "source": "補充題目(進階)", "id": 856}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 31, "stem": "客人進行槓鈴臥推時，槓鈴落下的位置偏向頸部而非胸部中央，同時肘部明顯高於肩水平。以下哪項是最需要優先糾正的風險？", "options": {"A": "訓練速度過慢，影響訓練效果", "B": "呼吸節奏未有配合動作", "C": "握距過寬，降低胸大肌參與程度", "D": "肘部過高及槓鈴位置偏差"}, "answer": "D", "explanation": "臥推時肘部過高（超過肩水平）加上槓鈴位置偏差，會增加肩關節前側結構的夾擠風險，屬於高危動作模式，應優先糾正，將肘部角度及落槓位置調整至胸部中下方。", "source": "補充題目(進階)", "id": 857}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 32, "stem": "教練觀察到客人進行蹲舉至最低點時，出現明顯「臀部眨眼」（butt wink）現象。以下哪項處理方式最為恰當？", "options": {"A": "鼓勵客人蹲得更深，以增加訓練效果", "B": "改用更重的負荷，以強迫身體適應此動作模式", "C": "此現象對腰椎並無影響，毋須處理", "D": "建議客人只蹲至骨盆仍能維持中立的深度"}, "answer": "D", "explanation": "臀部眨眼反映骨盆於深蹲末端過度後傾，令腰椎進入屈曲受壓的狀態。恰當做法是將蹲舉深度限制於骨盆仍能維持中立的範圍，並透過髖關節柔韌度及核心穩定訓練改善根本問題，而非蹲得更深或勉強加重。", "source": "補充題目(進階)", "id": 858}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 46, "stem": "教練為進階客人設計訓練，希望同時針對胸大肌的原動肌及其拮抗肌（背部肌群），且動作之間不設休息。此安排屬於以下哪種高階訓練技巧？", "options": {"A": "預先疲勞訓練法", "B": "金字塔訓練法", "C": "循環訓練法", "D": "超級組訓練法1（原動肌配合拮抗肌）"}, "answer": "D", "explanation": "超級組訓練法1的定義正是連續完成兩個動作，分別針對原動肌及其拮抗肌，動作之間不設或盡量減少休息，例如胸推配合背部划船動作。", "source": "補充題目(進階)", "id": 859}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 31, "stem": "客人進行啞鈴肩上推舉時，下背明顯過度拱起。分析此代償動作最可能的成因，以及教練最直接的糾正方法應為？", "options": {"A": "核心穩定不足及／或肩關節活動度不足", "B": "屬正常動作模式，毋須處理", "C": "這代表客人肩部力量非常出色", "D": "這純粹是因為負荷過輕"}, "answer": "A", "explanation": "肩上推舉時下背過度拱起，通常反映核心穩定不足（未能抵抗推舉時的伸展力矩）或肩關節屈曲活動度不足（身體借用腰椎伸展代償肩部活動度的缺乏）。應優先收緊核心、評估肩部活動度，並適當減輕負荷。", "source": "補充題目(進階)", "id": 860}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 32, "stem": "比較槓鈴蹲舉與健身球靠牆蹲，兩者對初學者的訓練意義最大分別在於？", "options": {"A": "健身球靠牆蹲能提供背部支撐", "B": "兩者的訓練效果完全一致，並無分別", "C": "槓鈴蹲舉對初學者的風險較低", "D": "健身球靠牆蹲的負荷普遍較槓鈴蹲舉為大"}, "answer": "A", "explanation": "健身球靠牆蹲利用牆壁及健身球提供背部支撐及引導動作軌跡，降低核心穩定及平衡的要求，讓初學者可先掌握蹲舉的基本動作模式，風險相對較低，適合作為蹲舉的入門或退階版本。", "source": "補充題目(進階)", "id": 861}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 46, "stem": "客人希望單獨加強股四頭肌，但不希望過度徵召臀大肌參與，教練考慮採用預先疲勞訓練法。應該如何安排動作次序？", "options": {"A": "兩個動作應該同時進行", "B": "先進行槓鈴蹲舉（複合動作），再進行器械坐式腿屈伸（孤立動作）", "C": "先進行器械坐式腿屈伸（孤立動作", "D": "動作次序對訓練效果並無影響"}, "answer": "C", "explanation": "預先疲勞訓練法的原理是先以孤立動作（如坐式腿屈伸）令目標肌肉（股四頭肌）預先疲勞，隨即進行複合動作（如蹲舉），令目標肌肉於複合動作中更快接近力竭，從而減少其他協同肌肉（如臀大肌）分擔負荷的比例。", "source": "補充題目(進階)", "id": 862}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 31, "stem": "教練評估阻力訓練動作的安全性時，發現客人於硬拉動作中，槓鈴與身體之間的距離明顯超過正常範圍。此情況對應以下哪一項分析要點，並會帶來何種風險？", "options": {"A": "呼吸節奏失衡，導致缺氧", "B": "動作幅度不足，降低訓練效果", "C": "此屬個人動作風格，並無風險", "D": "動作路線偏離，令力矩增加，加重下背負荷"}, "answer": "D", "explanation": "動作路線是六大分析要點之一，槓鈴遠離身體會令阻力力臂增長、力矩增加，大幅提高下背（腰椎）承受的壓力，增加受傷風險，應糾正令槓鈴貼近身體活動。", "source": "補充題目(進階)", "id": 863}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 46, "stem": "客人完成一組蹲舉至力竭後，教練立即減輕百分之二十的負荷，要求其再完成四至五下直至再次力竭。此屬於以下哪種訓練技巧？", "options": {"A": "離心收縮訓練法", "B": "超級組訓練法", "C": "循環訓練法", "D": "遞減組訓練法（Drop set）"}, "answer": "D", "explanation": "力竭後隨即更換較輕的重量，再完成數下直至再次力竭，正正是遞減組訓練法（Drop set）的定義，目的是延長肌肉承受張力的時間，加深訓練刺激。", "source": "補充題目(進階)", "id": 864}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 32, "stem": "教練發現客人進行蹲舉時膝關節持續內扣（膝外翻），並且腳跟有離地傾向。以下哪個訓練調整優先次序最為合理？", "options": {"A": "先降低負荷及蹲舉深度", "B": "完全停止所有下肢訓練", "C": "膝外扣屬正常現象，毋須理會", "D": "直接增加負重，以強迫膝關節維持正確位置"}, "answer": "A", "explanation": "膝外扣加上腳跟離地，反映臀部外側肌群力量不足及／或足踝活動度不夠，應先降低負荷及深度，針對性加強相關肌群及活動度，待動作模式改善後再循序漸進加重，而非強行加重令風險進一步提高。", "source": "補充題目(進階)", "id": 865}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 46, "stem": "教練以循環訓練法為客人設計一節訓練，目標為同時提升肌耐力及心肺適能。以下哪個安排最符合循環訓練法的原則？", "options": {"A": "動作之間只設約十秒短暫休息", "B": "每組之間休息三分鐘，模仿肌力訓練的安排", "C": "只進行單一動作，連續重複三十分鐘", "D": "每個動作之間休息五分鐘，確保完全恢復"}, "answer": "A", "explanation": "循環訓練法的標準安排是動作之間只設約十秒的極短休息，將數個動作組合成一個約十五分鐘的循環，重複二至三次，透過短休息及多動作組合，同時達到肌耐力及心肺適能的訓練效果。", "source": "補充題目(進階)", "id": 866}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 31, "stem": "客人一直使用史密夫機（Smith Machine）進行蹲舉，教練考慮轉為採用自由重量（槓鈴）蹲舉。轉換過程中最需要留意的風險是？", "options": {"A": "史密夫機與自由重量的動作模式完全一致，可直接沿用相同負荷", "B": "自由重量對核心穩定及平衡的要求較高", "C": "自由重量訓練並無任何額外風險", "D": "轉換初期應立即採用比史密夫機更重的負荷"}, "answer": "B", "explanation": "史密夫機提供固定軌跡，降低對核心穩定及平衡的要求；轉換為自由重量蹲舉時，身體需要額外控制平衡及軌跡，應由較輕負荷開始重新適應，而非直接沿用相同或更重的負荷。", "source": "補充題目(進階)", "id": 867}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 31, "stem": "教練評估客人的臥推動作時，特別留意其「身體穩定」是否達標。以下哪項描述最符合「身體穩定」這項分析要點的要求？", "options": {"A": "動作全程保持核心完全放鬆", "B": "雙腳懸空以增加訓練難度", "C": "肩帶縮回下壓、腹橫肌收緊、背部挺直", "D": "手肘完全鎖死以節省力量"}, "answer": "C", "explanation": "「身體穩定」是阻力訓練動作分析的六大要點之一，臥推時要求肩帶縮回下壓、腹橫肌收緊及背部挺直，以維持軀幹穩定，避免動作過程中出現代償或受傷風險。", "source": "補充題目(進階)", "id": 868}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 32, "stem": "教練發現客人蹲舉時上身過度前傾，重心明顯偏移至腳掌前方。此現象最可能反映以下哪項問題？", "options": {"A": "這是正確的蹲舉動作模式，毋須糾正", "B": "呼吸節奏錯誤，導致失去平衡", "C": "股四頭肌力量過於強勁", "D": "髖關節或踝關節活動度不足"}, "answer": "D", "explanation": "蹲舉時上身過度前傾，通常反映髖關節或踝關節活動度不足，或核心穩定能力有限，令身體透過上身前傾去代償，以維持重心平衡，長遠會增加下背壓力，應針對活動度及核心穩定進行改善。", "source": "補充題目(進階)", "id": 869}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 46, "stem": "客人希望於同一節訓練中，以不同角度充分刺激三角肌各個部位，教練安排前平舉、側平舉及俯身側平舉依次進行，動作之間只有短暫休息。此安排最貼近以下哪種訓練概念？", "options": {"A": "預先疲勞訓練法", "B": "離心收縮訓練法", "C": "循環訓練法", "D": "複合組訓練（"}, "answer": "D", "explanation": "複合組訓練是指連續進行多個針對同一肌群（但角度或發力方式不同）的動作，中間只有短暫或不設休息，藉此從多角度充分刺激該肌群，此安排與預先疲勞訓練法（針對不同肌群的孤立及複合動作組合）及循環訓練法（涉及全身不同肌群）的概念有所不同。", "source": "補充題目(進階)", "id": 870}, {"chapter": "3. 抗阻力訓練原則及實踐", "page": 32, "stem": "教練分析蹲舉動作時發現，客人的膝關節活動路線理想（朝向第二、三腳趾方向），但腰椎於動作末端出現輕微屈曲。教練應該優先檢視以下哪個範疇？", "options": {"A": "應立即要求客人加大蹲舉深度", "B": "毋須特別處理，膝關節路線正確已屬主要考慮因素", "C": "這代表膝關節路線分析方法有誤", "D": "核心穩定能力及髖關節柔韌度"}, "answer": "D", "explanation": "即使膝關節活動路線正確，腰椎於動作末端出現屈曲（如臀部眨眼），仍多與核心穩定能力或髖關節柔韌度不足有關，兩者屬於不同的分析範疇，教練應該分別檢視，不能因為其中一項正確而忽略另一項的潛在問題。", "source": "補充題目(進階)", "id": 871}, {"chapter": "4. 訓練原則和方案設計", "page": 44, "stem": "客人目標為增肌，已採用固定訓練動作及負荷持續訓練三個月，惟近期體型及力量均未見進步。根據訓練原則，最可能的成因及對應方案為？", "options": {"A": "習慣性原則導致收益遞減", "B": "客人的休息安排普遍傾向不足，應立即停止訓練", "C": "訓練原則與此情況無關，純屬個人際遇問題", "D": "應該立即大幅減少訓練量"}, "answer": "A", "explanation": "習慣性原則（Principle of Accommodation）指出身體會逐漸適應相同的訓練刺激，導致收益遞減。長期採用固定動作及負荷而缺乏變化，正符合此情況，應透過調整訓練動作、強度、訓練量等變數，重新製造超負荷刺激。", "source": "補充題目(進階)", "id": 872}, {"chapter": "4. 訓練原則和方案設計", "page": 47, "stem": "教練為兩位目標不同的客人設計方案：甲希望增強最大肌力，乙希望提升肌耐力。以下哪組參數配對最為正確？", "options": {"A": "甲乙的訓練強度及休息時間應該互相對調", "B": "甲：重複次數少於或等於六次", "C": "甲：重複次數十二次以上、強度67%1RM以下；乙：重複次數少於或等於六次、強度85%1RM以上", "D": "兩者應採用完全相同的訓練參數"}, "answer": "B", "explanation": "根據阻力訓練處方一般指引，肌力訓練（甲）宜採用低重複次數（六次或以下）、高強度（85%1RM或以上）、較長休息（二至五分鐘）；肌耐力訓練（乙）則採用高重複次數（十二次或以上）、低強度（67%1RM或以下）、短休息（三十秒或以內）。", "source": "補充題目(進階)", "id": 873}, {"chapter": "4. 訓練原則和方案設計", "page": 45, "stem": "客人希望短時間內提升最大肌力，同時維持一定訓練量。教練考慮採用CO-FIVR-PT原則中哪個組合，最切合「以肌肉力量為主」的方案設計？", "options": {"A": "高重複次數、短休息、快速節奏", "B": "強度十二次重複最大值以上、休息三十秒、上身先於下身", "C": "強度約六次重複最大值（6RM）", "D": "訓練次序及休息時間與訓練成效無關"}, "answer": "C", "explanation": "以肌肉力量為主的CO-FIVR-PT方案設計，強度建議約6RM、訓練量三至六組、組間休息需三分鐘以上，以確保足夠恢復應付高強度訓練，訓練次序建議下身先於上身。", "source": "補充題目(進階)", "id": 874}, {"chapter": "4. 訓練原則和方案設計", "page": 46, "stem": "教練發現客人於同一節訓練中，肌力表現較平時遜色，同時主觀感覺疲倦、睡眠質素轉差。根據雙因子理論，最可能的原因是？", "options": {"A": "應立即增加訓練強度以突破瓶頸", "B": "這與雙因子理論完全無關", "C": "體適能水平下降，疲勞水平相對正常", "D": "疲勞水平累積過高"}, "answer": "D", "explanation": "雙因子理論（Fitness-Fatigue Model）指出運動表現等於體適能減去疲勞。當疲勞累積過高（如訓練過量、休息不足），即使體適能水平未有下降，表現仍會因疲勞掩蓋而下降。此情況應調整訓練量或增加恢復，而非強行加重訓練。", "source": "補充題目(進階)", "id": 875}, {"chapter": "4. 訓練原則和方案設計", "page": 44, "stem": "教練為一位長期病患剛康復、需要從基礎重新開始的客人設計訓練。根據AFT優化系統，應該由哪個級別開始，訓練重點為何？", "options": {"A": "藍級，著重改善功能失調及動作質量，重建自信", "B": "紅級，著重專項運動表現", "C": "應直接進行高強度訓練，以加快進度", "D": "AFT系統只適用於運動員，不適用於此類客人"}, "answer": "A", "explanation": "AFT優化系統（Athletic Fitness Training系統）的藍級是最基礎的級別，專門針對功能失調或體弱人士，訓練重點在於糾正動作模式、改善基本功能，並重建運動信心，適合長期病患康復初期的客人。", "source": "補充題目(進階)", "id": 876}, {"chapter": "4. 訓練原則和方案設計", "page": 47, "stem": "客人於一個訓練週期中經歷「疲勞、恢復、超量恢復、衰減」的過程。若教練於客人仍處於「疲勞」階段時，就安排下一節高強度訓練，最可能出現以下哪種後果？", "options": {"A": "此屬正確做法，應該持續採用這種安排", "B": "有助令體能水平持續穩步提升", "C": "疲勞持續累積", "D": "對訓練效果完全沒有影響"}, "answer": "C", "explanation": "超量恢復（Supercompensation）需要足夠恢復時間才能達成。若於仍處於疲勞階段就再施加高強度刺激，疲勞會不斷累積而未能達到超量恢復的高峰，長遠有機會導致過度訓練症候群，令表現不升反跌。", "source": "補充題目(進階)", "id": 877}, {"chapter": "4. 訓練原則和方案設計", "page": 47, "stem": "教練希望透過調整訓練變數，令客人於八星期內循序漸進地提升訓練強度。此做法符合以下哪項訓練原則？", "options": {"A": "習慣性原則", "B": "特殊性原則", "C": "個人化原則", "D": "漸進原則"}, "answer": "D", "explanation": "漸進原則要求訓練負荷隨時間循序漸進地增加，避免一次過大幅提升強度而導致受傷，同時確保身體持續獲得適當的超負荷刺激，以促進進步。", "source": "補充題目(進階)", "id": 878}, {"chapter": "4. 訓練原則和方案設計", "page": 44, "stem": "甲、乙兩位客人同樣以增肌為目標，惟甲從事文職工作長期久坐，乙從事體力勞動工作。根據個人化原則，教練於設計方案時最應該考慮以下哪項？", "options": {"A": "個人化原則只適用於受傷人士", "B": "應考慮兩人職業、生活習慣等因素的差異", "C": "職業對訓練方案設計並無影響", "D": "兩人的方案應該完全一致，因為目標相同"}, "answer": "B", "explanation": "個人化原則要求教練根據客人的性別、基因、性格、文化、職業及生活習慣量身訂造方案。久坐辦公室人士可能需要額外加入姿勢矯正及柔韌度元素，體力勞動者的方案設計考量則有所不同，即使目標（增肌）相同亦然。", "source": "補充題目(進階)", "id": 879}, {"chapter": "4. 訓練原則和方案設計", "page": 46, "stem": "客人已有一定訓練經驗，教練希望令其在提升肌肉圍度的同時，亦提升訓練的心肺負荷及效率。以下哪種高階訓練技巧最為合適？", "options": {"A": "金字塔訓練法（單純加重）", "B": "循環訓練法", "C": "離心收縮訓練法", "D": "預先疲勞訓練法"}, "answer": "B", "explanation": "循環訓練法透過將多個動作以極短休息（約十秒）組合成循環，除了提供肌肉訓練刺激外，因休息時間短促、心率持續維持較高水平，亦可同時提升心肺負荷及訓練效率。", "source": "補充題目(進階)", "id": 880}, {"chapter": "4. 訓練原則和方案設計", "page": 47, "stem": "客人於過去一個月，每節訓練的強度、訓練量及訓練種類均完全沒有改變，惟要求教練加快令其見到增肌效果。教練應該如何解釋及調整？", "options": {"A": "解釋習慣性原則導致身體適應現有刺激", "B": "告知客人只要堅持下去便會見到效果，毋須改變任何安排", "C": "增肌純粹取決於飲食，與訓練變數無關", "D": "直接停止訓練，讓身體自然恢復"}, "answer": "A", "explanation": "此情況正正反映習慣性原則：身體已適應現有的固定訓練刺激，出現收益遞減。教練應解釋需要透過漸進式超負荷（調整強度、訓練量或動作變化）製造新刺激，才能持續帶來增肌效果。", "source": "補充題目(進階)", "id": 881}, {"chapter": "4. 訓練原則和方案設計", "page": 45, "stem": "教練為以肌肉力量為主要目標的客人安排訓練次序時，應優先安排以下哪類動作？", "options": {"A": "大肌肉、多關節動作", "B": "小肌肉、單關節動作", "C": "訓練次序對肌力訓練效果並無影響", "D": "純伸展動作"}, "answer": "A", "explanation": "訓練次序原則一般建議大肌肉先於小肌肉、多關節動作先於單關節動作，因為複合動作需要更多神經肌肉協調及能量，宜於體力及專注力最充沛的訓練初段進行，效果及安全性均較理想。", "source": "補充題目(進階)", "id": 882}, {"chapter": "4. 訓練原則和方案設計", "page": 47, "stem": "客人詢問教練為何需要隔一段時間就更換訓練動作及強度安排，而不能一直沿用最初「有效」的方案。教練最貼切的回應是？", "options": {"A": "純粹是為了令訓練更具趣味性", "B": "因為教練希望收取更多堂費", "C": "此做法並無實質科學根據", "D": "因應習慣性原則"}, "answer": "D", "explanation": "此做法的科學根據正是習慣性原則：身體會逐漸適應相同的訓練模式，導致收益遞減。定期調整訓練變數（動作、強度、訓練量等）可維持有效的超負荷刺激，確保客人持續進步，並非純粹為增添趣味或其他非科學考量。", "source": "補充題目(進階)", "id": 883}, {"chapter": "4. 訓練原則和方案設計", "page": 44, "stem": "教練為一位剛完成物理治療、獲准恢復運動的客人設計方案，選用大量結構化的基礎動作（如靠牆蹲、橋式）以重建動作信心。此安排最符合AFT優化系統中哪個級別的訓練原則？", "options": {"A": "AFT系統不適用於康復後客人", "B": "紅級，著重專項運動及競技表現", "C": "藍級，著重重建基礎動作模式及信心", "D": "應直接跳至進階複合動作，加快恢復進度"}, "answer": "C", "explanation": "剛完成物理治療、需要重建動作信心及基礎功能的客人，屬於AFT優化系統中藍級的訓練對象。藍級著重從簡單、結構化的動作開始，重建動作質量及信心，而非直接進行進階或專項訓練。", "source": "補充題目(進階)", "id": 884}, {"chapter": "4. 訓練原則和方案設計", "page": 46, "stem": "教練希望透過調整訓練節奏，加長客人於離心（下降）階段的時間，藉此增加肌肉承受張力的時間。以下哪組節奏標示符合此設計意圖？", "options": {"A": "向心4秒、離心1秒", "B": "向心1秒、離心1秒、完全沒有停頓", "C": "向心2秒、停頓1秒、離心4秒", "D": "節奏標示與肌肉張力時間並無關連"}, "answer": "C", "explanation": "延長離心階段的時間（如向心2秒、停頓1秒、離心4秒）可有效增加肌肉承受張力的整體時間（Time Under Tension），是常見用以強化肌肥大訓練刺激的節奏調整方式。", "source": "補充題目(進階)", "id": 885}, {"chapter": "4. 訓練原則和方案設計", "page": 47, "stem": "客人的訓練目標由「肌肉力量」轉為「肌肉耐力」，教練需要相應調整CO-FIVR-PT中的哪些參數，變化方向為何？", "options": {"A": "應該提高強度（%1RM）、減少重複次數、延長組間休息", "B": "訓練目標轉變不需要調整任何參數", "C": "應該降低強度（%1RM）、增加重複次數、縮短組間休息", "D": "主要調整訓練動作即可，其餘參數影響相對輕微"}, "answer": "C", "explanation": "由肌力訓練轉為肌耐力訓練，強度（%1RM）應相應降低，重複次數增加，組間休息時間亦應縮短，以配合肌耐力訓練「低強度、高次數、短休息」的參數特徵，此為CO-FIVR-PT原則因應訓練目標調整的具體體現。", "source": "補充題目(進階)", "id": 886}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 55, "stem": "客人於第一次試堂後，主動詢問教練「何時可以簽約」，惟教練尚未講解處方內容及價錢。根據銷售六步曲，教練此刻最應該採取的行動是？", "options": {"A": "立即報價收款，把握銷售機會", "B": "直接拒絕客人的簽約意願", "C": "轉移話題，避免討論價錢", "D": "按部就班回到流程"}, "answer": "D", "explanation": "即使客人主動表達興趣，教練仍應確保銷售流程完整：先確認充分了解需求、講解處方內容，令客人清楚了解價值所在，才進入報價及付款步驟，避免因急於促成交易而令客人事後質疑價值。", "source": "補充題目(進階)", "id": 887}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 54, "stem": "教練與新客人第一次會面時，全程保持眼神接觸並採用鼓勵性字眼，惟過程中不斷打斷客人發言、急於介紹課程內容。此做法的主要問題是？", "options": {"A": "眼神接觸次數過多，應該減少", "B": "完全沒有問題，這些均屬良好的溝通技巧", "C": "缺乏聆聽，令非語言（約七成", "D": "鼓勵性字眼使用過度"}, "answer": "C", "explanation": "有效溝通講求語言（約百分之三十）與非語言（約百分之七十）的配合，當中聆聽是非常重要的一環。不斷打斷客人、急於推銷，反映欠缺聆聽，未能真正了解客人需求就直接介紹課程，容易造成溝通失衡，降低建立信任的效果。", "source": "補充題目(進階)", "id": 888}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 54, "stem": "客人反映其他健身室教練同樣聲稱專業，質疑為何需要選擇你。根據私人教練成功之道的四大元素，教練應該如何回應最為全面？", "options": {"A": "從專業訓練技巧知識", "B": "迴避此問題，轉移話題", "C": "單純強調自己收費較廉", "D": "直接批評其他教練並不專業"}, "answer": "A", "explanation": "私人教練成功之道由良好銷售業績、良好溝通技巧、良好服務態度及專業訓練技巧知識四方面互相配合而成，教練應全方位展示這些元素的實際體現（例如過往成功案例、專業知識講解、貼心服務），而非單純以價格競爭或批評對手。", "source": "補充題目(進階)", "id": 889}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 55, "stem": "教練於六步曲第三步（估計客戶需要多長時間達到目標）發現，客人期望的時間表與現實體適能原則明顯不符（例如期望一個月增肌十公斤）。教練最恰當的做法是？", "options": {"A": "為促成交易，直接答應此不切實際的目標", "B": "誠實運用專業知識與客人溝通", "C": "暫時擱置此問題，先按原定流程推進銷售步驟", "D": "直接拒絕這位客人"}, "answer": "B", "explanation": "教練的專業角色要求誠實運用知識引導客人建立合理期望，而非為促成交易而附和不切實際的目標。此做法既維護專業誠信，亦有助建立長遠信任關係，避免日後因未達標而產生糾紛。", "source": "補充題目(進階)", "id": 890}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 54, "stem": "教練向一位完全沒有運動科學背景的客人講解肩關節解剖知識，客人面露茫然。教練應該如何調整溝通方式？", "options": {"A": "建議客人自行上網查閱資料", "B": "改用淺白語言及比喻", "C": "繼續使用專業術語，客人終會理解", "D": "直接停止解釋，開始訓練"}, "answer": "B", "explanation": "有效的溝通需要因應對象調整表達方式。面對缺乏專業背景的客人，應將專業知識轉化為淺白語言及比喻，並配合非語言的親身示範，令客人真正理解，而非堅持使用術語或迴避解說。", "source": "補充題目(進階)", "id": 891}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 55, "stem": "客人已完成六步曲最後一步（付款），惟事後於社交媒體投訴教練「只顧收錢，缺乏跟進」。此情況反映銷售流程中哪個部份可能被忽略？", "options": {"A": "六步曲僅止於付款步驟，其後的跟進不屬教練責任", "B": "良好服務態度應貫穿整個訓練過程", "C": "應該退款了事", "D": "這純屬客人無理取鬧"}, "answer": "B", "explanation": "雖然六步曲以完成付款作結，但私人教練成功之道強調良好服務態度應貫穿整個訓練關係，持續跟進客人進度、保持溝通，才能建立長遠信任及口碑，單純完成交易並不代表教練的責任已經完結。", "source": "補充題目(進階)", "id": 892}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 55, "stem": "教練希望向一位對價格非常敏感的客人推銷長期訓練套餐，應該於哪個步驟開始討論價錢最為恰當？", "options": {"A": "一見面就即時討論價錢，爭取先機", "B": "價錢應該於最開始就成為主導話題", "C": "先建立關係、了解需求、講解處方內容", "D": "傾向延後討論價錢，待客人主動查詢時才回應"}, "answer": "C", "explanation": "六步曲設計的邏輯是先建立關係、了解需求、講解處方內容，待客人充分理解訓練方案的價值後，才進入價錢討論及付款步驟。過早聚焦於價錢，容易令客人未了解價值就先以價格作決定，降低成交率及滿意度。", "source": "補充題目(進階)", "id": 893}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 54, "stem": "客人講話時語氣猶豫，身體微微後傾，雙手交叉。教練單憑語言內容判斷其「對參與訓練充滿信心」，繼續原定計劃。此做法忽略了以下哪項？", "options": {"A": "客人的身體語言只屬次要參考，語言內容才是主要判斷依據", "B": "忽略了非語言訊號（姿勢", "C": "並無忽略任何事項，語言內容已足夠判斷", "D": "應該直接無視此位客人的疑慮"}, "answer": "B", "explanation": "有效溝通強調非語言所佔比重甚至高於語言（約七成）。身體後傾、雙手交叉等姿勢往往透露猶豫或防衛心理，教練應結合語言與非語言綜合判斷，而非單憑口頭回應就斷定客人狀態，忽略潛在的疑慮訊號。", "source": "補充題目(進階)", "id": 894}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 54, "stem": "教練與客人建立關係初期，過份強調自己的專業資歷及過往成就，客人反而顯得有距離感。此做法最可能忽略了以下哪項溝通原則？", "options": {"A": "銷售技巧應該貫穿全程", "B": "客人的感受與建立關係並無關連", "C": "建立融洽和諧的關係（R", "D": "專業資歷屬次要考慮，客人一般不太在意教練背景"}, "answer": "C", "explanation": "六步曲第一步「建立融洽和諧的關係」（Rapport）講求真誠了解及連繫客人，而非單方面自我推銷資歷。過度強調個人成就而忽略雙向溝通，容易令客人感到被說教而非被理解，反而阻礙關係的建立。", "source": "補充題目(進階)", "id": 895}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 55, "stem": "客人已表明預算有限，惟教練仍然堅持推銷最昂貴的套餐方案。此做法違反了以下哪項原則？", "options": {"A": "良好銷售業績原則，應不惜一切促成最昂貴的交易", "B": "此做法完全正確，教練應以自身利益為優先", "C": "個人化及誠信服務原則", "D": "與溝通技巧並無關連"}, "answer": "C", "explanation": "私人教練的專業服務應以客人實際需要及情況（包括預算）為依歸，提供合適建議。罔顧客人已表明的限制而堅持推銷最高價方案，有違誠信服務及真正以客為本的原則，長遠亦會損害信任及聲譽。", "source": "補充題目(進階)", "id": 896}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 54, "stem": "客人於對話中多次提及「工作壓力大」、「時間有限」，教練卻只顧解釋訓練動作的技術細節，未有回應這些訊息。此做法反映教練忽略了以下哪項溝通元素？", "options": {"A": "客人的個人處境與訓練方案設計無關", "B": "教練應該直接批評客人時間管理不善", "C": "訓練動作的技術細節才是溝通的核心，其餘可以從略", "D": "聆聽及回應客人透露的個人處境"}, "answer": "D", "explanation": "客人主動透露的個人處境（如工作壓力、時間限制）是了解其需求及生活狀態的重要線索，教練應該聆聽並適當回應，甚至將此納入方案設計的考量（例如安排更具彈性的訓練時間），而非只顧單向講解技術細節，忽略這些重要訊息。", "source": "補充題目(進階)", "id": 897}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 55, "stem": "教練完成銷售六步曲的第四步（估計時間配合）後，客人表示需要與家人商量才能決定。教練最恰當的回應是？", "options": {"A": "施加壓力，要求客人必須即時決定", "B": "尊重客人的決定過程", "C": "未經客人同意就聯絡其家人游說", "D": "直接放棄跟進此客人"}, "answer": "B", "explanation": "尊重客人的決策過程屬於良好服務態度的一部份。教練應該提供充足及清晰的資訊，讓客人可以與家人商量，並主動、適時地跟進後續回應，而非施加壓力、放棄跟進或未經同意介入客人的私人決策過程。", "source": "補充題目(進階)", "id": 898}, {"chapter": "5. 溝通、業務推廣及商業發展", "page": 54, "stem": "教練發現客人對於加入訓練計劃猶豫不決，主要原因是擔心自己「體能太差，會跟不上」。教練應該如何運用溝通技巧回應此疑慮？", "options": {"A": "直接指出客人體能確實較差，加深其疑慮", "B": "以生硬的專業術語解釋運動生理學原理，試圖說服客人", "C": "運用同理心聆聽客人的擔憂", "D": "忽略客人的擔憂，直接開始銷售流程"}, "answer": "C", "explanation": "面對客人的疑慮，教練應該運用同理心聆聽，理解其擔憂背後的原因，並以淺白易明的方式解釋訓練方案會因應其現有水平循序漸進設計，藉此建立信心及消除疑慮，而非加深疑慮、忽略問題或以艱澀術語增添壓力。", "source": "補充題目(進階)", "id": 899}, {"chapter": "6. 營養及運動表現", "page": 59, "stem": "客人為增肌，將全日蛋白質需求集中於一餐（例如訓練後）攝取，其餘時間幾乎不再攝取蛋白質。此做法的主要問題是？", "options": {"A": "蛋白質攝取時間對增肌效果的影響相對輕微，可以忽略", "B": "未能配合肌蛋白合成的時間規律", "C": "應該將所有蛋白質集中於訓練前攝取才屬正確", "D": "完全沒有問題，只要達到全日總攝取量即可"}, "answer": "B", "explanation": "研究顯示，將蛋白質分散於每三至四小時、每次攝取0.25至0.40克╱公斤體重的高質素蛋白質，是最有效刺激肌蛋白合成（肌肉細胞製造新蛋白質的過程）的方式，較集中一餐攝取全日總量更具效率，過多集中一餐的蛋白質亦可能轉化為脂肪或碳水化合物。", "source": "補充題目(進階)", "id": 900}, {"chapter": "6. 營養及運動表現", "page": 60, "stem": "客人計劃參加一場持續三小時的越野跑比賽，賽前一週已進行碳水化合物負荷法。比賽期間，教練建議的碳水攝取策略應為？", "options": {"A": "應該完全改為只補充蛋白質", "B": "比賽期間毋須再補充碳水，賽前儲備已經足夠", "C": "每小時補充少量（約十克）碳水已經足夠應付需要", "D": "每小時補充六十至九十克碳水化合物"}, "answer": "D", "explanation": "碳水化合物負荷法主要作用是增加賽前肌肝糖儲備，惟對於超過兩個半小時的長時間耐力運動，比賽期間仍需要每小時補充六十至九十克碳水化合物，並配合水份及電解質，才能維持長時間表現，單靠賽前儲備並不足夠。", "source": "補充題目(進階)", "id": 901}, {"chapter": "6. 營養及運動表現", "page": 62, "stem": "客人希望透過肌酸補充提升爆發力表現，惟因擔心副作用而只肯每日攝取三克，並期望即時見效。教練應該如何解釋？", "options": {"A": "三至五克╱日屬於維持期劑量", "B": "三克的劑量過高，應該再減少", "C": "三克╱日已是最有效的劑量，可以即時見效", "D": "肌酸補充完全毋須分為適應期及維持期"}, "answer": "A", "explanation": "肌酸補充的標準做法是先經過五至七日的適應期（每日約二十克，分四等份），令肌肉的肌酸儲備快速飽和，其後才轉為三至五克╱日的維持期。若一開始就只採用維持期劑量，需要較長時間才能達到飽和效果，未必符合客人期望較快見效的預期。", "source": "補充題目(進階)", "id": 902}, {"chapter": "6. 營養及運動表現", "page": 60, "stem": "客人參與一節少於四十五分鐘的室內單車課，堅持要求於過程中每十五分鐘補充一次運動飲料。根據運動營養原則，此做法屬於？", "options": {"A": "應該補充更多才屬正確", "B": "完全必要，運動時間長短不影響碳水補充的需要", "C": "未必必要，因為四十五分鐘以下運動", "D": "必須使用濃度百分之十二以上的運動飲料"}, "answer": "C", "explanation": "根據運動營養指引，運動持續時間少於四十五分鐘，碳水化合物補充並非必須。於此情況下頻密補充運動飲料，除了未必帶來表現提升，亦可能攝取不必要的額外熱量，對一般以健身為目的的客人未必有實際需要。", "source": "補充題目(進階)", "id": 903}, {"chapter": "6. 營養及運動表現", "page": 61, "stem": "客人本身有輕微焦慮及失眠問題，仍習慣於訓練前一小時飲用高劑量咖啡因飲品提神。教練應該如何建議？", "options": {"A": "應改為於訓練後才攝取咖啡因，並毋須理會攝取量", "B": "焦慮及失眠與咖啡因完全無關，可以照常攝取", "C": "咖啡因對表現有幫助，應該鼓勵客人飲用更多", "D": "因應咖啡因可能加劇焦慮及失眠等副作用"}, "answer": "D", "explanation": "咖啡因雖可改善運動表現，惟過量攝取可能引發暈眩、焦慮、失眠及躁動等副作用。對於本身已有焦慮及失眠傾向的客人，應特別留意攝取量（每日建議上限約四百毫克），並考慮減量或建議其他提神方式，而非一味鼓勵增加攝取。", "source": "補充題目(進階)", "id": 904}, {"chapter": "6. 營養及運動表現", "page": 59, "stem": "教練為客人計算熱量後，發現其每日攝取熱量持續高於消耗，惟客人堅持自己「食量甚少」。教練的專業判斷應該是？", "options": {"A": "直接相信客人的主觀感受，毋須再作跟進", "B": "熱量攝取與消耗的關係與體重變化無關", "C": "能量平衡原則客觀反映攝取多於", "D": "直接要求客人節食"}, "answer": "C", "explanation": "能量平衡原則（攝取相對消耗）是客觀的生理規律，主觀「食量少」的感覺未必反映實際攝取量（例如漏計醬料、飲品、小食等）。專業做法是透過客觀的飲食記錄追蹤，才能準確評估及調整，而非單憑主觀感受下判斷。", "source": "補充題目(進階)", "id": 905}, {"chapter": "6. 營養及運動表現", "page": 60, "stem": "客人參加一場長達四小時的超級馬拉松比賽，教練建議其採用運動飲料作為主要水份及能量補充。以下哪個濃度設計最為合適？", "options": {"A": "百分之六至八的葡萄糖濃度", "B": "低於百分之四，因為濃度越低越好", "C": "濃度與運動表現完全無關", "D": "越濃越好，超過百分之十五效果更佳"}, "answer": "A", "explanation": "運動飲料的理想濃度為百分之六至八，低於百分之四可能不足以提供足夠能量支持長時間運動，高於百分之八則容易引致腹部絞痛、噁心及腹瀉等腸胃不適，影響吸收及表現，並非濃度越高或越低就越好。", "source": "補充題目(進階)", "id": 906}, {"chapter": "6. 營養及運動表現", "page": 62, "stem": "客人服用支鏈氨基酸（BCAA）補充劑，期望可以取代正餐中蛋白質的角色。教練應該如何解釋BCAA的實際作用及角色？", "options": {"A": "BCAA可以完全取代日常蛋白質攝取", "B": "BCAA主要作用是延緩疲勞感（透", "C": "BCAA對運動表現完全沒有作用", "D": "BCAA應該於運動後六小時才作補充"}, "answer": "B", "explanation": "BCAA主要透過降低色氨酸相對於BCAA的比例，延緩中樞疲勞感，屬於輔助性補充劑，並非完整蛋白質的替代品。日常仍需要透過正餐攝取含有齊全必需氨基酸的完整蛋白質，才能滿足肌肉合成及修復的整體需要。", "source": "補充題目(進階)", "id": 907}, {"chapter": "6. 營養及運動表現", "page": 59, "stem": "教練發現客人的減重進度停滯了兩星期，惟飲食記錄顯示熱量攝取仍持續低於消耗。以下哪項分析角度最為合理？", "options": {"A": "應該立即停止所有飲食控制", "B": "應該即時大幅增加運動量", "C": "熱量赤字理應令體重持續下降，此情況應優先懷疑記錄有誤", "D": "減重過程可能受水份滯留"}, "answer": "D", "explanation": "雖然長遠而言熱量赤字會導致減重，惟短期內體重可能受水份滯留、荷爾蒙波動、代謝適應等因素影響而出現停滯（俗稱平台期）。專業做法是結合較長時間的趨勢，以及圍度、體脂等其他指標綜合判斷，而非單憑兩星期的磅重數字下結論。", "source": "補充題目(進階)", "id": 908}, {"chapter": "6. 營養及運動表現", "page": 62, "stem": "客人詢問為何教練建議其進行重量訓練的同時，需要留意蛋白質分餐攝取的節奏，而非單純計算全日總量。教練最貼切的解釋是？", "options": {"A": "分餐節奏（例如每三至四小時攝取0.", "B": "應該將所有蛋白質集中於一餐攝取效果最佳", "C": "分餐節奏純粹屬心理安慰，並無實際作用", "D": "蛋白質攝取節奏與肌肉合成並無關連"}, "answer": "A", "explanation": "肌蛋白合成有其時間規律，分散於每三至四小時攝取適量高質素蛋白質，可更頻密地刺激肌蛋白合成，較單純計算全日總量但集中於少數幾餐攝取更配合肌肉修復增長的生理節奏，此為分餐建議背後的科學原理。", "source": "補充題目(進階)", "id": 909}, {"chapter": "6. 營養及運動表現", "page": 59, "stem": "客人為求快速減重，將每日熱量攝取大幅降至每日六百千卡，並持續一個月。教練應該如何評估此做法？", "options": {"A": "支持此做法，熱量赤字越大，減重速度一般越理想", "B": "此做法完全安全，毋須任何調整", "C": "應該建議客人再進一步降低攝取量", "D": "此攝取量已低於極
