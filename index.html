most intuitive way for your client to understand whether\n the training provided by your service is effective. A professional training program can show\n the professional side of the coach, allowing clients to understand that to achieve a training\n goal is systematic. The design of the training program should take the client’s physical fitness\n level, maximize the training effect, and reduce the risk of injury into account. The fitness\n analysis allows clients to see their own changes in different periods, and to better understand\n their own progress. Coaches and clients can use this as a transcript for more specific training\n in the future. Therefore, the answer is D.\n 影像對比圖是讓客人以最直觀的方式了解你的服務為提供的訓練是否有效的方式。專業的\n 訓練方案能展現教練專業的一面，讓客人明白要達成一個訓練目標並不是雜亂無章，訓練\n 方案的設計應能夠考慮到客人的體適能水平、最大化訓練效果、減低受傷風險。體測分析\n 表格能夠讓客人看到自己在不同時期的改變，更了解自身的進度，教練與客人可以以此作\n 為成績表，在日後的訓練中更加針對性的進行訓練。因此，答案是D。", "source": "官方模擬試題"}, {"id": 47, "chapter": "6. 營養及運動表現", "stem": "A 60kg weighed client would like to increase the muscle mass, which of the following\n strategies is suitable to him/her?\n ( Remark: Resting expenditure rate (kcal/d) = [95.272 (Lean body mass [kg]) + 2026.161] / 4.18 )\n 一名六十公斤體重的客人希望能增加肌肉圍度，以下哪一個策略是比較適合？\n （ 註: 靜態消耗率 (千卡/日) = [95.272 (淨體重 [kg]) + 2026.161] / 4.18 )", "options": {"A": "Intake 1,800 kcal per day. The main nutrition should be protein.\n 每天吃 1,800 千卡，以蛋白質為主", "B": "Intake 1,800 kcal per day. The main nutrition should be carbohydrate.\n 每天吃 1,800 千卡，以碳水化合物為主", "C": "Intake 2,500 kcal per day. The main nutrition should be carbohydrate.\n 每天吃 2,500 千卡，以碳水化合物為主", "D": "Intake 2,500 kcal per day. The main nutrition should be protein.\n 每天吃 2,500 千卡，以蛋白質為主"}, "answer": "C", "explanation": "According to the calculation of resting expenditure rate, he requires 1800 kcal/d to maintain\n his current weight. If he would like to increase his body weight, he has to intake more than\n 1800 kcal/d. Carbohydrate should be the main source of energy and should be 50-55% of total\n energy intake per day.\n根據靜態消耗率的計算方法，他一日所需要的約1800 千卡的能量以維持現時的體重，\n 如果他想要增加體重，他每日需要攝入多於1800千卡的能量。而其中應該以碳水化合\n 物為主，它占每天總熱量的 50－55%。", "source": "官方模擬試題"}, {"id": 48, "chapter": "6. 營養及運動表現", "stem": "The best replenishment strategy of carbohydrate during endurance training is:\n 耐力訓練中補充碳水的正確策略是：", "options": {"A": "60g carbohydrate every 30 mins\n 每 30 分鐘補充 60 克碳水化合物", "B": "10g carbohydrate every 60 mins\n 每 60 分鐘補充 10 克碳水化合物", "C": "1 cup of 6% carbohydrate solution taken\n every 15 mins每 15 分鐘補充 1 杯含 6%\n 葡萄糖的飲料", "D": "1 cup of 10% carbohydrate solution taken\n every 15 mins每 15 分鐘補充 1 杯含 10%\n 葡萄糖的飲料"}, "answer": "C", "explanation": "During exercise, it should replenish 15-20g of carbohydrate every 30 minutes. Thus answer A\n and B is incorrect. The correct replenishment is equivalent to 1 cup of 6%-8% sports drink taken\n every 15 to 20 minutes. Therefore, the correct answer is C.\n 耐力運動中補充碳水化合物的理想策略是：每 30 分鐘補充 15－20 克，因此 A 和 B 選項\n 不正確，這個劑量相當於每 15－20 分鐘補充葡萄糖含量在 6%－8%的運動飲料 1 杯。因\n 此選項 C 正確。", "source": "官方模擬試題"}, {"id": 49, "chapter": "6. 營養及運動表現", "stem": "Which of the following statement(s) is/ are correct?\n 下列哪項／些說法是正確的？\n\n I. Carbohydrate intake target for low-intensity or skill-based activities is 3-5 g/kg/d\n 低強度或技巧訓練為主的碳水化合物攝取目標是3-5 克/體重(公斤)/日\n II. For endurance events last for 2-3 hours. Water replacement in the form of sport\n drink composite is more suitable.\n 持續2-3 小時的耐力運動應在運動期間以運動飲料等複合物的形式補充水份\n III. Pre-endurance exercise protein loading may benefit performance\n 耐力運動前蛋白質的負荷能改善運動表現\n IV. Glucose is the main energy source for exercise in high-intensity\n 醣原是進行高強度運動時的主要能量來源", "options": {"A": "I, II & III I, II 和 III", "B": "I, III & IV I, III 和 IV", "C": "I, II & IV I, II 和 IV", "D": "All of above 以上皆是"}, "answer": "C", "explanation": "The general recommendation of carbohydrate intake target for low-intensity or skill-based\n activities is 3-5 d/kg/d. Therefore, option I is correct. During prolonged endurance event (> 2.5\n hours), regular water replenishment\n 低強度或技巧訓練為主的碳水化合物的攝取目標是3-5 克/體重(公斤)/日，因此 I 正確；\n 在進行時間較長的耐力運動時，除了要定時補充流失的水份外，亦會建議在運動期間攝\n 入每小時60-90 克 (運動時間多於2.5小時) 的碳水化合物以維持體內醣原的儲備，以免影\n 響運動表現，因此 II 正確；研究結果指出在運動前的肌醣原儲備越多，耐力越好。相反，\n 蛋白質對於耐力運動不能夠產生決定性的影響，因此 III 不正確；高強度運動例如最大\n 攝氧量的 90－95%，主要能量來源是醣原，因為脂肪分解速度不能及時滿足肌肉的能量\n 需求，因此 IV 是正確的。", "source": "官方模擬試題"}, {"id": 50, "chapter": "6. 營養及運動表現", "stem": "Which of the followings statement about ergogenic aids is correct?\n 以下哪項陳述關於營養補充品是正確的？", "options": {"A": "BCAA can possibly delay fatigue during intense training\n 支鏈胺基酸可能在高強度訓練時延遲疲勞", "B": "Caffeine intake is contraindication to BCAA\n 咖啡因是服用支鏈胺基酸時的禁忌", "C": "Whey protein only contain a group of 3 essential amino acids\n 乳清蛋白質只包含 3 種必需胺基酸", "D": "Creatine Phosphate (CrP) is commonly used in for promoting athletes’ endurance\n performance\n 磷酸肌酸常見用於提升運動員的耐力表現"}, "answer": "A", "explanation": "BCAA is a group of 3 essential amino acids which are claimed to delay fatigue by balancing the\n level of tryptophan (a substance that may trigger sensation of fatigue in CNS).\n Option B is wrong as no evidence or guidelines that show caffeine intake is contraindication to\n BCAA intake. Option C is wrong because Whey protein contain all essential amino acids. Option\n D is also not true as Creatine Phosphate(CrP) is usually applied to enhance high intensity sports\n involving a lot of explosive movements.\n BCAA 是一組 3 種必需氨基酸，據稱通過平衡色氨酸（一種可能引發中樞神經系統疲勞感\n 的物質）的水平來延緩疲勞。答案 B 是錯誤的，因為沒有證據或指引顯示攝入咖啡因是\n 服用 BCAA 的禁忌。C 是錯誤的，因為乳清蛋白含有所有必需氨基酸。D 也是不正確的，\n 因為通常使用磷酸肌酸（CrP）來增強涉及大量爆發性動作的高強度競賽項目。", "source": "官方模擬試題"}, {"id": 51, "chapter": "6. 營養及運動表現", "stem": "Which of the following description(s) about recovery diet after exercise is incorrect?\n 關於運動後飲食補充的說法以下哪項是不正確的？", "options": {"A": "To avoid affecting athletes’ performance, adequate carbohydrate intake after training can help\n restore and maintain optimal muscle glycogen level\n 為避免影響運動員的表現，運動後攝取足夠的碳水化合物有助恢復及維持最佳肌糖原水平", "B": "Replenish protein is more important than carbohydrate after strength training because\n the body needs ample amounts of protein to repair the structural damage of muscle\n cells\n 力量訓練後補充蛋白質比碳水化合物重要，原因是身體需要大量蛋白質修補受損\n 的肌肉細胞", "C": "Intake 1-1.5g of carbohydrate for 1 kg of body weight within 30 minutes after exercise\n 運動後 30 分鐘內按每 1 公斤體重補充 1-1.5 克碳水化合物", "D": "Intake food and fluid shortly after exercise can minimize chronic fatigue and prevent\n lowering of immunity\n 運動後盡快補充食物和水分可以降低長期疲勞及預防抵抗力下降"}, "answer": "B", "explanation": "The recovery and maintenance of optimal levels of muscle glycogen are a key\n consideration for almost any type of athlete, because any type of sports event may use\n glycogen as energy fuel which human has very limited storage of glycogen. To avoid\naffecting athletes’ performance, post-exercise carbohydrate replenishment is very\n important. Therefore answer A is incorrect. Although there is structural damage to\n muscle cells and inflammatory reaction within the muscle, our body does not need to start\n the repairing process immediately. Also, the role of carbohydrate is more important than\n that of protein in post-exercise recovery process. Therefore, it should replenish carbohydrate\n first to speed up the glycogen recovery to minimize chronic fatigue and prevent lowering of\n immune defense. The answer is B.\n 恢復和維持最佳肌糖原水平是幾乎任何類型的運動巽的關鍵考慮因素，因為任何運動項\n 目都會消耗體內的糖原作為能量，而人體只有非常有限的糖原儲備，為避免影響長期的\n 運動表現，運動後的碳水化合物補充猶為重要，因此答案A 是不正確。雖然力量訓練後\n 身體的肌肉細胞有破損和發炎的現象，但身體不會馬上開始修補和合成它們，而運動後\n 恢復的過程中碳水化合物所扮演的角色比蛋白質更為重要。因此仍然需要先補充碳水化\n 合物以促進身體糖原的恢復、降低疲勞感、防止抵抗力下降。因此答案是B。", "source": "官方模擬試題"}, {"id": 52, "chapter": "6. 營養及運動表現", "stem": "Which of the following is the best nutritional strategy for preparing the marathon race?\n 以下哪項營養策略最適合預備馬拉松比賽？", "options": {"A": "Increase fat uptake by 50% 7 days before the event\n 比賽前 7 天增加 50%脂肪攝入量", "B": "Eat a lot of meat to increase the muscle mass and glycogen storage\n 吃大量肉類食品以增加肌肉含量和醣原貯備", "C": "Use carbohydrate loading method to increase glycogen storage\n 可通過碳水化合物儲備法增加肌醣原儲存量", "D": "Take 20g carbohydrate per 1kg body weight to increase the water and glycogen\n storage\n 按每公斤身體重吃 20 克碳水化合物去增加水分和醣原儲存量"}, "answer": "C", "explanation": "The amount of carbohydrate reserve can affect endurance sports performance. To increase the\n carbohydrate reserve, athletes need to take 6-10g of carbohydrate for each kg of body weight.\n Thus a 20g/kg is not the appropriate dosage of carbohydrate intake. Eating a lot of meat or fat\n can increase the energy storage since both fat and protein can act as the energy fuel. However,\n the level of glycogen is the key to determine the endurance of athletes since the low glycogen\n level will lead to the early fatigue. On the other hand, carbohydrate loading which is a 7 days\n training and eating strategy can elevate the glycogen reserve by 50-100%. Therefore answer C\n is correct.\n 碳水化合物的儲量會決定耐力運動的表現。而想提高碳水化合物儲量，每公斤體重應攝\n 入 6－10 克碳水化合物，因此每公斤體重 20 克碳水化合物攝入量是不適合的，如果吃大\n 量的肉或脂肪雖然會增加能量的儲存，因為脂肪和蛋白質都可以作為能量的燃料，但是\n 糖原的貯備才是耐力運動員的關鍵，因為低的糖原水平會導致提前的疲勞。另一方面，\n 碳水化合物儲備法是 7 天的運動訓練及飲食配合的策略，可以將體內肌糖原儲量提高 50\n －100%。因此答案 C 是正確的。", "source": "官方模擬試題"}, {"id": 53, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "Which of the following about the Upper Crossed Syndrome is correct?\n 以下哪項有關上交叉綜合症是正確的？", "options": {"A": "The pectoralis major and deep neck flexors are usually tight\n 胸大肌和深層頸屈肌通常是緊的", "B": "The levator scapulae is underactive\n 肩胛提肌欠缺激活", "C": "Stiff leg deadlift is highly recommended to correct the round shoulder\n 針對圓肩客人，建議多訓練直腿硬拉", "D": "None of above\n 以上皆否"}, "answer": "D", "explanation": "Upper Crossed Syndrome is characterized with poking chin and round shoulder. Muscle\n imbalances involve tight Pectoralis, Upper Trapezius and Levator Scapulae. The Rhomboids,\n Middle and Lower Trapezius as well as the deep neck flexors are usually weak. Therefore,\n option A and B are both incorrect. Stiff leg deadlift is to focus the gluteus maximus and\n hamstrings, strengthening on these muscles cannot provide specific corrective effect to\n the round shoulder problem.\n 上交叉綜合症特徵是頭部下顎前引及圓肩，一般都是有肌肉不平衡，如胸肌過緊，上斜\n 方和肩胛提肌過緊，而菱形肌、中下方斜和深層頸屈肌則過弱，因此選項Ａ和Ｂ都是不\n 正確。直腿硬拉是針對臀大肌及膕繩肌，強化它們並不效有效糾正圓肩的問題。", "source": "官方模擬試題"}, {"id": 54, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "Which of the following about the Lower Crossed Syndrome is correct?\n 以下哪項有關下交叉綜合症是正確的？", "options": {"A": "Lumbar lordosis and posterior pelvic tilt are common postures observed\n 腰椎前曲和骨盆後傾是常見的姿勢", "B": "Abdominal training with sit-up is recommended\n 建議利用仰臥起坐訓練腹肌", "C": "Transversus abdominis training with plank exercise is recommended\n 建議利用平板支撐訓練腹橫肌", "D": "Roman chair back extension is recommended\n 建議利用羅馬椅背伸展作訓練"}, "answer": "C", "explanation": "Lower Crossed Syndrome is characterized with excessive lumbar lordosis and anterior pelvic\n tilt. Muscle imbalances involve tight Erector Spinae and Iliopsoas. The abdominal and gluteal\n muscle groups are usually weak. Therefore option A is incorrect. As sit-up will involve both\n abdominal and Iliopsoas muscles, further strengthening on Iliopsoas is not recommended for\n Lower Crossed Syndrome and hence option B is incorrect. Since roman chair back extension is\n to focus the Erector Spinae and strengthening on this muscle will exacerbate the Lower Crossed\n Syndrome, hence option D is not a good choice as well.\n 答案：C –下交叉綜合症特徵是腰椎過度前曲和骨盆前傾，一般都會出現肌肉不平衡，比\n 如髂腰肌和豎棘肌過緊，腹肌和臀部肌群過弱，因此選項 A 是不正確。而仰臥起坐的訓\n 練會包括腹部和髂腰肌的參與，強化髂腰肌對下交叉綜合症是不建議的，所以 B 選項不\n 正確。而羅馬椅背伸展是針對豎棘肌，強化它會加劇下交叉綜合症的問題，所以 D 選項\n 也不正確。", "source": "官方模擬試題"}, {"id": 55, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "Which of the following about Pronation Distortion Syndrome is correct?\n 以下哪項有關旋前變形綜合症是正確的？", "options": {"A": "Varus knee is common in this syndrome\n 膝內翻是常見的症狀", "B": "Training with hip adduction is recommended\n 建議利用髖內收動作進行訓練", "C": "Flat feet is common in this syndrome\n 扁平足是常見的症狀", "D": "Drop jump exercise is recommended to increase jumping performance\n 建議利用深跳訓練改善跳躍能力"}, "answer": "C", "explanation": "Pronation Distortion Syndrome is characterized with flexed hip, valgus knee and flat feet (feet\n pronation). As significant flat feet may change the biomechanics as well as the weight\n distribution of clients, the knee joints will turn in (valgus) and also the hip will flex as well.\n Clients with this postural deviation usually have tight Iliopsoas and hip adductor while the\n Gluteus Maximus, Medius and Minimus are weak. Therefore, option A is incorrect and option\n B is not recommended. Drop jump requires good landing technique. Clients with such postural\n deviation will have extra pressure on hip, knee\nand ankle. Personal trainers should avoid high speed-high impact exercise before knowing how to\n control the posture to reduce injury risk. Therefore option D is not recommended.\n 旋前變形綜合症特徵是髖屈曲、膝外翻和扁平足 (足部旋前)，明顯的扁平足會改變生物力學以及客\n 人的重心分佈，因此產生了膝關節向內扣 (外翻)和髖屈曲的問題，客人有這種體位偏離一般都是髂\n 腰肌和髖內收肌群比較緊，臀大肌、臀中肌及臀小肌比較弱，所以選項 A 是不正確而選項 B 也是不\n 建議的。深跳動作對著地控制的要求較高，由於客人體位偏離會在髖、膝、足踝產生額外的壓力，\n 因此私人教練應該避免在客人未能控制姿勢前進行快速高衝擊訓練，以免出現受傷，所以 D 選項也\n 不是理想的選擇。", "source": "官方模擬試題"}, {"id": 56, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "Why analyzing the posture of clients before training is important for personal trainers?\n 為什麼訓練前分析客人的姿勢對私人教練來說是很重要？", "options": {"A": "To help make the diagnosis for patients\n 為病人提供診斷", "B": "To help design the rehabilitation program\n 幫助設計康復計畫", "C": "To help prevent injuries induced from training\n 幫助預防由訓練引起的損傷", "D": "To help maximize the muscle hypertrophy\n 幫助最大化的肌肉肥大"}, "answer": "C", "explanation": "Postural analysis is an important process for personal trainers to understand the joint alignment,\n muscle tension as well as the articular pressure of their clients. Since personal trainers are not qualified\n to proceed in the diagnostic process and take part in the rehabilitation program design, option A and B are\n absolutely incorrect. When the personal trainer understands the posture and muscle tension of clients,\n some risky exercise can be avoided while remedial training drills can be introduced to relieve the stress of\n our joints. For example, clients with excessive lumbar lordosis and anterior pelvic tilt will be recommended\n to use seated static bike as their cardiovascular training instead of the high impact running. Clients with\n poking chin and neck discomfort will be taught to train the deep neck flexors to maintain the neutral head\n position for postural correction and prevent neck pain.\n 體位分析對私人教練是一個非常重要的過程，已瞭解客人的關節排列、肌肉張力和骨骼關節的壓力\n 因為私人教練並不具備診斷以及設計康復訓練計畫的資格，所以選項 A 和B 是絕對不正確的。當私人\n 教練瞭解客人的姿勢和肌肉張力後，一些比較危險的訓練動作就可以避免，而且教練還可以利用一些\n 糾正體位的訓練動作去緩解客人的關節壓力。例如，客人有腰椎過度前曲和骨盆前傾，教練會建議\n 他們使用坐式固定自行車來代替高衝擊的跑步來鍛練心肺耐力，又或者是客人有頭部和下額前引和\n 頸部不適，教練會指導他們鍛練深層頸屈肌來保持頭部中立，並改善姿勢和防止頸部疼痛。", "source": "官方模擬試題"}, {"id": 57, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "Which postural deviations can be enhanced by shoulder bridge (Photo 1) and clam\n exercise(Photo 2)?\n 哪些體位的偏離可以通過肩橋（圖 1）和開蚌訓練（圖 2）改善？\n\n Photo 圖 1 Photo 圖 2\n\n I Upper Crossed Syndrome 上交叉綜合症\n II Lower Crossed Syndrome 下交叉綜合症\n III Pronation Distortion Syndrome 旋前變形綜合症\n IV Hallux Valgus 拇趾外翻", "options": {"A": "I, II & III I, II 和 III", "B": "I, III & IV I, III 和 IV", "C": "II & III II 和 III", "D": "III & IV III 和 IV"}, "answer": "C", "explanation": "Shoulder bridge is to strengthen the Gluteus Maximus while the clam exercise can train both Gluteus\n Maximus and Medius. Since the Lower Crossed Syndrome is characterized by weak Gluteus Maximus. It is\n believed that both clam and shoulder bridge are specific corrective drills to the Lower Crossed Syndrome.\n The Pronation Distortion Syndrome is characterized by the valgus knee which is caused by the weak\n Gluteus Maximus, Medius and Minimus. Both exercises (especially the clam) are good to focus on the\n gluteal strengthening. Since there is no significant involvement of the gluteal muscle groups for the\n Upper Crossed Syndrome and Hallux Valgus. Therefore, the appropriate options should be II and III.\n 肩橋是用來強化臀大肌而合蚌式訓練是用來強化臀大和臀中肌。因為下交叉綜合症會有臀大肌較弱\n 的問題，所以合蚌跟肩橋都是屬於比較針對下交叉綜合症的訓練方法。而旋前變形綜合症是由於臀\n 大肌、臀中肌、臀小肌較弱而引起的膝關節外翻，因此利用這兩種訓練（特別是合蚌式）來強化臀\n 部肌是很合適的。由於在上交叉綜合症和拇趾外翻的情況裏面，臀部肌肉沒有明顯的關係，所以合\n 適的選項是 II 和 III。", "source": "官方模擬試題"}, {"id": 58, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "Which of the following about proprioceptive neuromuscular facilitation (PNF) stretching\n is/are correct?\n 以下哪項／些關於本體感受神經肌肉促進法（PNF 伸展）是正確的？\n\n I It is effective to increase the joint range of motion 對提高關節活動幅度有明顯的效\n 果\n II It is an important warm up technique 這是一種重要的熱身技巧\n III It may help correct the anterior pelvic tilt 也許能改善骨盆前傾\n IV The only way to correct round shoulder is to apply intensive PNF stretching on\n pectoralis major 改善圓肩唯一的方法是用密集的 PNF 技巧來伸展胸大肌", "options": {"A": "I & III I 和 III", "B": "I, III & IV I, III 和 IV", "C": "II & III II 和 III", "D": "III & IV III 和 IV"}, "answer": "A", "explanation": "PNF techniques involve stretching, strengthening and motor learning for various clients.\n Personal trainers usually apply the PNF techniques to enhance the joint range of motion\n especially after the intensive muscle training. When clients have received the intensive\n resistance training, the excited nervous signal may cause the tightness of the muscle. PNF is an\n effective technique to normalize the muscle tension and hence improve the range of motion.\n Therefore, option I is correct while option II is not applicable. For clients who have anterior\n pelvic tilt, since one of the possible reasons is the tight Iliopsoas, personal trainers can first\n deliver the Iliopsoas muscle length test to see if the muscle is tight or not. By applying the PNF\n stretching on tight Iliopsoas noticed, the anterior pelvic tilt may be corrected and therefore\n option III is correct. For option IV, since round shoulder may be caused by tight Pectoralis\n Major, weak upper and middle back muscle groups or poor sitting and standing habits,\n trainers may apply various strategies to tackle the problem rather than using the PNF\n stretching only.\n PNF 技巧適合各種的客人，它包括伸展、強化和動作學習，私人教練一般使用 PNF 技巧\n 來提高關節運動的幅度，由其是高強度肌肉訓練過後。當客人完成高強度抗阻力訓練後，\n 興奮的神經訊號會導致肌肉緊張，PNF 就是一套有效的技巧去把肌肉的張力正常化，以\n 改善關節活動幅度。因此選項 I 是正確而 II 是不合適的。對有骨盆前傾的客人，教練可以\n 先瞭解髂腰肌的長度然後再確定是否安排髂腰肌的 PNF 伸展來針對性改善骨盆前傾的問\n 題，所以選項 III 也是正確，但對選項 IV 來說，因為導致圓肩可能是胸大肌過緊，上和中\n 背部肌肉過弱或者是不良的坐姿和站姿習慣，所以教練可能需要針對不同的情況運用各\n 種的技巧和策略去處理不同的情況，而不是單純使用 PNF 伸展。", "source": "官方模擬試題"}, {"id": 59, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "Which of the following posture characteristics match with upper crossed syndrome?\n 以下哪項姿勢特徵與上交叉綜合症相符?", "options": {"A": "Earlobe and acromion as a straight line 耳垂及肩峰垂直成一條線", "B": "Palm facing each other 掌心相對", "C": "Distance between medial border and thoracic spine have larger than 3-4 fingers\n width from the back view 從背面望，內側沿肩胛崗根部與胸椎距離有大於 3-4 指距\n 離", "D": "All of the above are correct 以上皆是"}, "answer": "C", "explanation": "The causes of the upper cross syndrome are the upper trapezius, levator scapula, scalene,\n sternocleidomastoid, suboccipital muscle become tight/hyperactive while deep cervical flexors,\n and lower trapezius are weak/underactive, leading to the head forward. It is necessary to check\nwhether the client has a forward lead problem, the coach should check whether the earlobe is in\n line with the acromion from the side view. If the two are aligned as a straight line, it is not a\n forward lean. Therefore, answer A is incorrect. In addition, the upper cross syndrome can also be\n caused by tight/overactive pectoralis major, pectoralis minor, latissimus dorsi, sub-occipital muscle,\n while weak muscles usually include infraspinatus,, teres minor, posterior deltoid, middle trapezius,\n lower trapezius, and rhomboid muscles. Weakness/poor activation of these muscles lead to round\n shoulder problems. In the assessment and analysis of round shoulders, the coach needs to check\n whether the client’s palms are internally rotated (the palms are backward for internal rotation,\n while they face to each other means normal). 3-4 finger width means that the scapula not forward\n or anterior tilt. Therefore, only answer C meets the characteristics of upper cross syndrome.\n 上交叉綜合症的成因是上斜方肌, 肩胛提肌, 斜角肌, 胸鎖乳突肌, 枕下肌群過緊/過度活躍，\n 深層頸屈肌, 下斜方肌衰弱/欠缺激活，導致頭部前引。如需要檢查客人是否有頭部前引問題，\n 教練需從側面觀檢查耳垂與肩峰是否垂直，如兩者垂直成一條線，則不是頭部前引，因此答\n 案A不正確。另外，上交叉綜合症同時會因胸大肌、胸小肌、背闊肌過緊/過度活躍，崗下肌、\n 小圓肌、後三角肌、中斜方肌、下斜方肌、菱形肌衰弱/欠缺激活導致出現圓肩問題，在有\n 關圓肩的評估及分析中，教練需要檢查客人掌心是否出現內旋 (掌心向後表示內旋，相對表\n 示正常)，內側沿肩胛崗根部與胸椎距離約3-4指寬度代表肩胛沒有出現肩胛前引或前傾的問\n 題。因此，只有答案C符合上交叉綜合症的姿勢特徵。", "source": "官方模擬試題"}, {"id": 60, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "Which of the following about postural analysis is correct?\n 以下哪項有關姿勢分析是正確的?", "options": {"A": "Each joint and muscle in human body work independently\n 身體各個關節和肌肉並非完全獨立運作", "B": "Functional movement analysis can best reflect the postural deviation and joint alignment\n 功能動態姿勢分析是最能反映客人站立時身體姿勢及關節排列", "C": "Personal trainers are not supposed to perform any postural analysis without supervision of\n medical professional\n 教練不應在沒有醫護人員的監督下擅自為客人進行姿勢分析", "D": "All are correct 以上皆正確"}, "answer": "A", "explanation": "The joints of the body are working as a kinetic chain and mutually influenced with each other. The\n postural analysis can help reflect muscle tone, potential muscle imbalance, tightness or weakness\n to some extent. Take Pronation Distortion Syndrome as an example: A collapsed arch (flat feet)\n on one foot of a client can cause knee valgus. Due to joint alignment problems, the pelvis may tilt\n to one side, more seriously may lead to scoliosis. Therefore, the joints and muscles of the body\n do not operate independently. Dynamic posture analysis does not effectively reflect the body\n posture and joint arrangement of the client when standing. With the change of movement, it is\n difficult for the coach to analyze the body posture and joint arrangement of the client in a static\n state. Posture analysis does not include pathological diagnosis. It only relies on the characteristics\n of body arrangement to find weak links in the kinematic chain from posture or functional\n movement analysis, and formulates training programs for clients based on the information\n obtained from the analysis. Hence, supervision from medical professionals is not necessary for\n these procedures. Therefore, answer A is correct.\n 身體各個關節環環相扣，相互影響。體位分析能某程度反映肌肉張力、肌肉潛在不平衡、過\n 緊或衰弱。以旋前變形綜合症為例: 客人單邊腳出現足弓下塌 (扁平足) 的問題，可導致膝部\n 外翻，由於關節排列上的問題，令骨盆側傾，更嚴重或可能導致脊柱側彎的問題，因此身體\n 各個關節和肌肉並非完全獨立運作。功能動態姿勢分析並不能有效反映客人站立時的身體姿\n 勢及關節排列，隨著動作的變化，教練難以分析客人靜態下的身體姿勢及關節排列。姿勢分\n 析並不包含病理學的診斷，只是靠身體排列的特徵，從姿勢或功能動作分析尋找運動鏈中較\n 弱位置，因應分析所得的資訊為客人訂立訓練方案，因此這過程並不需要醫療人員監督。因\n 此，答案A是正確的。", "source": "官方模擬試題"}, {"id": 61, "chapter": "8. 特別需要人士訓練指引", "stem": "Which of the following about angina is correct?\n 以下哪項關於心絞痛的說法是正確的？", "options": {"A": "It is mainly caused by valvular disorders\n 主要由於心臟瓣膜出現病變導致", "B": "It is because of coronary artery stenosis\n 由於冠狀動脈狹窄導致", "C": "Angina is the absolute contraindication to exercise\n 心絞痛是一個運動的絕對禁忌", "D": "Angina attack needs quick swallowing of TNG with water\n 心絞痛發作需要立即用水吞服救心丸"}, "answer": "B", "explanation": "Angina is a primary symptom of coronary heart disease (CHD). It is because of coronary artery\n stenosis and lack of oxygen that finally lead to the chest pain. Therefore, it is not caused by the\n heart valve disorder. Only if the client has the unstable angina and otherwise it is believed that\n patients with angina can also take part in some activities with the doctor approval. When the\n patient encounters the episode of heart attack, the TNG should be prescribed under the tongue\n since there are lots of blood capillaries and this can greatly facilitate the absorption of TNG.\n Swallowing of TNG with water is not an efficient and practical method.\n 答案：B – 心絞痛是冠心病的症狀，是由於冠狀動脈狹窄導致心肌供氧不足從而出現疼\n 痛，與心臟瓣膜無關。除非是非穩定性心絞痛，一般穩定性心絞痛如果在醫生的同意下\n 是可以進行運動的。而救心丸是需要在舌下含服的，因為舌下有豐富的血管可以很快吸\n 收及發揮藥效，如果用水吞服則要進入胃及小腸才吸收，這樣既不實際，效果也不好。", "source": "官方模擬試題"}, {"id": 62, "chapter": "8. 特別需要人士訓練指引", "stem": "Which of the following is not the exercise should be avoid for clients with hypertension?\n 下列哪項訓練不屬於高血壓會員的應避免訓練動作？", "options": {"A": "Decline chest press 下斜板推胸", "B": "Cable crossover 十字夾胸", "C": "Roman chair back extension 羅馬椅背伸展", "D": "All of above 以上皆是"}, "answer": "B", "explanation": "The client who has the hypertension should avoid exercises with the head lower than the heart\n since the cranial pressure may rise dramatically and increase the risk of getting stroke.\n Therefore, the decline chest press and Roman chair back extension are not good choices. Only\n the cable crossover (either standing or sitting) can provide a safe posture for the client.\n答案：B – 高血壓的會員要避免做頭低於心臟的動作，防止腦部壓力劇增從而增加中風的\n 風險。因此下斜板推胸和羅馬椅背伸展都屬於禁忌動作。只有十字夾胸 (站姿或坐姿) 是\n 在安全姿勢下的訓練。", "source": "官方模擬試題"}, {"id": 63, "chapter": "8. 特別需要人士訓練指引", "stem": "Which of the following statements is correct?\n 下列哪項說法是正確的？", "options": {"A": "Children at developmental period need to do a lot of high intensity exercises to\n improve immunity\n 兒童發育時期應該進行大量高強度運動以增強抵抗力", "B": "The pregnant women need to perform more PNF stretching in full range with high\n intensity to enhance flexibility and relieve the pain of puerperal\n 孕婦應該多做全幅度和大強度的 PNF 伸展來增加柔韌度及緩減分娩後的痛苦", "C": "Elderly need to perform balance exercises in safe environment for fall prevention\n 老年人應該在安全的環境下多做平衡訓練以減少跌倒", "D": "Obese clients need to do more high impact training in the early stage for faster fat\n burning effect\n 肥胖人士在訓練初期應該多做高衝擊有氧訓練，這樣能夠快速減脂"}, "answer": "C", "explanation": "At the developing stage, children should avoid doing repetitive or high volume of high\n intensity exercise because it may damage the epiphyseal growth plate of the bone. For\n pregnant women, their bodies will release the hormone relaxin that can soften the ligaments\n and increase the mobility to prepare for the child birth. If high intensity and full range PNF\n stretching is prescribed, ligaments may be further lengthened and finally it will lead to the joint\n instability. For obese clients, since they will have higher pressure in their joints due to the\n large body weight, high impact exercises will further increase the joint pressure. For the\n elderly, since most of them suffer from osteoporosis and they have the risk of bone fracture\n in falling. The poor balance and coordination may further put them at risk. Therefore,\n regularly balance training can improve their coordination and control. This is important for\n them since fall prevention can greatly help decrease the risk of bone fracture.\n 兒童發育時期要避免做大量及重複性高強度運動以免損傷骨骺影響發育，而對於孕婦來\n 說，身體會釋放鬆弛激素使韌帶放鬆，這是為了預備分娩所產生的現象，如果進行全幅\n 度和高強度的PNF 伸展，這樣可能會將韌帶進一步拉松，導致關節不穩定。對於肥胖人\n 士，因為體重過大使關節的壓力增加，所以應該避免做高衝擊有氧運動。而對於老年人\n 而言，因為他們大多都有骨質疏鬆的問題，加上平衡協調能力的下降，如果萬一跌倒，\n 就很有可能造成骨折，所以他們應該多做平衡協調的訓練，加強身體的協調和控制能力\n 去防止跌倒引起的骨折。", "source": "官方模擬試題"}, {"id": 64, "chapter": "8. 特別需要人士訓練指引", "stem": "Mr. Chen, aged 56-yr is diagnosed with type II diabetes mellitus and hypertension. Which of\n the following is/are correct?\n 陳先生，56 歲，同時患有 II 型糖尿病和高血壓，以下哪項／些是正確的？\n\n I Measure the blood pressure and blood sugar level before exercise\n 運動前要測量血壓和血糖水平\n II Bring some candies and take TNG before exercise\n 隨身攜帶糖塊和運動前服用速效救心丸\n III Check if the feet is injured and drink sufficient water before and after exercise\n 運動前後要檢查腳是否受傷，並且補充水分\n IV Should do more resistance training and less aerobic exercise to avoid overloading\n 應該多做抗阻力訓練，減少有氧訓練以避免出現過勞", "options": {"A": "I only 只有 I", "B": "I, II & IV I, II 和 IV", "C": "II & III II 和 III", "D": "I & III I 和 III"}, "answer": "D", "explanation": "The diabetes client should keep the blood sugar level stable and therefore, they have to\n measure blood sugar level before exercise. Since diabetes influences the neural and circulatory\n system, it takes longer time for the wound to heal. Type II diabetes is mainly caused by the\n obesity and it is found that obese clients have poor sensitivity to insulin. Aerobic exercises are\n highly recommended for them since it helps metabolize the excessive blood glucose. On the\n other hand, prolonged exercise without proper eating will cause hypoglycaemia. Therefore it is\n recommended to prepare the candy before training. Since many diabetes patients have\n complications such as hypertension and the most important issue for high blood pressure is to\n keep the blood pressure steady before and after exercise, it is recommended to measure the\n blood pressure before exercise to minimize the risk as well. In addition, hydration is important\n for patients with hypertension since the continuous sweating and water loss during exercise\nwill make the blood more viscous. The viscous blood will result in the faster increase of blood\n pressure. Finally, TNG is mainly the medication for the angina case but not for the hypertension\n and diabetes.\n 患有糖尿病的會員運動前要測血糖，如果血糖過高和過低時都不能做運動。因為糖尿病\n 使人的迴圈和神經系統受到影響，因此傷口不容易癒合。糖尿病人特別是二型很多都是\n 因為肥胖引起的細胞變異導致不能接受糖分，有氧運動可以消耗多餘的血糖，所以應該\n 多做有氧運動。運動時要隨身攜帶糖塊，防止長時間運動中出現低血糖。糖尿病人往往\n 有很多併發症，例如高血壓。對於高血壓人士來說，運動中血壓必須要穩定，高血壓的會\n 員在運動前一定要測血壓，防止在血壓過高的時候做運動以減少運動的風險。因為運動\n 會出汗，脫水的話會引起血液粘稠，血壓增高，所以在運動前中後都要補水。最後患有高\n 血壓的會員不需要攜帶速效救心丸，因為救心丸主要是針對心絞痛而不是高血壓或糖尿\n 病。", "source": "官方模擬試題"}, {"id": 65, "chapter": "8. 特別需要人士訓練指引", "stem": "A client with diabetes is going to start an exercise session with you. Which of the following\n managements is appropriate?\n 一位糖尿病會員準備要跟你開始訓練，以下哪項是正確的處理？", "options": {"A": "Observe any signs and symptoms of hyperglycemia or hypoglycemia\n 要注意觀察任何高血糖或低血糖的徵狀", "B": "Need to get doctor’s approval before each exercise session\n 需要於開始每一節運動課前尋求醫生的同意", "C": "Eat some fast-acting glucose snack before exercise\n 先吃一些糖塊再做運動", "D": "Eat whole cereal bread for emergency handling if the client feels dizzy and faint during\n prolonged training\n 如因客人在長時間訓練課當中感到頭暈和昏倒，應該吃全麥麵包作緊急處理。"}, "answer": "A", "explanation": "In training clients with diabetes, the most dangerous situation is hyperglycemia or\n hypoglycaemia since both situations can be lethal. It is essential to get the doctor approval\n before training for special populations. Once the blood glucose level is well controlled and\n recognized, clients can have the training after measuring the blood pressure and glucose level.\n Therefore, it is no need to get the doctor approval for each training session. To prevent the\n hypoglycaemia during prolonged training, food in low glycemic index (GI) providing a more\n prolonged and slower glucose action should be prescribed before exercise. If clients feel dizzy\n and faint due to the low blood glucose level, they should immediately take a piece of candy for\n fast glucose restoration. Whole cereal bread is not a good choice for emergency use since the\n speed of glucose action is not fast enough because of the low GI.\n 答案：A – 為糖尿病人訓練時，最危險的情況就是高血糖或低血糖，因為這兩種情況都可\n 以是致命的。對特殊人士來說，取得醫生的同意才開始運動是非常重要，但只要以後血\n 糖能夠良好的控制和瞭解，客人只需要每次訓練前量好血壓和血糖就可以，不必要每次\n 訓練都得到醫生的同意。為了防止長時間訓練中有低血糖的情況，訓練前要進食一些讓\n 血糖慢速和長時間反應的低血糖值數(GI)食品，如果萬一運動中出現了低血糖導致頭暈不\n 適，客人要馬上服用一塊糖果去快速回復血糖的正常水平，全麥麵包並不是緊急情況下\n 的一個良好選擇，因為它屬於低血糖值數(GI)，吸收速度不夠快。", "source": "官方模擬試題"}, {"id": 66, "chapter": "8. 特別需要人士訓練指引", "stem": "Which of the following exercise guideline(s) is/are incorrect for clients with asthma?\n 以下哪項／些訓練指引對於哮喘人士是不正確的？\n\n I Take the medicine provided by the trainer for life saving during emergency\n 在運動中出現緊急情況時，服用教練提供的藥物以作搶救\n II Outdoor trainings must lead to the asthmatic attack and therefore, clients must\n perform indoor physical activities\n 戶外訓練一定會引發哮喘，因此一定要在室內進行運動\n III All clients with asthma need to go through a full fitness assessment including blood\n pressure, body fat, muscle endurance, strength, power and VO2max tests for designing\n the safest training plan\n 哮喘會員在運動前應該進行完整的體適能評估流程，包括血壓、體脂、肌肉耐\n 力、肌力及最大攝氧量的測試，這樣才能設計最安全的訓練計畫\n IV Client should bring along asthma puffer during exercise\n 客人在運動時應常備哮喘噴霧旁身", "options": {"A": "I only 只有 I", "B": "I, II & III I, II 和 III", "C": "I, III & IV I, III 和 IV", "D": "All of above 以上皆是"}, "answer": "B", "explanation": "Firstly, personal trainers cannot provide the medicine to the client, it is because only doctors\n are qualified to do so and therefore option I is incorrect. Secondly, if the temperature is not\n very cold and dry, clients with asthma can practice outdoor activities and exercises after\n sufficient warm up and hydration. Therefore option II is incorrect as well. Thirdly, the client\n who has asthma should avoid very high intensity exercise, while the VO2max testing may\n challenge the limit of the client, such test is not recommended for them. Therefore\n option III is incorrect either. Lastly, there is an adverse effect to the respiratory system on\n asthmatic clients in doing exercises in forward bend position. Therefore, the correct answer\n should be B.\n 首先，客人的藥物不能夠由教練提供，因為教練不是醫生，不能提供醫療支援，只能代為\n 保管。所以 I 是錯誤的。第二，如果戶外環境並不是寒冷和乾燥的，那麼哮喘人士是可以\n 在充分熱身和補水後在戶外進行運動的。所以 II 是錯誤的。第三，哮喘人士進行劇烈運\n 動時相對危險，而且最大攝氧量的測試會挑戰客人的極限，考慮到安全問題應避免進行\n 最大攝氧量測試，所以 III 是錯誤的。最後，哮喘人士運動時應常備哮喘噴霧旁身。所以\n 正確答案是 B。", "source": "官方模擬試題"}, {"id": 67, "chapter": "8. 特別需要人士訓練指引", "stem": "Which of the following program prescription(s) is/are correct for clients with osteoporosis\n and hypertension?\n 以下哪一個運動處方是對同時患有骨質疏鬆症和高血壓的客人是最合適的？\n\n I Safe exercise environment to minimize risk of fall; take the anti-hypertensive\n medication; measure the blood pressure and warm up 2-3 minutes before high intensity\n exercises to minimize the risk of training\n 運動前檢查訓練場地是否安全以減少跌倒的風險；服用降壓藥；量度前血壓並於\n 高強度訓練熱身2 至 3 分鐘以減低受傷風險\n II Resistance training with light weight, high repetitions without exhaustion at\n completion of sets. The intensity of aerobic exercise should be between 50-75% of\n HRmax, and use the Karvonen Formula for calculation\n 抗阻力訓練採用輕重量，多次數，於每組完成時不力竭。有氧運動強度必須在貯\n 備心率的 50~75%之間，並且採用卡式公式作計算\n III Squat, roman chair back extension, crunch and upper-limb training are good choices\n for resistance training. And it is better to perform PNF stretching with maximal muscle\n contraction to promote muscles relaxation at the end of a training session\n 理想的抗阻力訓練動作包括：蹲舉，羅馬椅背伸展，卷腹和上肢力量訓練。訓練\n 後最好採用 PNF 伸展，通過最大肌肉收縮來促進肌肉放鬆\n IV To reduce risk of falling, we need to arrange more stability, coordination, balance\n training under a supervised and safe environment for them\n 為了減少客人跌倒機會，在訓練計劃中應該在有人監督和安全的環境下，多安排\n 穩定性、協調性和平衡力的訓練", "options": {"A": "IV only 只有 IV", "B": "II & IV II 和 IV", "C": "I, III & IV I, III 和 IV", "D": "All of above 以上皆是"}, "answer": "A", "explanation": "Clients with hypertension should have longer warm up such as 5-10 minutes before the\n training even though they have already prescribed the anti-hypertensive medications.\n Therefore, option I is incorrect. Since some of the medications may affect the heart rate, thus\n Karvonen Formula should not be the only tool to determine the exercise intensity. Instead, RPE\n should also be included. The client who has osteoporosis should avoid exercises with forward\n bending such as Roman chair back extension and they should not perform the PNF stretching\n with vigorous muscle contraction which may lead to bone fracture. Since falling will also cause\n fracture for clients with osteoporosis, it is recommended to add some balance, coordination\n and stability training under well controlled and supervised environment for these clients.\n 高血壓客人就算訓練前已服用降壓藥，也應該進行較長的熱身，例如 5-10 分鐘左右，所\n 以選項 I 不正確。服用降壓藥後可能會影響心率，因此卡式公式不應該成為唯一的強度判\n 定工具，所以建議同時使用自覺運動強度表(RPE)。有骨質疏鬆症的會員要避免做負重身\n 體前彎的動作如羅馬椅背伸展，並且不應採用 PNF 這樣大強度的伸展，容易對骨骼造成\n 壓力。因為跌倒也可能造成骨折，所以應該在保護和監督情況下加入平衡、穩定和協調\n 的訓練。因此只有選項 IV 是最合適的。", "source": "官方模擬試題"}, {"id": 68, "chapter": "8. 特別需要人士訓練指引", "stem": "Which of the followings is the warning sign means that pregnant women should stop exercising?\n 以下哪項是孕婦應停止進行運動的警示?", "options": {"A": "Chest pain 胸痛", "B": "Feeling of fatigue 感覺乏力", "C": "Dizziness or feelings of faintness 頭暈或暈眩感", "D": "All of the above 以上皆是"}, "answer": "D", "explanation": "Some pregnant women will feel heart palpitations. The most common cause is postural\n hypotension. Because of the increase in hormones during pregnancy, blood vessels dilate.\n If you stand up suddenly or maintain the same position for too long, you may sudden ly\n feel chest tightness or heart palpitations. Especially in the early or late stages of\npregnancy, it is more likely to happen with sudden onset. Because standing suddenly or\n maintaining the same posture for a longer period of time may affect the return o f blood\n to the heart and decrease the output, resulting in postural hypotension. Therefore, if\n symptoms such as chest pain occur, exercise should be suspended. Pregnant women\n prone to feel fatigued easily and feel weak in the early stage and late stage of pregnancy.\n Therefore, if the pregnant woman feels fatigued, training should be suspended to avoid\n excessive exercise which may affect daily life. Dizziness may be caused by anemia or low\n blood sugar. In order to prevent client from losing balance due to dizziness in training. It\n should be suspended.\n 有些孕婦會感到胸悶，甚至有時候可能感到心悸，最常見的原因為姿勢性低血壓。因為\n 懷孕時荷爾蒙上升導致血管擴張，突然站起來，或是維持同一個姿勢時間太久，都可能\n 會突然感到胸悶或心悸。尤其是懷孕初期或後期更易發生，通常都是突然發生。因為突\n 然站立或維持同一個姿勢太久，可能會影響心臟血液回流及輸出量減少，導致姿勢性低\n 血壓。因此如果出現胸口痛等症狀，應暫停運動。在妊娠早期，身體對懷孕還沒有適應，\n 孕婦都會感到容易疲勞，感覺渾身無力；到後期，挺著一個大肚子，行動不便，也特別\n 容易疲勞，因此如孕婦感覺乏力，應暫停訓練，避免因過勞影響日常生活。頭暈或有暈\n 眩感可能是因為貧血或血糖過低所導致，為避免客人在訓練時因暈眩而失平衡趺倒，應\n 暫停訓練。", "source": "官方模擬試題"}, {"id": 69, "chapter": "8. 特別需要人士訓練指引", "stem": "In the emergency management of stroke, what does F- Face represents.\n 在中風的快速處理中，F – Face (面部) 代表的是什麼?", "options": {"A": "Observe whether the patient's face is tired 觀察患者是否面容疲憊", "B": "Observe whether the patient is pale 觀察患者是否面色慘白", "C": "Observe whether the patients cheeks are red 觀察患者是否面色紅潤", "D": "Observe whether the two sides of the patient are symmetrical 觀察患者兩邊面是否對稱"}, "answer": "D", "explanation": "Facial paralysis occurs during a stroke when nerves that control the muscles in the face\n are damaged in the brain. Depending on the type of stroke, damage to the brain cells is\n caused by either lack of oxygen or excessive pressure on the brain cells caused by\n bleeding. Brain cells can die within minutes in each case.\n 在中風的快速處理中F-Face 代表面部，主要是觀察患者的面部是否出現兩邊不對稱的情\n 況。因為中風或有可能會令大腦中控制面部肌肉的神經受損，導致面部麻痺。根據中風\n 的類型，腦細胞受損是由於缺氧或出升導致腦細胞壓力過大造成的。若出現此情況，腦\n 細胞可以在幾分鐘內被殺死。", "source": "官方模擬試題"}, {"id": 70, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "In what stage of injury, the client may resume the running and jumping related training?\n 在受傷中的哪一階段，客人可以開始恢復慢跑及跳躍訓練？", "options": {"A": "Acute inflammatory phase 急性發炎期", "B": "Chronic inflammatory phase 慢性發炎期", "C": "Proliferative phase 維修期", "D": "Remodeling phase 重組期"}, "answer": "C", "explanation": "There are 3 stages for soft tissue healing after injury. The first phase is Acute Inflammatory\n phase. The injury area is red, hot, swollen and painful. In this stage, movement should\n not be completely restricted. Optimal loading will stimulate the process as tendon,\n ligament and muscles all require some loading to stimulate healing. The second phase is\n Proliferative phase in which inflammation and bleeding has been resolved and scar tissue is\n formed. During this phase, increasing blood circulation to the injury area can speed up scar\n formation and healing because of more nutrient and oxygen supply. Gentle movements and\n activities are beneficial for maintaining the muscle strength and joint flexibility. However, the\n vigorous exercises may tear the newly formed scar tissue and therefore only gentle exercises\n can be applied. The third stage is Remodeling phase in which scar tissues density increased. So\n more active training can be introduced to enhance the strength, flexibility, speed and balance\n etc. in order to restore the functions of the client and avoid further injuries.\n 軟組織損傷康復分為三個階段，第一個階段是急性發炎期，受傷部位紅、熱、腫、疼。在\n 這個階段要停止活動，不應完成限制所有活動，洽當的負重及活動能夠刺激肌腱、韌及\n 肌肉的復原。第二個階段是維修期，發炎和出血已經停止，疤痕組織形成。在這個階段\n 增加受傷部位血液迴圈可以加速疤痕形成和康復，因為更多的養份和氧氣被輸送到受傷\n 部位。輕微的運動和活動對於保持肌肉力量和關節柔韌度有益。但是，劇烈運動可以撕\n 裂剛形成的疤痕組織因此這個階段只可以進行輕微的活動。第三個階段是重組期，疤痕\n 組織密度增加。因此這個階段可以多進行一些運動以提高力量、柔韌度、速度和平衡等，\n 以恢復客人的正常功能及預防再次受傷。", "source": "官方模擬試題"}, {"id": 71, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "Regarding soft tissue management, for ‘POLICE’, which of the following is the major function\n of “I”?\n 根據軟組織受傷處理原則 “POLICE” 中的 “I”，以下哪一項是 “I” 的主要功能？", "options": {"A": "Repair the broken capillaries 維修破損血管", "B": "Control the inflammation and reduce the swelling 控制發炎及減少血腫", "C": "Decrease the pain 減少痛楚", "D": "Improve mobility and strength 改善靈活性及力量"}, "answer": "C", "explanation": "The purpose of applying ice to the injured area is to reduce the temperature, lowering\n temperature can reduce nerve cells activities and thus help to decrease the pain. While, icing\n has been proved not effective for selling control.\n 答案：A－冰敷的目的是降低受傷部位的溫度，低溫會減少神經細胞活動因此減低疼痛感。\n 而低溫已被證實不能夠有效控制受傷後的紅腫，因此答案是C。", "source": "官方模擬試題"}, {"id": 72, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "Which of the following describes the correct role of a personal trainer in helping clients with\n sports injury?\n 私人體適能教練在協助運動受傷客人的角色中，以下哪一項／些說法是正確的？\n\n I Assess and diagnose the client’s condition 評估及診斷客人的傷勢\n II Provide rehabilitation plan and exercises 提供康復計畫及訓練\n III Show the correct techniques of exercises 正確的運動技巧\n IV Remind the client about possible injuries in training 提醒客人容易受傷的高危動作", "options": {"A": "I & II I 和 II", "B": "II & III II 和 III", "C": "III & IV III 和 IV", "D": "All of above 以上皆是"}, "answer": "C", "explanation": "To diagnose the client and provide rehabilitation plan is the role of medical professionals such\n as doctors and physiotherapists. The role of fitness trainers is to help clients in carrying out the\n proper exercises, such as showing the correct techniques, proper warm-up and cool down and\n proper use of equipment. Also fitness trainers should communicate with other medical\n professionals to report and discuss the progress of clients for more accurate training strategies.\n 診斷病情和提供康復計畫是醫護人員例如醫生或物理治療師的角色。體適能教練的角色\n 是幫助客人完成合適的運動，例如：示範正確技巧、正確熱身和運動後放鬆、正確的使用\n 設備。同時體適能教練應該與其他醫護人員溝通，彙報和探討客人的進展以便制定更加\n 準確的訓練策略。", "source": "官方模擬試題"}, {"id": 73, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "Which of the following describe the correct mechanism of overuse syndrome?\n 關於勞損綜合症的受傷原理，以下哪一項是正確的？", "options": {"A": "Micro-trauma → lengthening of soft tissue → inflammation → decrease in space and\n flexibility → increase chance of wear and tear\n 細微損傷 → 軟組織增長 → 發炎 → 空間減少 → 增加磨損／撕裂的機會", "B": "Micro-trauma → inflammation → thickening of soft tissue → muscle imbalance →\n increase chance of wear and tear\n 細微損傷 → 發炎 → 軟組織變厚 → 肌肉不平衡 → 增加磨損／撕裂的機會", "C": "Inflammation → decrease in space and flexibility → micro-trauma → increase chance\n of wear and tear → thickening of soft tissue\n 發炎 → 空間及柔韌性減少 → 細微損傷 → 增加磨損／撕裂的機會 → 軟組織\n 變厚", "D": "Micro-trauma → inflammation → thickening of soft tissue → decrease in space and\n flexibility → increase chance of wear and tear\n 細微損傷 → 發炎 → 軟組織變厚 → 空間及柔韌性減少 → 增加磨損／撕裂的\n 機會"}, "answer": "D", "explanation": "The first step of Overuse Syndrome is microtrauma of soft tissues caused by repetitive\n movement and insufficient rest. The repeating microtrauma will accumulate and result in tissue\n inflammation. That is why Overuse Syndrome is a chronic injury. Then during the healing\n process, scars tissues will be formed. The scars tissues will make the soft tissues thickened and\n as a result, joint space and flexibility decreased. This will further increase the friction among\n soft tissues during joint movement and hence more inflammation will be produced in repeated\n movement.\n 勞損綜合症的第一步是軟組織重複運動或休息不夠造成的細微損傷，細微損傷不斷重複\n 和累積造成組織發炎。因此勞損綜合症屬於慢性損傷。在康復過程中，疤痕組織形成。疤\n 痕組織會使軟組織增厚，結果造成關節空間和柔韌度下降。這使得關節活動時軟組織磨\n 損進一步增加，因此重複的動作引發再次發炎。", "source": "官方模擬試題"}, {"id": 74, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "Which of the following description(s) about behind neck lat pull down is/are correct?\n 以下哪一／些說法關於頸後下拉是正確的？\n\n I It is dangerous because it will strengthen the pectoralis minor\n 這是危險動作因為胸小肌會強化\n II It is dangerous because it will overstretch the trapezius and hence cause the shoulder\n tendonitis\n 這是危險動作因為斜方肌會伸展過度而造成肩部肌腱炎\n III It is dangerous because it will overstretch the shoulder joint capsule and ligament\n which will lead to shoulder instability\n 這是危險動作因為肩關節囊及韌帶會伸展過度而造成肩關節不穩定\n IV It is dangerous because it will put excessive stress on the cervical vertebrae\n 這是危險動作因為頸椎會受到過度壓力", "options": {"A": "I & IV I 和 IV", "B": "II, III & IV II, III 和 IV", "C": "I & III I 和 III", "D": "III & IV III 和 IV"}, "answer": "D", "explanation": "In performing the lat pulldown exercise in the behind neck position, the shoulder joint must\n rotate externally in abducted position. This position imposes excessive strain on the anterior\n capsule and ligaments of shoulder joint, since the anterior capsule are structured to stabilize\n shoulder. Besides, in performing behind neck lat pull down, the clients have to move the head\n forward by flexing their necks. Exercise in neck flexion position may put extra stress on cervical\n spine.\n 在完成頸後下拉動作時，肩關節必須在外展的位置上外旋，這個姿勢使肩關節前方的關\n 節囊和韌帶過分拉緊，而前方的關節囊是用於穩定關節的結構。此外，在做頸後下拉時\n 客人的頭要通過屈曲的動作向前伸，頸部屈曲的姿勢可能造成頸椎壓力增加。", "source": "官方模擬試題"}, {"id": 75, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "Why a client with shoulder tendonitis should avoid shoulder press exercise?\n 為何患有肩部肌腱炎的客人應該避免肩上推舉的動作？", "options": {"A": "It will strengthen the levator scapulae and worsen the shoulder tendonitis\n 這個訓練會強化肩胛提肌而使肩部肌腱炎惡化", "B": "Nerve is compressed by the acromion process\n 肩峰突會壓迫神經", "C": "The space between acromion process and greater tubercle of humerus is decreased\n and this will further increase the chance of muscle tendons impingement\n 肩峰突和肱骨大結節間的空間減少，因而增加肌腱受到擠壓的機會", "D": "Pectoralis minor is strengthened hence causes round shoulder posture\n 胸小肌會被強化而造成圓肩姿勢"}, "answer": "C", "explanation": "During the upward phase of shoulder press, the greater tubercle of humerus is moving towards\n the acromion process of scapular. As a result, the space in between becomes smaller. However,\n there are 2 muscle tendons running through the space – long head of Biceps Brachii and\n Supraspinatus. Reducing the space will increase the risk of impingement on these tendons.\n Clients with shoulder tendinitis will have the tendons of the long head of Biceps Brachii and\n Supraspinatus thickened because of the inflammation and scar tissues. Thus the chance of\n getting shoulder impingement is even greater when doing the shoulder press exercise.\n 在肩上推舉的向上階段，肱骨大結節向著肩胛骨的肩峰突移動，因此二者之間的空間減\n 小。但是，這個空間中有兩個肌肉的肌腱通過－肱二頭肌長頭和岡上肌。空間減小會增\n 加擠壓肌腱的風險。有肩部肌腱炎的客人肱二頭肌長頭和岡上肌肌腱由於發炎和疤痕組\n 織的形成而增厚，因此在做肩上推舉動作時肩部擠壓的機會更高。\n\n Shoulder impingement\n Space in between humerus and\n 肩部擠壓\n acromion process of scapular\n reduced during shoulder abduction\n of shoulder press upward phase.\n 在肩外展和向上推舉階段肱骨和\n 肩胛骨肩峰突的空間減小。", "source": "官方模擬試題"}, {"id": 76, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "What does drop jump should be categorized into for obesity client?\n 深跳對於肥胖人士來說是屬於哪一類別的動作?", "options": {"A": "Category I 類別 I", "B": "Category II 類別 II", "C": "Category III 類別 III", "D": "Category IV 類別 IV"}, "answer": "C", "explanation": "Drop jump exercise is a high impact exercise and it requires good landing technique to\n perform safely. People with obesity are in heavy weight, excessive stress may increase the risk\n of injuries on hip, knee and lower back. High impact training such as jumping, hopping or\n prolonged running should be avoided to decrease the injury risk. Drop jump should be\n classified as Cat III drills for obesity population for the very high risk but minimal benefit.\n 深跳是一項高撞擊性的訓練，並且對著地動作的技巧有相當的要求。肥胖人士的體重\n 較一般人士高，相對地，他們的關節，特別是髖、膝關節及腰椎承受相對較高的壓力。\n 為減少對關節的壓力，肥胖人士應避免進行高撞擊性的訓練，例如: 跳躍、彈跳發跑步。\n 對肥胖人士來說，基於極高風險但只有極低的回報，深跳屬於類別III 的動作。", "source": "官方模擬試題"}, {"id": 77, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "Which of the following warm up sequence is correct?\n 以下哪些熱身流程是正確的?", "options": {"A": "increase of temperature(R) > potentiation(P) > activation(A) > increase mobility(M)\n 提升溫度(R) > 增效亢奮(P) > 激活肌群(A) > 提升靈活(M)", "B": "potentiation(P) > increase of temperature(R) > increase mobility(M) > activation(A)\n 增效亢奮(P) > 提升溫度(R) > 提升靈活(M) > 激活肌群(A)", "C": "increase of temperature(R) > activation(A) > increase mobility(M) > potentiation(P)\n 提升溫度(R) > 激活肌群(A) > 提升靈活(M) > 增效亢奮(P)", "D": "activation(A) > potentiation (P) > increase of temperature(R) > increase mobility(M)\n 激活肌群(A) > 增效亢奮 P) > 提升溫度(R) > 提升靈活(M)"}, "answer": "C", "explanation": "The procedure of warm up start with R-raise. This first part of warm up needs to focus on\n raising key physiological parameters, namely blood flow, muscle temperature, core\n temperature, muscle elasticity and the quality of neural activation and conduction. This is\n achieved through the targeted use of low-intensity movements. A-activation comes next. This\n part needs to focus on activate the core muscles and other stabilizers, increase ability of\n controlling the body. After that would be M-mobilization, allow the range of motion achieved\n the mobility which the exercise required. Lastly, P-potentiation. This phase is to maximize the\n function of muscles through specific movements, speed and type of contraction to mimic the\n actual training drills for facilitating the neuromuscular excitation. For example, a 100-m\n sprinter would perform series of sprinting drills before the competition; or doing couple of\n warm-up set before the actual training of barbell bench press.\n\n 熱身的流程是先是R-raise進行低強度的運動進行熱身，讓肌肉及身體的核心溫度提昇，\n 增加血液的流動，增加肌肉的彈性及喚醒神經元。繼而A-activation激活核心及各穩定肌\n 群，提昇身體的控制能力。之後就是M-mobilization，讓身體的靈活度達至運動時需要\n 達到的關節活動幅度。最後就是P-potentiation 用針對訓練的動作，速度或收縮方或促進\n 相關神經肌肉亢奮，例如100米跑的運動員需要在比賽之前進行一系列的衝刺熱身；或\n 進行槓鈴平板推舉前先做一系列負重較少的槓鈴推舉動作。", "source": "官方模擬試題"}, {"id": 78, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "When a client has suffered from acute calf muscle tear meanwhile, he shows very painful with one hand\n pressing on the calf, which of the following management is reasonable?\n 如客人出現小腿肌肉出現急性拉傷的情況，手按受傷部位並顯得十分痛楚，以下哪些急性創傷的\n 處理方式是合理的?", "options": {"A": "Use hot towel to perform heat treatment\n 使用熱毛巾進行熱敷", "B": "Applying massage techniques to relive the pain\n 利用運動按摩舒緩痛楚", "C": "Apply static stretching on the injured muscle group for 20 seconds\n 靜態伸展受傷肌群保持 20 秒", "D": "All of the above are unsafe and unreasonable\n 以上皆不可取"}, "answer": "D", "explanation": "If you encounter an acute strain, you sholes treat it in P.O.L.I.C.E.\n P – Protection\n OL – Optimal Loading\n I – Ice\n C – Compression\n E – Elevation\n Although applying a hot towel to apply heat can relieve the pain, the location of the strain\n may still be bleeding. The heat will diastole the blood vessels making it difficult to stop\n bleeding and reduce swelling. The external pressure of sports massage may exert pressure to\n the injured location. This does not help in relieving the pain, but also may make the client\n more painful, so it should not be used as a way to deal with acute strains. The injury\n mechanism of a muscle strain is that the muscle bears the tension that the muscle tissue can\n withstand in the elongated position, which causes the muscle to tear or break. In the case of\n acute injury, static stretching may aggravate the injury. Therefore, none of the above injury\n management method should be used to treat acute strains\n\n 如若遇到急性拉傷的情況，應以P.O.L.I.C.E 的方式進行處理\n P – Protection 保護受傷部位\n OL – Optimal Loading 施加合適負荷\nI – Ice 冰敷受傷部位\n C – Compression 加壓/包紥受傷部位\n E – Elevation 抬高受傷部位\n 以熱毛巾進行熱敷雖然能夠緩解痛楚感，但拉傷的位置有可能仍然處於出血的狀態，\n 熱力會令微細血管舒張，難以做到止血消腫的效果。運動按摩的外部壓力有可能會按\n 壓到受傷位置，非但不能舒緩痛楚更有可能令客人痛上加痛，因此不應用作處理急性\n 拉傷的方式。肌肉拉傷的受傷機制是因肌肉在拉長的位置承受肌肉組織能夠承受的張\n 力，導致肌肉撕裂或斷裂，在急性受傷的情況下進行靜態伸展或可能會加劇傷勢。因\n 此，以上處理方式都不應用作處理急性拉傷。", "source": "官方模擬試題"}, {"id": 79, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "Which of the following descriptions about overuse syndrome is incorrect?\n 以下哪項有關勞損綜合症的描述是不正確的?", "options": {"A": "Due to strenuous or intensive pull or stress leading to tear and hematoma of soft tissue\n 因短時間內猛烈的拉扯或壓力將軟組織撕裂導致血腫", "B": "Muscle imbalance leading to mal-alignment of joint and poor biomechanics can be one of the\n underlying causes of overuse syndrome\n 可以由肌肉不平衡使關節排列偏離及力學失調所致", "C": "Overuse syndrome is related to increase of age\n 勞損綜合症與年紀增長相關", "D": "Sudden increase of training volume and load may lead to overuse syndrome\n 不合理地突然增加訓練量及負荷可導致勞損綜合症"}, "answer": "A", "explanation": "Overuse syndrome usually has an insidious onset, and it is caused by cumulative effect from\n prolonged period and change. It is not caused by strenuous or intensive pull or stress leading\n to tear and hematoma of soft tissue.\n\n 勞損綜合症一般是在不知不覺發生及長時間累積和演變而成，而非在突然的猛烈的拉\n 扯或壓力將軟組織撕裂導致。因此答案A不正確。\n 138\n11. 參考文獻 References\n\n 2. AASFP, Anatomy Flash Card 5th ed., 2018\n 3. AASFP, Advanced Fitness Trainer Certification Course Manual, 15th ed., 2019\n 4. ACSM’s Guidelines for Exercise Testing and Prescription. 10th ed., Lippincott: Williams &\n Wilkins, 2018\n 5. American College of Sports Medicine. ACSM's Resources for the Personal Trainer. 5th ed.:\n Philadelphia: Wolters Kluwer / American College of Sports Medicine; 2018.\n 6. American College of Sports Medicine. ACSM's Resource Manual for Guidelines for Exercise\n Testing and Prescription. 7th ed. Philadelphia: Philadelphia: Wolters Kluwer\n Health/Lippincott Williams & Wilkins; 2014.\n 7. Brukner P, Clarsen B, Cook J, Cools A, Crossley K, Hutchinson MR, et al. Brukner & Khan's\n clinical sports medicine. 5 th edition ed.: North Ryde, New South Wales : McGraw-Hill\n Education Australia; 2017.\n 8. Heyward V.H., Advanced Fitness Assessment and Exercise Prescription. 4th Edition,\n Champaign, IL: Human Kinetics, 2002.\n 9. Houglum PA, Perrin DH. Therapeutic Exercise for Musculoskeletal Injuries. 2nd ed.\n Champaign: Human Kinetics, 2005\n 10. Jeukendrup A., Gleeson, M., Sports Nutrition, Champaign, IL : Human Kinetics, 3rd ed,\n 2019.\n 11. Kisner C., et al. Therapeutic Exercise Foundations and Techniques. 3rd ed., Philadelphia:\n F.A. Davis Co., 2002\n 12. McArdle W.D., Katch F.I., Katch V.L., Exercise Physiology – Energy, Nutrition & Human\n Performance 8th Edition, Baltimore, Maryland: Lippincott Williams & Wilkins, 2015.\n 13. Wardlaw G.M., Contemporary Nutrition – Issues and Insights 5th Edition, Dubuque, Iowa :\n Brown & Benchmark Publishers, 2003.\n 14. William C.W., Rugg S., Dynatomy – Dynamic Human Anatomy, Champaign, IL: Human\n Kinetics, 2006.\n 139\n出版：亞洲運動及體適能專業學院（AASFP）\n 網址：www.aasfp.com\n 電話：25789877\n 電郵：aasfp@aasfp.com\n 2019 年（第二版（v2.0））\n\n 封面：鳴謝以下教練作封面模特兒\n AASFP「型」象代言人馬家衡、林敬良及羅壹曦、運動達人余曉彤、AASFP 女教練馮詩\n 琪及黃慧琪\n 140", "source": "官方模擬試題"}, {"id": 80, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "以下哪組肌肉屬於肩袖肌群（Rotator Cuff）？", "options": {"A": "三角肌前、中、後束", "B": "棘上肌、棘下肌、小圓肌、肩胛下肌", "C": "斜方肌上、中、下束", "D": "胸大肌及背闊肌"}, "answer": "B", "explanation": "肩袖肌群由 Supraspinatus（棘上肌）、Infraspinatus（棘下肌）、Teres minor（小圓肌）及 Subscapularis（肩胛下肌）四塊肌肉組成。", "source": "補充練習題"}, {"id": 81, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "肱二頭肌長頭（Biceps Brachii Long head）的起端位於：", "options": {"A": "肩胛骨喙突", "B": "肱骨", "C": "橈骨", "D": "尺骨"}, "answer": "A", "explanation": "肱二頭肌長頭起於肩胛骨喙突（Coracoid Process），止於橈骨。", "source": "補充練習題"}, {"id": 82, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "以下哪塊肌肉的收縮動作是「肩水平內收」（Shoulder horizontal adduction）？", "options": {"A": "後三角肌", "B": "胸大肌", "C": "棘下肌", "D": "腓腸肌"}, "answer": "B", "explanation": "胸大肌起於鎖骨、胸骨及肋骨，止於肱骨前上方，主要收縮動作為肩水平內收。", "source": "補充練習題"}, {"id": 83, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "髂腰肌（Iliopsoas）過緊，最可能導致以下哪個姿勢問題？", "options": {"A": "圓肩", "B": "骨盆前傾及腰椎過度前曲", "C": "膝外翻", "D": "駝背"}, "answer": "B", "explanation": "髂腰肌起於第12節胸椎及所有腰椎，止於股骨，過緊會令骨盆前傾及腰椎過度前曲，增加下背痛風險。", "source": "補充練習題"}, {"id": 84, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "有氧運動的「即時」（急性）生理適應不包括以下哪一項？", "options": {"A": "心率上升", "B": "心輸出量上升", "C": "靜態心率下降", "D": "肌肉分配較多血流"}, "answer": "C", "explanation": "靜態心率下降屬於長期（慢性）適應的結果，而非運動當下的即時反應。", "source": "補充練習題"}, {"id": 85, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "以下哪一項是有氧運動的長期（慢性）適應？", "options": {"A": "最大心率大幅上升", "B": "心室肌增厚，心臟體積增加", "C": "微血管數量減少", "D": "最大攝氧量下降"}, "answer": "B", "explanation": "長期有氧訓練會令心室肌增厚、左心室空間增大，令心臟體積增加、每搏輸出量提升。", "source": "補充練習題"}, {"id": 86, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "人體靜態氧氣攝取量（1 MET）約等於：", "options": {"A": "1.5 毫升/公斤/分鐘", "B": "3.5 毫升/公斤/分鐘", "C": "7.0 毫升/公斤/分鐘", "D": "10.5 毫升/公斤/分鐘"}, "answer": "B", "explanation": "人體靜態氧吸收量定義為 3.5 毫升/公斤/分鐘（ml/kg/min），即 1 MET。", "source": "補充練習題"}, {"id": 87, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "中樞神經系統（CNS）包括：", "options": {"A": "腦和脊髓", "B": "周邊神經及感受器", "C": "運動神經元及肌肉", "D": "自主神經及交感神經"}, "answer": "A", "explanation": "中樞神經系統（CNS）由腦和脊髓組成，負責接收並整合周邊神經系統（PNS）傳來的資訊。", "source": "補充練習題"}, {"id": 88, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "遲發性肌肉酸痛（DOMS）通常在運動後多久達到最高峰？", "options": {"A": "1-2小時", "B": "6-12小時", "C": "24-72小時", "D": "5-7天"}, "answer": "C", "explanation": "DOMS 一般在訓練後 24-72 小時達到最頂峰，常與大量離心收縮訓練有關。", "source": "補充練習題"}, {"id": 89, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "急性肌肉酸痛的成因主要與以下哪個能量系統有關？", "options": {"A": "ATP-CP系統", "B": "無氧糖酵解（乳酸系統）", "C": "有氧系統", "D": "脂肪氧化系統"}, "answer": "B", "explanation": "急性肌肉酸痛由無氧糖酵解釋出氫離子，令肌肉環境變酸所致，一般數分鐘至2-3小時可清除。", "source": "補充練習題"}, {"id": 90, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "以下哪一類肌纖維的抗疲乏性最高、收縮力量最低？", "options": {"A": "I型（慢縮）", "B": "IIa型", "C": "IIx型", "D": "以上皆同"}, "answer": "A", "explanation": "I型肌纖維（慢縮/紅肌）以慢氧化代謝為主，抗疲乏性最高但收縮力量及收縮速度最低，適合長時間耐力活動。", "source": "補充練習題"}, {"id": 91, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "IIx型肌纖維最適合應用於以下哪種運動模式？", "options": {"A": "馬拉松長跑", "B": "100-200米短距離衝刺跑", "C": "瑜伽伸展", "D": "太極"}, "answer": "B", "explanation": "IIx型肌纖維（快縮/白肌）無氧能力高、收縮力量極高但抗疲乏性低，適合短距離衝刺跑等爆發性運動。", "source": "補充練習題"}, {"id": 92, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "肌肉肥大的「暫時性肥大」主要成因是：", "options": {"A": "肌纖維數量增生", "B": "肌纖維尺寸增大", "C": "訓練時體液聚積於肌肉細胞間空隙（充血）", "D": "肌腱增厚"}, "answer": "C", "explanation": "暫時性肥大（俗稱 Pump）是訓練時充血，體液聚積於肌肉細胞間空隙所致，只維持數小時。", "source": "補充練習題"}, {"id": 93, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "以下哪項屬於「慢性肌肉肥大」的機制？", "options": {"A": "肌纖維肥大（fibre hypertrophy）及肌纖維增生（fibre hyperplasia）", "B": "單純水份滯留", "C": "乳酸堆積", "D": "心輸出量增加"}, "answer": "A", "explanation": "慢性肥大是透過長期訓練使肌纖維尺寸增加（hypertrophy）及/或數量增加（hyperplasia）而達成的持久性肌肉量提升。", "source": "補充練習題"}, {"id": 94, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "以下哪塊肌肉並非常見的過度繃緊（hyperactive）肌肉？", "options": {"A": "肩胛提肌", "B": "胸小肌", "C": "斜角肌", "D": "下斜方肌"}, "answer": "D", "explanation": "下斜方肌通常屬於容易衰弱（underactive）的肌肉，並非常見的過緊肌肉；肩胛提肌、胸小肌及斜角肌則常見過緊。", "source": "補充練習題"}, {"id": 95, "chapter": "2. 健康體適能評估及計劃安排", "stem": "根據課程指引，量度血壓前應先靜坐休息最少多久？", "options": {"A": "1分鐘", "B": "5分鐘", "C": "15分鐘", "D": "30分鐘"}, "answer": "B", "explanation": "量血壓前應坐著休息至少5分鐘，測試前30分鐘不可吸煙或攝入咖啡因。", "source": "補充練習題"}, {"id": 96, "chapter": "2. 健康體適能評估及計劃安排", "stem": "根據課程分級標準，血壓持續高於以下哪個數值不宜開始運動？", "options": {"A": "140/90 mmHg", "B": "160/100 mmHg", "C": "200/110 mmHg", "D": "180/100 mmHg"}, "answer": "C", "explanation": "血壓超過 200/110 mmHg 屬絕對禁忌，不應開始運動訓練。", "source": "補充練習題"}, {"id": 97, "chapter": "2. 健康體適能評估及計劃安排", "stem": "PAR-Q問卷的主要作用是：", "options": {"A": "作臨床診斷病症之用", "B": "初步了解客人健康狀況，判斷是否需要轉介醫護人員", "C": "直接取代體適能測試", "D": "用於計算最大攝氧量"}, "answer": "B", "explanation": "PAR-Q是自我填報問卷，用於初步篩查客人健康狀況，其內容不能作臨床診斷之用。", "source": "補充練習題"}, {"id": 98, "chapter": "2. 健康體適能評估及計劃安排", "stem": "Jackson & Pollock皮褶測量法中，男士三點量度部位是：", "options": {"A": "胸、腹、大腿", "B": "三頭肌、髂脊上、大腿", "C": "胸、三頭肌、腹", "D": "背、腹、大腿"}, "answer": "A", "explanation": "男士三點皮褶測試部位為胸部、腹部及大腿；女士則為三頭肌、髂脊上及大腿。", "source": "補充練習題"}, {"id": 99, "chapter": "2. 健康體適能評估及計劃安排", "stem": "以下哪項屬於「動態最大肌力測試」（3RM）的特點？", "options": {"A": "較適合一般大眾及初學者", "B": "以手握力計進行", "C": "較適用於有訓練經驗、動作質量良好的健康客人", "D": "主要評估心肺耐力"}, "answer": "C", "explanation": "3RM等動態最大肌力測試涉及多關節動作（如卧推、蹲舉），較適合有經驗且動作質量良好的客人。", "source": "補充練習題"}, {"id": 100, "chapter": "2. 健康體適能評估及計劃安排", "stem": "平板支撐（Plank）主要用作評估哪一種體適能？", "options": {"A": "動態肌力", "B": "靜態核心肌耐力", "C": "心肺耐力", "D": "柔韌度"}, "answer": "B", "explanation": "平板支撐是代表性的靜態肌耐力測試動作，屬全身（主要核心肌群）耐力測試。", "source": "補充練習題"}, {"id": 101, "chapter": "2. 健康體適能評估及計劃安排", "stem": "1.5英哩跑測試（1.5-Mile Run Test）屬於：", "options": {"A": "最大強度心肺耐力測試", "B": "次最大強度心肺耐力測試", "C": "肌力測試", "D": "柔韌度測試"}, "answer": "B", "explanation": "1.5英哩跑測試屬次最大強度測試，測試完成後量度心率並代入公式估算最大攝氧量。", "source": "補充練習題"}, {"id": 102, "chapter": "2. 健康體適能評估及計劃安排", "stem": "BESS平衡測試中，每個站立姿勢需要維持閉眼穩定多少秒？", "options": {"A": "10秒", "B": "20秒", "C": "30秒", "D": "60秒"}, "answer": "B", "explanation": "BESS測試要求受測者於每個姿勢下閉眼維持穩定20秒，並記錄錯誤次數（每項最多10分）。", "source": "補充練習題"}, {"id": 103, "chapter": "2. 健康體適能評估及計劃安排", "stem": "Chester台階測試在受測者的自覺運動強度（RPE）超過多少分時應停止測試？", "options": {"A": "10分", "B": "12分", "C": "14分", "D": "18分"}, "answer": "C", "explanation": "Chester台階測試在RPE超過14分或心率超過最大心率80%時應停止測試。", "source": "補充練習題"}, {"id": 104, "chapter": "2. 健康體適能評估及計劃安排", "stem": "血壓評估中，「心舒壓」（Diastolic pressure）是指：", "options": {"A": "心室收縮時測得的壓力", "B": "心室舒張時測得的壓力", "C": "最大攝氧量時的壓力", "D": "運動後即時的壓力"}, "answer": "B", "explanation": "心舒壓是心室舒張（放鬆）時，動脈血管壁承受的壓力。", "source": "補充練習題"}, {"id": 105, "chapter": "2. 健康體適能評估及計劃安排", "stem": "1-英哩步行測試較常用於以下哪類人群？", "options": {"A": "專業運動員", "B": "長者或體能水平較弱人士", "C": "健美運動員", "D": "青少年運動員"}, "answer": "B", "explanation": "1-英哩步行測試屬次最大強度測試，較常用於長者或體能水平較弱的人士。", "source": "補充練習題"}, {"id": 106, "chapter": "2. 健康體適能評估及計劃安排", "stem": "心肺區域測試（Talk Test）中，若受測者未能完整讀出句子，應：", "options": {"A": "繼續加大強度", "B": "終止測試", "C": "忽略此徵狀，記錄心率", "D": "改用最大強度測試"}, "answer": "B", "explanation": "心肺區域測試以RPE及能否舒適讀出句子作終止指標，若未能完整讀出句子（或RPE達15分以上）應終止測試。", "source": "補充練習題"}, {"id": 107, "chapter": "2. 健康體適能評估及計劃安排", "stem": "以下何者不屬於評估前的預備事項？", "options": {"A": "避免劇烈運動", "B": "避免酒精及咖啡因", "C": "充足睡眠", "D": "測試前大量進食碳水化合物"}, "answer": "D", "explanation": "評估前應避免劇烈運動、酒精、咖啡因，並確保充足睡眠，並非要求大量進食碳水化合物。", "source": "補充練習題"}, {"id": 108, "chapter": "2. 健康體適能評估及計劃安排", "stem": "動態肌耐力測試中，評估腹部肌群耐力常用的動作是：", "options": {"A": "捲腹", "B": "掌上壓", "C": "引體上升", "D": "深蹲"}, "answer": "A", "explanation": "動態肌耐力測試中，腹部常用捲腹，胸部常用掌上壓，背部常用引體上升。", "source": "補充練習題"}, {"id": 109, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "分析阻力訓練動作有效性及安全性的6項重點不包括：", "options": {"A": "身體穩定", "B": "動作幅度", "C": "呼吸", "D": "客人年齡"}, "answer": "D", "explanation": "6項分析重點為身體穩定、身體位置、動作路線、動作幅度、呼吸及節奏，不包括客人年齡。", "source": "補充練習題"}, {"id": 110, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "槓鈴平板臥推舉的正確身體穩定要求是：", "options": {"A": "肩帶聳起，腹部放鬆", "B": "肩帶縮回下壓，腹橫肌收緊，背部挺直", "C": "腰椎完全離開平板", "D": "雙腳離地"}, "answer": "B", "explanation": "臥推時應肩帶縮回下壓、腹橫肌收緊及背部挺直以維持身體穩定。", "source": "補充練習題"}, {"id": 111, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "進行槓鈴臥推時，向上推起過程中的呼吸方式應為：", "options": {"A": "向上呼氣", "B": "向上吸氣", "C": "閉氣完成整個動作", "D": "隨意呼吸"}, "answer": "A", "explanation": "臥推的呼吸原則是向上（發力）時呼氣，向下（還原）時吸氣。", "source": "補充練習題"}, {"id": 112, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "進行槓鈴蹲舉時，膝關節理想的活動路線方向應朝向：", "options": {"A": "腳踝內側", "B": "第2、3腳趾方向", "C": "腳跟", "D": "完全內扣"}, "answer": "B", "explanation": "蹲舉時膝關節應始終朝向第2、3腳趾方向，避免出現膝外翻（內扣）。", "source": "補充練習題"}, {"id": 113, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "蹲舉時出現的「臀部眨眼」（Butt Wink）現象，主要風險是：", "options": {"A": "增加股四頭肌訓練效果", "B": "令腰椎受壓", "C": "提升動作幅度", "D": "沒有任何風險"}, "answer": "B", "explanation": "顯著的臀部眨眼現象會令腰椎進入屈曲狀態並受壓，是蹲舉的高危動作之一。", "source": "補充練習題"}, {"id": 114, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "私教訓練課中正確的教學流程應為：", "options": {"A": "熱身運動 → 示範 → 教授 → 調整運動", "B": "教授 → 熱身運動 → 示範 → 調整運動", "C": "示範 → 熱身運動 → 教授 → 調整運動", "D": "熱身運動 → 教授 → 示範 → 調整運動"}, "answer": "A", "explanation": "正確流程為：熱身運動 → 示範 → 教授（訓練）→ 調整運動（冷卻）。", "source": "補充練習題"}, {"id": 115, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "客人在臥推時不自覺拱起下背，最佳的糾正方法是：", "options": {"A": "增加下背肌力訓練", "B": "改窄握", "C": "指示客人啟動核心（軀幹）肌肉收緊", "D": "增加熱身時間"}, "answer": "C", "explanation": "拱背反映核心（軀幹）穩定不足，最直接的解決方法是指導客人啟動及收緊核心肌肉以維持腰椎中立。", "source": "補充練習題"}, {"id": 116, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "以下哪項不是使用平衡工具（如健身球、平衡墊）於私教訓練中的好處？", "options": {"A": "增加訓練變化及趣味", "B": "增加穩定性及功能性訓練效果", "C": "有效增加最大肌力負荷", "D": "增加訓練難度"}, "answer": "C", "explanation": "平衡工具主要提升穩定性、功能性及訓練變化，但因負荷較輕，並非有效增加最大肌力負荷的工具。", "source": "補充練習題"}, {"id": 117, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "健身球捲腹訓練時，健身球應放置於客人身體哪個部位下方？", "options": {"A": "肩胛骨", "B": "腰椎", "C": "頸椎", "D": "下腹"}, "answer": "A", "explanation": "健身球捲腹時，球應置於客人肩胛骨下方，以取得穩定的支撐及合適的活動幅度。", "source": "補充練習題"}, {"id": 118, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "以初學者而言，以下哪項訓練動作風險相對最高、最不適合？", "options": {"A": "橡皮帶側平舉", "B": "健身球蹲舉（球置於牆上）", "C": "健身球啞鈴臥推", "D": "橡皮帶頸後臂屈伸"}, "answer": "C", "explanation": "健身球啞鈴臥推同時對平衡及核心穩定性要求高，對初學者風險及難度均較高，不建議作為起始動作。", "source": "補充練習題"}, {"id": 119, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "增加掌上壓難度及挑戰性的方法，以下何者不正確？", "options": {"A": "抬起一條腿以增加核心穩定需求", "B": "雙膝跪地做掌上壓以增加控制要求", "C": "雙腳放於健身球上以增加平衡挑戰", "D": "雙手放於不穩定表面增加難度"}, "answer": "B", "explanation": "雙膝跪地掌上壓是降低難度（regression）的方法，而非增加難度的變化。", "source": "補充練習題"}, {"id": 120, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "阻力訓練中，「動作路線」（Path of Motion）主要是指：", "options": {"A": "完成動作所需的時間", "B": "負重在空間中的運動軌跡", "C": "肌肉收縮的類型", "D": "呼吸節奏"}, "answer": "B", "explanation": "動作路線是指器械、槓鈴或啞鈴等負重在整個訓練動作中所走的空間軌跡。", "source": "補充練習題"}, {"id": 121, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "訓練節奏標示「4-4拍」是指：", "options": {"A": "每組完成4次", "B": "離心及向心階段各佔4拍", "C": "每次訓練4分鐘", "D": "每週訓練4次"}, "answer": "B", "explanation": "節奏標示如4-4拍是指動作離心（下降）階段與向心（發力）階段各佔4拍時間。", "source": "補充練習題"}, {"id": 122, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "肩水平內收（Shoulder horizontal adduction）主要涉及哪個活動平面？", "options": {"A": "矢狀面", "B": "額狀面", "C": "水平面", "D": "斜切面"}, "answer": "C", "explanation": "肩水平內收（外展）動作是在水平面（transverse plane）上進行的。", "source": "補充練習題"}, {"id": 123, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "蹲舉時「上身保持直立」，主要目的是：", "options": {"A": "減少股四頭肌參與", "B": "避免重心過度前移，降低腰椎壓力", "C": "增加膝關節活動幅度", "D": "提升動作速度"}, "answer": "B", "explanation": "保持上身直立有助維持重心於身體中軸，避免軀幹過度前傾增加下背壓力。", "source": "補充練習題"}, {"id": 124, "chapter": "4. 訓練原則和方案設計", "stem": "FITT原則中的「T」除了Time之外，另一項是：", "options": {"A": "Tempo", "B": "Type", "C": "Target", "D": "Training"}, "answer": "B", "explanation": "FITT代表Frequency頻率、Intensity強度、Time時間及Type種類。", "source": "補充練習題"}, {"id": 125, "chapter": "4. 訓練原則和方案設計", "stem": "CO-FIVR-PT運動處方原則中，「V」代表：", "options": {"A": "Variation", "B": "Volume", "C": "Velocity", "D": "Vigor"}, "answer": "B", "explanation": "CO-FIVR-PT中的V代表Volume（訓練量），例如組數x次數或持續時間。", "source": "補充練習題"}, {"id": 126, "chapter": "4. 訓練原則和方案設計", "stem": "根據五大訓練方案設計原則，「超負荷原則」是指訓練負荷必須：", "options": {"A": "維持不變", "B": "高於習慣/常態水平", "C": "低於平常水平", "D": "與客人生活習慣無關"}, "answer": "B", "explanation": "超負荷原則要求訓練刺激必須高於身體習慣的水平，例如增加強度、訓練量或縮減休息時間。", "source": "補充練習題"}, {"id": 127, "chapter": "4. 訓練原則和方案設計", "stem": "「習慣性原則」（Principle of Accommodation）指出：", "options": {"A": "身體會習慣相同訓練模式，隨體適能上升出現收益遞減", "B": "必須每天更換訓練動作", "C": "訓練強度須維持恆定", "D": "客人年齡越大訓練效果越好"}, "answer": "A", "explanation": "習慣性原則說明長期採用相同訓練方式，身體會逐漸適應，訓練收益隨之遞減（收益遞減現象）。", "source": "補充練習題"}, {"id": 128, "chapter": "4. 訓練原則和方案設計", "stem": "AFT優化系統中，「藍級」訓練的主要重點是：", "options": {"A": "針對專項運動及競技比賽的體適能訓練", "B": "改善功能失調及體弱問題，從簡單動作開始著重動作質量", "C": "提升動作速度及反應敏捷訓練", "D": "肌肥大相關訓練目標"}, "answer": "B", "explanation": "藍級是最基礎的級別，重點是改善功能失調、糾正不良姿勢及動作模式，重建自信和運動樂趣。", "source": "補充練習題"}, {"id": 129, "chapter": "4. 訓練原則和方案設計", "stem": "AFT優化系統中，「紅級」人士的訓練重點包括：", "options": {"A": "從簡單訓練動作開始", "B": "針對專項運動及競技比賽情境的體適能和腦適能訓練", "C": "改善關節靈活性及穩定性", "D": "學習操控訓練工具及器械"}, "answer": "B", "explanation": "紅級是最高階級別，強調專項運動及競技相關訓練、建立抗壓能力及戰術技術相關訓練。", "source": "補充練習題"}, {"id": 130, "chapter": "4. 訓練原則和方案設計", "stem": "根據課程指引，HIIT訓練部份的強度一般達最大儲備心率的：", "options": {"A": "40-50%", "B": "60-70%", "C": "80-90%", "D": "100%"}, "answer": "C", "explanation": "HIIT訓練部份強度一般為80-90%儲備心率（RPE 15-18或zone 4-5），恢復部份則降至40-50%儲備心率。", "source": "補充練習題"}, {"id": 131, "chapter": "4. 訓練原則和方案設計", "stem": "長距離耐力有氧訓練的強度建議維持在：", "options": {"A": "接近最大心率", "B": "低於乳酸閾值（Zone 2為主）", "C": "HIIT區域", "D": "純無氧區域"}, "answer": "B", "explanation": "長距離耐力訓練應保持有氧及低乳酸範圍，強度低於乳酸閾值，以Zone 2為主，輔以適量Zone 3。", "source": "補充練習題"}, {"id": 132, "chapter": "4. 訓練原則和方案設計", "stem": "「個人化原則」在設計訓練方案時，主要考慮客人的：", "options": {"A": "性別、基因、性格、文化、職業及生活習慣", "B": "只考慮體重", "C": "只考慮年齡", "D": "教練自身喜好"}, "answer": "A", "explanation": "個人化原則要求教練根據客人個人性別、基因、性格、文化、職業及生活習慣量身訂造訓練方案。", "source": "補充練習題"}, {"id": 133, "chapter": "4. 訓練原則和方案設計", "stem": "以增肌為主的一般抗阻力訓練方案設計特點是：", "options": {"A": "較多採用複合動作", "B": "按身體部位/肌肉分化劃分訓練時間表，較多採用孤立肌肉動作", "C": "只做全身循環訓練", "D": "每次訓練只做一組"}, "answer": "B", "explanation": "增肌為主的方案常按身體部位分化訓練，並較多採用孤立動作集中刺激目標肌群。", "source": "補充練習題"}, {"id": 134, "chapter": "4. 訓練原則和方案設計", "stem": "CO-FIVR-PT原則中，「O」代表訓練次序的安排，一般建議：", "options": {"A": "小肌肉先於大肌肉", "B": "單關節動作先於多關節動作", "C": "大肌肉先於小肌肉、多關節先於單關節", "D": "沒有特定次序"}, "answer": "C", "explanation": "訓練次序原則建議：新動作學習優先安排，並依循大肌肉→小肌肉、多關節→單關節的順序。", "source": "補充練習題"}, {"id": 135, "chapter": "4. 訓練原則和方案設計", "stem": "訓練強度與訓練量之間的關係一般是：", "options": {"A": "成正比", "B": "呈反比", "C": "完全沒有關係", "D": "只受頻率影響"}, "answer": "B", "explanation": "運動強度通常和訓練量呈反比關係，即強度越高，可承受的訓練量相對越少。", "source": "補充練習題"}, {"id": 136, "chapter": "4. 訓練原則和方案設計", "stem": "訓練速度節奏（Tempo）方面，中等至略慢的速度較有利於：", "options": {"A": "提升最大力量及爆發力", "B": "提升肌肉承受張力時間，有利肌肥大", "C": "提升心肺耐力", "D": "提升柔韌度"}, "answer": "B", "explanation": "中等至略慢的訓練速度能延長肌肉承受張力時間（Time Under Tension），有利於肌肥大。", "source": "補充練習題"}, {"id": 137, "chapter": "4. 訓練原則和方案設計", "stem": "初學者（藍級）在訓練次序上應優先加強哪些穩定肌群？", "options": {"A": "頸椎、肩胛、核心、骨盆", "B": "只需訓練上肢", "C": "只需訓練下肢", "D": "不需特別著重穩定肌群"}, "answer": "A", "explanation": "初學者應多訓練重要穩定肌群（頸椎、肩胛、核心、骨盆），並從較易操控的訓練方式開始。", "source": "補充練習題"}, {"id": 138, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "根據課程建議，私教溝通中語言與非語言表達的合適比例是：", "options": {"A": "70% : 30%（語言 : 非語言）", "B": "30% : 70%（語言 : 非語言）", "C": "50% : 50%", "D": "100%語言，不需非語言"}, "answer": "B", "explanation": "課程指出適合的比例是語言30%、非語言70%，即「行動比言語更重要」。", "source": "補充練習題"}, {"id": 139, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "向客戶推銷的建議六步曲，第一步應該是：", "options": {"A": "完成付款手續", "B": "向客戶解釋處方內容", "C": "建立融洽和諧的關係", "D": "了解客戶的需求及目標"}, "answer": "C", "explanation": "六步曲第一步是建立融洽和諧的關係（Rapport），其後才了解需求、估計時間及解釋方案。", "source": "補充練習題"}, {"id": 140, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "私人教練成功條件中，屬於「科學」部分的是：", "options": {"A": "心態", "B": "銷售技巧", "C": "知識和技巧、安全性", "D": "服務態度"}, "answer": "C", "explanation": "私人教練成功條件分為「藝術」（心態、溝通、服務、銷售）及「科學」（知識技巧、安全性）兩部分。", "source": "補充練習題"}, {"id": 141, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "以下哪項屬於有效的「非語言」溝通技巧？", "options": {"A": "使用鼓勵性字眼", "B": "眼神接觸及以鏡作示範", "C": "詳細解釋訓練原理", "D": "提供書面訓練計劃"}, "answer": "B", "explanation": "非語言溝通包括眼神接觸、姿勢、距離、以鏡作示範及創造舒適環境等。", "source": "補充練習題"}, {"id": 142, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "在銷售流程中，「估計客戶需要多長時間達到目標」應在哪個步驟進行？", "options": {"A": "第一步", "B": "第三步", "C": "完成付款後", "D": "不需要進行此步驟"}, "answer": "B", "explanation": "六步曲第三步是估計客戶需要多長時間配合才能達到目標，屬建立關係及了解需求之後的步驟。", "source": "補充練習題"}, {"id": 143, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "教練給予客人有意義的回饋，主要有助於：", "options": {"A": "提升客人的學習及訓練表現", "B": "減少訓練時間", "C": "取代熱身運動", "D": "降低訓練強度"}, "answer": "A", "explanation": "有意義及具體的回饋能有效提升客人對動作的理解及學習表現。", "source": "補充練習題"}, {"id": 144, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "以下哪個不屬於課程列出的成功教練具備的人際溝通技巧？", "options": {"A": "語言／非語言", "B": "眼神接觸", "C": "財務管理能力", "D": "聆聽"}, "answer": "C", "explanation": "課程列出的溝通技巧包括語言/非語言、距離、身體接觸、眼神接觸、儀表及聆聽，並不包括財務管理能力。", "source": "補充練習題"}, {"id": 145, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "銷售六步曲中，最後一步是：", "options": {"A": "建立融洽關係", "B": "了解客戶需求", "C": "完成付款手續", "D": "向客戶解釋處方內容"}, "answer": "C", "explanation": "六步曲最後一步（第六步）是完成付款手續。", "source": "補充練習題"}, {"id": 146, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "根據課程，私人教練成功之道的核心組成部分包括：", "options": {"A": "良好銷售業績、良好溝通技巧、良好服務態度及專業訓練技巧知識", "B": "只需良好銷售業績", "C": "只需專業知識，不需溝通技巧", "D": "與客人保持距離，避免建立關係"}, "answer": "A", "explanation": "私人教練成功之道由良好銷售業績、良好溝通技巧、良好服務態度及專業訓練技巧與知識四方面互相配合而成。", "source": "補充練習題"}, {"id": 147, "chapter": "6. 營養及運動表現", "stem": "根據ISSN（2018）建議，一般運動人士增肌的每日蛋白質攝取建議量為：", "options": {"A": "0.8-1.0克/公斤體重", "B": "1.4-2.0克/公斤體重", "C": "3.0-4.0克/公斤體重", "D": "沒有特定建議"}, "answer": "B", "explanation": "增肌人士每日蛋白質攝取建議為1.4-2.0克/公斤體重，並建議分開5至6餐進食。", "source": "補充練習題"}, {"id": 148, "chapter": "6. 營養及運動表現", "stem": "耐力運動持續超過2.5小時，建議每小時攝取碳水化合物的份量是：", "options": {"A": "10-20克", "B": "30-60克", "C": "60-90克", "D": "100-150克"}, "answer": "C", "explanation": "超過2.5小時的長時間耐力及高強度運動，建議每小時攝取60-90克碳水化合物；1-2.5小時則為30-60克/小時。", "source": "補充練習題"}, {"id": 149, "chapter": "6. 營養及運動表現", "stem": "運動飲品中葡萄糖濃度過高（>8%）可能導致：", "options": {"A": "表現顯著提升", "B": "腹部絞痛、噁心及腹瀉", "C": "沒有任何副作用", "D": "血糖過低"}, "answer": "B", "explanation": "運動飲品建議濃度為6-8%，濃度過高（>8%）容易導致腹部絞痛、噁心及腹瀉；過低（<4%）則不足以增強表現。", "source": "補充練習題"}, {"id": 150, "chapter": "6. 營養及運動表現", "stem": "碳水化合物負荷法（Carbohydrate Loading）主要目的是：", "options": {"A": "賽前減少肌肉肝糖儲備", "B": "賽前大量增加肌肉和肝糖原貯備約50-100%", "C": "提升瞬間爆發力", "D": "取代蛋白質補充"}, "answer": "B", "explanation": "碳水化合物負荷法目的是在賽前約一週內大量增加肌肉及肝糖原貯備約50-100%，針對改善超過90分鐘的耐力表現。", "source": "補充練習題"}, {"id": 151, "chapter": "6. 營養及運動表現", "stem": "運動時間少於45分鐘，關於碳水化合物補充的建議是：", "options": {"A": "必須大量補充", "B": "並非必須補充", "C": "必須每15分鐘補充一次", "D": "應完全禁食"}, "answer": "B", "explanation": "運動持續時間少於45分鐘，碳水化合物的攝取並非必須。", "source": "補充練習題"}, {"id": 152, "chapter": "6. 營養及運動表現", "stem": "1小時或以下的運動，水份補充建議：", "options": {"A": "必須使用運動飲料", "B": "飲用純水已可提供最大效益", "C": "完全不需要補水", "D": "只能補充電解質粉"}, "answer": "B", "explanation": "1小時或較短時間的運動，單純飲用清水已可提供足夠的補水效益；超過1小時則以運動飲料等複合物更有效。", "source": "補充練習題"}, {"id": 153, "chapter": "6. 營養及運動表現", "stem": "咖啡因建議於運動前多久攝入以達最佳效果？", "options": {"A": "運動前5分鐘", "B": "運動前30-60分鐘", "C": "運動前3小時", "D": "運動後即時"}, "answer": "B", "explanation": "建議於運動前30-60分鐘攝入咖啡因，以改善耐力及爆發性運動表現。", "source": "補充練習題"}, {"id": 154, "chapter": "6. 營養及運動表現", "stem": "肌酸磷酸補充的「適應期」建議攝取方式是：", "options": {"A": "持續5-7日，約20克/日（分4等份）", "B": "單次攝取100克", "C": "只需攝取1日", "D": "每月一次20克"}, "answer": "A", "explanation": "肌酸適應期建議持續進食5-7日，每日約20克（分開4等份），其後轉為維持期3-5克/日。", "source": "補充練習題"}, {"id": 155, "chapter": "6. 營養及運動表現", "stem": "運動後即時的肌蛋白合成敏感期大約維持多久？", "options": {"A": "1小時", "B": "4小時", "C": "12小時", "D": "24小時"}, "answer": "B", "explanation": "運動後即時（約4小時）的肌蛋白合成較為敏感，應優先在此期間攝取蛋白質。", "source": "補充練習題"}, {"id": 156, "chapter": "6. 營養及運動表現", "stem": "乳清蛋白的建議攝取量及頻率是：", "options": {"A": "每3-4小時攝取0.25-0.40克/公斤體重的高質素蛋白質", "B": "每日只需攝取一次任何份量", "C": "只可在運動後攝取", "D": "不建議與其他蛋白質來源混合"}, "answer": "A", "explanation": "研究建議每3-4小時攝取0.25-0.40克/公斤體重的高質素蛋白質，是最有效增加蛋白質合成率的方式。", "source": "補充練習題"}, {"id": 157, "chapter": "6. 營養及運動表現", "stem": "健康成年人的建議咖啡因每日攝取上限大約為：", "options": {"A": "100毫克", "B": "400毫克", "C": "1000毫克", "D": "沒有上限"}, "answer": "B", "explanation": "一般對成人的建議咖啡因攝取劑量為400毫克/日，過量可能引發暈眩、焦慮、失眠及躁動。", "source": "補充練習題"}, {"id": 158, "chapter": "6. 營養及運動表現", "stem": "能量攝取與消耗的關係中，「攝取 < 消耗」會導致：", "options": {"A": "增重", "B": "減重", "C": "維持體重不變", "D": "與體重無關"}, "answer": "B", "explanation": "當攝取熱量少於消耗熱量時，身體處於負能量平衡狀態，結果是減重。", "source": "補充練習題"}, {"id": 159, "chapter": "6. 營養及運動表現", "stem": "支鏈氨基酸（BCAA）主要由哪三種必需氨基酸組成？", "options": {"A": "異白氨酸、白氨酸、纈氨酸", "B": "精氨酸、甘氨酸、丙氨酸", "C": "色氨酸、酪氨酸、苯丙氨酸", "D": "組氨酸、賴氨酸、蛋氨酸"}, "answer": "A", "explanation": "BCAA由異白氨酸（isoleucine）、白氨酸（leucine）和纈氨酸（valine）三種必需氨基酸組成。", "source": "補充練習題"}, {"id": 160, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "上交叉綜合症（Upper-Crossed Syndrome）中，以下哪組肌肉屬於「過緊」？", "options": {"A": "深層頸屈肌、中下斜方肌", "B": "胸大肌、胸小肌、上斜方肌、肩胛提肌", "C": "腹直肌、臀大肌", "D": "股四頭肌、腓腸肌"}, "answer": "B", "explanation": "上交叉綜合症的過緊肌肉包括胸大肌、胸小肌、背闊肌、上斜方肌、肩胛提肌、斜角肌及枕下肌群。", "source": "補充練習題"}, {"id": 161, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "下交叉綜合症（Lower-Crossed Syndrome）常見於以下哪類人士？", "options": {"A": "游泳運動員", "B": "久坐上班族、常穿高跟鞋女士及肥胖人士", "C": "瑜伽教練", "D": "長跑運動員"}, "answer": "B", "explanation": "下交叉綜合症常見於久坐工作、常穿高跟鞋或肥胖人士，特徵是腰椎前曲弧度過大及骨盆前傾。", "source": "補充練習題"}, {"id": 162, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "下交叉綜合症患者應避免以下哪個訓練動作？", "options": {"A": "肩橋", "B": "硬拉、羅馬椅軀幹伸展", "C": "四點式跪撐", "D": "仰臥核心收縮訓練"}, "answer": "B", "explanation": "硬拉及羅馬椅軀幹伸展會進一步加重腰椎前曲，是下交叉綜合症應避免的高風險動作。", "source": "補充練習題"}, {"id": 163, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "旋前變形綜合症（Pronation Distortion Syndrome）中，過弱的肌肉包括：", "options": {"A": "腓腸肌、比目魚肌", "B": "脛骨前肌、脛骨後肌及足部肌肉、臀大肌、臀中肌", "C": "髂腰肌、股直肌", "D": "髖內收肌群"}, "answer": "B", "explanation": "旋前變形綜合症中，脛骨前/後肌、足部肌肉、臀大肌、臀中肌及股內側肌通常屬過弱，而腓腸肌、比目魚肌等則過緊。", "source": "補充練習題"}, {"id": 164, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "以下哪項屬於旋前變形綜合症的評估及分析檢查點？", "options": {"A": "頭部前引", "B": "足弓空間、膝外翻、大拇趾外翻", "C": "腰椎前曲弧度過大", "D": "肩胛不平貼"}, "answer": "B", "explanation": "旋前變形綜合症的檢查點包括足弓空間、跟腱方向、大拇趾外翻、膝外翻及骨盆前傾。", "source": "補充練習題"}, {"id": 165, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "脊柱側彎（Scoliosis）患者應避免以下哪類訓練？", "options": {"A": "側棒", "B": "靠牆站立", "C": "高負重的全身性訓練，例如蹲舉、硬拉", "D": "俯臥超人"}, "answer": "C", "explanation": "脊柱側彎患者應避免高負重的全身性訓練（如蹲舉、硬拉），以免加劇脊柱壓力。", "source": "補充練習題"}, {"id": 166, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "PNF伸展法的好處不包括：", "options": {"A": "促進恢復正常姿勢和肌肉控制", "B": "有效放鬆過緊的肌肉", "C": "提高本體協調性和平衡力", "D": "直接治療關節炎"}, "answer": "D", "explanation": "PNF伸展法的好處是改善肌肉張力、姿勢控制及本體感覺協調，並非治療關節炎等病理狀況（教練不具診斷及治療資格）。", "source": "補充練習題"}, {"id": 167, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "拇趾外翻（Hallux Valgus）的定義是拇趾骨與第一蹠骨之間關節傾斜超過：", "options": {"A": "5度", "B": "15度", "C": "30度", "D": "45度"}, "answer": "B", "explanation": "拇趾外翻是指拇趾骨和第一蹠骨之間關節傾斜超過15度。", "source": "補充練習題"}, {"id": 168, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "上交叉綜合症的評估檢查點包括：", "options": {"A": "頭部前引、寒背、掌心向後", "B": "膝超伸", "C": "足弓塌陷", "D": "骨盆側傾"}, "answer": "A", "explanation": "上交叉綜合症檢查點包括頭部前引、肩胛不平貼、寒背、肩胛胸椎距離過大、下角凸出及掌心向後（內旋）。", "source": "補充練習題"}, {"id": 169, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "下交叉綜合症的過弱肌肉組別包括：", "options": {"A": "豎棘肌、髂腰肌", "B": "腹部肌群、臀大肌、股內側肌", "C": "闊筋膜張肌", "D": "胸腰筋膜"}, "answer": "B", "explanation": "下交叉綜合症的過弱肌肉包括腹部肌群、臀大肌及股內側肌，過緊的則有豎棘肌、髂腰肌、股直肌等。", "source": "補充練習題"}, {"id": 170, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "改善上交叉綜合症的建議強化運動包括：", "options": {"A": "槓鈴聳肩", "B": "靠牆胸大肌伸展", "C": "眼鏡蛇式（Cobra）、直臂划船、貼牆下顎縮回", "D": "股直肌伸展"}, "answer": "C", "explanation": "眼鏡蛇式、直臂划船及貼牆下顎縮回是強化中下背及深層頸屈肌的動作，有助改善上交叉綜合症；槓鈴聳肩則應避免。", "source": "補充練習題"}, {"id": 171, "chapter": "7. 運動處方：體位偏離及柔韌度", "stem": "旋前變形綜合症建議避免的運動類型是：", "options": {"A": "低強度伸展", "B": "高沖擊性運動，如快跑和跳躍", "C": "核心穩定訓練", "D": "平衡訓練"}, "answer": "B", "explanation": "由於旋前變形綜合症影響足弓及下肢力學排列，應避免高沖擊性運動如快跑及跳躍，以免加劇問題。", "source": "補充練習題"}, {"id": 172, "chapter": "8. 特別需要人士訓練指引", "stem": "根據課程指引，冠心病（心臟病）客人應隨身攜帶哪種藥物？", "options": {"A": "阿士匹靈", "B": "救心丸（脷底丸，Trinitrate Glyceryl）", "C": "胰島素", "D": "抗生素"}, "answer": "B", "explanation": "冠心病客人應隨時帶備救心丸（脷底丸），含服於舌頭底下作快速急救之用。", "source": "補充練習題"}, {"id": 173, "chapter": "8. 特別需要人士訓練指引", "stem": "急性中風的快速識別口訣「FAST」中，「A」代表：", "options": {"A": "Alert 警覺", "B": "Arms 手臂無力", "C": "Attitude 態度", "D": "Ambulance 救護車"}, "answer": "B", "explanation": "FAST中F=Face面部不對稱，A=Arms手臂無力下垂，S=Speech說話不清，T=Time爭取黃金3小時盡快就醫。", "source": "補充練習題"}, {"id": 174, "chapter": "8. 特別需要人士訓練指引", "stem": "健康人士的空腹血糖值應維持在：", "options": {"A": "1.0-3.0 mmol/L", "B": "4.0-6.0 mmol/L", "C": "7.0-10.0 mmol/L", "D": "10.0-15.0 mmol/L"}, "answer": "B", "explanation": "健康人士空腹血糖值應介乎4.0-6.0 mmol/L，糖尿病人士空腹血糖值則≥7.0 mmol/L。", "source": "補充練習題"}, {"id": 175, "chapter": "8. 特別需要人士訓練指引", "stem": "糖尿病人士低血糖的定義是血糖值低於：", "options": {"A": "3.9 mmol/L", "B": "6.0 mmol/L", "C": "7.0 mmol/L", "D": "10.0 mmol/L"}, "answer": "A", "explanation": "糖尿病人士低血糖定義為血糖值低於3.9 mmol/L，成因包括服用過多降糖藥物或進食不足。", "source": "補充練習題"}, {"id": 176, "chapter": "8. 特別需要人士訓練指引", "stem": "高血壓的定義是日常靜態血壓高於：", "options": {"A": "120/80 mmHg", "B": "140/90 mmHg", "C": "160/100 mmHg", "D": "180/120 mmHg"}, "answer": "B", "explanation": "高血壓定義為日常靜態血壓高於140/90 mmHg，需相隔兩天最少兩次量度作準。", "source": "補充練習題"}, {"id": 177, "chapter": "8. 特別需要人士訓練指引", "stem": "高血壓客人訓練時應避免以下哪項？", "options": {"A": "5-10分鐘中低強度熱身", "B": "訓練前檢查血壓", "C": "憋氣及高強度等長收縮", "D": "訓練前提醒服用降血壓藥"}, "answer": "C", "explanation": "高血壓客人訓練時應避免憋氣及高強度等長收縮，因閉氣及等長收縮會使血管受壓，直接壓迫心臟和血管。", "source": "補充練習題"}, {"id": 178, "chapter": "8. 特別需要人士訓練指引", "stem": "哮喘患者進行運動前，建議進行的熱身時間及強度是：", "options": {"A": "1-2分鐘輕度熱身", "B": "10-15分鐘劇烈或可變強度熱身", "C": "不需要熱身", "D": "30分鐘低強度熱身即可"}, "answer": "B", "explanation": "建議哮喘患者進行10-15分鐘劇烈強度或可變強度的熱身運動，以誘發「不應期」減低運動誘發性支氣管收縮。", "source": "補充練習題"}, {"id": 179, "chapter": "8. 特別需要人士訓練指引", "stem": "肥胖人士運動時，應避免的訓練類型是：", "
