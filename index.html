低熱量飲食（VLCD"}, "answer": "D", "explanation": "每日攝取低於800千卡已符合極低熱量飲食（VLCD）的定義，長期在缺乏專業醫療監督下採用，可能對健康構成風險（如營養不良、代謝紊亂）。教練應建議客人調整至更合理及可持續的熱量水平，並在需要時建議尋求專業醫療人員監督。", "source": "補充題目(進階)", "id": 910}, {"chapter": "6. 營養及運動表現", "page": 60, "stem": "客人於一小時的室內帶氧課堂後，主訴口渴及輕微頭暈，並提到過程中只飲用了少量清水。教練應該如何檢視此情況？", "options": {"A": "單純飲用清水已足夠應付一小時或以下的運動", "B": "口渴及頭暈與水份補充完全無關", "C": "一小時運動必須使用運動飲料，飲用清水並不足夠", "D": "應立即建議客人大量灌水"}, "answer": "A", "explanation": "一小時或以下的運動，飲用清水通常已可提供足夠的補水效益。惟客人仍出現口渴及頭暈徵狀，教練應先了解其實際飲水量是否足夠、當日環境溫度及濕度等因素，而非單純假設是補水方式（清水或運動飲料）的問題，需要綜合檢視多項因素。", "source": "補充題目(進階)", "id": 911}, {"chapter": "6. 營養及運動表現", "page": 61, "stem": "客人希望於長時間工作日中維持專注力，向教練查詢咖啡因的攝取時機建議。教練建議客人在會議前多久攝取咖啡因，效果最為理想？", "options": {"A": "咖啡因的攝取時機並不影響其效果", "B": "會議開始前五分鐘", "C": "會議開始前三小時", "D": "會議開始前三十至六十分鐘"}, "answer": "D", "explanation": "咖啡因一般建議於預期需要提升專注力或運動表現的活動開始前三十至六十分鐘攝取，讓其於體內達到較理想的濃度水平，攝取時機過早或過遲均會影響其發揮效果的時間點。", "source": "補充題目(進階)", "id": 912}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 70, "stem": "客人長期對著電腦工作，出現頭部前引、圓肩、上背駝背，教練檢查發現其深層頸屈肌及中下斜方肌明顯無力。根據此體位分析，最應該避免安排以下哪類訓練？", "options": {"A": "眼鏡蛇式伸展", "B": "貼牆下顎縮回訓練", "C": "胸大肌的大重", "D": "直臂划船"}, "answer": "C", "explanation": "此客人屬於典型的上交叉綜合症，胸大肌、胸小肌等前側肌群已經過緊，若再安排大重量臥推等進一步強化胸部肌群的訓練，會加劇肌肉不平衡，令圓肩問題惡化。應優先加強背部及深層頸屈肌，並避免過度強化已經過緊的胸部肌群。", "source": "補充題目(進階)", "id": 913}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 71, "stem": "客人的骨盆前傾情況明顯，教練於方案中安排了羅馬椅背伸展作為核心訓練動作之一。此安排最大的問題是？", "options": {"A": "羅馬椅背伸展會強化已經過緊的豎脊肌及髂腰肌", "B": "此動作對骨盆前傾並無任何影響", "C": "完全沒有問題，羅馬椅背伸展是理想的核心訓練", "D": "應該增加此動作的訓練量以改善問題"}, "answer": "A", "explanation": "下交叉綜合症患者的豎脊肌、髂腰肌等已處於過緊狀態，羅馬椅背伸展會進一步強化這些肌肉，加劇腰椎前曲弧度過大的問題，屬於下交叉綜合症應該避免的高風險動作之一，應以強化腹部肌群及臀大肌為訓練重點。", "source": "補充題目(進階)", "id": 914}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 71, "stem": "客人有明顯膝外翻及足弓塌陷，教練打算安排高強度跳繩訓練以提升心肺適能。此安排是否恰當？", "options": {"A": "需要審慎考慮", "B": "應該加大跳繩強度以強化足弓", "C": "膝外翻及足弓塌陷與跳躍訓練完全無關", "D": "非常恰當，跳繩對心肺適能有莫大幫助"}, "answer": "A", "explanation": "膝外翻加上足弓塌陷符合旋前變形綜合症的特徵，此類客人應避免高沖擊性運動（如快跑、跳躍），以免加劇下肢力學排列問題。教練應優先安排針對性強化訓練（如脛骨前╱後肌、臀中肌）及低衝擊帶氧訓練，而非直接安排高強度跳繩。", "source": "補充題目(進階)", "id": 915}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 72, "stem": "客人有輕度脊柱側彎，教練建議其進行大重量硬拉訓練以強化核心。此建議是否恰當？", "options": {"A": "脊柱側彎與硬拉訓練完全沒有關係", "B": "不恰當，脊柱側彎患者應避免高負", "C": "應該增加硬拉重量以矯正側彎", "D": "非常恰當，大重量訓練對脊柱側彎最有幫助"}, "answer": "B", "explanation": "脊柱側彎患者應避免高負重的全身性訓練（如蹲舉、硬拉），以免加劇脊柱受壓。適合的訓練包括側棒、靠牆站立及俯臥超人等針對性強化動作，而非大重量的複合訓練，以免對已經側彎的脊柱造成額外壓力。", "source": "補充題目(進階)", "id": 916}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 73, "stem": "客人有拇趾外翻問題，同時習慣穿著尖頭高跟鞋上班。教練於處方中加入了腳趾分散訓練，惟客人仍然每日穿著高跟鞋。此訓練方案的成效如何？", "options": {"A": "鞋履選擇與拇趾外翻完全無關", "B": "應該增加訓練強度以抵銷鞋履的影響", "C": "訓練成效可能有限", "D": "非常有效，單靠腳趾訓練已足夠解決問題"}, "answer": "C", "explanation": "拇趾外翻的其中一個主要成因正是經常穿著高跟尖頭鞋。單靠訓練而不改變誘因（持續穿著高跟鞋），成效可能大打折扣。教練除了安排針對性訓練，亦應建議客人正視及調整鞋履選擇，才能有效改善問題。", "source": "補充題目(進階)", "id": 917}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 71, "stem": "客人進行深蹲時出現骨盆前傾及膝外翻，同時提及自己經常穿著高跟鞋。教練分析此客人的體位問題，以下哪項判斷最為完整？", "options": {"A": "純屬個人體質，並無辦法改善", "B": "這是正常的深蹲動作，毋須理會", "C": "可能同時涉及下交叉綜合症（骨", "D": "純粹是下交叉綜合症，與鞋履完全無關"}, "answer": "C", "explanation": "骨盆前傾及膝外翻可以同時反映下交叉綜合症及旋前變形綜合症的特徵，兩者均可能因長期穿著高跟鞋（改變重心及足部力學）而誘發或加劇，教練分析時應該綜合考慮這些因素，而非將問題單一化。", "source": "補充題目(進階)", "id": 918}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 72, "stem": "客人透過PNF伸展改善膕繩肌柔韌度，惟同時被診斷有骨質疏鬆症。教練於安排此伸展方案時，最需要留意以下哪項？", "options": {"A": "應該加大PNF伸展強度以強化骨質密度", "B": "骨質疏鬆症與柔韌度訓練完全無關", "C": "PNF伸展對骨質疏鬆症完全沒有風險，可以正常進行", "D": "PNF伸展涉及的大強度肌肉收縮方式可能對骨骼造成額外壓力"}, "answer": "D", "explanation": "PNF伸展（本體感覺神經肌肉促進伸展法）涉及大強度的肌肉收縮再放鬆，容易對骨質疏鬆症患者的骨骼造成額外壓力，增加骨折風險。此類客人應避免PNF等高強度伸展方式，改用較溫和、低風險的靜態伸展以改善柔韌度。", "source": "補充題目(進階)", "id": 919}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 70, "stem": "客人於牆上天使測試中，發現手臂無法貼牆完成動作，同時有明顯圓肩。教練根據此結果，最應該於方案中加強以下哪項？", "options": {"A": "此測試結果與體位偏離並無關連", "B": "純粹加強手臂肌肉訓練", "C": "胸部肌群伸展", "D": "胸大肌力量訓練"}, "answer": "C", "explanation": "牆上天使測試手臂無法貼牆，通常反映胸部肌群過緊及肩胛穩定肌群（中下斜方肌）力量不足，配合圓肩表現，教練應加入胸部伸展及背部穩定肌群強化訓練，而非加強已經過緊的胸大肌。", "source": "補充題目(進階)", "id": 920}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 73, "stem": "客人有輕微足底筋膜炎徵狀（晨起第一步腳跟痛），同時發現有拇趾外翻。教練於選擇訓練動作時，應該優先避免以下哪類動作？", "options": {"A": "腳趾分散訓練", "B": "高沖擊性的跑步", "C": "靜態伸展小腿肌肉", "D": "足弓承托小肌肉訓練"}, "answer": "B", "explanation": "足底筋膜炎及拇趾外翻均涉及足部結構及力學問題，高沖擊性的跑步或跳躍訓練會令足底組織承受更大重量及反覆撞擊，可能同時加劇兩者的徵狀，應優先避免，改以低衝擊訓練配合針對性伸展及強化。", "source": "補充題目(進階)", "id": 921}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 72, "stem": "教練發現客人有輕微脊柱側彎，主要向左彎曲。於分析過緊肌肉時，教練預期會於哪一側發現肌肉較為繃緊？", "options": {"A": "與肌肉緊張度完全無關", "B": "對側（右側）腰方肌及相關肌群", "C": "完全隨機，並無特定規律", "D": "雙側肌肉的繃緊程度普遍相若，差異不大"}, "answer": "B", "explanation": "脊柱側彎時，脊柱凹側（側彎方向的對側）的肌肉（如對側腰方肌）會因長期處於縮短狀態而變得繃緊，這是分析脊柱側彎肌肉不平衡的重要原則，有助教練針對性設計伸展及強化方案。", "source": "補充題目(進階)", "id": 922}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 71, "stem": "客人於評估中發現足弓空間過度塌陷、跟腱方向明顯內傾。教練根據這些檢查結果，判斷客人最可能出現以下哪種體位問題？", "options": {"A": "上交叉綜合症", "B": "旋前變形綜合症", "C": "脊柱側彎", "D": "純粹屬於正常的足部結構差異，毋須跟進"}, "answer": "B", "explanation": "足弓空間過度塌陷及跟腱方向內傾，均屬於旋前變形綜合症的評估檢查要點，反映下肢力學排列出現偏離，並非正常的結構差異，教練應該根據此結果安排針對性的強化及伸展訓練。", "source": "補充題目(進階)", "id": 923}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 70, "stem": "客人接受上交叉綜合症相關評估後，教練建議加入「眼鏡蛇式」及「直臂划船」等強化動作。此建議背後的訓練原理最貼近以下哪項？", "options": {"A": "強化中下背及深層頸屈肌等相對薄弱的肌群", "B": "單純提升心肺適能，與體位矯正無關", "C": "強化已經過度繃緊的胸部肌群，加強其收縮能力", "D": "此類動作只適用於下交叉綜合症"}, "answer": "A", "explanation": "眼鏡蛇式及直臂划船均為強化中下背及深層頸屈肌等相對薄弱肌群的動作，針對上交叉綜合症中肌力不足的部份進行強化，配合伸展過緊的胸部及頸部前側肌群，有助改善圓肩及頭部前引等體位偏離。", "source": "補充題目(進階)", "id": 924}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 73, "stem": "客人被診斷有拇趾外翻，同時提及家族中母親及姊妹亦有相同問題。教練分析此情況時，應該如何看待遺傳因素的角色？", "options": {"A": "純粹因為遺傳，訓練及鞋履調整完全沒有作用", "B": "遺傳因素是拇趾外翻公認的成因之一", "C": "應該直接放棄任何訓練介入", "D": "遺傳與拇趾外翻並無任何關連"}, "answer": "B", "explanation": "遺傳確實是拇趾外翻的成因之一，惟這並不代表後天介入毫無作用。教練仍可透過針對性訓練（如腳趾分散訓練）及建議調整鞋履選擇等生活習慣，改善足部力學及延緩問題惡化，而非因為存在遺傳因素就完全放棄介入。", "source": "補充題目(進階)", "id": 925}, {"chapter": "7. 運動處方：體位偏離及柔韌度", "page": 72, "stem": "客人主訴柔韌度良好，過去甚少受傷，因此質疑教練建議加入柔韌度評估及矯正訓練的必要性。教練最貼切的回應是？", "options": {"A": "柔韌度評估只適用於柔韌度欠佳的人士", "B": "柔韌度良好代表受傷風險已大幅降低，毋須再作評估", "C": "良好柔韌度有助減少肌肉不平衡帶來的風險", "D": "過去甚少受傷，反映未來出現運動創傷的機會亦相對較低"}, "answer": "C", "explanation": "良好的柔韌度確實有助減少因肌肉不平衡而增加的受傷風險，惟這並不等同保證完全免除運動損傷，兩者屬不同概念。定期評估及矯正訓練仍有其價值，有助及早發現潛在的體位偏離問題，維持長遠的體位健康。", "source": "補充題目(進階)", "id": 926}, {"chapter": "8. 特別需要人士訓練指引", "page": 79, "stem": "客人同時患有第二型糖尿病及高血壓，正服用降血糖藥及降血壓藥。教練於訓練前應該特別留意以下哪項組合風險？", "options": {"A": "藥物之間不會互相影響訓練安排，可以照常進行", "B": "應優先處理血糖問題，血壓藥物的影響相對次要", "C": "此類客人不應該進行任何運動", "D": "降血糖藥可能引致低血糖"}, "answer": "D", "explanation": "兩種病症同時存在時，教練需要留意降血糖藥可能引致的低血糖徵狀（如手震、冒汗、頭暈），同時降血壓藥可能令心率反應失真，令單純以心率監控強度變得不可靠，應結合自覺運動強度表（RPE）等其他方法，並隨時留意低血糖警號。", "source": "補充題目(進階)", "id": 927}, {"chapter": "8. 特別需要人士訓練指引", "page": 83, "stem": "一位五十歲客人主訴右肩持續疼痛及活動幅度收窄超過三個月，尤其外旋及上舉困難，X光檢查正常。根據課程內容，教練最應該考慮以下哪種可能性，並如何調整訓練？", "options": {"A": "應該立即加大肩部負重以強迫恢復活動幅度", "B": "單純肌肉疲勞，繼續原有的高強度肩部訓練", "C": "可能是肩周炎", "D": "此症狀與肩周炎完全沒有關連"}, "answer": "C", "explanation": "五十歲、女性較常見、活動幅度持續受限加上疼痛超過三個月，符合肩周炎（Frozen Shoulder）的典型表現。教練應避免頸後下拉、直立上提等容易造成肩關節囊紊亂的動作，並建議客人轉介醫生或物理治療師作進一步評估，而非強行加大訓練負荷。", "source": "補充題目(進階)", "id": 928}, {"chapter": "8. 特別需要人士訓練指引", "page": 84, "stem": "懷孕二十八週的客人於訓練期間突然主訴心悸及輕微頭暈，心率量得145 b.p.m.。教練即時應該採取的行動是？", "options": {"A": "鼓勵客人繼續堅持，情況很快便會好轉", "B": "根據孕婦運動警示徵狀（心率超過140 b.p.m.", "C": "要求客人加快動作節奏，以分散注意力", "D": "這些徵狀對孕婦而言屬正常現象，毋須理會"}, "answer": "B", "explanation": "心率超過140 b.p.m.及頭暈均屬於孕婦應停止運動的警示徵狀，教練應立即暫停訓練，讓客人休息，並密切觀察狀況，必要時建議求醫，而非鼓勵繼續訓練或忽視這些警號。", "source": "補充題目(進階)", "id": 929}, {"chapter": "8. 特別需要人士訓練指引", "page": 85, "stem": "一位六十五歲客人有輕度骨質疏鬆，同時表達希望透過訓練「保持骨質密度」。教練於選擇訓練動作時，應該如何平衡「負重訓練有助骨質密度」與「應避免高衝擊動作」這兩項原則？", "options": {"A": "骨質疏鬆症患者不適合任何形式的訓練", "B": "選用適量負重但低衝擊的阻力訓練（如節奏可控的器械或啞鈴訓練）", "C": "應該進行高強度爆發性跳躍以最大化骨質密度刺激", "D": "應以伸展運動為主導，避免任何形式的負重訓練"}, "answer": "B", "explanation": "骨質疏鬆症患者需要適量負重刺激以維持骨質密度，惟同時應避免爆發性或高衝擊性動作，以及過度的脊椎彎曲扭轉。恰當做法是選用適量負重、動作可控的阻力訓練，於兩項原則之間取得平衡，而非完全不做負重訓練或走向另一極端進行高衝擊訓練。", "source": "補充題目(進階)", "id": 930}, {"chapter": "8. 特別需要人士訓練指引", "page": 81, "stem": "一位有哮喘病史的客人，計劃於乾燥、相對濕度只有百分之二十的冷氣房內進行高強度間歇訓練。教練應該如何提醒？", "options": {"A": "相對濕度低於百分之三十可能令呼吸道黏膜更容易變乾", "B": "應該將訓練強度提升至最大以增強耐受性", "C": "濕度與哮喘發作完全無關", "D": "此環境完全沒有問題，可以正常訓練"}, "answer": "A", "explanation": "哮喘患者應避免於相對濕度低於百分之三十的環境運動，因為乾燥空氣容易令呼吸道黏膜變乾，增加誘發運動性哮喘的風險。教練應建議調整場地環境濕度，或至少延長熱身時間（十至十五分鐘）以誘發不應期，降低風險。", "source": "補充題目(進階)", "id": 931}, {"chapter": "8. 特別需要人士訓練指引", "page": 82, "stem": "一位長期跑步的客人主訴膝蓋內側疼痛，膝部活動時有聲響，蹲下時症狀加劇，並提到近期腫脹持續加重。教練根據這些描述，應優先考慮以下哪項，並如何調整訓練？", "options": {"A": "此症狀屬正常現象，毋須特別處理", "B": "應該加大跑量以強化膝關節", "C": "懷疑半月板撕裂徵狀", "D": "單純肌肉痠痛，繼續原有跑量"}, "answer": "C", "explanation": "膝蓋痛、關節聲響、腫脹持續加劇符合半月板撕裂的典型徵狀，教練應暫停可能加劇問題的高負荷動作（跑步、深蹲），建議轉介專業評估，並在獲確認安全的前提下，加入針對性的平衡及關節穩定訓練作為預防及輔助。", "source": "補充題目(進階)", "id": 932}, {"chapter": "8. 特別需要人士訓練指引", "page": 84, "stem": "一位八歲兒童客人於炎熱天氣下進行團體訓練，教練發現其比同齡稍大的小朋友更快出現疲態。根據課程內容，這現象最可能的生理解釋是？", "options": {"A": "兒童的體溫調節能力較弱", "B": "這現象與年齡完全無關", "C": "純粹是這位小朋友不夠努力", "D": "兒童的心肺適能一般優於成人"}, "answer": "A", "explanation": "兒童的體溫調節系統尚未完全發育成熟，對極端氣候的忍耐力較低，加上運動經濟較低（相同相對強度下氧氣消耗量較成人高百分之十至三十），這些生理特點令兒童於炎熱環境下更容易較快出現疲態，教練需要因應調整訓練強度及休息安排。", "source": "補充題目(進階)", "id": 933}, {"chapter": "8. 特別需要人士訓練指引", "page": 79, "stem": "客人有嚴重肥胖問題（BMI 38），同時表示膝關節有輕微不適。教練建議的帶氧訓練模式，以下哪項最為恰當？", "options": {"A": "應以高強度帶氧訓練為主，加快減脂速度", "B": "高強度跳繩訓練", "C": "低衝擊性訓練", "D": "戶外長跑，透過高強度快速減脂"}, "answer": "C", "explanation": "嚴重肥胖人士的關節（尤其膝關節）長期承受較大壓力，加上已有輕微不適，應優先選用低衝擊性的帶氧訓練模式（如固定單車、水中帶氧運動），減少對關節的額外負荷，同時仍可達到帶氧訓練的效果。", "source": "補充題目(進階)", "id": 934}, {"chapter": "8. 特別需要人士訓練指引", "page": 82, "stem": "客人有輕微足底筋膜炎，同時本身亦是長期高血壓患者。教練於調整訓練計劃時，需要同時兼顧以下哪幾方面？", "options": {"A": "這兩個病症應該分開兩個獨立方案處理，互不相關", "B": "需要同時考慮足底筋膜炎（避免高沖擊", "C": "血壓問題應完全凌駕於足底問題之上，其他毋須理會", "D": "應優先處理足底筋膜炎，血壓問題可留待其後再作跟進"}, "answer": "B", "explanation": "特別需要人士的訓練方案設計，往往需要同時兼顧多重病症或傷患的考量。此客人需要同時處理足底筋膜炎（避免高沖擊、加強伸展強化）及高血壓（避免閉氣、高強度等長收縮，確保充足熱身），將兩方面的注意事項整合於同一個訓練方案之中，而非分割或忽略其中一方。", "source": "補充題目(進階)", "id": 935}, {"chapter": "8. 特別需要人士訓練指引", "page": 85, "stem": "一位七十五歲客人的主要目標是「減低跌倒風險」，教練於方案中主要安排大重量肌力訓練，並沒有加入任何平衡或協調訓練。此方案設計是否足夠完整？", "options": {"A": "應以平衡訓練為主導，肌力訓練的重要性相對次要", "B": "非常完整，肌力訓練已足夠減低跌倒風險", "C": "跌倒風險與訓練方案設計完全無關", "D": "不夠完整，高齡人士減低跌倒風險的"}, "answer": "D", "explanation": "雖然肌力訓練對高齡人士十分重要，惟根據課程指引，減低跌倒風險的方案應同時加入神經運動控制相關訓練，例如平衡、敏捷及本體感受訓練，單靠肌力訓練未必能夠全面針對跌倒風險的各個層面，方案設計上有所不足。", "source": "補充題目(進階)", "id": 936}, {"chapter": "8. 特別需要人士訓練指引", "page": 79, "stem": "客人被診斷患有靜脈曲張，教練考慮為其安排長時間站立進行的訓練動作。此安排是否恰當？", "options": {"A": "靜脈曲張與訓練安排完全沒有關連", "B": "非常恰當，長時間站立有助改善靜脈曲張", "C": "需要審慎考慮", "D": "應該安排更長時間的站立訓練以強化下肢"}, "answer": "C", "explanation": "靜脈曲張患者的靜脈瓣膜功能已受影響，長時間站立會令下肢靜脈血液回流更為困難，可能令症狀惡化。教練安排訓練時宜適時穿插休息、避免長時間持續站立，並可考慮加入促進下肢血液回流的動作，而非安排更長時間的站立訓練。", "source": "補充題目(進階)", "id": 937}, {"chapter": "8. 特別需要人士訓練指引", "page": 83, "stem": "客人主訴上肢麻痺及乏力，同時提及近日情緒低落及難以入睡。教練面對此情況，最恰當的專業判斷是？", "options": {"A": "忽略此情況，繼續原有訓練計劃", "B": "教練不具備診斷資格", "C": "直接建議客人自行服用藥物", "D": "直接判斷客人患有frozen shoulder（肩周炎），並自行制定治療方案"}, "answer": "B", "explanation": "上肢麻痺乏力可能涉及多種潛在成因（如神經受壓、其他病理狀況），並非單純體適能問題。教練並不具備醫療診斷資格，應建議客人尋求醫生或相關專業人士評估，暫時避免可能加劇症狀的訓練動作，而非自行診斷、忽略或建議服藥。", "source": "補充題目(進階)", "id": 938}, {"chapter": "8. 特別需要人士訓練指引", "page": 84, "stem": "一位懷孕客人於訓練中反映「近日胎動明顯減少」。教練根據課程內容，應該如何回應？", "options": {"A": "胎兒運動減少屬於孕婦應停止運動並", "B": "與訓練安排完全無關，教練毋須回應", "C": "應該增加訓練強度以刺激胎動", "D": "這是正常現象，毋須特別理會，繼續原定訓練"}, "answer": "A", "explanation": "胎兒運動減少屬於孕婦運動警示徵狀之一，連同陰道出血、頭暈、呼吸急促、胸痛、心率過高等徵狀，均提示應立即暫停運動並尋求醫療意見。教練應該對這類徵狀保持警覺，適時建議客人聯絡醫生，而非視為正常現象或忽略不理。", "source": "補充題目(進階)", "id": 939}, {"chapter": "8. 特別需要人士訓練指引", "page": 81, "stem": "客人於運動期間突然出現喘鳴聲及呼吸困難，教練懷疑是哮喘發作。以下哪項是恰當的即時處理步驟？", "options": {"A": "協助客人使用其緊急藥物（如氣管舒張劑）", "B": "忽略症狀，讓客人自行決定是否需要休息", "C": "要求客人立即進行劇烈帶氧運動以「打開」呼吸道", "D": "立即安排客人平躺，並鼓勵繼續完成餘下訓練動作"}, "answer": "A", "explanation": "懷疑哮喘發作時，應協助客人使用其隨身攜帶的緊急藥物（如氣管舒張劑），讓其保持放鬆及舒緩的體位（坐姿或半坐姿較平躺更有助呼吸），並密切觀察病情變化，而非要求繼續運動、進行劇烈活動或忽略症狀。", "source": "補充題目(進階)", "id": 940}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 92, "stem": "客人於一次訓練中扭傷腳踝，二十四小時內出現明顯腫脹。教練於此階段建議客人進行按摩以加速消腫。此建議是否恰當？", "options": {"A": "不恰當，急性受傷首四十八至", "B": "按摩與消腫完全無關", "C": "應該立即進行大力按摩以加速血液循環", "D": "非常恰當，按摩可以加速消腫"}, "answer": "A", "explanation": "H.A.R.M.原則（Heat熱敷、Alcohol酒精、Running走動、Massage按摩）明確指出這四項於急性受傷初期（四十八至七十二小時內）均不適宜，按摩可能會加劇患處的腫脹及出血，應優先遵循P.OL.I.C.E.原則（Protection保護、Optimal Loading理想負荷、Ice冰敷、Compression加壓、Elevation抬高）處理。", "source": "補充題目(進階)", "id": 941}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 93, "stem": "客人長期進行單一方向的高爾夫揮桿訓練，並沒有進行任何反向或伸展補償，半年後出現慢性下背痛。教練分析此成因，以下哪項最為貼切？", "options": {"A": "應該增加揮桿次數以強化相關肌肉", "B": "純屬意外，並無特定成因", "C": "高爾夫運動一般不容易導致勞損問題", "D": "重複性單一方向動作可能導致"}, "answer": "D", "explanation": "長期重複單一方向的動作（如高爾夫揮桿）容易造成特定肌群過度使用，而對側肌肉相對薄弱，形成肌肉不平衡，累積成勞損性慢性疼痛。教練應於訓練方案中加入反向動作訓練及針對性伸展，以平衡身體兩側的負荷。", "source": "補充題目(進階)", "id": 942}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 95, "stem": "客人於未經任何熱身的情況下，直接進行大重量蹲舉測試，訓練後主訴膝關節不適。教練檢討此事件，主要缺失在於哪個環節？", "options": {"A": "訓練動作選擇錯誤", "B": "此情況與熱身完全無關，純屬動作技巧問題", "C": "應該於事後加大訓練量作補償", "D": "缺乏適當熱身（R.A.M.流程）"}, "answer": "D", "explanation": "R.A.M.熱身原則（Raise提升體溫循環、Activate激活核心╱穩定肌群、Mobilize活動關節提升靈活度）是大重量訓練前的重要準備，缺乏此步驟就直接進行高負荷測試，會大幅增加關節及軟組織受傷的風險，這正是事件的主要缺失。", "source": "補充題目(進階)", "id": 943}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 96, "stem": "客人主訴下背痛，並形容痛楚會延伸至大腿後側及小腿，偶爾伴有麻痺感。教練根據此描述，應該如何回應？", "options": {"A": "此症狀（牽涉痛", "B": "應該立即加大負重以強化下背肌肉", "C": "純屬肌肉疲勞，繼續原有訓練計劃", "D": "此屬正常訓練反應，毋須理會"}, "answer": "A", "explanation": "下肢牽涉痛、麻痺等症狀提示椎間盤問題可能已壓迫到神經，屬於較嚴重的警號，教練並不具備診斷資格，應暫停可能加劇問題的高風險訓練動作，並建議客人盡快求醫或轉介專業人士評估，而非自行判斷或強行訓練。", "source": "補充題目(進階)", "id": 944}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 94, "stem": "教練希望為一位傷患未完全康復的客人安排訓練動作，發現某個動作屬於「類別III」。根據課程對訓練動作的風險分類，教練應該如何處理？", "options": {"A": "類別III動作對任何人士都屬於風險過大", "B": "類別III動作只適合傷患未康復人士", "C": "直接採用，因為所有動作對健康均有益處", "D": "風險分類與訓練方案設計並無關連"}, "answer": "A", "explanation": "類別III訓練動作對任何人士（無論健康與否）均屬於風險過大、回報╱價值較低，容易受傷，好處亦不明確，應避免採用。對於傷患未完全康復的客人，應優先選用類別I（低風險高效益）或經改良調整的類別II動作。", "source": "補充題目(進階)", "id": 945}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 95, "stem": "客人日常主要從事靜態辦公室工作，教練於訓練前熱身環節，除了基本提升體溫的動作外，特別加入了臀部及核心的激活訓練。此安排的用意最可能是？", "options": {"A": "針對久坐人士常見的臀部肌", "B": "此安排與受傷預防完全無關", "C": "純粹為了拖延時間", "D": "應該省略此步驟，直接進入主要訓練"}, "answer": "A", "explanation": "久坐人士常見臀部肌群受抑制（underactive）及核心穩定能力下降，教練於R.A.M.熱身流程的Activate環節特別加強這方面的激活，有助於正式訓練前重新啟動相關肌群的功能，提升訓練效果之餘亦可降低受傷風險，這正是針對性熱身設計的體現。", "source": "補充題目(進階)", "id": 946}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 92, "stem": "客人日常穿著不合適的運動鞋進行高強度跑步訓練，教練分析此屬於哪類受傷風險因素？", "options": {"A": "此情況不屬於任何風險因素分類", "B": "純屬運氣問題", "C": "內在因素，因為與身體結構有關", "D": "外在因素，因為錯誤選擇"}, "answer": "D", "explanation": "運動創傷的外在因素包括環境、氣溫、錯誤選擇或使用運動設備╱裝備等。不合適的運動鞋屬於裝備選擇問題，歸類為外在因素，並非源自身體本身結構或功能的內在因素。", "source": "補充題目(進階)", "id": 947}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 96, "stem": "客人日常需要經常彎腰搬運重物，教練於方案中特別加強核心穩定及正確提舉技巧訓練。此安排主要針對哪類受傷風險？", "options": {"A": "與受傷預防完全無關，純粹提升觀感", "B": "針對負重時核心肌肉反應遲緩", "C": "應該完全避免任何核心訓練", "D": "此類訓練與日常搬運工作無關"}, "answer": "B", "explanation": "負重時核心肌肉反應遲緩或衰弱，加上提舉技巧不當，是下背痛及腰椎扭傷的常見成因。針對經常需要搬運重物的客人，加強核心穩定及正確提舉技巧訓練，正是預防此類職業相關受傷風險的恰當做法。", "source": "補充題目(進階)", "id": 948}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 95, "stem": "客人主訴上一節訓練後翌日全身肌肉痠痛，惟今日仍然安排一節同樣高強度的訓練。教練於熱身及訓練安排上應該如何調整？", "options": {"A": "應該加大今節訓練強度以「克服」痠痛", "B": "考慮遲發性肌肉痠痛（DOM", "C": "完全毋須調整，正常進行", "D": "DOMS與訓練安排完全無關"}, "answer": "B", "explanation": "遲發性肌肉痠痛（DOMS）會影響肌肉表現及增加受傷風險，教練應因應客人狀態彈性調整訓練安排，例如延長熱身、適度降低強度或訓練量，並加強訓練後的冷卻放鬆程序，而非堅持原有高強度安排或要求客人「捱過」痠痛。", "source": "補充題目(進階)", "id": 949}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 94, "stem": "教練為健康、有訓練經驗的客人設計方案時，主要採用類別I動作，並加入少量經改良的類別II動作。根據風險分類原則，此安排是否合理？", "options": {"A": "應該只採用類別I動作，避免加入任何類別II動作", "B": "風險分類與客人的訓練經驗完全無關", "C": "合理，類別I對健康人士屬低風險高效益，經", "D": "應該全數採用類別III動作，以達到最大訓練刺激"}, "answer": "C", "explanation": "對於健康、有訓練經驗的客人，以類別I（低風險高效益）動作作為訓練主軸，並適度加入經改良調整的類別II動作以提供額外訓練刺激及效益，屬於恰當的風險管理原則，兼顧安全性及訓練效果。", "source": "補充題目(進階)", "id": 950}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 96, "stem": "客人於硬拉訓練中，教練觀察到其每次提起槓鈴一刻，核心明顯沒有有效收緊，腰椎輕微屈曲。教練應該如何處理，才能預防潛在的下背受傷風險？", "options": {"A": "應該改用更快的提舉速度以掩蓋此問題", "B": "忽略此現象，繼續加重", "C": "此屬正常現象，毋須糾正", "D": "暫停加重，先糾正核心收緊"}, "answer": "D", "explanation": "核心沒有有效收緊，加上腰椎屈曲，是硬拉中常見的高風險代償動作，容易導致下背（腰椎）受傷。教練應暫停加重，優先糾正核心收緊時機及動作技巧，確保腰椎維持中立，待動作模式穩定後才循序漸進地增加負荷，而非無視問題繼續訓練。", "source": "補充題目(進階)", "id": 951}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 93, "stem": "客人主訴右膝內側於跑步時出現持續隱隱作痛，並非急性受傷，而是過去數個月逐漸出現及加劇。教練根據此病史特徵，最應該懷疑哪類問題？", "options": {"A": "慢性勞損（overuse injury）", "B": "此症狀與勞損完全無關", "C": "應該立即增加跑量以「克服」痛楚", "D": "急性拉傷，應該立即使用P.OL.I.C.E.處理"}, "answer": "A", "explanation": "症狀逐漸出現並隨時間加劇，而非單一意外事件引致，符合慢性勞損（overuse injury）的典型病史特徵。教練應檢視訓練量是否過度、跑步技巧是否恰當，以及恢復安排是否足夠，而非將其當作急性受傷處理，或一味增加跑量。", "source": "補充題目(進階)", "id": 952}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 92, "stem": "客人於潮濕悶熱的天氣下進行戶外長跑訓練，並未有因應調整訓練強度及補水安排。教練分析此情況涉及哪類受傷風險因素？", "options": {"A": "外在因素，環境及氣溫屬於外在", "B": "內在因素，因為與個人體質有關", "C": "純屬客人個人責任，與教練安排無關", "D": "此情況與受傷風險完全無關"}, "answer": "A", "explanation": "環境及氣溫（如潮濕悶熱天氣）屬於運動創傷的外在因素之一。教練有責任因應環境因素調整訓練強度及補水安排，若未有作出相應調整，即屬訓練安排上的疏忽，增加中暑、脫水等風險，而非純屬客人個人體質或責任問題。", "source": "補充題目(進階)", "id": 953}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 94, "stem": "客人是重返運動場的退役運動員，體能水平良好，惟膝關節曾接受手術。教練考慮安排某個動作，發現其屬於「類別II」。根據風險分類原則，教練應該如何處理？", "options": {"A": "應該完全避免任何類別II或以上的動作", "B": "直接採用原始版本，因為客人體能水平良好", "C": "類別II動作對普通人士有一定風險", "D": "風險分類與手術史完全無關，可以忽略此因素"}, "answer": "C", "explanation": "類別II動作對普通人士有一定風險，訓練有素人士則可考慮直接採用；惟此客人雖然體能水平良好，但曾接受膝關節手術，屬於特別需要考量的因素，教練應該綜合評估手術史對此動作的潛在影響，考慮是否需要經改良後才進行，而非單純因體能良好就直接採用原始版本。", "source": "補充題目(進階)", "id": 954}, {"chapter": "9. 鍛鍊安全性和損傷預防", "page": 95, "stem": "教練為客人安排訓練後的冷卻放鬆環節，客人質疑「訓練都做完了，冷卻是否浪費時間」。教練最貼切的回應是？", "options": {"A": "冷卻放鬆主要對專業運動員的表現較有幫助", "B": "冷卻放鬆有助加快清除乳酸、減輕遲發性肌肉痠痛", "C": "認同客人看法，日後可以省略此環節", "D": "冷卻放鬆純粹是傳統習慣，並無實際科學根據"}, "answer": "B", "explanation": "訓練後冷卻放鬆有助加快清除乳酸、減輕遲發性肌肉痠痛，並有利減少訓練後肌力和表現下降，避免肌肉過度繃緊及勞損，對一般健身人士同樣具有實際價值，並非純屬傳統習慣或只適用於專業運動員。", "source": "補充題目(進階)", "id": 955}];
</script>
<script>
(function(){
'use strict';

const CHAPTERS = [
  "1. 高級功能解剖學和運動生理學",
  "2. 健康體適能評估及計劃安排",
  "3. 抗阻力訓練原則及實踐",
  "4. 訓練原則和方案設計",
  "5. 溝通、業務推廣及商業發展",
  "6. 營養及運動表現",
  "7. 運動處方：體位偏離及柔韌度",
  "8. 特別需要人士訓練指引",
  "9. 鍛鍊安全性和損傷預防",
  "簡報溫習題",
  "基礎部份"
];

const CHAPTER_COLORS = ["#4f7cff","#35d07f","#ffb84d","#ff5d5d","#c084fc","#22d3ee","#f472b6","#a3e635","#fb923c","#8b8b8b","#0ea5a5"];

let selectedChapters = new Set(CHAPTERS);
let sourceFilters = new Set(['official','supp','adv','slides','sff']);
let countMode = '50';
let orderMode = 'shuffle';

let session = null; // {questions:[], idx, correctCount, wrongCount, answers:[{qid, chosen, correct}]}
let masteryData = {}; // qid -> {seen, correct}
let wrongBank = new Set(); // qid list needing review
let recentlySeen = []; // array of qids recently practised (most recent last), used to avoid repeats
let chapterWrongCounts = {}; // chapter name -> cumulative wrong-answer count

const RECENT_SEEN_CAP = 300; // how many recent ids to remember before recycling

// ---------------- Storage helpers ----------------
async function loadPersisted(){
  try{
    const r = await window.storage.get('apt-mastery', false);
    if(r && r.value) masteryData = JSON.parse(r.value);
  }catch(e){ masteryData = {}; }
  try{
    const r2 = await window.storage.get('apt-wrongbank', false);
    if(r2 && r2.value) wrongBank = new Set(JSON.parse(r2.value));
  }catch(e){ wrongBank = new Set(); }
  try{
    const r3 = await window.storage.get('apt-examdate', false);
    if(r3 && r3.value) document.getElementById('examDate').value = r3.value;
  }catch(e){}
  try{
    const r4 = await window.storage.get('apt-recentseen', false);
    if(r4 && r4.value) recentlySeen = JSON.parse(r4.value);
  }catch(e){ recentlySeen = []; }
  try{
    const r5 = await window.storage.get('apt-chapterwrong', false);
    if(r5 && r5.value) chapterWrongCounts = JSON.parse(r5.value);
  }catch(e){ chapterWrongCounts = {}; }
}
async function saveMastery(){
  try{ await window.storage.set('apt-mastery', JSON.stringify(masteryData), false); }catch(e){}
}
async function saveWrongBank(){
  try{ await window.storage.set('apt-wrongbank', JSON.stringify([...wrongBank]), false); }catch(e){}
}
async function saveExamDate(v){
  try{ await window.storage.set('apt-examdate', v, false); }catch(e){}
}
async function saveRecentlySeen(){
  try{ await window.storage.set('apt-recentseen', JSON.stringify(recentlySeen), false); }catch(e){}
}
async function saveChapterWrong(){
  try{ await window.storage.set('apt-chapterwrong', JSON.stringify(chapterWrongCounts), false); }catch(e){}
}

// ---------------- Countdown ----------------
function updateCountdown(){
  const input = document.getElementById('examDate');
  const cdNum = document.getElementById('cdNum');
  if(!input.value){ cdNum.textContent = '--'; return; }
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(input.value + 'T00:00:00');
  const diff = Math.round((target - today) / 86400000);
  cdNum.textContent = diff >= 0 ? diff : '0';
}
document.getElementById('examDate').addEventListener('change', (e)=>{
  updateCountdown();
  saveExamDate(e.target.value);
});

// default exam date: 24/7/2026, only if not already set later by storage
(function setDefaultDate(){
  const input = document.getElementById('examDate');
  if(!input.value) input.value = '2026-07-24';
})();

// ---------------- Setup screen rendering ----------------
function chapterStats(chName){
  const qs = QUESTIONS.filter(q=>q.chapter===chName);
  let seen=0, correct=0;
  qs.forEach(q=>{
    const m = masteryData[q.id];
    if(m && m.seen>0){ seen++; if(m.lastCorrect) correct++; }
  });
  return {total: qs.length, seen, correct};
}

function renderChapterGrid(){
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';
  CHAPTERS.forEach((ch, i)=>{
    const stats = chapterStats(ch);
    const pct = stats.seen ? Math.round(stats.correct/stats.seen*100) : 0;
    const chip = document.createElement('div');
    chip.className = 'chip' + (selectedChapters.has(ch) ? ' on' : '');
    chip.dataset.chapter = ch;
    const shortName = ch.replace(/^\d+\.\s*/,'');
    chip.innerHTML = `
      <div class="chip-top">
        <div class="chip-name">${escapeHtml(shortName)}</div>
        <div class="chip-count">${stats.total}題</div>
      </div>
      <div class="mastery-bar"><div class="mastery-fill" style="width:${pct}%;background:${CHAPTER_COLORS[i]}"></div></div>
      <div class="mastery-txt">${stats.seen ? pct+'% 掌握 · 已做 '+stats.seen+'題' : '尚未練習'}</div>
    `;
    chip.addEventListener('click', ()=>{
      if(selectedChapters.has(ch)) selectedChapters.delete(ch);
      else selectedChapters.add(ch);
      renderChapterGrid();
      updateHint();
    });
    grid.appendChild(chip);
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

const SOURCE_MAP = {official: '官方模擬試題', supp: '補充練習題', adv: '補充題目(進階)', slides: '簡報溫習題', sff: '基礎部份'};

function filteredPool(){
  return QUESTIONS.filter(q=>{
    if(!selectedChapters.has(q.chapter)) return false;
    const key = Object.keys(SOURCE_MAP).find(k => SOURCE_MAP[k] === q.source);
    if(key && !sourceFilters.has(key)) return false;
    return true;
  });
}

function updateHint(){
  const pool = filteredPool();
  document.getElementById('selectedHint').textContent =
    pool.length ? `目前篩選範圍共 ${pool.length} 題可用` : '請至少選擇一個章節及一個題目來源';
  document.getElementById('startBtn').disabled = pool.length===0;
}

// segmented controls (single-select, mutually exclusive)
function bindSeg(id, onPick, initVal){
  const seg = document.getElementById(id);
  seg.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      seg.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      onPick(btn.dataset.v);
    });
  });
}

// multi-select toggle group (each button independently on/off)
function bindMultiSeg(id, set, onChange){
  const seg = document.getElementById(id);
  seg.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const v = btn.dataset.v;
      if(set.has(v)){
        if(set.size === 1) return; // keep at least one source selected
        set.delete(v);
        btn.classList.remove('on');
      } else {
        set.add(v);
        btn.classList.add('on');
      }
      onChange();
    });
  });
}

bindMultiSeg('sourceSeg', sourceFilters, ()=>{ updateHint(); });
bindSeg('countSeg', v=>{ countMode=v; });
bindSeg('orderSeg', v=>{ orderMode=v; });

document.getElementById('selectAllChBtn').addEventListener('click', ()=>{
  selectedChapters = new Set(CHAPTERS);
  renderChapterGrid();
  updateHint();
});
document.getElementById('clearAllChBtn').addEventListener('click', ()=>{
  selectedChapters = new Set();
  renderChapterGrid();
  updateHint();
});

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function renderOverallStats(){
  const el = document.getElementById('overallStats');
  const totalQ = QUESTIONS.length;
  let seen=0, correct=0;
  Object.keys(masteryData).forEach(id=>{
    const m = masteryData[id];
    if(m.seen>0){ seen++; if(m.lastCorrect) correct++; }
  });
  if(seen===0){
    el.innerHTML = `<div class="empty-note">尚未開始練習。選擇章節後按「開始練習」，你嘅答題紀錄同錯題會自動儲存喺呢個網頁度，方便你隨時重溫弱項。</div>`;
    return;
  }
  const accPct = Math.round(correct/seen*100);
  const completionPct = Math.round(seen/totalQ*100);

  const wrongEntries = Object.entries(chapterWrongCounts).filter(([ch,n])=>n>0).sort((a,b)=>b[1]-a[1]);
  let weakestHtml = '';
  if(wrongEntries.length>0){
    const maxWrong = wrongEntries[0][1];
    weakestHtml = `
      <div style="margin-top:18px;padding-top:16px;border-top:1px solid var(--line);">
        <div style="font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;font-family:'JetBrains Mono',monospace;">錯題最多章節 · Weakest Chapters</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${wrongEntries.slice(0,5).map(([ch,n])=>{
            const idx = CHAPTERS.indexOf(ch);
            const color = idx>=0 ? CHAPTER_COLORS[idx] : '#999';
            const pct = Math.round(n/maxWrong*100);
            return `
              <div style="display:flex;align-items:center;gap:10px;">
                <div style="width:150px;flex-shrink:0;font-size:12px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(ch.replace(/^\d+\.\s*/,''))}</div>
                <div style="flex:1;height:7px;background:var(--surface-2);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${color};border-radius:4px;"></div></div>
                <div style="width:34px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--bad);">${n}</div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  el.innerHTML = `
    <div style="display:flex;gap:26px;flex-wrap:wrap;align-items:center;">
      <div style="text-align:center;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:var(--good);">${accPct}%</div>
        <div style="font-size:11px;color:var(--ink-faint);margin-top:4px;">答題準確率<br>（已練習題目中答對比例）</div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:var(--accent);">${completionPct}%</div>
        <div style="font-size:11px;color:var(--ink-faint);margin-top:4px;">全題庫完成度<br>（${seen}/${totalQ} 題已練習）</div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--bad);">${wrongBank.size}</div>
        <div style="font-size:11px;color:var(--ink-faint);margin-top:4px;">待重溫錯題</div>
      </div>
    </div>
    ${weakestHtml}
  `;
}

function refreshReviewBtn(){
  const btn = document.getElementById('reviewBtn');
  document.getElementById('reviewCount').textContent = wrongBank.size;
  btn.style.display = wrongBank.size>0 ? 'inline-block' : 'none';
}

// ---------------- Quiz logic ----------------
function startSession(pool, opts){
  opts = opts || {};
  let qs = pool;
  const n = countMode!=='all' && !opts.noLimit ? parseInt(countMode,10) : pool.length;

  if(orderMode==='shuffle' && !opts.noShuffle){
    // avoid repeating recently-seen questions where possible
    const recentSet = new Set(recentlySeen);
    const fresh = pool.filter(q => !recentSet.has(q.id));
    const stale = pool.filter(q => recentSet.has(q.id));
    let ordered;
    if(fresh.length >= n){
      ordered = shuffle(fresh);
    } else {
      // not enough fresh questions: use all fresh ones, top up with least-recently-seen stale ones
      const staleOrderedByRecency = stale.slice().sort((a,b)=>{
        return recentlySeen.indexOf(a.id) - recentlySeen.indexOf(b.id);
      });
      ordered = shuffle(fresh).concat(staleOrderedByRecency);
    }
    qs = ordered;
  }

  if(countMode!=='all' && !opts.noLimit){
    qs = qs.slice(0, Math.min(n, qs.length));
  }

  session = {
    questions: qs,
    idx: 0,
    furthest: 0,
    correctCount: 0,
    wrongCount: 0,
    answers: new Array(qs.length).fill(null)
  };

  // update recently-seen log (only meaningful for shuffled practice sessions)
  if(orderMode==='shuffle' && !opts.noShuffle){
    qs.forEach(q=>{
      const idx = recentlySeen.indexOf(q.id);
      if(idx !== -1) recentlySeen.splice(idx,1);
      recentlySeen.push(q.id);
    });
    if(recentlySeen.length > RECENT_SEEN_CAP){
      recentlySeen = recentlySeen.slice(recentlySeen.length - RECENT_SEEN_CAP);
    }
    saveRecentlySeen();
  }

  document.getElementById('setup-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  renderQuestion();
}

function renderQuestion(){
  const q = session.questions[session.idx];
  const already = session.answers[session.idx];
  const isLast = session.idx === session.questions.length-1;

  document.getElementById('prevBtn').disabled = (session.idx === 0);
  document.getElementById('nextBtn').textContent = isLast ? '完成練習' : '下一題';
  document.getElementById('nextBtn').disabled = !already;

  const pct = Math.round((session.furthest + (session.answers[session.furthest] ? 1 : 0)) / session.questions.length * 100);
  document.getElementById('progFill').style.width = Math.min(pct,100)+'%';
  document.getElementById('progTxt').textContent = `第 ${session.idx+1} / ${session.questions.length} 題`;
  document.getElementById('scoreGood').textContent = '對 '+session.correctCount;
  document.getElementById('scoreBad').textContent = '錯 '+session.wrongCount;

  const chShort = q.chapter.replace(/^\d+\.\s*/,'');
  document.getElementById('qChapterTag').textContent = chShort;
  const srcTag = document.getElementById('qSourceTag');
  srcTag.textContent = q.source;
  let srcClass = 'supp';
  if(q.source === '官方模擬試題') srcClass = 'official';
  else if(q.source === '簡報溫習題') srcClass = 'slides';
  else if(q.source === '基礎部份') srcClass = 'sff';
  else if(q.source === '補充題目(進階)') srcClass = 'adv';
  srcTag.className = 'q-source-tag ' + srcClass;
  document.getElementById('qPageTag').textContent = q.page ? ('P.'+q.page) : '';
  document.getElementById('qStem').textContent = q.stem;

  const optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = '';
  ['A','B','C','D'].forEach(key=>{
    const div = document.createElement('div');
    div.className = 'opt';
    div.dataset.key = key;
    div.innerHTML = `<span class="opt-key">${key}</span><span>${escapeHtml(q.options[key]||'')}</span>`;
    if(already){
      div.classList.add('locked');
      if(key === q.answer) div.classList.add('correct');
      else if(key === already.chosen) div.classList.add('wrong');
      else div.classList.add('dim');
    } else {
      div.addEventListener('click', ()=> selectOption(key));
    }
    optsEl.appendChild(div);
  });

  const fb = document.getElementById('feedback');
  if(already){
    fb.classList.add('show', already.correct ? 'correct' : 'wrong');
    fb.classList.remove(already.correct ? 'wrong' : 'correct');
    document.getElementById('fbHead').textContent = already.correct ? '✓ 答對了' : ('✗ 答錯了，正確答案是 ' + q.answer);
    document.getElementById('fbBody').textContent = q.explanation;
  } else {
    fb.classList.remove('show','correct','wrong');
  }
}

function selectOption(chosen){
  if(session.answers[session.idx]) return; // already answered, view-only
  const q = session.questions[session.idx];
  const correct = chosen === q.answer;

  session.answers[session.idx] = {chosen, correct};
  if(correct) session.correctCount++; else session.wrongCount++;

  if(!masteryData[q.id]) masteryData[q.id] = {seen:0, correctCount:0};
  masteryData[q.id].seen += 1;
  masteryData[q.id].lastCorrect = correct;
  if(correct){
    masteryData[q.id].correctCount = (masteryData[q.id].correctCount||0)+1;
    wrongBank.delete(q.id);
  } else {
    wrongBank.add(q.id);
    chapterWrongCounts[q.chapter] = (chapterWrongCounts[q.chapter]||0) + 1;
    saveChapterWrong();
  }
  saveMastery();
  saveWrongBank();

  renderQuestion();
}

document.getElementById('prevBtn').addEventListener('click', ()=>{
  if(session.idx > 0){
    session.idx--;
    renderQuestion();
  }
});

document.getElementById('nextBtn').addEventListener('click', ()=>{
  if(!session.answers[session.idx]) return;
  if(session.idx < session.questions.length-1){
    session.idx++;
    if(session.idx > session.furthest) session.furthest = session.idx;
    renderQuestion();
  } else {
    finishSession();
  }
});

document.getElementById('quitBtn').addEventListener('click', ()=>{
  const answeredCount = session.answers.filter(a=>a).length;
  if(answeredCount===0 || confirm('確定要結束練習？已完成嘅題目會計入紀錄。')){
    finishSession();
  }
});

// keyboard shortcuts
document.addEventListener('keydown', (e)=>{
  if(document.getElementById('quiz-screen').style.display !== 'block') return;
  const map = {'1':'A','2':'B','3':'C','4':'D','a':'A','b':'B','c':'C','d':'D'};
  const answered = session.answers[session.idx];
  if(map[e.key] && !answered){
    selectOption(map[e.key]);
  } else if(e.key === 'Enter' && answered){
    document.getElementById('nextBtn').click();
  } else if(e.key === 'ArrowLeft'){
    document.getElementById('prevBtn').click();
  }
});

function finishSession(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  renderResult();
  renderChapterGrid();
  renderOverallStats();
  refreshReviewBtn();
}

function renderResult(){
  const pairs = session.questions
    .map((q,i)=>({q, a:session.answers[i]}))
    .filter(p=>p.a);
  const total = pairs.length;
  const good = session.correctCount;
  const bad = session.wrongCount;
  const pct = total ? Math.round(good/total*100) : 0;

  document.getElementById('resPct').textContent = pct+'%';
  document.getElementById('resTotal').textContent = total;
  document.getElementById('resGood').textContent = good;
  document.getElementById('resBad').textContent = bad;

  // chapter breakdown for this session
  const byChapter = {};
  pairs.forEach(({q,a})=>{
    if(!byChapter[q.chapter]) byChapter[q.chapter] = {total:0, correct:0};
    byChapter[q.chapter].total++;
    if(a.correct) byChapter[q.chapter].correct++;
  });
  const barsEl = document.getElementById('resChapterBars');
  barsEl.innerHTML='';
  if(Object.keys(byChapter).length===0){
    barsEl.innerHTML = '<div class="empty-note">未有作答紀錄</div>';
  }
  CHAPTERS.forEach((ch,i)=>{
    if(!byChapter[ch]) return;
    const st = byChapter[ch];
    const p = Math.round(st.correct/st.total*100);
    const row = document.createElement('div');
    row.className='cbar-row';
    row.innerHTML = `
      <div class="cbar-name">${escapeHtml(ch.replace(/^\d+\.\s*/,''))}</div>
      <div class="cbar-track"><div class="cbar-fill" style="width:${p}%;background:${CHAPTER_COLORS[i]}"></div></div>
      <div class="cbar-pct">${st.correct}/${st.total}</div>
    `;
    barsEl.appendChild(row);
  });

  // review list (wrong only)
  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML='';
  const wrongPairs = pairs.filter(p=>!p.a.correct);
  const reviewCard = document.getElementById('resReviewCard');
  if(wrongPairs.length===0){
    reviewCard.style.display='none';
  } else {
    reviewCard.style.display='block';
    wrongPairs.forEach(({q,a})=>{
      const det = document.createElement('details');
      det.className='review-item';
      det.innerHTML = `
        <summary><span>${escapeHtml(q.stem.split('\n')[0].slice(0,60))}${q.stem.length>60?'…':''}</span><span class="rq-num">你答 ${a.chosen} · 正解 ${q.answer}</span></summary>
        <div class="rq-body">${escapeHtml(q.stem)}\n\n${['A','B','C','D'].map(k=>`${k}. ${q.options[k]}`).join('\n')}\n\n<span class="rq-correct">正確答案：${q.answer}</span>\n\n${escapeHtml(q.explanation)}</div>
      `;
      reviewList.appendChild(det);
    });
  }

  document.getElementById('retryWrongBtn').style.display = wrongBank.size>0 ? 'inline-block' : 'none';
}

document.getElementById('backBtn').addEventListener('click', ()=>{
  document.getElementById('result-screen').style.display='none';
  document.getElementById('setup-screen').style.display='block';
});

document.getElementById('retryWrongBtn').addEventListener('click', ()=>{
  const pool = QUESTIONS.filter(q=>wrongBank.has(q.id));
  document.getElementById('result-screen').style.display='none';
  startSession(pool, {noLimit:true});
});

document.getElementById('reviewBtn').addEventListener('click', ()=>{
  const pool = QUESTIONS.filter(q=>wrongBank.has(q.id));
  startSession(pool, {noLimit:true});
});

document.getElementById('startBtn').addEventListener('click', ()=>{
  const pool = filteredPool();
  if(pool.length===0) return;
  startSession(pool);
});

// ---------------- Init ----------------
(async function init(){
  await loadPersisted();
  updateCountdown();
  renderChapterGrid();
  updateHint();
  renderOverallStats();
  refreshReviewBtn();
})();

})();

</script>
