options": {"A": "固定自行車", "B": "水中有氧運動", "C": "高撞擊性訓練，例如跳躍及跑步", "D": "低強度阻力訓練"}, "answer": "C", "explanation": "肥胖人士關節長期承受較大壓力，應避免高撞擊性訓練，考慮非負重訓練如固定自行車或水中有氧。", "source": "補充練習題"}, {"id": 180, "chapter": "8. 特別需要人士訓練指引", "stem": "鐮刀型紅血球疾病患者運動時，建議每運動多久應稍作休息？", "options": {"A": "5分鐘", "B": "20分鐘", "C": "60分鐘", "D": "不需要休息"}, "answer": "B", "explanation": "鐮刀型紅血球疾病患者每運動20分鐘便應稍作休息，不應持續運動多於20分鐘，以免脫水及乳酸積聚。", "source": "補充練習題"}, {"id": 181, "chapter": "8. 特別需要人士訓練指引", "stem": "教練面對特別需要人士時的角色定位是：", "options": {"A": "可自行進行康復治療", "B": "不具備康復治療資格，必要時應先獲醫護人員同意書", "C": "可代替醫生作診斷", "D": "不需理會客人的運動反應"}, "answer": "B", "explanation": "教練不具備進行康復治療及診斷的資格，必要時應先獲得醫生或專業人士同意書才能開始運動。", "source": "補充練習題"}, {"id": 182, "chapter": "8. 特別需要人士訓練指引", "stem": "冠心病的典型症狀是疼痛可能延伸至：", "options": {"A": "右腳掌", "B": "左胸延伸到左腋下、左手內側及肩胛骨之間", "C": "頭頂", "D": "腹部下方"}, "answer": "B", "explanation": "冠心病痛楚可從左胸延伸到左腋下和左手內側，以及肩胛骨之間。", "source": "補充練習題"}, {"id": 183, "chapter": "8. 特別需要人士訓練指引", "stem": "糖尿病人士的高血糖定義通常是超過：", "options": {"A": "6.0 mmol/L", "B": "7.0 mmol/L", "C": "10-11.1 mmol/L", "D": "3.9 mmol/L"}, "answer": "C", "explanation": "糖尿病人士高血糖定義為血糖值超過10-11.1 mmol/L。", "source": "補充練習題"}, {"id": 184, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "急性軟組織受傷處理原則 P.OL.I.C.E. 中，「OL」代表：", "options": {"A": "Optimal Loading 施加理想負荷", "B": "Overload 超負荷", "C": "Only Load 只負重", "D": "Open Leg 打開雙腿"}, "answer": "A", "explanation": "P.OL.I.C.E.分別代表Protection保護、Optimal Loading理想負荷、Ice冰敷、Compression加壓及Elevation抬高。", "source": "補充練習題"}, {"id": 185, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "軟組織受傷處理不宜事項H.A.R.M.中，「R」代表：", "options": {"A": "Rest 休息", "B": "Running 走動", "C": "Recovery 恢復", "D": "Rehabilitation 康復"}, "answer": "B", "explanation": "H.A.R.M.代表Hot熱、Alcohol酒精、Running走動及Massage按摩，四者於急性受傷初期均不宜。", "source": "補充練習題"}, {"id": 186, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "P.OL.I.C.E.及H.A.R.M.處理原則適用於受傷後多久內？", "options": {"A": "6-12小時", "B": "24小時內", "C": "48至72小時內", "D": "一星期後"}, "answer": "C", "explanation": "此兩套處理原則適用於急性創傷後48至72小時內，目的是紓緩病情及防止傷患惡化。", "source": "補充練習題"}, {"id": 187, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "運動創傷的「內在因素」不包括：", "options": {"A": "肌肉不平衡", "B": "柔韌性欠佳", "C": "錯誤選擇運動器材", "D": "關節排列不良"}, "answer": "C", "explanation": "錯誤選擇運動器材屬於外在因素；內在因素包括體適能水平、關節排列不良、肌肉不平衡、柔韌性欠佳及關節失穩等。", "source": "補充練習題"}, {"id": 188, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "訓練前熱身的R.A.M.原則中，「M」代表：", "options": {"A": "Massage 按摩", "B": "Mobilize 活動關節提升幅度和靈活", "C": "Motivation 動機", "D": "Maximum 最大化"}, "answer": "B", "explanation": "R.A.M.代表Raise提升體溫循環、Activate激活核心/穩定肌群及Mobilize活動關節提升靈活度。", "source": "補充練習題"}, {"id": 189, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "扭傷（Sprain）與拉傷（Strain）的分別是：", "options": {"A": "扭傷是韌帶受傷，拉傷是肌肉或肌腱受傷", "B": "扭傷是肌肉受傷，拉傷是韌帶受傷", "C": "兩者完全相同", "D": "扭傷只發生於上肢"}, "answer": "A", "explanation": "扭傷是韌帶被過度拉扯撕裂（如踝關節扭傷），拉傷則是肌肉或肌腱過度拉扯撕裂（如膕繩肌拉傷）。", "source": "補充練習題"}, {"id": 190, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "肩關節夾擠症候群的常見誘因不包括：", "options": {"A": "圓肩、寒背", "B": "肩胛穩定及肩袖肌群薄弱", "C": "高沖擊撞擊性活動如快跑", "D": "經常於高危肩膊位置重複運動"}, "answer": "C", "explanation": "肩關節夾擠症候群主要與肩部重複性動作、圓肩姿勢及肩胛/肩袖肌群薄弱有關，與下肢高沖擊活動關聯較低。", "source": "補充練習題"}, {"id": 191, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "肩關節夾擠症候群患者，肩外展至哪個角度範圍時痛楚特別明顯（疼痛弧）？", "options": {"A": "0-30度", "B": "60-120度", "C": "150-180度", "D": "沒有特定角度"}, "answer": "B", "explanation": "肩外展60-120度時痛楚特別明顯，稱為「疼痛弧」（painful arc）。", "source": "補充練習題"}, {"id": 192, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "髕骨關節綜合症（前膝疼痛）患者訓練調整建議不包括：", "options": {"A": "深蹲改半蹲", "B": "減低跑步里數或增加休息", "C": "增加跳躍訓練量", "D": "考慮貼紥改善髕骨位置"}, "answer": "C", "explanation": "髕骨關節綜合症患者應減少跳躍及高沖擊訓練，而非增加，以免加劇病情。", "source": "補充練習題"}, {"id": 193, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "下背痛及腰椎扭傷的成因不包括：", "options": {"A": "提起重物時姿勢不良", "B": "核心肌肉反應遲緩或衰弱", "C": "長期坐姿不正確", "D": "充足熱身及漸進式訓練"}, "answer": "D", "explanation": "充足熱身及漸進式訓練是預防受傷的方法，並非下背痛的成因。", "source": "補充練習題"}, {"id": 194, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "根據課程分類，「類別III」訓練動作的特點是：", "options": {"A": "低風險高效益，適合普羅大眾", "B": "風險過大、回報價值較低，容易受傷", "C": "經改良後適合普通人士", "D": "必須每日進行"}, "answer": "B", "explanation": "類別III訓練對任何人士都屬風險過大、回報/價值較低，容易受傷，訓練好處亦不明確。", "source": "補充練習題"}, {"id": 195, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "訓練後冷卻及放鬆的作用不包括：", "options": {"A": "加快清除乳酸", "B": "減輕遲發性肌肉酸痛", "C": "直接治療已存在的關節炎", "D": "減低運動後生理及心理疲勞"}, "answer": "C", "explanation": "訓練後冷卻放鬆主要有助恢復及減少疲勞和酸痛，但教練不具治療關節炎等病症的資格。", "source": "補充練習題"}, {"id": 196, "chapter": "9. 鍛鍊安全性和損傷預防", "stem": "肩關節夾擠症候群訓練調整建議中，上斜臥推應如何調整？", "options": {"A": "改為平板或下斜臥推，或採用窄手", "B": "改為直立划船", "C": "增加至過頭推舉", "D": "不需調整"}, "answer": "A", "explanation": "上斜臥推對肩關節夾擠風險較高，建議改為平板或下斜臥推，並採用較窄的握距以降低風險。", "source": "補充練習題"}];

<script>
(function(){
'use strict';

const CHAPTERS = [
  "1. 高級功能解剖學和運動生理學",
  "2. 健康體適能評估及計劃安排",
  "3. 抗阻力訓練原則及實踐",
  "4. 訓練原則和方案設計",
  "5. 溝通、業務推廣及商業發展",
  "6. 營養及運動表現",
  "7. 運動處方：體位偏離及柔韌度",
  "8. 特別需要人士訓練指引",
  "9. 鍛鍊安全性和損傷預防"
];

const CHAPTER_COLORS = ["#4f7cff","#35d07f","#ffb84d","#ff5d5d","#c084fc","#22d3ee","#f472b6","#a3e635","#fb923c"];

let selectedChapters = new Set(CHAPTERS);
let sourceFilter = 'all';
let countMode = '40';
let orderMode = 'shuffle';

let session = null; // {questions:[], idx, correctCount, wrongCount, answers:[{qid, chosen, correct}]}
let masteryData = {}; // qid -> {seen, correct}
let wrongBank = new Set(); // qid list needing review

// ---------------- Storage helpers ----------------
async function loadPersisted(){
  try{
    const r = await window.storage.get('apt-mastery', false);
    if(r && r.value) masteryData = JSON.parse(r.value);
  }catch(e){ masteryData = {}; }
  try{
    const r2 = await window.storage.get('apt-wrongbank', false);
    if(r2 && r2.value) wrongBank = new Set(JSON.parse(r2.value));
  }catch(e){ wrongBank = new Set(); }
  try{
    const r3 = await window.storage.get('apt-examdate', false);
    if(r3 && r3.value) document.getElementById('examDate').value = r3.value;
  }catch(e){}
}
async function saveMastery(){
  try{ await window.storage.set('apt-mastery', JSON.stringify(masteryData), false); }catch(e){}
}
async function saveWrongBank(){
  try{ await window.storage.set('apt-wrongbank', JSON.stringify([...wrongBank]), false); }catch(e){}
}
async function saveExamDate(v){
  try{ await window.storage.set('apt-examdate', v, false); }catch(e){}
}

// ---------------- Countdown ----------------
function updateCountdown(){
  const input = document.getElementById('examDate');
  const cdNum = document.getElementById('cdNum');
  if(!input.value){ cdNum.textContent = '--'; return; }
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(input.value + 'T00:00:00');
  const diff = Math.round((target - today) / 86400000);
  cdNum.textContent = diff >= 0 ? diff : '0';
}
document.getElementById('examDate').addEventListener('change', (e)=>{
  updateCountdown();
  saveExamDate(e.target.value);
});

// default exam date: 14 days from now, only if not already set later by storage
(function setDefaultDate(){
  const input = document.getElementById('examDate');
  const d = new Date(); d.setDate(d.getDate()+14);
  const iso = d.toISOString().slice(0,10);
  if(!input.value) input.value = iso;
})();

// ---------------- Setup screen rendering ----------------
function chapterStats(chName){
  const qs = QUESTIONS.filter(q=>q.chapter===chName);
  let seen=0, correct=0;
  qs.forEach(q=>{
    const m = masteryData[q.id];
    if(m && m.seen>0){ seen++; if(m.lastCorrect) correct++; }
  });
  return {total: qs.length, seen, correct};
}

function renderChapterGrid(){
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';
  CHAPTERS.forEach((ch, i)=>{
    const stats = chapterStats(ch);
    const pct = stats.seen ? Math.round(stats.correct/stats.seen*100) : 0;
    const chip = document.createElement('div');
    chip.className = 'chip' + (selectedChapters.has(ch) ? ' on' : '');
    chip.dataset.chapter = ch;
    const shortName = ch.replace(/^\d+\.\s*/,'');
    chip.innerHTML = `
      <div class="chip-top">
        <div class="chip-name">${escapeHtml(shortName)}</div>
        <div class="chip-count">${stats.total}題</div>
      </div>
      <div class="mastery-bar"><div class="mastery-fill" style="width:${pct}%;background:${CHAPTER_COLORS[i]}"></div></div>
      <div class="mastery-txt">${stats.seen ? pct+'% 掌握 · 已做 '+stats.seen+'題' : '尚未練習'}</div>
    `;
    chip.addEventListener('click', ()=>{
      if(selectedChapters.has(ch)) selectedChapters.delete(ch);
      else selectedChapters.add(ch);
      renderChapterGrid();
      updateHint();
    });
    grid.appendChild(chip);
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function filteredPool(){
  return QUESTIONS.filter(q=>{
    if(!selectedChapters.has(q.chapter)) return false;
    if(sourceFilter==='official' && q.source!=='官方模擬試題') return false;
    if(sourceFilter==='supp' && q.source!=='補充練習題') return false;
    return true;
  });
}

function updateHint(){
  const pool = filteredPool();
  document.getElementById('selectedHint').textContent =
    pool.length ? `目前篩選範圍共 ${pool.length} 題可用` : '請至少選擇一個章節';
  document.getElementById('startBtn').disabled = pool.length===0;
}

// segmented controls
function bindSeg(id, onPick, initVal){
  const seg = document.getElementById(id);
  seg.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      seg.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      onPick(btn.dataset.v);
    });
  });
}
bindSeg('sourceSeg', v=>{ sourceFilter=v; updateHint(); });
bindSeg('countSeg', v=>{ countMode=v; });
bindSeg('orderSeg', v=>{ orderMode=v; });

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function renderOverallStats(){
  const el = document.getElementById('overallStats');
  const totalQ = QUESTIONS.length;
  let seen=0, correct=0;
  Object.keys(masteryData).forEach(id=>{
    const m = masteryData[id];
    if(m.seen>0){ seen++; if(m.lastCorrect) correct++; }
  });
  if(seen===0){
    el.innerHTML = `<div class="empty-note">尚未開始練習。選擇章節後按「開始練習」，你嘅答題紀錄同錯題會自動儲存喺呢個網頁度，方便你隨時重溫弱項。</div>`;
    return;
  }
  const pct = Math.round(correct/seen*100);
  el.innerHTML = `
    <div style="display:flex;gap:26px;flex-wrap:wrap;align-items:center;">
      <div style="text-align:center;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;color:var(--accent);">${pct}%</div>
        <div style="font-size:11px;color:var(--ink-faint);margin-top:4px;">整體掌握率</div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;">${seen}/${totalQ}</div>
        <div style="font-size:11px;color:var(--ink-faint);margin-top:4px;">已練習題數</div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--bad);">${wrongBank.size}</div>
        <div style="font-size:11px;color:var(--ink-faint);margin-top:4px;">待重溫錯題</div>
      </div>
    </div>
  `;
}

function refreshReviewBtn(){
  const btn = document.getElementById('reviewBtn');
  document.getElementById('reviewCount').textContent = wrongBank.size;
  btn.style.display = wrongBank.size>0 ? 'inline-block' : 'none';
}

// ---------------- Quiz logic ----------------
function startSession(pool, opts){
  opts = opts || {};
  let qs = pool;
  if(orderMode==='shuffle' && !opts.noShuffle) qs = shuffle(qs);
  if(countMode!=='all' && !opts.noLimit){
    const n = parseInt(countMode,10);
    qs = qs.slice(0, Math.min(n, qs.length));
  }
  session = {
    questions: qs,
    idx: 0,
    correctCount: 0,
    wrongCount: 0,
    answers: [],
    locked: false
  };
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  renderQuestion();
}

function renderQuestion(){
  const q = session.questions[session.idx];
  session.locked = false;
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('nextBtn').textContent = (session.idx === session.questions.length-1) ? '完成練習' : '下一題';

  const pct = Math.round((session.idx)/session.questions.length*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progTxt').textContent = `第 ${session.idx+1} / ${session.questions.length} 題`;
  document.getElementById('scoreGood').textContent = '對 '+session.correctCount;
  document.getElementById('scoreBad').textContent = '錯 '+session.wrongCount;

  const chShort = q.chapter.replace(/^\d+\.\s*/,'');
  document.getElementById('qChapterTag').textContent = chShort;
  document.getElementById('qSourceTag').textContent = q.source;
  document.getElementById('qStem').textContent = q.stem;

  const optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = '';
  ['A','B','C','D'].forEach(key=>{
    const div = document.createElement('div');
    div.className = 'opt';
    div.dataset.key = key;
    div.innerHTML = `<span class="opt-key">${key}</span><span>${escapeHtml(q.options[key]||'')}</span>`;
    div.addEventListener('click', ()=> selectOption(key));
    optsEl.appendChild(div);
  });

  const fb = document.getElementById('feedback');
  fb.classList.remove('show','correct','wrong');
}

function selectOption(chosen){
  if(session.locked) return;
  session.locked = true;
  const q = session.questions[session.idx];
  const correct = chosen === q.answer;

  document.querySelectorAll('#qOptions .opt').forEach(el=>{
    el.classList.add('locked');
    const k = el.dataset.key;
    if(k === q.answer) el.classList.add('correct');
    else if(k === chosen) el.classList.add('wrong');
    else el.classList.add('dim');
  });

  if(correct) session.correctCount++; else session.wrongCount++;
  session.answers.push({id:q.id, chosen, correct});

  // persist mastery
  if(!masteryData[q.id]) masteryData[q.id] = {seen:0, correctCount:0};
  masteryData[q.id].seen += 1;
  masteryData[q.id].lastCorrect = correct;
  if(correct){
    masteryData[q.id].correctCount = (masteryData[q.id].correctCount||0)+1;
    wrongBank.delete(q.id);
  } else {
    wrongBank.add(q.id);
  }
  saveMastery();
  saveWrongBank();

  const fb = document.getElementById('feedback');
  fb.classList.add('show', correct ? 'correct' : 'wrong');
  document.getElementById('fbHead').textContent = correct ? '✓ 答對了' : ('✗ 答錯了，正確答案是 ' + q.answer);
  document.getElementById('fbBody').textContent = q.explanation;

  document.getElementById('nextBtn').disabled = false;
}

document.getElementById('qOptions').addEventListener('keyup', ()=>{});

document.getElementById('nextBtn').addEventListener('click', ()=>{
  if(session.idx < session.questions.length-1){
    session.idx++;
    renderQuestion();
  } else {
    finishSession();
  }
});

document.getElementById('quitBtn').addEventListener('click', ()=>{
  if(session.answers.length===0 || confirm('確定要結束練習？已完成嘅題目會計入紀錄。')){
    finishSession();
  }
});

// keyboard shortcuts
document.addEventListener('keydown', (e)=>{
  if(document.getElementById('quiz-screen').style.display !== 'block') return;
  const map = {'1':'A','2':'B','3':'C','4':'D','a':'A','b':'B','c':'C','d':'D'};
  if(map[e.key] && !session.locked){
    selectOption(map[e.key]);
  } else if(e.key === 'Enter' && session.locked){
    document.getElementById('nextBtn').click();
  }
});

function finishSession(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  renderResult();
  renderChapterGrid();
  renderOverallStats();
  refreshReviewBtn();
}

function renderResult(){
  const total = session.answers.length;
  const good = session.correctCount;
  const bad = session.wrongCount;
  const pct = total ? Math.round(good/total*100) : 0;

  document.getElementById('resPct').textContent = pct+'%';
  document.getElementById('resTotal').textContent = total;
  document.getElementById('resGood').textContent = good;
  document.getElementById('resBad').textContent = bad;

  // chapter breakdown for this session
  const byChapter = {};
  session.answers.forEach(a=>{
    const q = QUESTIONS.find(x=>x.id===a.id);
    if(!byChapter[q.chapter]) byChapter[q.chapter] = {total:0, correct:0};
    byChapter[q.chapter].total++;
    if(a.correct) byChapter[q.chapter].correct++;
  });
  const barsEl = document.getElementById('resChapterBars');
  barsEl.innerHTML='';
  if(Object.keys(byChapter).length===0){
    barsEl.innerHTML = '<div class="empty-note">未有作答紀錄</div>';
  }
  CHAPTERS.forEach((ch,i)=>{
    if(!byChapter[ch]) return;
    const st = byChapter[ch];
    const p = Math.round(st.correct/st.total*100);
    const row = document.createElement('div');
    row.className='cbar-row';
    row.innerHTML = `
      <div class="cbar-name">${escapeHtml(ch.replace(/^\d+\.\s*/,''))}</div>
      <div class="cbar-track"><div class="cbar-fill" style="width:${p}%;background:${CHAPTER_COLORS[i]}"></div></div>
      <div class="cbar-pct">${st.correct}/${st.total}</div>
    `;
    barsEl.appendChild(row);
  });

  // review list (wrong only)
  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML='';
  const wrongAnswers = session.answers.filter(a=>!a.correct);
  const reviewCard = document.getElementById('resReviewCard');
  if(wrongAnswers.length===0){
    reviewCard.style.display='none';
  } else {
    reviewCard.style.display='block';
    wrongAnswers.forEach((a,idx)=>{
      const q = QUESTIONS.find(x=>x.id===a.id);
      const det = document.createElement('details');
      det.className='review-item';
      det.innerHTML = `
        <summary><span>${escapeHtml(q.stem.split('\n')[0].slice(0,60))}${q.stem.length>60?'…':''}</span><span class="rq-num">你答 ${a.chosen} · 正解 ${q.answer}</span></summary>
        <div class="rq-body">${escapeHtml(q.stem)}\n\n${['A','B','C','D'].map(k=>`${k}. ${q.options[k]}`).join('\n')}\n\n<span class="rq-correct">正確答案：${q.answer}</span>\n\n${escapeHtml(q.explanation)}</div>
      `;
      reviewList.appendChild(det);
    });
  }

  document.getElementById('retryWrongBtn').style.display = wrongBank.size>0 ? 'inline-block' : 'none';
}

document.getElementById('backBtn').addEventListener('click', ()=>{
  document.getElementById('result-screen').style.display='none';
  document.getElementById('setup-screen').style.display='block';
});

document.getElementById('retryWrongBtn').addEventListener('click', ()=>{
  const pool = QUESTIONS.filter(q=>wrongBank.has(q.id));
  document.getElementById('result-screen').style.display='none';
  startSession(pool, {noLimit:true});
});

document.getElementById('reviewBtn').addEventListener('click', ()=>{
  const pool = QUESTIONS.filter(q=>wrongBank.has(q.id));
  startSession(pool, {noLimit:true});
});

document.getElementById('startBtn').addEventListener('click', ()=>{
  const pool = filteredPool();
  if(pool.length===0) return;
  startSession(pool);
});

// ---------------- Init ----------------
(async function init(){
  await loadPersisted();
  updateCountdown();
  renderChapterGrid();
  updateHint();
  renderOverallStats();
  refreshReviewBtn();
})();

})();

</script>
</body>
</html>
