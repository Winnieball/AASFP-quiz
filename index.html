<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APT 應試機｜AASFP 高級私人教練理論模擬試題</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#101114;
  --surface:#191b20;
  --surface-2:#21242b;
  --surface-3:#282c35;
  --line:#2c2f37;
  --ink:#edeef2;
  --ink-dim:#90939e;
  --ink-faint:#5c5f6a;
  --accent:#4f7cff;
  --accent-dim:#2a3a66;
  --good:#35d07f;
  --good-dim:#173829;
  --bad:#ff5d5d;
  --bad-dim:#3a1c1c;
  --warn:#ffb84d;
  --warn-dim:#3a2c14;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(79,124,255,0.14), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(53,208,127,0.08), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:960px;margin:0 auto;padding:28px 20px 80px;}

/* ---------- Header / scoreboard ---------- */
.topbar{
  display:flex;justify-content:space-between;align-items:flex-start;
  gap:16px;margin-bottom:22px;flex-wrap:wrap;
}
.brand{display:flex;flex-direction:column;gap:2px;}
.brand .eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;
  color:var(--accent);text-transform:uppercase;font-weight:700;
}
.brand h1{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:28px;
  margin:2px 0 0;letter-spacing:.01em;color:var(--ink);
}
.brand .sub{color:var(--ink-dim);font-size:13px;margin-top:2px;}

.countdown{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:10px 18px;display:flex;align-items:center;gap:12px;min-width:168px;
}
.countdown .cd-num{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:30px;
  color:var(--warn);line-height:1;
}
.countdown .cd-label{display:flex;flex-direction:column;gap:2px;}
.countdown .cd-label span:first-child{font-size:11px;color:var(--ink-dim);}
.countdown input{
  background:transparent;border:none;color:var(--ink-dim);font-size:11px;
  font-family:'JetBrains Mono',monospace;padding:0;width:98px;cursor:pointer;
}
.countdown input:focus{outline:none;color:var(--accent);}

/* ---------- Cards / sections ---------- */
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px;margin-bottom:18px;
}
.section-title{
  font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink-dim);margin:0 0 14px;font-weight:600;
}

/* ---------- Chapter grid ---------- */
.chapters{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.chip{
  border:1px solid var(--line);background:var(--surface-2);border-radius:11px;
  padding:12px 14px;cursor:pointer;user-select:none;transition:border-color .15s, background .15s;
  position:relative;
}
.chip:hover{border-color:var(--accent);}
.chip.on{border-color:var(--accent);background:var(--accent-dim);}
.chip .chip-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.chip .chip-name{font-size:13px;font-weight:500;line-height:1.4;}
.chip .chip-count{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-dim);
  flex-shrink:0;
}
.chip .mastery-bar{
  height:4px;background:var(--surface-3);border-radius:2px;margin-top:9px;overflow:hidden;
}
.chip .mastery-fill{height:100%;background:var(--good);border-radius:2px;transition:width .3s;}
.chip .mastery-txt{font-size:10px;color:var(--ink-faint);margin-top:5px;font-family:'JetBrains Mono',monospace;}

/* ---------- Controls row ---------- */
.controls-row{display:flex;flex-wrap:wrap;gap:22px;margin-top:18px;}
.control-group{display:flex;flex-direction:column;gap:8px;}
.control-group label{
  font-size:11px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.06em;
  font-family:'JetBrains Mono',monospace;
}
.seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.seg button{
  background:var(--surface-2);color:var(--ink-dim);border:none;padding:8px 14px;
  font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  border-right:1px solid var(--line);
}
.seg button:last-child{border-right:none;}
.seg button.on{background:var(--accent);color:#fff;}

.btn{
  font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.03em;
  font-size:15px;border:none;border-radius:11px;padding:13px 22px;cursor:pointer;
  transition:transform .1s, opacity .15s;
}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:.92;}
.btn-primary:disabled{background:var(--surface-3);color:var(--ink-faint);cursor:not-allowed;}
.btn-ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line);}
.btn-ghost:hover{border-color:var(--accent);}
.btn-warn{background:var(--warn-dim);color:var(--warn);border:1px solid var(--warn);}

.start-row{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;align-items:center;}
.start-hint{font-size:12px;color:var(--ink-faint);}

/* ---------- Quiz screen ---------- */
#quiz-screen{display:none;}
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:14px;flex-wrap:wrap;}
.progress-wrap{flex:1;min-width:160px;}
.progress-track{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .25s;}
.progress-txt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-dim);margin-top:6px;}
.score-pill{
  font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:9px;padding:7px 14px;display:flex;gap:10px;
}
.score-pill .s-good{color:var(--good);}
.score-pill .s-bad{color:var(--bad);}

.q-chapter-tag{
  display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--accent);background:var(--accent-dim);border-radius:6px;padding:4px 10px;
  margin-bottom:14px;
}
.q-source-tag{
  display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--ink-faint);border:1px solid var(--line);border-radius:6px;padding:3px 8px;
  margin-left:8px;
}
.q-stem{font-size:16px;line-height:1.75;white-space:pre-line;margin-bottom:20px;color:var(--ink);}
.q-stem b{color:var(--accent);}

.options{display:flex;flex-direction:column;gap:10px;}
.opt{
  display:flex;gap:12px;align-items:flex-start;text-align:left;
  border:1px solid var(--line);background:var(--surface-2);border-radius:11px;
  padding:13px 16px;cursor:pointer;font-size:14.5px;line-height:1.6;color:var(--ink);
  transition:border-color .12s, background .12s;
}
.opt:hover:not(.locked){border-color:var(--accent);}
.opt .opt-key{
  font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--ink-dim);
  flex-shrink:0;width:20px;
}
.opt.correct{border-color:var(--good);background:var(--good-dim);}
.opt.correct .opt-key{color:var(--good);}
.opt.wrong{border-color:var(--bad);background:var(--bad-dim);}
.opt.wrong .opt-key{color:var(--bad);}
.opt.dim{opacity:.45;}
.opt.locked{cursor:default;}

.feedback{
  margin-top:16px;border-radius:11px;padding:16px 18px;border:1px solid var(--line);
  background:var(--surface-2);display:none;
}
.feedback.show{display:block;}
.feedback .fb-head{
  font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.feedback.correct .fb-head{color:var(--good);}
.feedback.wrong .fb-head{color:var(--bad);}
.feedback .fb-body{font-size:13.5px;line-height:1.75;color:var(--ink-dim);white-space:pre-line;}

.quiz-nav{display:flex;justify-content:space-between;margin-top:20px;align-items:center;}
.quiz-nav .left-actions{display:flex;gap:10px;}

/* ---------- Result screen ---------- */
#result-screen{display:none;}
.score-hero{
  text-align:center;padding:38px 20px 30px;
}
.score-hero .big-num{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:64px;
  color:var(--accent);line-height:1;
}
.score-hero .big-label{color:var(--ink-dim);font-size:13px;margin-top:8px;letter-spacing:.04em;}
.score-hero .sub-stats{
  display:flex;justify-content:center;gap:26px;margin-top:20px;flex-wrap:wrap;
}
.score-hero .sub-stats div{text-align:center;}
.score-hero .sub-stats .n{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;}
.score-hero .sub-stats .l{font-size:11px;color:var(--ink-faint);margin-top:3px;}

.chapter-bars{display:flex;flex-direction:column;gap:12px;}
.cbar-row{display:flex;align-items:center;gap:12px;}
.cbar-name{width:180px;flex-shrink:0;font-size:12.5px;color:var(--ink-dim);}
.cbar-track{flex:1;height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;}
.cbar-fill{height:100%;border-radius:4px;}
.cbar-pct{
  width:60px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;
  color:var(--ink-dim);flex-shrink:0;
}

.review-list{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
.review-item{
  border:1px solid var(--line);border-radius:11px;background:var(--surface-2);overflow:hidden;
}
.review-item summary{
  padding:12px 16px;cursor:pointer;font-size:13.5px;color:var(--ink);
  display:flex;justify-content:space-between;gap:10px;align-items:center;list-style:none;
}
.review-item summary::-webkit-details-marker{display:none;}
.review-item summary .rq-num{color:var(--bad);font-family:'JetBrains Mono',monospace;font-size:11px;flex-shrink:0;}
.review-item .rq-body{padding:0 16px 16px;font-size:13px;line-height:1.7;color:var(--ink-dim);white-space:pre-line;border-top:1px solid var(--line);padding-top:12px;}
.review-item .rq-body .rq-correct{color:var(--good);font-weight:700;}

.result-actions{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap;}

.empty-note{color:var(--ink-faint);font-size:13px;text-align:center;padding:24px;}

@media (max-width:600px){
  .brand h1{font-size:22px;}
  .cbar-name{width:120px;font-size:11.5px;}
  .score-hero .big-num{font-size:48px;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <span class="eyebrow">AASFP · APTHK 高級私人教練證書</span>
      <h1>應試模擬機</h1>
      <div class="sub">第三版應試精讀本 · 196 題理論模擬試題</div>
    </div>
    <div class="countdown">
      <div class="cd-num" id="cdNum">--</div>
      <div class="cd-label">
        <span>距離考試</span>
        <input type="date" id="examDate">
      </div>
    </div>
  </div>

  <!-- ===================== SETUP SCREEN ===================== -->
  <div id="setup-screen">

    <div class="card">
      <div class="section-title">選擇章節　Select Chapters</div>
      <div class="chapters" id="chapterGrid"></div>
    </div>

    <div class="card">
      <div class="controls-row">
        <div class="control-group">
          <label>題目來源</label>
          <div class="seg" id="sourceSeg">
            <button data-v="all" class="on">全部</button>
            <button data-v="official">官方題目</button>
            <button data-v="supp">補充題目</button>
          </div>
        </div>
        <div class="control-group">
          <label>題目數量</label>
          <div class="seg" id="countSeg">
            <button data-v="20">20</button>
            <button data-v="40" class="on">40</button>
            <button data-v="80">80</button>
            <button data-v="all">全部</button>
          </div>
        </div>
        <div class="control-group">
          <label>排列方式</label>
          <div class="seg" id="orderSeg">
            <button data-v="shuffle" class="on">隨機</button>
            <button data-v="order">順序</button>
          </div>
        </div>
      </div>
      <div class="start-row">
        <button class="btn btn-primary" id="startBtn">開始練習</button>
        <button class="btn btn-warn" id="reviewBtn" style="display:none;">錯題重溫 (<span id="reviewCount">0</span>)</button>
        <span class="start-hint" id="selectedHint"></span>
      </div>
    </div>

    <div class="card" id="statsCard">
      <div class="section-title">整體進度　Overall Mastery</div>
      <div id="overallStats"></div>
    </div>

  </div>

  <!-- ===================== QUIZ SCREEN ===================== -->
  <div id="quiz-screen">
    <div class="quiz-top">
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
        <div class="progress-txt" id="progTxt"></div>
      </div>
      <div class="score-pill">
        <span class="s-good" id="scoreGood">對 0</span>
        <span class="s-bad" id="scoreBad">錯 0</span>
      </div>
    </div>

    <div class="card">
      <span class="q-chapter-tag" id="qChapterTag"></span><span class="q-source-tag" id="qSourceTag"></span>
      <div class="q-stem" id="qStem"></div>
      <div class="options" id="qOptions"></div>
      <div class="feedback" id="feedback">
        <div class="fb-head" id="fbHead"></div>
        <div class="fb-body" id="fbBody"></div>
      </div>
    </div>

    <div class="quiz-nav">
      <div class="left-actions">
        <button class="btn btn-ghost" id="quitBtn">結束練習</button>
      </div>
      <button class="btn btn-primary" id="nextBtn" disabled>下一題</button>
    </div>
  </div>

  <!-- ===================== RESULT SCREEN ===================== -->
  <div id="result-screen">
    <div class="card score-hero">
      <div class="big-num" id="resPct">0%</div>
      <div class="big-label">本輪準確率</div>
      <div class="sub-stats">
        <div><div class="n" id="resTotal">0</div><div class="l">總題數</div></div>
        <div><div class="n" id="resGood" style="color:var(--good)">0</div><div class="l">答對</div></div>
        <div><div class="n" id="resBad" style="color:var(--bad)">0</div><div class="l">答錯</div></div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">按章節表現　Chapter Breakdown</div>
      <div class="chapter-bars" id="resChapterBars"></div>
    </div>

    <div class="card" id="resReviewCard">
      <div class="section-title">錯題檢視　Review Mistakes</div>
      <div class="review-list" id="reviewList"></div>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="backBtn">返回主頁</button>
      <button class="btn btn-warn" id="retryWrongBtn" style="display:none;">只重做錯題</button>
    </div>
  </div>

</div>

<script>
const QUESTIONS = [{"id": 1, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "A runner suffers muscle strain at the back of his/her thigh. Which of the following muscles\n may be involved?\n 有一個客人跑步時拉傷了大腿後側的肌肉，其中可能涉及的肌肉有哪些？\n\n I Biceps femoris long head 股二頭肌長頭\n II Biceps brachii short head 肱二頭肌短頭\n III Semitendinosus 半腱肌\n IV Rectus femoris 股直肌", "options": {"A": "I & III I 和 III", "B": "II & III II 和 III", "C": "I & IV I 和 IV", "D": "All of above 以上皆是"}, "answer": "A", "explanation": "The pulled muscle is hamstrings which is made up of biceps femoris (long head and short head),\n semitendinosus and semimembranosus.\n 被牽扯的肌肉是膕繩肌，它由股二頭肌（長頭和短頭），半腱肌和半膜肌組成\n\n Biceps femoris (long head)\n 股二頭肌 (長頭)\n Semitendinosus\n 半腱肌\n\n Biceps femoris (short head) Semimembranosus\n 股二頭肌 (短頭) 半膜肌", "source": "官方模擬試題"}, {"id": 2, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "Jack would like to increase the mass of his upper trapezius by doing the shoulder shrug\n exercise. His trainer asked him to pull the scapula and rib cage up as far as possible to get\n maximum contraction. What is/are the risk(s) of the shoulder shrug exercise Jack performed?\n 客人要通過聳肩訓練動作來增加他的上斜方肌體積，他的教練要求他盡力拉高肩胛骨\n 及肋骨架以達到肌肉最大的收縮，客人這種訓練方法有以下哪項／些風險？\n\n I Pectoralis minor may be too strong and cause the elevation of first and second ribs as\n well as nerve compression 胸小肌過強及造成第一、二對肋骨上提而壓迫神經線\n II Scalenes muscles may be too strong and cause the scapula protraction and result in\n round shoulder posture 斜角肌可能過度強化及造成肩胛骨前引以致圓肩\n III Scalenes muscles may be too strong and cause the elevation of first and second ribs as\n well as nerve compression 斜角肌可能過度強化及造成第一、二對肋骨上提而壓迫\n 神經線\n IV Levator scapulae may be too strong and cause the scapula protraction and result in\n round shoulder posture 肩胛提肌過度強化而造成肩胛骨前引及圓肩姿勢", "options": {"A": "II only 只有 II", "B": "III only 只有 III", "C": "III & IV III 和 IV", "D": "All of above 以上皆是"}, "answer": "B", "explanation": "Since Jack has raised his ribs and scapula during the movement, he may strengthen the scalene\n muscle and levator scapulae at the same time. The scalene originates from the first and second\n ribs and inserts to the cervical vertebrae. Thus strong scalene muscle may elevate these two\n ribs and decrease the space between the ribs and clavicle and hence cause the nerve\n entrapment. The levator scapulae originates from the first to the fourth cervical vertebrae and\n inserts to the scapula and therefore, the strong levator scapulae may cause the shoulder girdle\n elevation. Only the pectoralis minor originates from the ribs and insert to the coracoid process\n may lead to the scapula protraction and round shoulder.\n 當客人在動作中提高他的肋骨和肩胛骨，他可能同時會強化到斜角肌和肩胛提肌。斜角\n 肌起點在第一第二節肋骨，止點在頸椎。因此，強化斜角肌可能會提高這兩節肋骨，從而\n 減少肋骨與鎖骨的空間壓迫神經線。肩胛提肌起點在第一到第四節頸椎，止點在肩胛骨，\n因此，強化肩胛提肌可能導致肩帶上舉。只有胸小肌的起點在肋骨止點在喙突，可能導\n 致肩帶前引和圓肩。", "source": "官方模擬試題"}, {"id": 3, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "When performing the Hanging Leg Raise exercise (shown below), which of the followings is\n correct?\n 以下哪一項關於懸垂舉腿（如下圖）是正確的？", "options": {"A": "Transversus abdominis is agonist, iliopsoas is\n synergist\n 腹直肌是原動肌，髂腰肌是協助肌", "B": "Transversus abdominis is antagonist, iliopsoas\n is stabilizers\n 腹橫肌是拮抗肌，髂腰肌是穩定肌", "C": "Transversus abdominis is stabilizer, iliopsoas\n is synergist\n 腹橫肌是穩定肌，髂腰肌是協助肌", "D": "Transvesus abdominisi is stabilizer, iliopsoas is agonist\n 腹橫肌是穩定肌，髂腰肌原動肌"}, "answer": "D", "explanation": "The major joint movements from starting to finishing position of hanging leg raise is hip flexion.\n The prime mover of hip flexion is Iliopsoas. In order to facilitate the hip flexion movement, the\n trunk especially the lumbar region must be stable. The transversus abdominis is the key muscle\n to contract and stabilize the lumbar spine.\n 懸垂舉腿從開始到完成最主要的關節活動是髖屈曲。髖屈曲的原動肌是髂腰肌。為了使\n 髖屈曲的動作順利的完成，軀幹部分特別是腰部必須穩定。腹橫肌是一塊非常重要的幫\n 助腰椎穩定的肌肉。", "source": "官方模擬試題"}, {"id": 4, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "The following diagram shows a spinning backfist movement in kickboxing training.\n Which of the following movement analysis is correct?\n 下圖是 Kickboxing 訓練的鞕拳動作，以下哪一個動作分析是正確的？\n\n Human Movement Agonist\n 人體活動名稱 原動肌\n I Shoulder extension Latissimus dorsi\n 肩伸展 背闊肌\n II Shoulder horizontal abduction Posterior deltoid\n 肩水平外展 後三角肌\n III Shoulder horizontal abduction Latissimus dorsi\n 肩水平內收 背闊肌\n IV Elbow extension Triceps brachii\n 肘伸展 肱三頭肌\n V Elbow extension Biceps brachii\n 肘伸展 肱二頭肌", "options": {"A": "I & IV I 和 IV", "B": "II & IV II 和 IV", "C": "III & IV III 和 IV", "D": "II & V II 和 V"}, "answer": "B", "explanation": "The elbow movement of the back-fist is elbow extension. The joint is moving from flexed\n position to straightened position. Thus the prime mover of elbow extension is triceps brachii.\n The shoulder joint is moving in transverses plane and away from the middle line of the body.\n So the movement is shoulder horizontal abduction. The prime mover for shoulder horizontal\n abduction is posterior deltoid.\n 鞕拳動作中肘關節的活動是肘伸展。關節活動是從屈曲的位置到伸直的位置。肘伸展的\n 原動肌是肱三頭肌。肩關節在水平面同時離開身體的中線運動，所以運動是肩水平外展。\n 肩水平外展的原動肌是三角肌後束。", "source": "官方模擬試題"}, {"id": 5, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "After completion of a regular resistance training program for 12 weeks, a male client\n experienced significant improvement on strengths but no obvious upscale of muscles girth.\n Which of the following terms best explains this phenomenon?\n 完成一項為期 12 周有規律的阻力訓練後，一位男客人感覺有明顯的肌力增加，卻沒\n 有顯著的肌肉圍度增長。以下哪項最適合解釋此現象？", "options": {"A": "Hypertrophy\n 肌肉肥大", "B": "Hyperplasia\n 肌纖增生", "C": "Hyperventilation\n 過度換氣", "D": "Motor unit recruitment\n 運動單位募集"}, "answer": "D", "explanation": "This is because at the beginning few weeks of training, our body adapt to recruit more motor\n units to perform exercises in higher intensity or resistance. Basically, all muscle fibers are\n connected by particular/specific motor neurons but it is just a matter whether the individual\n can activate all these motor units effectively. Therefore, as more motor units (and muscle\n fibers) can be activated, after 12 weeks of training, the client feels easier to lift up a heavy\n object (improvement on strength) but does not observe any muscles size changes. This\n phenomenon is termed Neuromuscular Adaptation (or simply called “learning of motor unit\n recruitment”). In this situation, there should be no changes in size and number of muscle\n fibers, so answer A and B are wrong. Answer C is condition relating to our respiratory system\n which is not the correct answer.\n 這是由於開始訓練的首幾周，我們的身體基本上學習募集更多的運動單位，以克服更高\n 強度及阻力的訓練動作。 所有肌纖維也連接著其指定及相應的運動神經元，因此問題只\n 在於人們能否將這些運動單位有效激活。 隨著能激活及募集的運動單位（以及肌纖維）\n 增加，經過 12 週的訓練後，客戶感覺更容易抬起一項重的物件（力量改善），但沒有觀\n 察到任何肌肉大小的變化。這種現像被稱為「神經肌肉適應（Neuromuscular Adaptation）」\n （或簡稱為“運動單位招募”的學習）。\n 在這種情況下，肌纖維的大小和數量應該沒有變化，因此答案 A 和 B 是錯誤的。\n 答案 C 是一與呼吸系統有關的病症，所以不屬正確答案。", "source": "官方模擬試題"}, {"id": 6, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "Which of the following about the energy systems is correct?\n 以下哪一項關於能量系統的描述是正確的？", "options": {"A": "ATP-CP system is fast and carbohydrate is the main fuel of this system ATP-CP 系統能\n 迅速提供能量，碳水化合物是其主要能量來源", "B": "Aerobic system will produce certain amounts of lactic acid, hence cause some muscle\n soreness 有氧系統會產生乳酸而造成肌肉酸痛", "C": "Carbohydrate and fat are the main fuel of lactic acid system. Using this energy system\n may produce significant muscle soreness 碳水化合物及脂肪是乳酸系統的主要能量\n 來源，應用此系統時可造成明顯的肌肉酸痛", "D": "Aerobic system is the only system can use fat as the energy fuel 有氧系統是唯一的系\n 統能應用脂肪作能量來源"}, "answer": "D", "explanation": "The source of energy for aerobic system including carbohydrates and fat, while the energy\n source for ATP-CP system is creatine phosphate. Thus answer A is incorrect. For lactic acid\n system, carbohydrate is the only fuel. So answer C is incorrect. In aerobic system, the end\n product is carbon dioxide and water and no lactic acid produced and therefore answer B is\n incorrect. Finally, aerobic system is the only system can use fat as energy fuel. That’s why\n aerobic exercise should be emphasized for fat reduction.\n 有氧系統的能量來源包括碳水化合物和脂肪。ATP-CP 系統的能量來源是肌酸。因此答案\n A 是錯誤的。乳酸系統的能量來源只有碳水化合物。所以答案 C 是錯誤的。有氧系統可\n 以產生二氧化碳和水，沒有乳酸產生，因此答案 B 是錯誤的。最後，只有有氧系統會利\n 用脂肪作為能量來源。這就是為什麼有氧訓練對於減脂來說是最重要的。", "source": "官方模擬試題"}, {"id": 7, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "Which human movement will be performed when supraspinatus performs concentric\n contraction?\n 岡上肌向心收縮發力時產生以下哪個人體動作?", "options": {"A": "Shoulder flexion 肩屈曲", "B": "Shoulder extension 肩伸展", "C": "Shoulder abduction 肩外展", "D": "Shoulder internal rotation 肩內旋"}, "answer": "C", "explanation": "The supraspinatus muscle is the only muscle of the rotator cuff that is not a primary\n rotator of the humerus. The origin of the muscle is at the supraspinous fossa of the\n scapula, the muscle tendon passes above the glenohumeral joint insert at the tuberosi ty of\n the humerus. Concentric contraction of the supraspinatus muscle leads to abduction of\n this movement during first 15 degrees of its arc. Beyond 15 degrees the deltoid muscle\n becomes more active in abducting the arm.\n\n 岡上肌是肩袖中唯一不是主力負責肱骨旋轉的肌肉。肌肉的起點在肩胛骨的棘上窩，肌\n 腱在盂肱關節上方通過連接到肱骨結節處。岡上肌的同心收縮產生外展弧形的首 15 度。\n 超過 15 度時，三角肌在外展手臂方面變得越來越有影響力。", "source": "官方模擬試題"}, {"id": 8, "chapter": "1. 高級功能解剖學和運動生理學", "stem": "Which of the following training exercise cannot effectively train the quadriceps?\n 以下哪個訓練不能有效訓練股四頭肌", "options": {"A": "Squat 深蹲", "B": "Machine seated leg extension 器械坐姿腿屈伸", "C": "Stiff leg deadlift直腿硬拉", "D": "Lunges 啞鈴箭步蹲"}, "answer": "C", "explanation": "The contraction of quadriceps can perform knee extension. Besides, contraction of rectus\n femoris can perform hip flexion. Therefore, during the concentric phase of the training\n movement which can train the quadriceps should include active knee extension, such as\n squat, machine seated leg extension and lunges. However, one of the training keys of stiff\n leg deadlift must maintain the knee slightly flexed or almost fully extended. The training\n focus mainly on active hip extension by contracting gluteus maximus and hamstrings. In\n conclude, the stiff leg deadlift cannot effectively train the quadriceps.\n\n 股四頭肌收縮時主要產生的收縮動作是膝伸展，當中股直肌亦同時能夠產生髖屈曲的動作。\n 因此訓練動作在向心收縮階段應該有包括主動膝伸展的動作。深蹲、器械坐姿腿屈伸、啞\n 鈴箭步蹲等訓練動作在向心收縮階段都有涉及膝伸展，但直腿硬拉則強調在整個動作中，\n 膝部角度保持微曲或近乎完全伸直，其訓練重點主要由臀大肌及膕繩肌發力進行主動髖伸\n 展。因此直腿硬拉不能有效訓練股四頭肌。", "source": "官方模擬試題"}, {"id": 9, "chapter": "2. 健康體適能評估及計劃安排", "stem": "Which of the following is/are the required preparation of performing the part of physical testing in\n health and fitness assessment for a client?\n 以下哪一項是健康體適能評估的體能測試前客人應有的準備？", "options": {"A": "Warm up for 10 minutes\n 熱身 10 分鐘", "B": "Finish the Physical Activity Readiness Questionnaire (PAR-Q) form\n 完成一份運動前健康問卷調查 (PAR-Q)", "C": "Wear sports clothing and Shoes\n 穿運動服及運動鞋", "D": "All of above\n 以上皆是"}, "answer": "D", "explanation": "The pre-test screening should include the completion of the PAR-Q form to identify individuals\n who need medical clearance from physicians before taking any physical fitness test or starting\n an exercise program. The screening also helps to find out any contraindication to exercise\n testing. The pre-test preparations can help to enhance the efficiency of the health and fitness\n assessment procedure and they consist of proper clothing and footwear, no stimulating food\n or drinks, sufficient rest and no vigorous activity before the testing. Proper clothing and short\n pant can enhance the convenience of the skinfold testing, push up and crunch exercise. Client\n should have their meals around 2 hours before the test and avoid spicy food so that it will not\n affect the blood pressure and heart rate measurement. Also, the client should avoid performing\n exhaustive physical activities before the testing and the trainer should remind them to have\n sufficient rest the day before. All these are important to ensure an accurate assessment result.\n 在測試之前檢查應包括完成一份 PAR-Q 問卷，找出哪些人在安排測試或開始訓練計畫之\n 前需要先進行醫學方面的檢查。這些檢查也可以找出一些訓練和測試的禁忌。測試前的\n 準備工作可以提高我們體適能測試的效率，包括合適的服裝和鞋，不要攝入刺激性的食\n 物和飲料，充足的休息和在測試之前不能做劇烈運動。合適的服裝和短褲可以方便進行\n 皮褶度量、俯臥撐和卷腹。會員進餐應在測試前 2 小時，避免吃辛辣的食物，這樣才不\n 至於影響血壓和心率的測試。同時客人應在測試之前儘量避免劇烈運動，教練要提醒他\n 們在測試的前一天有充足的休息。所有這些都對測試結果的準確性很重要。", "source": "官方模擬試題"}, {"id": 10, "chapter": "2. 健康體適能評估及計劃安排", "stem": "Why do clients need regular health and fitness assessment?\n 為何客人需要定期作健康體適能評估？", "options": {"A": "It can measure the training progress and review its effectiveness\n 其可測量訓練進度和檢視訓練效果", "B": "If there is no health and fitness assessment, the client will be extremely dangerous\n 不作定期的健康體適能評估，客人會很危險", "C": "It is purely for marketing and commercial reasons\n 主要是出於市場推廣及商業考慮", "D": "It can diagnose diseases of clients\n 健康體適能評估可診斷出客人的疾病"}, "answer": "A", "explanation": "The main objective of regular physical fitness assessment is to review the effectiveness and\n progress of the training program. It can be a yardstick to measure the progress of physical\n fitness and a useful tool to show the progress. Therefore, it is not purely driven by market needs.\n However, we should notice that health and fitness assessment cannot diagnose any disease, it\n is to measure the quality of health fitness components: cardiorespiratory endurance, body\n composition, flexibility, muscle strength and endurance. Finally, the objective of performing\n health and fitness assessment is to understand the fitness profile and it is not a kind of\n diagnostic tool for clients.\n 定期身體評估的主要目的是評價訓練的效果和進展。它是一個測量體適能進展的準繩，\n 及有效顯示訓練進展。因此，它不是完全為了市場推廣的需求。無論如何，我們應注意到\n 健康體適能測試不能夠診斷任何的疾病，而是測量健康相關體適能元素的質量：心肺耐\n 力、身體組成、柔韌性、肌肉力量和肌肉耐力。最後，健康體適能測試的目標是瞭解客人\n 的體適能狀況而不是一個診斷的工具。", "source": "官方模擬試題"}, {"id": 11, "chapter": "2. 健康體適能評估及計劃安排", "stem": "Which of the following is/are correct for skinfold measurements of thigh?\n 以下哪項說法關於大腿皮褶測量是正確的？", "options": {"A": "The skinfold taken is midway between the anterior superior iliac spine(ASIS) and tibial\n tuberosity\n 測量皮褶位置在髂前上棘和脛骨結節的中間位置", "B": "Body weight should be shifted to the non-testing leg so as to relieve the muscle\n tension of the testing thigh\n 身體重量應放在非測量的腿上，使受測量的腿部肌肉可以放鬆", "C": "The skinfold position taken is different between male and female\n 男性和女性測量的位置不同", "D": "The knee joint of the leg under measurement should be straightened completely and\n hyperextended\n 受測量的腿應完全伸直至超伸狀態"}, "answer": "B", "explanation": "When measuring the skinfold at thigh, the skinfold location should be at the midway between\n the hip joint and knee joint, at the anterior aspect of the thigh and taken vertically. The skinfold\n taken is the same for female and male. During measurement, client should be standing up and\n the testing leg under measurement should be relaxed to avoid the skin being stretched which\n will affect the measuring accuracy. Therefore, the body weight should be shifted to the non-\n testing leg. To make sure the leg under measurement is relax, the leg should not be\n straightened or hyperextended and it should be kept slightly bent. Therefore, option B is\n correct.\n 當測量腿部皮褶時，測量位置應該在髖關節和膝關節中點，大腿前面垂直捏起。這個部\n 位男性和女性的捏起部位是相同的。在測量的過程中，客人應該站立，測試腿保持放鬆\n 姿勢，避免皮膚拉緊造成測試的準確性下降。因此，重心應該移到非測試腿上。為了確保\n 測試腿的放鬆，不要將它伸直或超伸，可以保持微屈。因此，選項 B 是正確的。", "source": "官方模擬試題"}, {"id": 12, "chapter": "2. 健康體適能評估及計劃安排", "stem": "Which of the following statements about the Chester Step Test for testing cardiorespiratory\n endurance of clients is/are correct?\n 關於 Chester 臺階測試來評估客人心肺耐力的過程，以下哪項說法是正確的？", "options": {"A": "It is an accurate test to find out the actual VO2max of clients\n 這是一個能準確的找出客人真正最大攝氧量的方法", "B": "It is suggested to increase the intensity to 90% of maximum heart rate gradually during\n the test\n 測試過程中逐漸把強度加大，直到客人最大心率的 90%", "C": "If the test is terminated in the final stage for the safety reason, the VO2max value of the\n client can still be predicted from the results of previous completed stages\n 如測試在最後階段中，由於安全理由而終止，客人的最大攝氧量仍可從之前完成\n 之測試階段結果估計出來", "D": "None of above\n 以上皆非"}, "answer": "C", "explanation": "Chester Step Test is a sub-maximal test for cardiorespiratory endurance. There are 5 stages in\n the test and the intensity is gradually increased. There are 2 safety measures. First, when the\n heart rate of client reaches 80% maximum heart rate or the Rating of Perceived Exertion\n reaches 14 or above, the test will be terminated for the safety reason. Thus the intensity of the\n test will never reach 90% of maximum heart rate. The heart rate of each stage is recorded and\n then plotted against a graph. From the graph, we can predict the VO2max value of the client. But\n this is an estimation instead of an actual VO2max value. As the VO2max is obtained by plotting a\ngraph according to the data from stage 1 to 5, the result can still be estimated if 1 or 2 data is\n missing. Thus even the client has not finished all 5 stages, the VO2max value can still be\n predicted.\n Chester 臺階測試是心肺耐力次最大強度測試。這項測試有 5 個階段，強度逐漸增加。有\n 2 個安全標準。一是當會員心率達到最大心率的 80%或者自我運動強度值在 14 以上，測\n 試將因安全的原因停止。因此這項測試的強度絕不能達到最大心率的 90%。每個階段的\n 心率將被標記在測試表的方格上。從圖表上我們可以推測出客人的最大攝氧量。但是這\n 是一個估計值而非實際的最大攝氧量測試結果。由於最大攝氧量的得出是依照 1-5 個階\n 段的資料標記的圖表，因此即使客人不能完成所有 5 個階段的測試， 有 1-2 個資料的缺\n 少，仍然能夠估計他的最大攝氧量數值。", "source": "官方模擬試題"}, {"id": 13, "chapter": "2. 健康體適能評估及計劃安排", "stem": "The blood pressure measurement of a client is 170/110mmHg, as a Personal Trainer, which\n of the following is the appropriate response?\n 如客人的血壓是 170/110 mmHg，作為一位私人體適能教練，以下哪項是適合的相應\n 行動？", "options": {"A": "Do not inform client about the blood pressure measurement and proceed to other\n tests\n 不告知客人血壓的測量結果而且繼續為客人作其他測試", "B": "Tell the client that he/she is suffered from hypertension and suggest the client to go to\n hospital for medical check\n 告知客人他／她有高血壓病症同時建議客人到醫院作檢查", "C": "Advise the client to have medical check by physician\n 建議客人找醫生作醫學檢查", "D": "Since the diastolic pressure is extremely high, the trainer should inform the client that\n he/she has extreme hypertension and it is a contraindication to all exercises\n 告知客人由於他的心縮壓極高，因此有極嚴重的高血壓，並且這是任何運動的禁\n 忌"}, "answer": "C", "explanation": "Since the role of personal trainers is not to diagnose the client, the trainer should not draw any\n conclusion such as hypertension. For any uncertainty, personal trainers should refer the client\n to the medical professionals such as the doctor.\n 私人教練的角色不是診斷疾病，教練不能給出任何諸如高血壓等疾病的結論。任何不確\n 定的因素，私人教練應該將客人轉介至醫護人員，例如醫生。", "source": "官方模擬試題"}, {"id": 14, "chapter": "2. 健康體適能評估及計劃安排", "stem": "Which of the followings regarding the assessment results are correct?\n 以下哪些關於評估的結果是正確的？\n\n I Zone 4 of the cardio zone test indicates the intensity over the lactate threshold\n 第4區的心肺訓練區代表強度已超越乳酸閾值\n II The client is not able to speak a complete sentence when exercising at zone 3\n 客人於第3區時無法說完整句子\n III The best performance of BESS test should be 60 as full marks\n BESS 平衡測試的最佳表現及分數60分作為滿分\n IV The BESS test includes balance tasks with eyes opened and closed\n BESS 平衡測試包括了開眼及閉眼的測試", "options": {"A": "I only 只有 I", "B": "III only 只有 III", "C": "I & II I 和 II", "D": "I, II & IV I, II 和 IV"}, "answer": "A", "explanation": "The cardio zone test initially includes zone 1 to 3 for the intensity below the lactate threshold\n while the client is able to speak complete sentences. When the clients progressively run with a\n higher intensity such as zone 4, it is already above the lactate threshold and since the body\n highly relies on using anaerobic energy system (lactate) and therefore, he/she is not able to\n speak complete sentence. For the BESS balance test, it includes 6 different tasks (double-leg,\n tandem, single leg) with or without balance pad whereas all tasks are performed with eyes\n closed. The more error committed during the balance tasks, the higher the score he/she will\n obtain.\n 心肺區鑑定測試開始包括第一至三低強度區，運動強度低於乳酸閾值，因此客人能說出\n 完整句子，當強度漸進至第四區時，強度超過乳酸閾值，身體大量倚靠無氧的乳酸系統\n 供能，因此客人無法說出完整句子。而BESS平衡測試，由六個不同的任務所構成（雙\n 腳，前後腳，單腳）有或沒有站於平衡墊上，所有任務都以閉眼方式進行，當客人所犯\n 的錯誤愈多，分數就會愈高。", "source": "官方模擬試題"}, {"id": 15, "chapter": "2. 健康體適能評估及計劃安排", "stem": "Which of the following testing procedures is correct?\n 以下哪個測試的流程是正確的?", "options": {"A": "1-mile run > 1RM chest press > Push-up muscle endurance test\n 1 .5 英哩跑步測試 > 1 RM 卧推 > 掌上壓肌耐力測試", "B": "Push-up muscle endurance test > 1-mile run > 1RM chest press\n 掌上壓肌耐力測試 > 1.5 英哩跑步測試 > 1RM 卧推", "C": "1RM chest press > Push-up muscle endurance test> 1-mile run\n 1RM 卧推 > 掌上壓肌耐力測試 > 1.5 英哩跑步測試", "D": "All of the above are incorrect\n 以上皆不正確"}, "answer": "C", "explanation": "Muscular power refers to a great force production over a short period of time, such as in fast\n leg kicks and explosive jumping. Muscular strength is the ability to exert maximal force in one\n single contraction, such as lifting a weight that you could lift only once. Lastly, muscular\n endurance is when less force is sustained over a longer period of time such as in push up while\n long distance running related cardio test will impose the demand on muscular endurance,\n cardio endurance and energy expenditure. Therefore, to ensure the credibility, the examiner\nshould reduce the effect of muscle fatigue on each test. The test sequence should be muscle\n power → muscular strength → muscular endurance while cardio endurance test affecting\n both muscular force output and endurance should be conducted at the end The answer\n should be C.\n 肌肉爆發力是指在短時間內產生巨大的力量，例如快速踢腿和爆發性跳躍。肌肉力量指\n 在一次收縮中發揮最大力量的能力，例如舉起一個你只能舉起一次的重物。最後，肌肉\n 耐力是指在較長時間內維持較少的力量並持續出力的能力，例如掌上壓，而長跑相關的\n 心肺測試除了有大量肌耐力和心肺耐力的需求，更消耗大量能量。每次測試將花費在能\n 量上的降序是肌肉耐力、力量和爆發力。因此，為保證測試的可信度及受測者的能量消\n 秏狀態，考官測試員應減少肌肉疲勞對每次測試的影響。測試順序應該是爆發力→肌肉\n 力量→肌肉耐力。而同時影響肌力和肌耐力的心肺測試應放於最後，因此答案應該是C。", "source": "官方模擬試題"}, {"id": 16, "chapter": "2. 健康體適能評估及計劃安排", "stem": "Which of the followings about 1.5 mile run test is correct?\n 以下哪些關於 1.5 英哩跑步測試是正確的?", "options": {"A": "The slope should be set to 1% inclination if the test operates on treadmill\n 如在跑步機上進行，應將跑步機斜度調高至 1%", "B": "The test should be conducted at indoor environment if it rains heavily or the temperature is higher\n or above 28 degree Celsius\n 若遇上大雨或炎熱天氣如攝氏 28 度以上, 教練應考慮室內進行", "C": "The test is applicable to most active people\n 適用於大部份積極活躍的健身人士", "D": "All of the above are correct\n 以上皆正確"}, "answer": "D", "explanation": "Studies have suggested that increasing the inclination of the treadmill by 1% is more similar to\n road running. Answer A is correct. When running outdoors on a slippery ground, runners are\n prone to slip and fall. Subjects who exercise in hot weather may have a chance of heatstroke.\n Considering the safety of the test, moving the test to an indoor controllable place is under\n consideration. Answer B is correct. The intensity of the 1.5 mile run is more suitable for fitness\n people who have a certain level of physical training, so answer C is also correct. Therefore, the\n answer is D, all of the above are correct.\n 有研究指出，將跑步機斜度調高1% 較為與在路面上跑步的效果相約，因此要在進行1.5\n 英哩測試時，測試員應將跑步機斜度調高至1%，答案A是正確的。地面濕滑在戶外跑步，\n 跑者容易滑倒，在炎地天氣下運動受測者或有機會中暑，考慮到測試的安全性若遇到此\n 等情況，應考慮將測試移到室內可控的環境下進行，答案B是正確的。1.5 英哩跑的強度\n 較適合有進行一定程度體能訓練的健身人士，因此答案C也是正確的。因此答案是D，\n 以上皆正確。\n私人教練專用", "source": "官方模擬試題"}, {"id": 17, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Which of the following is the correct flow of teaching for a PT session?\n 以下哪項是一節私教訓練課中正確的流程？", "options": {"A": "Warm up → Demonstration → Cool down → Teaching\n 熱身運動 →示範 → 調整運動 → 教授", "B": "Warm up → Demonstration → Teaching → Cool down\n 熱身運動 → 示範 → 教授 →調整運動", "C": "Teaching → Warm up → Demonstration → Cool down\n 教授 → 熱身運動 → 示範 →調整運動", "D": "Demonstration → Warm up → Teaching → Cool down\n 示範 → 熱身運動 → 教授 → 調整運動"}, "answer": "B", "explanation": "During the teaching process, client should start with light intensity aerobic exercises like jogging\n and biking, for 5 to 10 minutes warm-up to increase core temperature, then apply stretching\n to increase mobility. As it is safer and more effective to stretch the tissue after the body\n warmed up. After warm-up, trainers can start the teaching by exercise demonstration as it\n can give the client an idea about the movement and safety precautions. Then the trainer can\n teach and instruct the client to perform the exercise step by step in details. After all, the client\n should cool down by doing some light aerobic exercises or stretching to relieve the muscle\n soreness and joint tension.\n 在指導過程中，客人應該以 5-10 分鐘低強度有氧運動作為熱身來提高核心溫度，如：慢\n 跑、自行車再以伸展增加身體的靈活度，因為此做法能夠令伸展更有效及安全地。之後\n 教練可以開始動作示範，這能夠給客人正確的動作概念和安全注意事項。然後教練能指\n 導客人一步一步地進行動作演練。這些結束後，客人應該通過一些低強度的有氧運動或\n 伸展來緩解肌肉酸痛和關節壓力。", "source": "官方模擬試題"}, {"id": 18, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Which of the following is important and be cautious in performing the fitball crunch?\n 以下哪項是進行健身球捲腹訓練時，重要及要注意的事項？", "options": {"A": "Make sure the head can touch fitball floor whenever the client goes down\n 向下還原時，要確保頭部與健身球接觸", "B": "Make sure the whole upper back leave the fitball\n 向上發力至整個上背離開健身球", "C": "Keep the chest up throughout the training movement\n 整個訓練動作過程中應保持挺胸的穩定姿勢", "D": "The lower back should be off the fitball\n 下背要離開健身球"}, "answer": "B", "explanation": "In performing the crunch, the movement is trunk flexion and it focuses on the Rectus\n Abdominis. To ensure there is minimum or no hip joint movement, the lower back should not\n be allowed to leave the floor because Iliopsoas will be activated to produce the hip flexion\n when the lower back is off the floor. When the client moves up, the neck must be stabilized by\n the deep neck flexor by tucking the chin in. This can help reduce the stress on the cervical spine.\n When the client goes up, the whole upper back leave the fitball is the full range of motion\n which stimulate the abdominal muscles effectively. It is difficult to keep the chest up while\n performing a crunch, because the chest up movement facilitate trunk extension and scapular\n retraction which opposite to the exercise motion. Therefore, stabilizing the body at\n preparatory phase, we should focus on tucking the chin in and depressing the scapula.\n 在進行捲腹時，關節活動是軀幹屈曲，主要針對腹直肌。為了盡可能減少或避免髖關節\n 的參與，下背部不能離開地面，因為當下背部離開地面時，髂腰肌將參與產生髖屈曲的\n 動作。當客人向上卷起軀幹時，應該通過收緊深層頸屈肌，保持下顎微收，穩定頸椎，這\n 能夠幫助減小頸椎壓力。當客人向上發力時，應向上捲至整個上背離開健身球 (完整幅\n 度) ，才能夠最有效刺激腹部。在捲腹動作中，我們難以維持挺胸的姿勢，因為挺胸動\n 會促進軀幹伸展及肩帶縮回，這與捲腹動作相反，因此作身體穩定時只需留意頸椎及肩\n 帶下壓。\n Head and neck are kept neutral by tucking the chin in\n 頭頸於中立位，下顎微收，穩定頸椎", "source": "官方模擬試題"}, {"id": 19, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "If a client arches his back in performing the barbell bench press, which of the following\n actions is the best solution to this problem?\n 如客人在進行槓鈴臥推時不自覺地拱起背部，以下哪項是最好的改正問題方法？", "options": {"A": "Increase the warm up period\n 增加熱身時間", "B": "Change the standard grip to narrow grip\n 把標準手握位置改為窄握", "C": "Instruct the client to activate core muscles\n 指示客人將核心（軀幹）肌肉啟動收緊", "D": "Increase the strength of lower back muscles\n 增加下背肌肉力量"}, "answer": "C", "explanation": "The common cause of arched back in performing barbell bench press is the poor control and\n activation of core muscles especially the abdominal muscles. These muscles include\n Transversus Abdominis, Internal Obliques, External Obliques and Rectus Abdominis and they\n are important to maintain the neutral position of the lumbar spine. Performing the bench press\n without proper core activation may lead to the back arching excessively and this may end up\n the lower back pain.\n 做杠鈴平板臥推時，腰椎拱起的常見原因是核心肌肉未被啟動和控制能力較差，特別是\n 腹部肌肉。這些肌肉包括腹橫肌、腹內斜肌、腹外斜肌和腹直肌，它們對於保持腰椎的中\n 立位非常重要。在做杠鈴平板臥推時，如果沒有正確的核心穩定會導致腰椎過度拱起，\n 這還可能會導致下背疼痛。", "source": "官方模擬試題"}, {"id": 20, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Which of the following statements about barbell parallel squat is correct?\n 以下哪項有關槓鈴平行蹲舉訓練的描述是正確的？", "options": {"A": "Butt wink is unavoidable when squatting down until the thigh parallel to the ground\n 蹲至大腿與地面平行成水平，臀部眨眼的現象出現是無可避免的", "B": "The barbell should place directly on the cervical vertebrae\n 槓鈴擺放的位置應直接壓於頸椎上", "C": "Knee should never pass the toe while squatting in any range\n 膝蓋在任何蹲舉幅度都不應超越腳尖", "D": "Hyperextension should be avoided in upright position\n 蹲起時膝關節應不超伸"}, "answer": "D", "explanation": "Butt wink refers to the posterior pelvic tilt leading to the rounding of the lower back\n during the descent of squat. Repetitive loaded squats with butt wink posture may\n cause the lower back and spinal injury such as herniated disc. The causes of butt wink\n may include insufficient poor hip mobility, insufficient flexibility of the gluteal muscles,\n sub-optimal neuromuscular control and poor ankle mobility. Therefore, by correcting\n the mentioned dysfunctions, most butt wink conditions can be corrected and henc e\n option A is incorrect. When performing the squat exercise, the barbell should be\n placed on the upper trapezius muscles instead of the cervical spine. Otherwise, it will\n cause excessive stress on the cervical spine, or even the inflammation and bruising o f\n posterior neck region. Therefore, option B is incorrect. From the perspective of\n biomechanics, in order to prevent the center of gravity from shifting backwards during\n full squat, the knees will naturally go beyond the toes. In this regard, evidence from\n research for such deep squatting position leading to a higher injury risk is insufficient\n and lacking. Therefore, answer C is also incorrect. Knee hyperextension refers to the\n locking position of our knee joints whereas the patella is squeezed in the weight-\n bearing position. In this position, the loading of our body weight cannot be shared by\n muscle contraction effectively. Instead, our ligaments and meniscus will take up the\n stress, and the prolonged knee hyperextension during exercise may over -stretch\n relevant ligaments and induce meniscus degenerative changes. In long term, the knee\n stability will be deteriorated. Therefore, it is necessary to maintain our knees slightly\n bent at the end of motion to protect our knees from injuries. Therefore, only option D\n is correct.\n 臀部眨眼是指下蹲的過程中，骨盆出現後傾的現象。假如在負重狀態下，長其期重\n 複出現此骨盆的偏離就有可能對下背、脊椎帶來不良影響，例如椎間盤凸出。在訓\n 練過程，臀部眨眼的成因可以包括髖關節靈活度欠佳、臀部範圍肌肉柔韌度不足、\n 神經肌肉操控能力不足、腳踝活動度不足等。因此只要對症下藥，臀部眨眼並非無\n 可避免，答案A不正確。槓鈴擺放的位置應在上斜方肌上，如槓鈴直接壓在頸椎上會\n 造成頸部關節受壓，甚至發炎及瘀青，因此答案B不正確。從生身力學的角度分析，\n 為免身體重心向後移，在進行全幅度深蹲的動作時，膝部必然會超前腳尖。而且在\n 正確的肌肉募集次序下，並沒有足夠的研究證據指出膝蓋超前腳尖便會大大增加受\n傷的風險。因此答案C不正確。膝超伸，也就是膝蓋關節鎖死的情況，在負重的狀態\n 下膝部出現超伸會對髕骨形成擠壓，同時本應由肌肉分擔的壓力，變成只由膝關節\n 承受，長此下去地訓練會令膝部半月板磨損及韌帶受到拉扯，減低膝關節的穩定性。\n 因此在完成的位置，應保持膝部微曲。答案是D。", "source": "官方模擬試題"}, {"id": 21, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Which of the following exercises is the least effective to develop power and strength of\n smashing movement in volleyball (as shown in photo)?\n 以下哪項訓練是對強化排球扣球爆發力和力量的效果是最少的（如圖所示）？", "options": {"A": "Preacher curl 斜板彎舉", "B": "Overhead triceps extension 頸後臂屈伸", "C": "Seated row 坐姿划船", "D": "Crunch & oblique twist 捲腹及腹斜肌旋轉"}, "answer": "A", "explanation": "Spiking movement in volley ball mainly consists of elbow extension, shoulder extension and\n trunk rotation and flexion. Therefore, major muscles involved are Triceps Brachii for elbow\n extension, Latissimus Dorsi for shoulder extension and Rectus Abdominis for trunk flexion and\n the Obliques (Internal and External) for trunk rotation. According to this analysis, Preacher Curl\n exercise is least effective for improving volley ball smashing, since this exercise focuses more\n on the Biceps Brachii which is not the major agonist in the smashing movement. Overhead\n triceps extension can strengthen the Triceps Brachii, seated row can strengthen the Latissimus\n Dorsi while crunch & oblique twist focus on Rectus Abdominis and the Obliques. All these\n trainings are more specific to the major muscles of the volley ball smashing motion.\n\n 排球的扣球動作主要是包括肘伸展、肩伸展和軀幹屈曲及旋轉，因此，主要參與的肌肉\n 包括肱三頭肌（肘伸展）、背闊肌（肩伸展）、腹直肌（軀幹屈曲）、腹內外斜肌（軀幹\n 旋轉）。根據以上分析，斜板彎舉主要針對肱二頭肌，這塊肌肉不是排球扣球動作的主動\n 肌，因此對於排球扣球的動作效果最小。頸後臂屈伸能強化肱三頭肌；坐姿划船能強化\n 背闊肌；卷腹和腹斜肌轉體可以強化腹直肌和腹內外斜肌，這些訓練動作可以特別針對\n 排球扣球動作的主動肌。", "source": "官方模擬試題"}, {"id": 22, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Dumbbell Chest Press and Cable Chest Fly are exercises targeting the pectoralis major\n muscles. If your client would like to focus more on the upper chest, what kind of adjustment\n should be made to meet your client’s expectation.\n 啞鈴平板卧推及鋼線飛鳥動作同樣是針對胸大肌的訓練動作，如果客人想要針對胸大肌\n 上束進行訓練，動作上應作怎樣的調整以配合客人的要求？", "options": {"A": "The impact of dumbbells or handles can help facilitate more upper chest muscle fiber involve\n 啞鈴或手握的撞擊可幫助刺激更多胸肌纖維參與，間接令上束肌肉參與增加", "B": "For dumbbell chest fly exercise, the bench has to be adjusted into incline position. For cable\n chest fly, the handle has to be adjusted to a low position.\n 啞鈴平板卧推動作需要將長椅調教至上斜；鋼線飛鳥動作需要將手柄調教至由下而上取出", "C": "For dumbbell chest fly exercise, the bench has to be adjusted into decline position. For cable\n chest fly, the handle has to be adjusted to a high position.\n 啞鈴平板卧推動作需要將長椅調教至下斜；鋼線飛鳥動作需要將手柄調教至由上而下取出", "D": "Only A and B are correct\n 只有 A 和 B 是正確的"}, "answer": "B", "explanation": "Pectoralis major is a large muscle in fan-\n shape (convergent). It attach on the\n sternum, ribs, clavicle, and humerus. The\n pectoralis major itself is comprised of two\n heads, i.e. sternocostal head and clavicular\n head, which jointly attach to the humerus.\n The upper chest is known as the clavicular\n head. It is the upper portion of the pec\n major originates at the clavicle. The\n muscle architecture of the clavicle head\n muscle fibre allows more stimulation while\n performing an shoulder adduction in a\n bottom-up approach. Therefore answer B\n is correct.\n 胸大肌從解剖學上呈扇狀。它附在胸骨、\n肋骨、鎖骨和肱骨上。胸大肌由兩個頭組成，即胸骨頭和鎖骨頭，它們共同以肱骨作為\n 止點。胸大肌上鎖骨頭肌肉的起點是在鎖骨，由於肌肉纖維的物理排列，因此從身體下\n 而上的肩關節內收對胸大肌上束有更高的刺激，所以答案是B。", "source": "官方模擬試題"}, {"id": 23, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Which of the following is/are the benefit(s) for using small training props: exercise ball and\n balance disc in personal training sessions?\n 以下哪項／些是在私教課訓練使用小工具：健身球和平衡墊的好處？\n\n I Increase the training variations and fun\n 增加訓練變化，提高會員訓練興趣\n II Increase the difficulty of training\n 增加訓練難度\n III Enhance the stability and functional training effects\n 增加穩定性及功能性訓練效果\n IV Help client to increase muscle mass effectively\n 幫助會員有效的增加肌肉", "options": {"A": "I, II & III I, II 和 III", "B": "I, II & IV I, II 和 IV", "C": "I, III & IV I, III 和 IV", "D": "All of above 以上皆是"}, "answer": "A", "explanation": "Using props in a personal training session can increase the training variations and difficulty. It\n can also make the training more functional and interesting. For body building, however it\n cannot help the client increase muscle mass effectively.\n 私教課中使用小工具能幫助我們增加訓練的變化、難度，提高身體的穩定性，使訓練更\n 加功能化、更有趣味性，但是小工具並不能有效的幫助會員增加肌肉達到健美的效果。", "source": "官方模擬試題"}, {"id": 24, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Which of the following descriptions of fitball back extension is wrong？\n 下列哪項有關健身球背伸展訓練的描述是錯誤的？", "options": {"A": "Stabilize the feet by the wall and place the fitball at the lower abdominal and pelvis region\n 將腳穩定在牆腳下方，健身球置於下腹骨盆位置", "B": "Keeping the back straight during exercise can activate the erector spinae more\n effectively\n 做這個動作時背部需保持挺直，以更有效刺激豎棘肌", "C": "In order to avoid the hyperextension of knee, we should bend knees slightly during\n exercise\n 做這個動作時膝關節應保持微微彎曲，以避免膝關節超伸", "D": "Putting hands behind the head rather than on the chest during exercise will make the\n exercise more difficult\n 運動時把雙手放在頭後比雙手放於胸前會增加訓練難度"}, "answer": "B", "explanation": "To adjust the pad of the Roman chair to align with the ASIS of clients can decrease the\n movement of pelvis and hip joint. When we keep the back straight during the exercise, the\n movement is mainly initiated by hip extension while the trunk is staying still. Therefore, Erector\n Spinae is under isometric contraction against the body weight. The training focus is not as\n significant as if the body is curling up and down. For the safety reason, it is suggested to bend\n the knee slightly during exercise to avoid the hypertension of knee joints. To put the hands\n behind the head during the exercise can increase the lever arm. And therefore it is more\n difficult than that hand on the chest.\n 羅馬椅的固定擋板調整到與訓練者的髂前上棘齊平可以穩定骨盆，減少髖關節的活動；\n 做羅馬椅背伸展時如果背部保持挺直，那動作就主要通過髖伸展來帶動,而軀幹卻保持靜\n 止，因此豎棘肌只是在做等長收縮對抗身體重量，所以對豎棘肌的強化不如把身體往下\n 和往上卷時明顯；同時為了安全性的原因，膝關節保持微微彎曲可以避免運動中關節超\n 伸；而手放於頭後比手放於胸前的阻力力臂大，因此難度有所增加。", "source": "官方模擬試題"}, {"id": 25, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Which of the following description about the use of exercise ball is correct?\n 以下哪項關於健身球使用的說法是正確的？", "options": {"A": "The exercise ball should be placed under the scapulae of client during crunch\n 在做健身球上捲腹時，健身球應該放在練習者的肩胛骨下面", "B": "The difficulty of exercise can be increased by putting the feet together during crunch\n 在健身球上捲腹時，可以通過將兩腳併攏來增加動作難度", "C": "The size of exercise ball is not important to client\n 健身球的尺碼對於客人來說不重要", "D": "The exercise ball should be placed under the client’s lumbar spine during dumbbell elbow\n extension on exercise ball\n 在健身球上啞鈴臂屈伸時，健身球應該放在練習者的腰椎下面"}, "answer": "B", "explanation": "During crunch on exercise ball, placing the exercise ball under the client’s scapular will limit the\n ROM of trunk flexion. The ball should be placed under the lumbar. For the same exercise,\n putting the feet together can decrease the base of support. So the exercise will become more\n difficult to keep the balance in performing the crunch. We should choose the appropriate size\n of the ball according to the height of the client so that the proper posture and exercise\n technique can be achieved. If we put the exercise ball under the lumbar spine of the client\n during dumbbell fly on exercise ball, the neck muscles will tense up without the support of the\n ball.\n 答案：B –在健身球上進行卷腹時，健身球放在練習者的肩胛骨下面會影響軀幹屈曲的幅\n 度，因此球應該放在腰椎下面；在健身球上卷腹時，兩腳併攏這樣減小了基礎支援面積，\n 身體需要控制平衡，動作難度增加了；健身球是分大小的，要根據不同的人或不同的訓\n 練目的選擇不同大小的健身球，讓客人達到正確的姿勢和技巧；在做健身球上啞鈴飛鳥\n 時，如果健身球放於腰椎下面，頭部懸空會讓頸部肌肉容易緊張。", "source": "官方模擬試題"}, {"id": 26, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Which of the following exercises is the worst choice for a novice client?\n 以下哪一個動作對初學者會員是最不適合的選擇？", "options": {"A": "Dumbbell chest press on the exercise ball\n 健身球啞鈴臥推", "B": "Elastic band lateral raise\n 橡皮帶側平舉", "C": "Exercise ball squat (ball on wall)\n 健身球蹲舉 (球置於牆上)", "D": "Elastic band triceps extension\n 橡皮帶頸後臂屈伸"}, "answer": "A", "explanation": "To determine the difficulty of exercise for the beginner, stability and coordination are key\n criteria to concern apart from the resistance. Elastic band lateral raise and triceps extension\n can be performed in either standing or sitting position which are pretty stable. Exercise ball\n squat allows clients leaning on their back so that the exercise ball provide extra stability to the\n client. Therefore option B, C and D are exercise that can be done by novice. For option A, as\n dumbbell chest press is already a difficult exercise for the beginner because of the high demand\n on coordination. The exercise ball will provide the extra instability to the client and therefore,\n it is too difficult for most novices.\n 要決定初學者訓練動作的難度，除了阻力的大小之外，穩定性和協調性是一個關鍵的條\n 件，橡皮帶側平舉和頸後臂屈伸都可以在站姿或坐姿完成，這相對來說是比較穩定的。\n 健身球蹲舉允許客人背靠球而健身球可以提供額外的穩定性，所以選項 B,C 和 D 都是可\n 以做的。對於選項 A 來說，啞鈴本身己經需要高度的協調性，難度己經不少，加上健身\n 球會提供額外的不穩定，所以這個動作是對初學者是最難以接受的。", "source": "官方模擬試題"}, {"id": 27, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "To increase the challenge and difficulty of push-up, which of the following approaches is\n incorrect?\n 要增加掌上壓訓練的難度和挑戰性，以下哪一項是不正確的？", "options": {"A": "Raise up one leg to increase the demand of core stabilization\n 抬起一條腿以增加對軀幹穩定性的要求", "B": "Push-up with knees on the floor to increase the demand of control\n 採用膝蓋跪地的方式做掌上壓以增加控制上的要求", "C": "Push-up with feet on exercise ball to increase the challenge of balance\n 雙腳放在健身球上以增加平衡能力的要求", "D": "Push-up with hands on exercise ball\n 雙手放在健身球上做掌上壓"}, "answer": "B", "explanation": "Lifting one leg during the exercise of push-up, the base of support is decreased and the exercise\n become more difficult. For push-up with the knees on mat, the lever arm is decreased, so the\n exercise becomes easier. Whether Push-up with feet on exercise ball or hands on the ball, it\n can increase the challenge of balance and the level of difficulty of the movement.\n 做掌上壓抬起一隻腿時，基礎支持面積減小，動作難度增加；膝蓋跪在地上做掌上壓身\n 體重力力臂減小了，動作難度反而降低；腳放在健身球上做掌上壓或手放於健身球上都\n 是減小了基礎支持面積，增加了不穩定性，動作難度都有所提高。", "source": "官方模擬試題"}, {"id": 28, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Which of the following exercise(s) can train the rotator cuff muscles effectively?\n 下列哪些動作可以有效地訓練到肩袖肌群？\n\n I Standing dumbbell shoulder external rotation (humerus close to the trunk)\n 站姿啞鈴肩外旋 (肱骨緊靠軀幹)\n II Side lying dumbbell shoulder external rotation 側臥啞鈴肩外旋\n III Cable shoulder internal rotation 鋼線肩內旋\n IV Elastic band internal and external rotation 橡皮帶肩內旋和外旋", "options": {"A": "I, II & III I, II 和 III", "B": "I, II & IV I, II 和 IV", "C": "II, III & IV II, III 和 IV", "D": "II & III II 和 III"}, "answer": "C", "explanation": "The direction of force is perpendicular to the path of movement during the exercise of standing\n dumbbell shoulder external rotation, therefore it is not able to train the shoulder external\n rotator effectively. But side lying dumbbell shoulder external rotation on the other hand allows\n the proper resistance direction to the target muscles and both cable and elastic band provides\n versatile resistance direction so that the movement can always be resisted effectively.\n 站姿啞鈴肩外旋這個練習由於阻力方向與動作路線垂直成 90 度，沒有在相反方向，所以\n 不能有效地訓練肩袖肌群中的外旋肌群；側臥啞鈴肩外旋能卻能夠允許正確的阻力方向\n 訓練目標肌肉，訓練到肩袖肌群中的外旋肌群；鋼線和橡皮帶都能夠提供變化多端的阻\n 力方向，因此所訓練的動作都可以得到良好的阻力。", "source": "官方模擬試題"}, {"id": 29, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Which of the following about the benefit of passive stretching is incorrect?\n 以下哪項有關於被動伸展的益處是不正確的？", "options": {"A": "To increase flexibility\n 增加柔韌度", "B": "To prevent the muscle tightness after weight training\n 預防力量訓練後肌肉繃緊", "C": "As a one-to-one service to client\n 作為對客人的一種貼身的服務", "D": "To promote the rapid growth of muscle fibers\n 促進肌纖維的快速增長"}, "answer": "D", "explanation": "Passive stretching is a one on one services provide by trainer. It is part of the relaxation\n method put into warm-up session in promoting flexibility and mobility to reduce risk of\n injury during training. The muscle tension can be normalized such that trained muscles will\n not get tight easily. However, there is no evidence that passive stretching can facilitate the\n rapid growth of muscle fibers and effective muscle building process.\n 被動伸展放鬆的方法，通常加入到熱身運動中的其中一環以增加柔韌度及靈活度預防受\n 傷，肌肉的張力也可以得到良好的調整使到肌肉不容易變緊張，但是目前沒有證明指出\n 被動伸展能夠有效加快肌肉纖維的快速生長以及對健美有效的反應。", "source": "官方模擬試題"}, {"id": 30, "chapter": "3. 抗阻力訓練原則及實踐", "stem": "Which of the following descriptions about dumbbell bent over fly is correct?\n 以下哪項有關啞鈴俯身飛鳥的訓練要點描述是正確的?", "options": {"A": "The target muscle of this training is middle deltoid\n 動作主要訓練的肌肉是三角肌中束", "B": "The movement should use posterior deltoid to raise the arm upward and above the shoulder level\n 動作應以三角肌後束發力向上至手臂高於肩關節", "C": "The bent movement should use the hip as axis and the back should be straight\n 俯身動作應以髖部作軸心，腰背挺直", "D": "All of the above are incorrect\n 以上皆不正確"}, "answer": "C", "explanation": "The contraction of middle deltoid can produce shoulder abduction movement, but\n dumbbell bent over fly is mainly move along the horizontal plane, so it cannot train the\n middle deltoid effectively. On the contrary, when the posterior deltoid contracted, it can\n produce horizontal abduction, so it is better to train the posterior deltoid. Answer A is\n incorrect. For answer B, although the training movement target the posterior deltoid, the\n range of motion should control within 90 degree of shoulder abduction (arms parallel to\n the ground) to reduce the pressure on the ligaments at the front of the shoulder.\n Therefore, answer B is incorrect. When performing bent over movement, the back will act\n as a lever arm to withstand the pressure of the body and the weight, so the core muscles\n should be tightened in order to keep the back straight. Movements such as round back or\n lordotic back will exert pressure on the lower back in a bad posture, leading to overuse\n injuries.\n 三角肌中束收縮時能夠產生肩外展的動作，而啞鈴俯身飛鳥的動作主要是沿水平面活動，\n 因此未能有效訓練三角肌中束。相反，三角肌後束收縮時能夠產生水平外展的動作，因\n 此較能訓練三角肌後束，答案A是不正確的。答案B，動作以三角肌後束發力是正確的，\n 但動作幅度應向上至肩外展90度 (手臂與地面平行)，以此來減少因肩關節推前，肩部前\n 方的韌帶承受的壓力，因此答案不正確。進行俯身動作時，腰背部分會作為力臂承受包\n 括身體及負重的壓力，因此應收緊核心肌群，保持腰背挺直。圓背或腰曲等的動作都會\n 令下背在不良姿勢下受壓，導致其他勞損傷病。", "source": "官方模擬試題"}, {"id": 31, "chapter": "4. 訓練原則和方案設計", "stem": "Training program for muscle hypertrophy should be _________\n 肌肉增大的訓練方案應該是 ____________", "options": {"A": "1-6 repetition maximum per set with heavy weight\n 用較重重量，每組 1-6 RM", "B": "6-12 repetition maximum per set with medium weight\n 用中等重量，每組 6-12 RM", "C": "More than 12 repetition maximum per set with light weight\n 用輕重量，每組 12 RM", "D": "8-12 repetition maximum per set with light weight\n 用輕重量，每組 8-12 RM"}, "answer": "B", "explanation": "For muscle hypertrophy, the training program should use medium weight so that the\n repetitions maximum (RM) is 6-12. Heavy weight with 1-6RM is targeting on muscle strength\n more than hypertrophy. However, light weight with more than 12 RM trains the muscle\n endurance. Light weight with repetitions 8-12 is not the effective training for muscle\n hypertrophy as well. Thus answer B is correct.\n答案：B－肌肉肥大的訓練方案應該使用中等重量，最大重複次數為 6-12。最大重複次數\n 1-6 的大重量方案是以增加肌力為主，最大重複次數 8-12 的輕重量方案是以提高肌肉耐\n 力為主，不能增加肌肉圍度。因此，B 是正確的。", "source": "官方模擬試題"}, {"id": 32, "chapter": "4. 訓練原則和方案設計", "stem": "Which of the following about beginners is incorrect?\n 關於初學者的訓練，以下哪項說法是不正確的？", "options": {"A": "Including all major muscles (prevent muscle imbalance)\n 訓練應包括所有大肌肉（預防肌肉不平衡）", "B": "Use five to six sets for each exercise and put more emphasis on stability\n 每項訓練動作 5-6 組，同時將重點放在穩定性上", "C": "Do not train the same muscle group on consecutive days\n 不要連續兩天訓練同一組肌肉", "D": "Do not use Pre-exhaustion technique\n 不要採用預先疲勞訓練法"}, "answer": "B", "explanation": "For beginners, trainers should train all major muscles of the clients to prevent muscle\n imbalance. To avoid overtraining by giving sufficient recovery period, trainers should not train\n the same muscle group on consecutive day and there should be no more than 3 sets for each\n exercise. In addition, advance training methods with high intensity and physical demand should\n be avoided. Pre-exhaustion training is a physical demanding and advanced training technique.\n And therefore it is not recommended for beginners as well.\n 對於初學者，教練應該訓練客人所有主要的肌肉防止肌肉不平衡。為了避免過度訓練，\n 要有足夠的恢復時間，教練不應該連續兩天訓練同一肌群，每個動作訓練時不應超過三\n 組。另外，強度較高，對體能要求很高的高級訓練技巧，應該避免給初學者使用。預先疲\n 勞法對體能要求較高，屬於高級訓練技巧，所以不適合初學者。", "source": "官方模擬試題"}, {"id": 33, "chapter": "4. 訓練原則和方案設計", "stem": "Which of the followings is/are not super set training method?\n 以下哪項／些不是超級組訓練法？\n\n I Dumbbell overhead triceps extension followed by cable press down\n 啞鈴頸後臂屈伸，然後鋼線下壓\n II Dumbbell shoulder press followed by lat pull down\n 啞鈴肩上推舉，然後頸前下拉\n III Bench press followed by 5 minutes fast run\n 臥推舉，然後 5 分鐘快跑\n IV 10-15 sets of consecutive exercises targeting different muscle groups\n 10-15 組連續不同的訓練動作，針對不同的肌肉群", "options": {"A": "I & II I 和 II", "B": "II & III II 和 III", "C": "III & IV III 和 IV", "D": "All of above 以上皆是"}, "answer": "C", "explanation": "Super Set training method typically combines 2 different exercises and there is no rest in\n between. There are 2 types of combination. One is combining 2 exercises for antagonistic\n muscles. Option II is an example that dumbbell shoulder press targets the Middle Deltoid for\n shoulder abduction while lat pull down targets the Latissimus Dorsi by shoulder adduction. The\n muscles are antagonistic because they produce opposite joint movement. Another type of\n Super Set training is combining 2 exercises targeting the same muscle group. Option I is an\n example that both overhead triceps extension and cable press down can target on Triceps\n Brachii. However, option III and IV do not fulfill the Super Set training criteria and therefore\n they are invalid.\n 超級組訓練法是兩個不同的動作組合在一起，動作之間沒有休息。超級組有兩個不同的\n 組合，超級組 1 是兩個動作訓練的目標肌肉構成拮抗肌群。選項 II：啞鈴肩上推舉，通過\n 肩外展訓練三角肌中束；頸前下拉，通過肩內收訓練背闊肌；由於關節活動相反，目標肌\n 肉是一對拮抗肌群。超級組 2 是兩個動作訓練的目標肌肉是同一肌群。選項 I：頸後臂屈\n 伸和鋼線下壓都是訓練肱三頭肌的。選項 III 和 IV 它們不符合超級組的標準。", "source": "官方模擬試題"}, {"id": 34, "chapter": "4. 訓練原則和方案設計", "stem": "Which of the following about “Pyramid Training” are correct?\n 以下哪項／些說法關於“金字塔訓練法”是正確的？\n\n I Weight is decreasing and reps are increasing\n 重量減少而次數同時增加\n II Weight is increasing and reps are decreasing\n 重量增加而次數同時減少\n III It is good for beginners\n 這是對初學者很好的訓練法\n IV Integrate ascending and descending as double-pyramid pattern\n 綜合遞增和遞減方法，組成雙金字塔訓練法", "options": {"A": "I, II & III I, II 和 III", "B": "I, II & IV I, II 和 IV", "C": "I, III & IV I, III 和 IV", "D": "All of above 以上皆是"}, "answer": "B", "explanation": "There are 2 types of Pyramid Trainings, ascending pyramid and descending pyramid. In\n ascending pyramid, weight is increasing while reps are decreasing. In descending pyramid,\n weight is decreasing and reps are increasing. The double pyramid load pattern will combine the\n ascending and descending by increasing the load from bottom up for the first few sets and\n decreasing it again to the initial level in the later few sets of training. However, the Pyramid\n Training method is a kind of advanced training skills. It is very demanding, exhaustive and no\n good for beginners. Therefore, option III is incorrect.\n 金字塔有兩種形式，遞增金字塔和遞減金字塔。遞增組，重量增加次數減少；遞減組，重\n 量減少次數增加。雙金字塔是遞增組和遞減組結合在一起，重量從開始組逐漸增加，然\n後在最後幾組逐漸減少到開始的重量。但是，金字塔訓練法屬於高級訓練技巧，它對體\n 能要求高、造成力竭，不適合初學者。因此選項 III 不正確。", "source": "官方模擬試題"}, {"id": 35, "chapter": "4. 訓練原則和方案設計", "stem": "Which of the following sign-and-symptom(s) is/are correct regarding overtraining?\n 關於過度訓練的徵狀，以下哪項／些是正確的？\n\n I Decreased performance 運動水平下降\n II Muscle soreness 肌肉酸痛\n III Resting heart rate significantly increased 靜態心率顯著上升\n IV Early fatigue 提早疲勞", "options": {"A": "II & IV II 和 IV", "B": "I, II & III I, II 和 III", "C": "I, II & IV I, II 和 IV", "D": "All of above 以上皆是"}, "answer": "D", "explanation": "The signs of overtraining include the performance drop, muscle soreness, fatigue,\n prolonged recovery time, loss of sleep, heart rate is much higher and no interest in activities.\n Physiologically, the overtrained client may have elevated resting heart rate and blood\n pressure, body aches and pains, allergic reaction, body weight loss and occasional\n nausea. Therefore all above options are sign- and symptoms of overtraining, the\n answer is D\n 過勞的症狀包括運動表現下降、肌肉酸痛、疲勞、恢復時間過長、失眠和對運動缺乏興\n 趣。生理方面，過勞的客人靜態心率和血壓會升高、身體酸痛和疼痛、過敏反應、體重減\n 輕、偶爾噁心。因此題目中的所有選項都屬於過度訓練的徵狀，答案D 是正確的。", "source": "官方模擬試題"}, {"id": 36, "chapter": "4. 訓練原則和方案設計", "stem": "Which of the following resistance training guidelines is correct?\n 以下哪項阻力訓練指引是正確的？", "options": {"A": "To improve muscle strength effectively, we should perform exercise in 4 repetitions\n of 90% of maximum resistance for 1 set. Resting period between sets is about 3\n minutes. Once per week\n 要有效增加肌力，訓練動作只作 1 組，每組 4 次，重量為最大阻力之 90%，組與\n 組之間休息 3 分鐘，每週訓練 1 次", "B": "To improve muscle endurance effectively, we should perform exercise in 20\n repetitions of 50% of maximum resistance for 2 sets. Resting period between sets is\n about 30 seconds. 3 times per week\n 要有效改善肌耐力，訓練動作應作 2 組，每組 20 次，重量為最大阻力之 50%，\n 組與組之間休息 30 秒，每週訓練 3 次", "C": "To improve muscle hypertrophy effectively, we should perform exercise in 10 repetitions of 75%\n of maximum resistance for 4 sets. Resting period between sets should be about 4\n minutes. 5 times per week\n 要有效肌肉增大，訓練動作應作 4 組，每組 10 次，重量為最大阻力之 75%，組\n 與組之間休息 4 分鐘，每週訓練 5 次", "D": "To improve muscle power effectively, we should perform exercise in 18\n repetitions of 90% of maximum resistance for 3 sets. Resting period between sets\n should be about 5 minutes. 3 times per week\n 要有效改善肌肉爆發力，訓練動作應作 3 組，每組 18 次，重量為最大阻力之\n 90%，組與組之間休息 5 分鐘，每週訓練 3 次"}, "answer": "B", "explanation": "According to resistance guideline in the course manual as shown below, only option B can\n fulfill all the criteria\n Intensity Reps Set Rest Frequency\n Muscle Strength >85% 6 or less 2-6 2-5 min 4-6 / wk\n Muscle Endurance <67% 12 or more 2-3 30s or less 2-3 / wk\n Muscle Hypertrophy 67-85% 6-12 3-6 30-90s 4-6 / wk\n Muscle Power 30-90% 3-5 3-5 2-5 min\n Option A, the number of set and frequency is not enough. For option C, the resting period is\n too long. For option D, the number of repetition is too much.\n\n 根據課本中的關於抗阻力訓練指引，只有選項 B 滿足標準\n 強度 次數 組 組間間歇 頻率\n 肌肉力量 >85% ≤6 2-6 2-5 分鐘 4-6 次 / 周\n 肌肉耐力 <67% ≥12 2-3 ≤30 秒 2-3 次 / 周\n 肌肉肥大 67-85% 6-12 3-6 30-90 秒 4-6 次 / 周\n 爆發力 30-90% 3-5 3-5 2-5 分鐘\n 選項 A，組數和頻率不夠；選項 C，間歇時間太長；選項 D，重複次數太多。", "source": "官方模擬試題"}, {"id": 37, "chapter": "4. 訓練原則和方案設計", "stem": "According to the AFT Enhancement System, which of the following populations is more suitable\n for using YELLOW level related training?\n 根據 AFT 優化系統，黃色級別之訓練內容較適合哪類人士?", "options": {"A": "Active individuals or amateurs\n 積極健康人士或業餘運動員", "B": "Elite or professional athletes\n 專業運動選手", "C": "Deconditioned or dysfunctional\n 失調或體弱人士", "D": "Trained athletes\n 有受訓練經驗的運動員"}, "answer": "A", "explanation": "Exercise recommendations for yellow class including maintain and improving\n comprehensive fitness level continuously; start training with exercises require higher level\n of skill, difficulty and complexity; enhance functional strength, optimize motor program and\n neuromuscular performance; implement high intensity training using aerobic and anaerobic\n metabolism; set relatively clear training goals for muscle strength or hypertrophy. To\n achieve these training contents, client should have a certain understand of physical fitness\n or fitness training which have been trained for a longer period of time. Therefore, people\n with dysfunction or deconditioned individuals can be ruled out. Professional athletes or\n athletes with training experience need more systematic and periodic training for special\nsports and sports-related training or tactical-related special training. Therefore, the training\n content of the yellow level is more suitable for active and healthy people or amateur\n athletes. The answer is A.\n 黃色級別的訓練內容包括維持及持續改善整體體適能水平、學習技巧，難度及複雜性\n 較高的訓練動作、強化功能力量，優化運動程式及神經肌肉控制能力、善用有氧及無\n 氧系統進行高強度的訓練、設立較明確的肌力或肌肥大之相關訓練目標。要完成以上\n 的訓練內容，客人應對體適能或健身訓練有一定的認識或持續訓練較長的時間，因此\n 可以排除失調或體弱的人士。而專業運動選手或有受訓練經驗的運動員則需要更有系\n 統的週期化訓練，針對專項運動及競技相關的訓練或戰術相關的專門訓練。因此黃色\n 級別之訓練內容較適合積極健康人士或業餘運動員，因此答案是A。", "source": "官方模擬試題"}, {"id": 38, "chapter": "4. 訓練原則和方案設計", "stem": "Which of the following lower limb training suitable for client who does not have training experience\n and has lower back injury and anterior pelvic tilt (blue level) ?\n 以下哪項下肢訓練適合沒有訓練經驗，背部有傷患及骨盆前傾人士 (藍級) 進行訓練?", "options": {"A": "Barbell squat 槓鈴蹲舉", "B": "Kettle bell swing 壺鈴擺蘯", "C": "Machine seated leg curl 器械坐姿腿彎舉", "D": "Stiff leg deadlift 直腿硬拉"}, "answer": "C", "explanation": "The barbell squat training need client to carry the barbell on their back and move up and\n down vertically. Multiple joints are working simultaneously. The action requires a certain\n degree of neuromuscular control. Moreover, the vertical compressive force placed on the\n lumbar spine is very large in performing this exercise. Kettlebell swings and stiff leg\n deadlifts consist of forward leaning motion, which puts pressure on the lower back. If the\n client is troubled by back injuries or poor alignment, they should avoid these relatively high\n risk activities. The client described in the question has no training experience and therefor e\n poor neuromuscular control is expected. In addition, this client has back injuries and\n anterior pelvic tilt, so it is more suitable to start training with simple movements like\n machine seated leg curl. The answer is C.\n 槓鈴蹲舉動作要求客人揹負槓鈴，在控制重心不會偏移的情況下垂直上落，涉及多個\n 關節同時運作，動作要求客人對神經肌肉操控有一定程度的控制，而重量垂直向下壓\n 對下背會構 成巨大壓力。壺鈴擺蘯及直腿硬拉的動作包含俯身向前的動作，對下背形\n 成較大的壓力，如客人受背部傷患問題困擾或姿勢排列不良，應避免進行此等較高風\n 險的訓練動作。題目中描述的客人沒有訓練經驗，因此在神經肌肉操控上較差，而且，\n 此客人的背部有傷患及骨盆前傾問題，較適合以簡單的動作開始進行訓練。因此，器\n 械坐姿腿彎舉最適合此客人進行訓練，答案是C。", "source": "官方模擬試題"}, {"id": 39, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "The relationship between the personal trainer and their clients can be BEST described as:\n 私人教練和客人之間關係的最佳描述是：", "options": {"A": "Friends 朋友", "B": "Teacher and student 老師與學員", "C": "Trainer is a good listener 教練是一位好的聆聽者", "D": "All of above 以上皆是"}, "answer": "D", "explanation": "The relationship between trainers and members should have different aspects. They are\n teacher and student, friends and even trainer is the listener. Because of the mutual trust,\n sometimes clients tend to tell the trainers their personal affairs. Therefore all of the answers\n are correct.\n 教練與會員之間的關係應該是多方面的，既是老師與學生，又屬於較為親近的朋友關係，\n 甚至也是一位好的聆聽者。很多會員偏向于向自己的教練吐露心裏話，可以說體現出對\n 於教練的一種特殊的信任。所以所有答案都正確。", "source": "官方模擬試題"}, {"id": 40, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "Which of the following is the advantage(s) for a personal trainer starting his career in a\n health club?\n 以下哪項屬於私人教練投身健身俱樂部作為事業起點的好處？", "options": {"A": "Being able to learn to handle different kinds of exercise equipment properly because\n of the well-equipped gym settings\n 因為有良好的健身室設備配合，其何學習正確地使用不同種類的健身設備", "B": "With a readily available and potentially expanding client pool\n 有一定數量並且可能增長的會員量", "C": "Easily consult other more experienced trainers who know well about this business\n 能更方便地請教其他更具行業經驗的教練", "D": "All of above\n 以上皆是"}, "answer": "D", "explanation": "Health club is a good starting point for a personal trainer career since there is an available client\n pool and may even increasing. It is a good source of clients. In addition, trainers just starting\n their career can better learn and handle exercise equipment by accessing to training tools in a\n health club. Finally, meeting with experienced trainers who knows the business well in the\n health club is definitely another advantage to learn more about the business.\n 私人教練的起步點往往是從健身俱樂部開始的，主要的原因是一定數量的會員作為基礎，\n 而且這個數目可能不斷增加，這些都是教練獲得新會員的主要來源。當然，眾多的器械\n 使新入行的教練更好的掌握器械的使用。而且，俱樂部的資深教練通常具備相當的經驗，\n 可以使新入行的教練獲益良多。", "source": "官方模擬試題"}, {"id": 41, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "Attributes of a successful trainer should include:\n 一位成功教練應具備的特質：", "options": {"A": "Knowing your legal responsibilities 明白你的法律責任", "B": "Setting entire portrait of a fitness professional 樹立一個體適能專業形象", "C": "Having professional qualifications 擁有專業資格", "D": "All of above 以上皆是"}, "answer": "D", "explanation": "A successful trainer must have professional qualifications, good image and communication\n skills. Even understanding the professional liability can protect both trainer himself/herself and\n the client, there is still a chance to be involved in legal issue. Thus knowing your legal\n responsibilities is essential for a successful trainer.\n 一位成功的私人教練通常需要具備多種條件，包括專業的知識、良好的形象、相當的溝\n 通能力等。當然成功的教練起碼要先具備專業、認可的資格。因為現在的私教面對的會\n 員情況越來越複雜，就算非常小心，也有可能會因犯錯牽扯到法律上的問題。所以，瞭解\n 教練的法律責任顯得格外的重要。", "source": "官方模擬試題"}, {"id": 42, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "As a personal trainer who wants to achieve successful personal trainer’s business, building\n a good rapport with his clients is essential. “Rapport” is best defined as:\n 作為一位私人教練，想取得成功的私教事業，與客人建立一個融洽和諧的合作關係是\n 很重要的。融洽和諧的關係（Rapport）的最佳描述應是：", "options": {"A": "Building a relationship of empathy 建立感情的關係", "B": "Building a relationship of warmth 建立融洽的關係", "C": "Building a relationship of sincerity 建立真誠的關係", "D": "Building a relationship of mutual trust 建立相互信任的關係"}, "answer": "D", "explanation": "Rapport is building upon mutual trust. Mutual trust is the first step to build up further\n relationship or friendship. Mutual trust includes empathy, warmth and sincerity. Thus building\n a relationship of mutual trust is most appropriate.\n 融洽和諧的關係主要是建立在互信的基礎上。人與人之間有了互信，才有更進一步的友\n 好關係。互信包括感情、融洽和真誠。", "source": "官方模擬試題"}, {"id": 43, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "If your client Mr. Ho got a serious knee pain, what kind of professionals should you refer him\n to visit?\n 如果你的會員何先生患有嚴重膝蓋痛，你應該將他轉介到哪一類的專業人士？", "options": {"A": "Medical professionals such as medical doctor or physiotherapist\n 專業醫護人士如醫生或物理治療師", "B": "Radiographer\n 放射治療師", "C": "Other experienced trainers who understand about sports injury\n 對運動損傷有認識的教練", "D": "Club manager\n 俱樂部經理"}, "answer": "A", "explanation": "It is the role of personal trainers to design a training program for clients. It is out of the scope\n of personal trainers to provide rehabilitation program for clients with serious pain and medical\n problems. Under such circumstances, trainers should refer the clients to medical professionals\n for diagnosis and suitable therapy such as serious knee pain mentioned in this case. Thus Mr.\n Ho should be referred to a medical doctor or physiotherapist.\n 根據轉介的原則，教練的責任是根據會員的情況與目標制定運動計畫。教練的專業資格\n 不包括為一些患有較為嚴重病痛的會員提供康復訓練計畫，這些都應該轉介給相關的專\n 業人士，才能對症下藥，不至於耽誤了病情。膝蓋痛屬於常見的病痛，應當交給醫生或物\n 理治療師作醫療方面的治療。", "source": "官方模擬試題"}, {"id": 44, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "Which of the following is incorrect when presenting to a client about personal training\n package?\n 向一位會員解釋私人教練的服務時，以下哪一項並不合適？", "options": {"A": "Describe how personal trainer can help client to reach the target\n 解釋私人教練如何幫助會員達到目標", "B": "Explain how to avoid unnecessary injuries with the guidance of a PT\n 講解在教練的指導下客人如何避免不必要的受傷", "C": "Describe how a PT will follow up training progress\n 解釋教練將如何跟進訓練計劃", "D": "Discuss the prices of services first\n 先討論私人教練的服務價格"}, "answer": "D", "explanation": "To sell a service properly, personal trainers should establish rapport with clients and\n understand their goals and needs, such as weight reduction or building muscles. Then\n formulate a suitable training program. Also, trainers should remind the client that training with\n a personal trainer can avoid injuries due to improper training. Trainers can help clients to\n achieve their goals by providing suitable training program and regular assessments of progress.\n In conclusion, the major part of selling service is communication but not the price. Talking about\n the price should be the last process after understanding the clients’ needs.\n 根據銷售的正確程式，教練一般先通過詢問和溝通瞭解會員的健身目標，例如減肥或增\n 肌，然後制定一份針對性的運動處方。並且提醒會員，有私人教練在旁可以最大限度避\n 免由不適當訓練造成的受傷。一個計畫的執行後，需要替會員再次測試，評估訓練效果。\n 所有以上這些，都是在銷售過程中首要進行溝通的，而不是價格。價格應該在明白客人\n 的需求後才被提出。", "source": "官方模擬試題"}, {"id": 45, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "Which of the following item(s) should be considered when formulating and describing\n personal training package to a client?\n 於設計和解釋私人教練的服務給一位會員時，應考慮以下哪一／些項目\n\n I Client’s health status 會員的健康狀況\n II Client’s exercise target 會員的健身目標\n III Client’ lifestyle and habits 會員的生活方式和習慣\n IV Client’ financial status 會員的經濟狀況", "options": {"A": "I & II I 和 II", "B": "I, II & III I, II 和 III", "C": "All of above 以上皆是", "D": "None of above 以上皆否"}, "answer": "C", "explanation": "It is a must to understand client’s health status, exercise target, life style and habits during the\n selling service process. As a professional trainer, we should also respect the will of clients and\n their financial status instead of simply upselling or pushing them. It is common that clients\n showed their interest in the training services provided by trainers. However, if the training\n cost is far beyond their financial ability, clients cannot enjoy the services they want. Thus it is\n essential to consider the client’s financial status during the selling process.\n 銷售過程中，會員的健康狀況、健身目標、生活習慣和愛好，肯定是必須要瞭解的。關於\n 作為一名專業的教練，我們也應該尊重客戶的意願和他們的財務狀況，而不是盲目向客\n 人推銷或迫使他們購買你提供的服務。有不少會員在與教練溝通時表現出對私教的課程\n 有相當大的興趣，也期待自己身體的變化帶給自己的快樂。但是，需要支付的費用是很\n 多會員不得不考慮的問題，儘管他們很想請教練，但是收入狀況迫使無法購買私教課。\n 所以，作為教練的確需要考慮會員的經濟狀況。", "source": "官方模擬試題"}, {"id": 46, "chapter": "5. 溝通、業務推廣及商業發展", "stem": "Which of the following item(s) should be considered when formulating and describing\n personal training package to a client?\n 於設計和解釋私人教練的服務給一位會員時，應考慮以下哪一／些項目？", "options": {"A": "Contrast of images 影像對比圖", "B": "Training programme 專業的訓練方案", "C": "Fitness analysis 體測分析表格", "D": "All of the above 以上皆是"}, "answer": "D", "explanation": "The image comparison chart is the
